<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONA | Home</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div id="app-wrapper">
        
        <section id="auth-screen">
            <h1 class="logo">ONA</h1>
            <form id="auth-form" class="form-container">
                <input type="email" id="email" placeholder="Email" required>
                <input type="password" id="password" placeholder="Password" required>
                <button type="submit" id="auth-btn">Log In</button>
            </form>
            <p class="toggle-auth" id="toggle-auth">Don't have an account? <b>Sign up</b></p>
        </section>

        <section id="main-app" style="display: none;">
            <header class="navbar">
                <h2 class="logo-small">ONA</h2>
                <i data-lucide="log-out" id="logout-btn" style="cursor:pointer"></i>
            </header>

            <div id="feed">
                </div>

            <nav class="bottom-nav">
                <i data-lucide="home"></i>
                <i data-lucide="search"></i>
                <div id="add-post-btn" class="nav-add-btn"><i data-lucide="plus-square"></i></div>
                <i data-lucide="heart"></i>
                <i data-lucide="user"></i>
            </nav>
        </section>

        <div id="upload-modal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <span id="close-modal">&times;</span>
                    <h3>New Post</h3>
                    <button type="submit" form="upload-form" class="share-link">Share</button>
                </div>
                <form id="upload-form">
                    <input type="file" id="image-file" accept="image/*" required>
                    <textarea id="caption" placeholder="Write a caption..." required></textarea>
                    <p id="upload-status"></p>
                </form>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
    <script>
        // Initialize the icons
        lucide.createIcons();
    </script>
</body>
</html>
