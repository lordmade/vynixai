<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vynix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/feather-icons"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366F1;
            --primary-dark: #4F46E5;
            --background: #F8FAFC;
            --surface: #FFFFFF;
            --border: #E2E8F0;
            --text-primary: #0F172A;
            --text-secondary: #64748B;
            --text-muted: #94A3B8;
            --like: #F43F5E;
            --story-gradient: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--background);
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            padding-bottom: calc(90px + env(safe-area-inset-bottom));
        }
        
        /* Shimmer */
        .shimmer {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        
        /* Grouped Stories */
        .stories-wrapper {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 16px 0;
            position: sticky;
            top: 60px;
            z-index: 40;
        }
        
        .stories-container {
            display: flex;
            flex-direction: row;
            flex-wrap: nowrap;
            gap: 20px;
            padding: 0 16px;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        
        .stories-container::-webkit-scrollbar { display: none; }
        
        .story-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            flex-shrink: 0;
            scroll-snap-align: start;
            position: relative;
        }
        
        .story-ring-group {
            width: 76px;
            height: 76px;
            border-radius: 50%;
            padding: 4px;
            background: var(--story-gradient);
            position: relative;
        }
        
        .story-ring-group.has-unseen { background: var(--story-gradient); }
        .story-ring-group.all-seen { background: #E2E8F0; }
        
        .story-img-group {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 3px solid var(--surface);
            object-fit: cover;
        }
        
        .story-count {
            position: absolute;
            bottom: -4px;
            right: -4px;
            background: var(--primary);
            color: white;
            font-size: 11px;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 10px;
            border: 2px solid var(--surface);
            min-width: 20px;
            text-align: center;
        }
        
        .story-label {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-secondary);
            max-width: 76px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .story-add-btn {
            position: absolute;
            bottom: 0;
            right: 0;
            background: var(--primary);
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid var(--surface);
        }
        
        /* Posts */
        .app-container { max-width: 100%; margin: 0 auto; }
        @media (min-width: 1024px) { .app-container { max-width: 600px; border-left: 1px solid var(--border); border-right: 1px solid var(--border); } }
        
        .header {
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .post-card {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 16px;
            animation: fadeIn 0.3s ease-out;
            position: relative;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .post-menu {
            position: absolute;
            top: 16px;
            right: 16px;
            opacity: 0;
            transition: opacity 0.2s;
        }
        
        .post-card:hover .post-menu, .post-menu.active { opacity: 1; }
        
        .post-menu-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 4px;
            border-radius: 50%;
        }
        
        .post-dropdown {
            position: absolute;
            top: 40px;
            right: 0;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            display: none;
            min-width: 150px;
            z-index: 20;
            overflow: hidden;
        }
        
        .post-dropdown.active { display: block; }
        
        .dropdown-item {
            padding: 12px 16px;
            font-size: 14px;
            color: var(--text-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
        }
        
        .dropdown-item:hover { background: var(--background); }
        .dropdown-item.delete { color: var(--like); }
        
        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
        }
        
        .post-header { display: flex; gap: 12px; margin-bottom: 12px; padding-right: 40px; }
        .post-author { font-weight: 700; font-size: 15px; }
        .post-meta { color: var(--text-secondary); font-size: 14px; }
        .post-text { font-size: 16px; line-height: 1.5; margin-bottom: 12px; word-wrap: break-word; }
        
        .post-media {
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 12px;
            border: 1px solid var(--border);
        }
        
        .post-media img, .post-media video {
            width: 100%;
            max-height: 500px;
            object-fit: cover;
            display: block;
        }
        
        .actions {
            display: flex;
            justify-content: space-between;
            max-width: 400px;
        }
        
        .action-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 600;
            padding: 8px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s;
            background: none;
            border: none;
            font-family: inherit;
        }
        
        .action-btn:active { transform: scale(0.9); }
        .action-btn.liked { color: var(--like); }
        
        /* Comments */
        .comments-section {
            border-top: 1px solid var(--border);
            margin-top: 12px;
            padding-top: 12px;
            display: none;
        }
        
        .comments-section.active { display: block; }
        
        .comment {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            animation: slideIn 0.3s ease-out;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        .comment-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
        }
        
        .comment-content { flex: 1; min-width: 0; }
        .comment-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }
        .comment-author { font-weight: 600; font-size: 14px; }
        .comment-time { font-size: 12px; color: var(--text-muted); }
        .comment-text { font-size: 14px; color: var(--text-primary); line-height: 1.4; }
        
        .comment-actions {
            display: flex;
            gap: 12px;
            margin-top: 6px;
            font-size: 12px;
            color: var(--text-secondary);
        }
        
        .comment-action {
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .comment-action.liked { color: var(--like); }
        
        .comment-menu {
            margin-left: auto;
            position: relative;
        }
        
        .comment-menu-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 2px;
            border-radius: 50%;
            opacity: 0;
            transition: opacity 0.2s;
        }
        
        .comment:hover .comment-menu-btn { opacity: 1; }
        
        /* Replies */
        .replies-container {
            margin-left: 44px;
            margin-top: 12px;
            padding-left: 12px;
            border-left: 2px solid var(--border);
        }
        
        .reply-input-wrapper {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            margin-left: 44px;
            align-items: center;
        }
        
        .reply-input {
            flex: 1;
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 6px 12px;
            font-size: 13px;
            outline: none;
            font-family: inherit;
        }
        
        .reply-submit {
            background: var(--primary);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            opacity: 0.5;
        }
        
        .reply-submit.active { opacity: 1; }
        
        .comment-input-wrapper {
            display: flex;
            gap: 12px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }
        
        .comment-input {
            flex: 1;
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 10px 16px;
            font-size: 14px;
            outline: none;
            font-family: inherit;
        }
        
        .comment-submit {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: 600;
            cursor: pointer;
            opacity: 0.5;
        }
        
        .comment-submit.active { opacity: 1; }
        
        /* Bottom Nav */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
            display: flex;
            justify-content: space-around;
            z-index: 100;
        }
        
        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px;
            color: var(--text-secondary);
            background: none;
            border: none;
            font-family: inherit;
            cursor: pointer;
        }
        
        .nav-item.active { color: var(--primary); }
        .nav-item span { font-size: 11px; font-weight: 600; }
        
        .fab {
            width: 56px;
            height: 56px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(99,102,241,0.4);
            transform: translateY(-20px);
            cursor: pointer;
        }
        
        /* Modals */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        
        .bottom-sheet {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--surface);
            border-radius: 24px 24px 0 0;
            padding: 20px;
            padding-bottom: calc(20px + env(safe-area-inset-bottom));
            transform: translateY(100%);
            transition: transform 0.3s;
            z-index: 201;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .modal-overlay.active ~ .bottom-sheet { transform: translateY(0); }
        
        /* Confirmation Modal */
        .confirm-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: var(--surface);
            border-radius: 20px;
            padding: 24px;
            width: 90%;
            max-width: 320px;
            z-index: 210;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .confirm-modal.active {
            opacity: 1;
            pointer-events: auto;
            transform: translate(-50%, -50%) scale(1);
        }
        
        .confirm-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; text-align: center; }
        .confirm-text { font-size: 14px; color: var(--text-secondary); margin-bottom: 20px; text-align: center; }
        .confirm-buttons { display: flex; gap: 12px; }
        .confirm-btn { flex: 1; padding: 12px; border-radius: 12px; border: none; font-weight: 600; cursor: pointer; font-size: 15px; }
        .confirm-btn.cancel { background: var(--background); color: var(--text-primary); }
        .confirm-btn.confirm { background: var(--like); color: white; }
        
        /* Story Viewer */
        .story-viewer {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 300;
            display: none;
            flex-direction: column;
        }
        
        .story-viewer.active { display: flex; }
        
        .story-progress-container {
            display: flex;
            gap: 4px;
            padding: 12px;
            padding-top: calc(12px + env(safe-area-inset-top));
        }
        
        .story-progress-bar {
            flex: 1;
            height: 3px;
            background: rgba(255,255,255,0.3);
            border-radius: 3px;
            overflow: hidden;
        }
        
        .story-progress-fill {
            height: 100%;
            background: white;
            width: 0%;
        }
        
        .story-media-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        .story-media {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        
        .story-video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        
        .story-controls {
            position: absolute;
            bottom: 40px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 16px;
            padding: 0 24px;
        }
        
        .story-control-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 12px 24px;
            border-radius: 24px;
            cursor: pointer;
            font-weight: 600;
            backdrop-filter: blur(10px);
        }
        
        .story-header {
            position: absolute;
            top: calc(60px + env(safe-area-inset-top));
            left: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: white;
            z-index: 10;
        }
        
        .story-header img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.3);
        }
        
        .story-nav {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 30%;
            z-index: 5;
        }
        
        .story-nav.prev { left: 0; }
        .story-nav.next { right: 0; }
        
        .upload-progress {
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            overflow: hidden;
            margin: 12px 0;
            display: none;
        }
        
        .upload-progress.active { display: block; }
        
        .progress-bar-fill {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.3s;
        }
        
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #1e293b;
            color: white;
            padding: 12px 24px;
            border-radius: 9999px;
            font-weight: 500;
            opacity: 0;
            transition: all 0.3s;
            z-index: 9999;
            pointer-events: none;
        }
        
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        
        @media (min-width: 1024px) {
            .bottom-nav { display: none; }
            body { padding-bottom: 0; }
        }
        
        /* Video duration badge */
        .video-duration {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background: rgba(0,0,0,0.6);
            color: white;
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 6px;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="app-container">
    <!-- Header -->
    <header class="header">
        <img src="" id="header-avatar" class="avatar" style="width: 32px; height: 32px; cursor: pointer;" onclick="goToProfile()">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="color: var(--primary);">
            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
        </svg>
        <button style="background: none; border: none;" onclick="showToast('Settings')">
            <i data-feather="settings" style="width: 20px; height: 20px; color: var(--text-primary);"></i>
        </button>
    </header>

    <!-- Grouped Stories -->
    <div class="stories-wrapper">
        <div class="stories-container" id="stories-container">
            <!-- Add Story -->
            <div class="story-group" onclick="triggerStoryUpload()">
                <div class="story-ring-group" style="background: var(--border);">
                    <img src="" id="my-story-img" class="story-img-group" style="opacity: 0.8;">
                    <div class="story-add-btn">
                        <i data-feather="plus" style="width: 14px; height: 14px;"></i>
                    </div>
                </div>
                <span class="story-label">Your Story</span>
            </div>
        </div>
    </div>

    <!-- Feed -->
    <div id="feed">
        <!-- Shimmer loading -->
        <div style="padding: 16px; background: var(--surface); border-bottom: 1px solid var(--border);">
            <div style="display: flex; gap: 12px; margin-bottom: 12px;">
                <div class="shimmer" style="width: 48px; height: 48px; border-radius: 50%;"></div>
                <div style="flex: 1;">
                    <div class="shimmer" style="width: 120px; height: 16px; margin-bottom: 8px; border-radius: 4px;"></div>
                    <div class="shimmer" style="width: 80px; height: 14px; border-radius: 4px;"></div>
                </div>
            </div>
            <div class="shimmer" style="width: 100%; height: 200px; border-radius: 16px;"></div>
        </div>
    </div>
</div>

<!-- Bottom Navigation -->
<nav class="bottom-nav">
    <button class="nav-item active" onclick="window.scrollTo({top:0,behavior:'smooth'})">
        <i data-feather="home" style="width: 24px; height: 24px;"></i>
        <span>Home</span>
    </button>
    <button class="nav-item" onclick="showToast('Search')">
        <i data-feather="search" style="width: 24px; height: 24px;"></i>
        <span>Search</span>
    </button>
    <button class="fab" onclick="openCompose()">
        <i data-feather="plus" style="width: 28px; height: 28px;"></i>
    </button>
    <button class="nav-item" onclick="showToast('Notifications')">
        <i data-feather="bell" style="width: 24px; height: 24px;"></i>
        <span>Alerts</span>
    </button>
    <button class="nav-item" onclick="goToProfile()">
        <i data-feather="user" style="width: 24px; height: 24px;"></i>
        <span>Profile</span>
    </button>
</nav>

<!-- Compose Modal -->
<div class="modal-overlay" onclick="closeCompose()"></div>
<div class="bottom-sheet">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
        <button onclick="closeCompose()" style="background: none; border: none; color: var(--text-secondary); font-size: 15px;">Cancel</button>
        <button id="post-btn" onclick="createPost()" style="background: var(--primary); color: white; border: none; padding: 8px 20px; border-radius: 9999px; font-weight: 700; opacity: 0.5;" disabled>Post</button>
    </div>
    
    <div style="display: flex; gap: 12px; margin-bottom: 16px;">
        <img src="" id="compose-avatar" class="avatar" style="width: 40px; height: 40px;">
        <textarea id="compose-text" placeholder="What's happening?" style="flex: 1; border: none; outline: none; font-size: 18px; resize: none; height: 120px; font-family: inherit;" oninput="updatePostButton()"></textarea>
    </div>
    
    <div id="media-preview" style="display: none; position: relative; margin-bottom: 16px; border-radius: 16px; overflow: hidden;">
        <img id="preview-img" style="width: 100%; max-height: 300px; object-fit: cover;">
        <button onclick="clearMedia()" style="position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.6); color: white; border: none; width: 32px; height: 32px; border-radius: 50%; cursor: pointer;">
            <i data-feather="x" style="width: 18px; height: 18px;"></i>
        </button>
    </div>
    
    <div class="upload-progress" id="upload-progress">
        <div class="progress-bar-fill" id="progress-fill"></div>
    </div>
    
    <div style="border-top: 1px solid var(--border); padding-top: 16px; display: flex; justify-content: space-between; align-items: center;">
        <div style="display: flex; gap: 16px;">
            <input type="file" id="media-input" accept="image/*,video/*" style="display: none;" onchange="handleMediaSelect(event)">
            <button onclick="document.getElementById('media-input').click()" style="background: none; border: none; color: var(--primary); cursor: pointer;">
                <i data-feather="image" style="width: 22px; height: 22px;"></i>
            </button>
        </div>
        <span id="char-count" style="color: var(--text-muted); font-size: 14px;">280</span>
    </div>
</div>

<!-- Story Upload Input (Video max 2 mins) -->
<input type="file" id="story-input" accept="image/*,video/*" style="display: none;" onchange="validateAndUploadStory(event)">

<!-- Story Viewer -->
<div class="story-viewer" id="story-viewer">
    <div class="story-progress-container" id="story-progress-container"></div>
    
    <div class="story-header" id="story-header">
        <img src="" id="story-viewer-avatar">
        <div>
            <div style="font-weight: 700;" id="story-viewer-name"></div>
            <div style="font-size: 12px; opacity: 0.8;" id="story-viewer-time"></div>
        </div>
    </div>
    
    <div class="story-nav prev" onclick="navigateStory(-1)"></div>
    <div class="story-nav next" onclick="navigateStory(1)"></div>
    
    <div class="story-media-container" id="story-media-container">
        <!-- Media injected here -->
    </div>
    
    <div class="story-controls" id="story-controls">
        <button class="story-control-btn" onclick="closeStoryViewer()">Close</button>
        <button class="story-control-btn" id="delete-story-btn" onclick="deleteCurrentStory()" style="display: none; background: var(--like);">Delete</button>
    </div>
</div>

<!-- Confirmation Modal -->
<div class="modal-overlay" id="confirm-overlay" onclick="closeConfirmModal()"></div>
<div class="confirm-modal" id="confirm-modal">
    <div class="confirm-title" id="confirm-title">Delete?</div>
    <div class="confirm-text" id="confirm-text">This action cannot be undone.</div>
    <div class="confirm-buttons">
        <button class="confirm-btn cancel" onclick="closeConfirmModal()">Cancel</button>
        <button class="confirm-btn confirm" id="confirm-action-btn" onclick="executeDelete()">Delete</button>
    </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, onValue, onChildAdded, onChildChanged, onChildRemoved, push, set, get, update, remove, query, orderByChild, limitToLast, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const CLOUDINARY_CLOUD_NAME = 'dqkujefxj';
    const CLOUDINARY_UPLOAD_PRESET = 'banter_box';
    const MAX_VIDEO_DURATION = 120; // 2 minutes in seconds
    
    const firebaseConfig = {
        apiKey: "AIzaSyBOyZ3As4GTuNvjemvPF_SpsC6m6vqtNhc",
        authDomain: "fire-b-a8878.firebaseapp.com",
        databaseURL: "https://fire-b-a8878.firebaseio.com",
        projectId: "fire-b-a8878",
        storageBucket: "fire-b-a8878.appspot.com",
        messagingSenderId: "658673187627",
        appId: "1:658673187627:web:6e4c29af661785f0afa36e"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    let currentUser = null;
    let currentUserData = null;
    let selectedMedia = null;
    let deleteCallback = null;
    let deleteType = null; // 'post', 'comment', 'story'
    let deleteData = null;
    
    // Story viewer state
    let storyGroups = new Map(); // userId -> {user, stories[]}
    let currentStoryGroupIndex = 0;
    let currentStoryIndex = 0;
    let storyTimeout = null;
    let currentVideoElement = null;

    async function uploadToCloudinary(file, folder = 'posts') {
        const formData = new FormData();
        formData.append('file', file);
        formData.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);
        formData.append('folder', folder);
        formData.append('context', `user=${currentUser?.uid || 'anonymous'}`);
        
        const response = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/upload`, {
            method: 'POST',
            body: formData
        });
        
        if (!response.ok) throw new Error('Upload failed');
        return await response.json();
    }

    onAuthStateChanged(auth, async (user) => {
        if (!user) {
            window.location.href = 'auth.html';
            return;
        }
        currentUser = user;
        await loadUserData();
        setupStoriesListeners();
        setupPostsListeners();
    });

    async function loadUserData() {
        const userRef = ref(db, `users/${currentUser.uid}`);
        const snapshot = await get(userRef);
        
        if (snapshot.exists()) {
            currentUserData = snapshot.val();
        } else {
            currentUserData = {
                uid: currentUser.uid,
                email: currentUser.email,
                username: currentUser.email.split('@')[0],
                displayName: currentUser.displayName || 'User',
                photoURL: currentUser.photoURL || `https://ui-avatars.com/api/?name=${currentUser.email}&background=6366F1&color=fff`,
                createdAt: Date.now()
            };
            await set(userRef, currentUserData);
        }
        
        document.getElementById('header-avatar').src = currentUserData.photoURL;
        document.getElementById('compose-avatar').src = currentUserData.photoURL;
        document.getElementById('my-story-img').src = currentUserData.photoURL;
    }

    // Grouped Stories System
    function setupStoriesListeners() {
        const storiesRef = query(ref(db, 'stories'), orderByChild('timestamp'));
        
        onChildAdded(storiesRef, (snapshot) => {
            const story = { id: snapshot.key, ...snapshot.val() };
            if (Date.now() - story.timestamp < 24 * 60 * 60 * 1000) {
                addStoryToGroup(story);
            }
        });
        
        onChildChanged(storiesRef, (snapshot) => {
            const story = { id: snapshot.key, ...snapshot.val() };
            updateStoryInGroup(story);
        });
        
        onChildRemoved(storiesRef, (snapshot) => {
            removeStoryFromGroup(snapshot.key);
        });
    }

    function addStoryToGroup(story) {
        const userId = story.uid;
        
        if (!storyGroups.has(userId)) {
            storyGroups.set(userId, {
                user: {
                    uid: userId,
                    username: story.username,
                    photoURL: story.userPhoto
                },
                stories: []
            });
        }
        
        const group = storyGroups.get(userId);
        // Check for duplicates
        if (!group.stories.find(s => s.id === story.id)) {
            group.stories.push(story);
            // Sort by timestamp
            group.stories.sort((a, b) => a.timestamp - b.timestamp);
            renderStoryGroups();
        }
    }

    function updateStoryInGroup(story) {
        const group = storyGroups.get(story.uid);
        if (group) {
            const index = group.stories.findIndex(s => s.id === story.id);
            if (index !== -1) {
                group.stories[index] = story;
                renderStoryGroups();
            }
        }
    }

    function removeStoryFromGroup(storyId) {
        for (const [userId, group] of storyGroups) {
            const index = group.stories.findIndex(s => s.id === storyId);
            if (index !== -1) {
                group.stories.splice(index, 1);
                if (group.stories.length === 0) {
                    storyGroups.delete(userId);
                }
                renderStoryGroups();
                break;
            }
        }
    }

    function renderStoryGroups() {
        const container = document.getElementById('stories-container');
        // Keep add button
        const addBtn = container.firstElementChild;
        container.innerHTML = '';
        container.appendChild(addBtn);
        
        // Render each user group
        for (const [userId, group] of storyGroups) {
            const hasUnseen = group.stories.some(s => !s.viewed?.[currentUser.uid]);
            const isOwn = userId === currentUser.uid;
            
            const groupEl = document.createElement('div');
            groupEl.className = 'story-group';
            groupEl.onclick = () => openStoryViewer(userId);
            
            groupEl.innerHTML = `
                <div class="story-ring-group ${hasUnseen ? 'has-unseen' : 'all-seen'}">
                    <img src="${group.user.photoURL}" class="story-img-group">
                    ${group.stories.length > 1 ? `<div class="story-count">${group.stories.length}</div>` : ''}
                </div>
                <span class="story-label">${isOwn ? 'Your Story' : group.user.username}</span>
            `;
            
            container.appendChild(groupEl);
        }
    }

    // Story Upload with Validation
    window.triggerStoryUpload = () => {
        document.getElementById('story-input').click();
    };

    window.validateAndUploadStory = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        
        // Check if video and get duration
        if (file.type.startsWith('video/')) {
            const video = document.createElement('video');
            video.preload = 'metadata';
            
            video.onloadedmetadata = async () => {
                window.URL.revokeObjectURL(video.src);
                if (video.duration > MAX_VIDEO_DURATION) {
                    showToast(`Video too long. Max ${MAX_VIDEO_DURATION/60} minutes allowed.`);
                    return;
                }
                await uploadStory(file);
            };
            
            video.src = URL.createObjectURL(file);
        } else {
            await uploadStory(file);
        }
    };

    async function uploadStory(file) {
        showToast('Uploading...');
        try {
            const result = await uploadToCloudinary(file, 'stories');
            const storyRef = push(ref(db, 'stories'));
            await set(storyRef, {
                uid: currentUser.uid,
                username: currentUserData.username,
                userPhoto: currentUserData.photoURL,
                mediaUrl: result.secure_url,
                mediaType: result.resource_type,
                timestamp: serverTimestamp(),
                viewed: { [currentUser.uid]: true }
            });
            showToast('Story added!');
        } catch (error) {
            console.error(error);
            showToast('Upload failed');
        }
    }

    // Story Viewer with Video Support
    window.openStoryViewer = (userId) => {
        const group = storyGroups.get(userId);
        if (!group || group.stories.length === 0) return;
        
        currentStoryGroupIndex = Array.from(storyGroups.keys()).indexOf(userId);
        currentStoryIndex = 0;
        
        // Find first unseen or start from beginning
        const firstUnseen = group.stories.findIndex(s => !s.viewed?.[currentUser.uid]);
        if (firstUnseen !== -1) currentStoryIndex = firstUnseen;
        
        displayCurrentStory();
    };

    function displayCurrentStory() {
        const userIds = Array.from(storyGroups.keys());
        const userId = userIds[currentStoryGroupIndex];
        const group = storyGroups.get(userId);
        const story = group.stories[currentStoryIndex];
        
        if (!story) {
            closeStoryViewer();
            return;
        }
        
        const viewer = document.getElementById('story-viewer');
        const container = document.getElementById('story-media-container');
        const progressContainer = document.getElementById('story-progress-container');
        
        // Update header
        document.getElementById('story-viewer-avatar').src = group.user.photoURL;
        document.getElementById('story-viewer-name').textContent = group.user.username;
        document.getElementById('story-viewer-time').textContent = formatTime(story.timestamp);
        
        // Show delete if own story
        const deleteBtn = document.getElementById('delete-story-btn');
        if (story.uid === currentUser.uid) {
            deleteBtn.style.display = 'block';
            viewer.classList.add('own-story');
        } else {
            deleteBtn.style.display = 'none';
            viewer.classList.remove('own-story');
            // Mark as viewed
            update(ref(db, `stories/${story.id}/viewed/${currentUser.uid}`), true);
        }
        
        // Create progress bars for all stories in group
        progressContainer.innerHTML = '';
        group.stories.forEach((_, idx) => {
            const bar = document.createElement('div');
            bar.className = 'story-progress-bar';
            const fill = document.createElement('div');
            fill.className = 'story-progress-fill';
            fill.style.width = idx < currentStoryIndex ? '100%' : '0%';
            if (idx === currentStoryIndex) fill.id = 'current-progress';
            bar.appendChild(fill);
            progressContainer.appendChild(bar);
        });
        
        // Display media
        container.innerHTML = '';
        if (currentVideoElement) {
            currentVideoElement.pause();
            currentVideoElement = null;
        }
        
        if (story.mediaType === 'video') {
            const video = document.createElement('video');
            video.className = 'story-video';
            video.src = story.mediaUrl;
            video.autoplay = true;
            video.playsInline = true;
            video.muted = false;
            
            video.onloadedmetadata = () => {
                const duration = Math.min(video.duration * 1000, 15000); // Max 15s per story
                animateProgress(duration);
                storyTimeout = setTimeout(() => navigateStory(1), duration);
            };
            
            video.onended = () => navigateStory(1);
            container.appendChild(video);
            currentVideoElement = video;
        } else {
            const img = document.createElement('img');
            img.className = 'story-media';
            img.src = story.mediaUrl;
            container.appendChild(img);
            
            animateProgress(5000); // 5 seconds for images
            storyTimeout = setTimeout(() => navigateStory(1), 5000);
        }
        
        viewer.classList.add('active');
    }

    function animateProgress(duration) {
        const fill = document.getElementById('current-progress');
        if (fill) {
            setTimeout(() => {
                fill.style.transition = `width ${duration}ms linear`;
                fill.style.width = '100%';
            }, 50);
        }
    }

    window.navigateStory = (direction) => {
        if (storyTimeout) clearTimeout(storyTimeout);
        
        const userIds = Array.from(storyGroups.keys());
        const currentGroup = storyGroups.get(userIds[currentStoryGroupIndex]);
        
        currentStoryIndex += direction;
        
        if (currentStoryIndex >= currentGroup.stories.length) {
            // Next user
            currentStoryGroupIndex++;
            currentStoryIndex = 0;
            if (currentStoryGroupIndex >= userIds.length) {
                closeStoryViewer();
                return;
            }
        } else if (currentStoryIndex < 0) {
            // Previous user
            currentStoryGroupIndex--;
            if (currentStoryGroupIndex < 0) {
                closeStoryViewer();
                return;
            }
            const prevGroup = storyGroups.get(userIds[currentStoryGroupIndex]);
            currentStoryIndex = prevGroup.stories.length - 1;
        }
        
        displayCurrentStory();
    };

    window.closeStoryViewer = () => {
        if (storyTimeout) clearTimeout(storyTimeout);
        if (currentVideoElement) {
            currentVideoElement.pause();
            currentVideoElement = null;
        }
        document.getElementById('story-viewer').classList.remove('active');
    };

    window.deleteCurrentStory = () => {
        const userIds = Array.from(storyGroups.keys());
        const group = storyGroups.get(userIds[currentStoryGroupIndex]);
        const story = group.stories[currentStoryIndex];
        
        deleteType = 'story';
        deleteData = story.id;
        showConfirmModal('Delete Story?', 'This story will be permanently removed.', 'Delete');
    };

    // Posts System
    function setupPostsListeners() {
        const postsRef = query(ref(db, 'posts'), orderByChild('timestamp'), limitToLast(50));
        
        onChildAdded(postsRef, async (snapshot) => {
            const post = { id: snapshot.key, ...snapshot.val() };
            if (!document.getElementById(`post-${post.id}`)) {
                await renderPost(post);
            }
        });
        
        onChildChanged(postsRef, (snapshot) => {
            updatePostInDOM(snapshot.key, snapshot.val());
        });
        
        onChildRemoved(postsRef, (snapshot) => {
            const el = document.getElementById(`post-${snapshot.key}`);
            if (el) el.remove();
        });
    }

    async function renderPost(post) {
        const feed = document.getElementById('feed');
        const userSnapshot = await get(ref(db, `users/${post.uid}`));
        const user = userSnapshot.val() || {};
        const isOwner = post.uid === currentUser.uid;
        
        const div = document.createElement('div');
        div.className = 'post-card';
        div.id = `post-${post.id}`;
        
        div.innerHTML = `
            ${isOwner ? `
            <div class="post-menu">
                <button class="post-menu-btn" onclick="togglePostMenu('${post.id}', event)">
                    <i data-feather="more-horizontal" style="width: 20px; height: 20px;"></i>
                </button>
                <div class="post-dropdown" id="dropdown-${post.id}">
                    <button class="dropdown-item delete" onclick="confirmDeletePost('${post.id}')">
                        <i data-feather="trash-2" style="width: 16px; height: 16px;"></i>
                        Delete
                    </button>
                </div>
            </div>
            ` : ''}
            
            <div class="post-header">
                <img src="${user.photoURL}" class="avatar" onclick="goToProfile('${post.uid}')" style="cursor: pointer;">
                <div style="flex: 1; min-width: 0;">
                    <div class="post-author">${user.displayName}</div>
                    <div class="post-meta">@${user.username} · ${formatTime(post.timestamp)}</div>
                </div>
            </div>
            
            <div class="post-text">${escapeHtml(post.text)}</div>
            
            ${post.mediaUrl ? `
                <div class="post-media">
                    ${post.mediaType === 'video' ? 
                        `<video src="${post.mediaUrl}" controls playsinline style="width: 100%;"></video>` :
                        `<img src="${post.mediaUrl}" style="width: 100%; display: block;" loading="lazy">`
                    }
                </div>
            ` : ''}
            
            <div class="actions">
                <button class="action-btn ${post.likes?.[currentUser.uid] ? 'liked' : ''}" onclick="toggleLike('${post.id}')">
                    <i data-feather="heart" style="width: 20px; height: 20px;" ${post.likes?.[currentUser.uid] ? 'fill="currentColor"' : ''}></i>
                    <span id="like-count-${post.id}">${Object.keys(post.likes || {}).length}</span>
                </button>
                
                <button class="action-btn" onclick="toggleComments('${post.id}')">
                    <i data-feather="message-circle" style="width: 20px; height: 20px;"></i>
                    <span id="comment-count-${post.id}">${Object.keys(post.comments || {}).length}</span>
                </button>
                
                <button class="action-btn" onclick="showToast('Share')">
                    <i data-feather="share" style="width: 20px; height: 20px;"></i>
                </button>
            </div>
            
            <div class="comments-section" id="comments-${post.id}">
                <div id="comments-list-${post.id}"></div>
                <div class="comment-input-wrapper">
                    <img src="${currentUserData.photoURL}" class="comment-avatar">
                    <input type="text" class="comment-input" id="comment-input-${post.id}" placeholder="Write a comment..." onkeypress="handleCommentKeypress(event, '${post.id}')" oninput="updateCommentButton('${post.id}')">
                    <button class="comment-submit" id="comment-submit-${post.id}" onclick="submitComment('${post.id}')" disabled>Post</button>
                </div>
            </div>
        `;
        
        feed.appendChild(div);
        
        // Setup comments listener for this post
        setupCommentsListener(post.id);
        feather.replace();
    }

    function updatePostInDOM(postId, postData) {
        const postEl = document.getElementById(`post-${postId}`);
        if (!postEl) return;
        
        // Update likes
        const likeCount = Object.keys(postData.likes || {}).length;
        const userLiked = postData.likes?.[currentUser.uid];
        const likeBtn = postEl.querySelector('.action-btn');
        const likeIcon = likeBtn.querySelector('i');
        
        document.getElementById(`like-count-${postId}`).textContent = likeCount;
        if (userLiked) {
            likeBtn.classList.add('liked');
            likeIcon.setAttribute('fill', 'currentColor');
        } else {
            likeBtn.classList.remove('liked');
            likeIcon.removeAttribute('fill');
        }
        
        // Update comment count
        document.getElementById(`comment-count-${postId}`).textContent = Object.keys(postData.comments || {}).length;
    }

    function setupCommentsListener(postId) {
        const commentsRef = ref(db, `posts/${postId}/comments`);
        
        onChildAdded(commentsRef, async (snapshot) => {
            const commentId = snapshot.key;
            const comment = snapshot.val();
            
            // Check if already rendered
            if (document.getElementById(`comment-${postId}-${commentId}`)) return;
            
            await renderComment(postId, commentId, comment);
        });
        
        onChildChanged(commentsRef, (snapshot) => {
            const commentId = snapshot.key;
            const comment = snapshot.val();
            updateCommentInDOM(postId, commentId, comment);
        });
        
        onChildRemoved(commentsRef, (snapshot) => {
            const el = document.getElementById(`comment-${postId}-${snapshot.key}`);
            if (el) el.remove();
        });
    }

    async function renderComment(postId, commentId, comment, isReply = false, parentId = null) {
        const containerId = parentId ? `replies-${postId}-${parentId}` : `comments-list-${postId}`;
        const container = document.getElementById(containerId);
        if (!container) return;
        
        // Check duplicate
        if (document.getElementById(`comment-${postId}-${commentId}`)) return;
        
        const userSnapshot = await get(ref(db, `users/${comment.uid}`));
        const user = userSnapshot.val() || {};
        const isOwner = comment.uid === currentUser.uid;
        const likes = comment.likes || {};
        const likeCount = Object.keys(likes).length;
        const userLiked = likes[currentUser.uid];
        
        const div = document.createElement('div');
        div.className = 'comment';
        div.id = `comment-${postId}-${commentId}`;
        div.style.marginLeft = isReply ? '44px' : '0';
        
        div.innerHTML = `
            <img src="${user.photoURL}" class="comment-avatar">
            <div class="comment-content">
                <div class="comment-header">
                    <span class="comment-author">${user.displayName}</span>
                    <span class="comment-time">${formatTime(comment.timestamp)}</span>
                    ${isOwner ? `
                    <div class="comment-menu">
                        <button class="comment-menu-btn" onclick="confirmDeleteComment('${postId}', '${commentId}')">
                            <i data-feather="trash-2" style="width: 14px; height: 14px;"></i>
                        </button>
                    </div>
                    ` : ''}
                </div>
                <div class="comment-text">${escapeHtml(comment.text)}</div>
                <div class="comment-actions">
                    <span class="comment-action ${userLiked ? 'liked' : ''}" onclick="toggleCommentLike('${postId}', '${commentId}')">
                        <i data-feather="heart" style="width: 12px; height: 12px;" ${userLiked ? 'fill="currentColor"' : ''}></i>
                        ${likeCount > 0 ? likeCount : 'Like'}
                    </span>
                    ${!isReply ? `<span class="comment-action" onclick="showReplyInput('${postId}', '${commentId}')">Reply</span>` : ''}
                </div>
                <div id="replies-${postId}-${commentId}" style="margin-top: 12px;"></div>
                <div id="reply-input-container-${postId}-${commentId}"></div>
            </div>
        `;
        
        container.appendChild(div);
        
        // Load replies
        if (comment.replies) {
            Object.entries(comment.replies).forEach(([replyId, reply]) => {
                renderComment(postId, replyId, reply, true, commentId);
            });
        }
        
        feather.replace();
    }

    function updateCommentInDOM(postId, commentId, comment) {
        const commentEl = document.getElementById(`comment-${postId}-${commentId}`);
        if (!commentEl) return;
        
        // Update likes
        const likes = comment.likes || {};
        const likeCount = Object.keys(likes).length;
        const userLiked = likes[currentUser.uid];
        const likeAction = commentEl.querySelector('.comment-action');
        
        likeAction.innerHTML = `
            <i data-feather="heart" style="width: 12px; height: 12px;" ${userLiked ? 'fill="currentColor"' : ''}></i>
            ${likeCount > 0 ? likeCount : 'Like'}
        `;
        likeAction.classList.toggle('liked', userLiked);
        
        // Load new replies if any
        if (comment.replies) {
            Object.entries(comment.replies).forEach(([replyId, reply]) => {
                if (!document.getElementById(`comment-${postId}-${replyId}`)) {
                    renderComment(postId, replyId, reply, true, commentId);
                }
            });
        }
        
        feather.replace();
    }

    // Interactions
    window.togglePostMenu = (postId, event) => {
        event.stopPropagation();
        const dropdown = document.getElementById(`dropdown-${postId}`);
        dropdown.classList.toggle('active');
    };

    window.toggleLike = async (postId) => {
        const likeRef = ref(db, `posts/${postId}/likes/${currentUser.uid}`);
        const snapshot = await get(likeRef);
        
        if (snapshot.exists()) {
            await remove(likeRef);
        } else {
            await set(likeRef, true);
            if (navigator.vibrate) navigator.vibrate(50);
        }
    };

    window.toggleComments = (postId) => {
        const section = document.getElementById(`comments-${postId}`);
        section.classList.toggle('active');
    };

    window.updateCommentButton = (postId) => {
        const input = document.getElementById(`comment-input-${postId}`);
        const btn = document.getElementById(`comment-submit-${postId}`);
        btn.disabled = !input.value.trim();
        btn.classList.toggle('active', !!input.value.trim());
    };

    window.handleCommentKeypress = (event, postId) => {
        if (event.key === 'Enter') submitComment(postId);
    };

    window.submitComment = async (postId) => {
        const input = document.getElementById(`comment-input-${postId}`);
        const text = input.value.trim();
        if (!text) return;
        
        const btn = document.getElementById(`comment-submit-${postId}`);
        btn.disabled = true;
        
        try {
            const commentRef = push(ref(db, `posts/${postId}/comments`));
            await set(commentRef, {
                uid: currentUser.uid,
                text: text,
                timestamp: serverTimestamp(),
                likes: {}
            });
            
            input.value = '';
            updateCommentButton(postId);
        } catch (error) {
            showToast('Failed to post comment');
        } finally {
            btn.disabled = false;
        }
    };

    window.toggleCommentLike = async (postId, commentId) => {
        const likeRef = ref(db, `posts/${postId}/comments/${commentId}/likes/${currentUser.uid}`);
        const snapshot = await get(likeRef);
        
        if (snapshot.exists()) {
            await remove(likeRef);
        } else {
            await set(likeRef, true);
        }
    };

    window.showReplyInput = (postId, commentId) => {
        const container = document.getElementById(`reply-input-container-${postId}-${commentId}`);
        if (container.innerHTML) {
            container.innerHTML = '';
            return;
        }
        
        container.innerHTML = `
            <div class="reply-input-wrapper">
                <img src="${currentUserData.photoURL}" class="comment-avatar" style="width: 28px; height: 28px;">
                <input type="text" class="reply-input" id="reply-input-${postId}-${commentId}" placeholder="Write a reply..." onkeypress="if(event.key==='Enter') submitReply('${postId}', '${commentId}')">
                <button class="reply-submit" onclick="submitReply('${postId}', '${commentId}')">Post</button>
            </div>
        `;
        setTimeout(() => document.getElementById(`reply-input-${postId}-${commentId}`).focus(), 100);
    };

    window.submitReply = async (postId, commentId) => {
        const input = document.getElementById(`reply-input-${postId}-${commentId}`);
        const text = input.value.trim();
        if (!text) return;
        
        try {
            const replyRef = push(ref(db, `posts/${postId}/comments/${commentId}/replies`));
            await set(replyRef, {
                uid: currentUser.uid,
                text: text,
                timestamp: serverTimestamp(),
                likes: {}
            });
        } catch (error) {
            showToast('Failed to post reply');
        }
    };

    // Delete System
    window.confirmDeletePost = (postId) => {
        deleteType = 'post';
        deleteData = postId;
        showConfirmModal('Delete Post?', 'This action cannot be undone.', 'Delete');
    };

    window.confirmDeleteComment = (postId, commentId) => {
        deleteType = 'comment';
        deleteData = { postId, commentId };
        showConfirmModal('Delete Comment?', 'This comment will be permanently removed.', 'Delete');
    };

    function showConfirmModal(title, text, confirmText) {
        document.getElementById('confirm-title').textContent = title;
        document.getElementById('confirm-text').textContent = text;
        document.getElementById('confirm-action-btn').textContent = confirmText;
        document.getElementById('confirm-overlay').classList.add('active');
        document.getElementById('confirm-modal').classList.add('active');
    }

    window.closeConfirmModal = () => {
        document.getElementById('confirm-overlay').classList.remove('active');
        document.getElementById('confirm-modal').classList.remove('active');
        deleteType = null;
        deleteData = null;
    };

    window.executeDelete = async () => {
        if (!deleteType || !deleteData) {
            closeConfirmModal();
            return;
        }
        
        try {
            if (deleteType === 'post') {
                await remove(ref(db, `posts/${deleteData}`));
                showToast('Post deleted');
            } else if (deleteType === 'comment') {
                await remove(ref(db, `posts/${deleteData.postId}/comments/${deleteData.commentId}`));
                showToast('Comment deleted');
            } else if (deleteType === 'story') {
                await remove(ref(db, `stories/${deleteData}`));
                closeStoryViewer();
                showToast('Story deleted');
            }
        } catch (error) {
            showToast('Delete failed');
        }
        
        closeConfirmModal();
    };

    // Compose
    window.openCompose = () => {
        document.querySelector('.modal-overlay').classList.add('active');
    };

    window.closeCompose = () => {
        document.querySelector('.modal-overlay').classList.remove('active');
        clearMedia();
    };

    window.updatePostButton = () => {
        const text = document.getElementById('compose-text').value;
        const btn = document.getElementById('post-btn');
        document.getElementById('char-count').textContent = 280 - text.length;
        
        btn.disabled = !text.trim() && !selectedMedia;
        btn.style.opacity = (text.trim() || selectedMedia) ? '1' : '0.5';
    };

    window.handleMediaSelect = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        
        selectedMedia = file;
        const preview = document.getElementById('media-preview');
        document.getElementById('preview-img').src = URL.createObjectURL(file);
        preview.style.display = 'block';
        updatePostButton();
    };

    window.clearMedia = () => {
        selectedMedia = null;
        document.getElementById('media-preview').style.display = 'none';
        document.getElementById('media-input').value = '';
        updatePostButton();
    };

    window.createPost = async () => {
        const text = document.getElementById('compose-text').value.trim();
        if (!text && !selectedMedia) return;
        
        const btn = document.getElementById('post-btn');
        btn.disabled = true;
        btn.textContent = 'Posting...';
        
        try {
            let mediaUrl = null;
            let mediaType = null;
            
            if (selectedMedia) {
                const result = await uploadToCloudinary(selectedMedia, 'posts');
                mediaUrl = result.secure_url;
                mediaType = result.resource_type;
            }
            
            const postRef = push(ref(db, 'posts'));
            await set(postRef, {
                uid: currentUser.uid,
                text: text,
                mediaUrl: mediaUrl,
                mediaType: mediaType,
                timestamp: serverTimestamp(),
                likes: {},
                comments: {}
            });
            
            document.getElementById('compose-text').value = '';
            closeCompose();
            showToast('Posted!');
        } catch (error) {
            showToast('Upload failed');
        } finally {
            btn.textContent = 'Post';
            btn.disabled = false;
        }
    };

    // Utilities
    function formatTime(timestamp) {
        if (!timestamp) return 'now';
        const secs = Math.floor((Date.now() - timestamp) / 1000);
        if (secs < 60) return 'now';
        if (secs < 3600) return Math.floor(secs/60) + 'm';
        if (secs < 86400) return Math.floor(secs/3600) + 'h';
        return Math.floor(secs/86400) + 'd';
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    window.showToast = (msg) => {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
    };

    window.goToProfile = (uid) => {
        window.location.href = `profile.html?id=${uid || currentUser.uid}`;
    };

    feather.replace();
</script>

</body>
</html>
