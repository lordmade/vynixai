<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Vynix - Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/feather-icons"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366F1;
            --primary-light: #818CF8;
            --primary-dark: #4F46E5;
            --background: #F8FAFC;
            --surface: #FFFFFF;
            --border: #E2E8F0;
            --text-primary: #0F172A;
            --text-secondary: #64748B;
            --text-muted: #94A3B8;
            --danger: #EF4444;
            --success: #10B981;
            --like: #F43F5E;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--background);
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94A3B8; }
        
        /* Layout Grid */
        .app-container {
            display: grid;
            grid-template-columns: 275px 1fr 350px;
            max-width: 1265px;
            margin: 0 auto;
            min-height: 100vh;
        }
        
        @media (max-width: 1280px) {
            .app-container { grid-template-columns: 88px 1fr; }
            .right-sidebar { display: none; }
        }
        
        @media (max-width: 768px) {
            .app-container { grid-template-columns: 1fr; }
            .left-sidebar { display: none; }
            .mobile-nav { display: flex !important; }
        }
        
        /* Sidebar */
        .left-sidebar {
            position: sticky;
            top: 0;
            height: 100vh;
            padding: 0 12px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
            background: var(--surface);
        }
        
        .nav-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 12px;
            margin: 4px 0;
            border-radius: 9999px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 20px;
            font-weight: 500;
            color: var(--text-primary);
            text-decoration: none;
        }
        
        .nav-item:hover { background: rgba(99, 102, 241, 0.1); color: var(--primary); }
        .nav-item.active { font-weight: 700; color: var(--primary); }
        .nav-item i { width: 26px; height: 26px; }
        
        .logo {
            padding: 12px;
            margin: 8px 0 16px;
        }
        
        .post-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 9999px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 16px;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
            transition: all 0.2s;
        }
        
        .post-btn:hover { background: var(--primary-dark); transform: translateY(-1px); }
        
        .user-profile {
            margin-top: auto;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-radius: 9999px;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .user-profile:hover { background: rgba(99, 102, 241, 0.1); }
        
        /* Main Content */
        .main-content {
            border-right: 1px solid var(--border);
            background: var(--surface);
            min-height: 100vh;
        }
        
        .header {
            position: sticky;
            top: 0;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            z-index: 10;
        }
        
        .header h1 {
            padding: 16px;
            font-size: 20px;
            font-weight: 700;
        }
        
        .tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
        }
        
        .tab {
            flex: 1;
            padding: 16px;
            text-align: center;
            font-weight: 500;
            cursor: pointer;
            position: relative;
            transition: all 0.2s;
        }
        
        .tab:hover { background: rgba(99, 102, 241, 0.05); }
        .tab.active { font-weight: 700; color: var(--primary); }
        .tab.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 56px;
            height: 4px;
            background: var(--primary);
            border-radius: 4px;
        }
        
        /* Compose Box */
        .compose-box {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 12px;
        }
        
        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
            background: var(--border);
            flex-shrink: 0;
        }
        
        .compose-input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 20px;
            resize: none;
            min-height: 80px;
            font-family: inherit;
        }
        
        .compose-input::placeholder { color: var(--text-secondary); }
        
        .compose-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }
        
        .media-btn {
            color: var(--primary);
            padding: 8px;
            border-radius: 50%;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .media-btn:hover { background: rgba(99, 102, 241, 0.1); }
        
        .post-submit {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 24px;
            border-radius: 9999px;
            font-weight: 700;
            cursor: pointer;
            opacity: 0.5;
            pointer-events: none;
            transition: all 0.2s;
        }
        
        .post-submit.active { opacity: 1; pointer-events: auto; }
        .post-submit:hover { background: var(--primary-dark); }
        
        /* Posts Feed */
        .post {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .post:hover { background: rgba(248, 250, 252, 0.5); }
        
        .post-content { flex: 1; min-width: 0; }
        
        .post-header {
            display: flex;
            align-items: center;
            gap: 4px;
            margin-bottom: 4px;
            font-size: 15px;
        }
        
        .post-author {
            font-weight: 700;
            color: var(--text-primary);
        }
        
        .post-handle, .post-time {
            color: var(--text-secondary);
        }
        
        .post-text {
            font-size: 15px;
            line-height: 1.5;
            margin-bottom: 12px;
            word-wrap: break-word;
        }
        
        .post-media {
            margin-bottom: 12px;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border);
            max-height: 500px;
        }
        
        .post-media img, .post-media video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        
        .post-actions {
            display: flex;
            justify-content: space-between;
            max-width: 425px;
        }
        
        .action-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            font-size: 13px;
            padding: 8px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .action-btn:hover { color: var(--primary); background: rgba(99, 102, 241, 0.1); }
        .action-btn.liked { color: var(--like); }
        .action-btn.liked:hover { background: rgba(244, 63, 94, 0.1); }
        
        /* Right Sidebar */
        .right-sidebar {
            padding: 0 24px;
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto;
        }
        
        .search-box {
            position: sticky;
            top: 0;
            background: var(--background);
            padding: 12px 0;
            z-index: 5;
        }
        
        .search-input {
            width: 100%;
            padding: 12px 16px 12px 48px;
            border: none;
            border-radius: 9999px;
            background: #E2E8F0;
            font-size: 15px;
            outline: none;
            transition: all 0.2s;
        }
        
        .search-input:focus {
            background: var(--surface);
            border: 1px solid var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }
        
        .trends {
            background: #F1F5F9;
            border-radius: 16px;
            margin-top: 16px;
            padding: 16px 0;
        }
        
        .trend-header {
            padding: 0 16px 12px;
            font-size: 20px;
            font-weight: 800;
        }
        
        .trend-item {
            padding: 12px 16px;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .trend-item:hover { background: rgba(0,0,0,0.03); }
        
        .trend-category {
            font-size: 13px;
            color: var(--text-secondary);
        }
        
        .trend-title {
            font-weight: 700;
            margin: 2px 0;
        }
        
        .trend-count {
            font-size: 13px;
            color: var(--text-secondary);
        }
        
        /* Mobile Navigation */
        .mobile-nav {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--surface);
            border-top: 1px solid var(--border);
            padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
            justify-content: space-around;
            z-index: 100;
        }
        
        .mobile-nav-item {
            padding: 8px 16px;
            color: var(--text-secondary);
        }
        
        .mobile-nav-item.active { color: var(--primary); }
        
        .fab {
            position: fixed;
            bottom: 80px;
            right: 16px;
            width: 56px;
            height: 56px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
            cursor: pointer;
            z-index: 50;
        }
        
        @media (min-width: 769px) { .fab { display: none; } }
        
        /* Loading States */
        .skeleton {
            background: linear-gradient(90deg, #E2E8F0 25%, #F1F5F9 50%, #E2E8F0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 4px;
        }
        
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        
        /* Toast */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #1e293b;
            color: white;
            padding: 12px 24px;
            border-radius: 9999px;
            font-weight: 500;
            opacity: 0;
            transition: all 0.3s;
            z-index: 9999;
            pointer-events: none;
        }
        
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        
        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }
        
        .modal-overlay.active { display: flex; }
        
        .modal {
            background: var(--surface);
            border-radius: 16px;
            width: 90%;
            max-width: 600px;
            max-height: 90vh;
            overflow: hidden;
            animation: modalIn 0.3s;
        }
        
        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        
        .modal-header {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .modal-body { padding: 16px; overflow-y: auto; max-height: 60vh; }
    </style>
</head>
<body>

<div class="app-container">
    <!-- Left Sidebar -->
    <aside class="left-sidebar">
        <div class="logo">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--primary);">
                <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
            </svg>
        </div>
        
        <nav>
            <a href="index.html" class="nav-item active">
                <i data-feather="home"></i>
                <span>Home</span>
            </a>
            <a href="explore.html" class="nav-item">
                <i data-feather="hash"></i>

            <a href="notifications.html" class="nav-item">

            <a href="messages.html" class="nav-item">
                <i data-feather="mail"></i>

            </a>
            <a href="#" class="nav-item" onclick="openBookmarks()">
                <i data-feather="bookmark"></i>
                <span>Bookmarks</span>
            </a>
            <a href="profile.html" class="nav-item">
                <i data-feather="user"></i>
                <span>Profile</span>
            </a>
        </nav>
        
        <button class="post-btn" onclick="openComposeModal()">Post</button>
        
        <div class="user-profile" onclick="goToProfile()">
            <img src="" alt="Profile" class="avatar" id="sidebar-avatar" style="width:40px; height:40px;">
            <div style="flex:1; min-width:0;">
                <div style="font-weight:700;" id="sidebar-name">User</div>
                <div style="color:var(--text-secondary); font-size:14px;" id="sidebar-handle">@user</div>
            </div>
            <i data-feather="more-horizontal" style="width:18px; height:18px;"></i>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <div class="header">
            <h1>Home</h1>
            <div class="tabs">
                <div class="tab active" onclick="switchTab('forYou')">For You</div>
                <div class="tab" onclick="switchTab('following')">Following</div>
            </div>
        </div>

        <!-- Compose -->
        <div class="compose-box">
            <img src="" alt="Me" class="avatar" id="compose-avatar">
            <div style="flex:1;">
                <textarea class="compose-input" placeholder="What is happening?!" id="compose-text" maxlength="280" oninput="updateComposeButton()"></textarea>
                <div id="media-preview" style="display:none; margin:12px 0; position:relative;">
                    <img src="" style="max-height:300px; border-radius:16px; width:100%; object-fit:cover;">
                    <button onclick="clearMedia()" style="position:absolute; top:8px; right:8px; background:rgba(0,0,0,0.6); color:white; border:none; width:32px; height:32px; border-radius:50%; cursor:pointer;">
                        <i data-feather="x" style="width:18px; height:18px;"></i>
                    </button>
                </div>
                <div class="compose-actions">
                    <div style="display:flex; gap:4px;">
                        <div class="media-btn" onclick="document.getElementById('media-input').click()">
                            <i data-feather="image" style="width:20px; height:20px;"></i>
                        </div>
                        <input type="file" id="media-input" accept="image/*,video/*" style="display:none;" onchange="handleMediaSelect(event)">
                        <div class="media-btn">
                            <i data-feather="smile" style="width:20px; height:20px;"></i>
                        </div>
                    </div>
                    <div style="display:flex; align-items:center; gap:12px;">
                        <span id="char-count" style="color:var(--text-secondary); font-size:14px; opacity:0;">280</span>
                        <button class="post-submit" id="post-btn" onclick="createPost()">Post</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Feed -->
        <div id="feed"></div>
        
        <!-- Loading -->
        <div id="loading-sentinel" style="height:100px; display:flex; align-items:center; justify-content:center;">
            <div class="skeleton" style="width:40px; height:40px; border-radius:50%;"></div>
        </div>
    </main>

    <!-- Right Sidebar -->
    <aside class="right-sidebar">
        <div class="search-box">
            <div style="position:relative;">
                <i data-feather="search" style="position:absolute; left:16px; top:50%; transform:translateY(-50%); width:18px; height:18px; color:var(--text-secondary);"></i>
                <input type="text" class="search-input" placeholder="Search" oninput="handleSearch(this.value)">
            </div>
        </div>
        
        <div class="trends">
            <div class="trend-header">Trends for you</div>
            <div id="trends-list">
                <div class="trend-item">
                    <div class="trend-category">Technology · Trending</div>
                    <div class="trend-title">#WebDevelopment</div>
                    <div class="trend-count">125K posts</div>
                </div>
                <div class="trend-item">
                    <div class="trend-category">Design · Trending</div>
                    <div class="trend-title">#UXDesign</div>
                    <div class="trend-count">45K posts</div>
                </div>
            </div>
        </div>
        
        <div style="background:#F1F5F9; border-radius:16px; margin-top:16px; padding:16px;">
            <div style="font-size:20px; font-weight:800; margin-bottom:16px;">Who to follow</div>
            <div id="suggested-users"></div>
        </div>
    </aside>
</div>

<!-- Mobile Navigation -->
<nav class="mobile-nav">
    <a href="index.html" class="mobile-nav-item active">
        <i data-feather="home" style="width:24px; height:24px;"></i>
    </a>
    <a href="explore.html" class="mobile-nav-item">
        <i data-feather="search" style="width:24px; height:24px;"></i>

    <a href="notifications.html" class="mobile-nav-item">
        <i data-feather="bell" style="width:24px; height:24px;"></i>
    </a>
    <a href="messages.html" class="mobile-nav-item">
        <i data-feather="mail" style="width:24px; height:24px;"></i>
    </a>
</nav>

<button class="fab" onclick="openComposeModal()">
    <i data-feather="plus" style="width:24px; height:24px;"></i>
</button>

<div class="toast" id="toast"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, onValue, onChildAdded, push, set, get, update, remove, query, orderByChild, limitToLast, endBefore, increment, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    import { getStorage, ref as storageRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBOyZ3As4GTuNvjemvPF_SpsC6m6vqtNhc",
        authDomain: "fire-b-a8878.firebaseapp.com",
        databaseURL: "https://fire-b-a8878.firebaseio.com",
        projectId: "fire-b-a8878",
        storageBucket: "fire-b-a8878.appspot.com",
        messagingSenderId: "658673187627",
        appId: "1:658673187627:web:6e4c29af661785f0afa36e"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const storage = getStorage(app);

    // State
    let currentUser = null;
    let currentUserData = null;
    let lastPostTimestamp = null;
    let isLoading = false;
    let hasMorePosts = true;
    let currentTab = 'forYou';
    let selectedMedia = null;
    const POSTS_PER_PAGE = 10;

    // Initialize
    onAuthStateChanged(auth, async (user) => {
        if (!user) {
            window.location.href = 'auth.html';
            return;
        }
        currentUser = user;
        await loadUserData();
        setupInfiniteScroll();
        loadInitialPosts();
        loadTrends();
        loadNotifications();
        loadUnreadMessages();
    });

    async function loadUserData() {
        const userRef = ref(db, `users/${currentUser.uid}`);
        const snapshot = await get(userRef);
        
        if (snapshot.exists()) {
            currentUserData = snapshot.val();
        } else {
            // Create new user
            currentUserData = {
                uid: currentUser.uid,
                email: currentUser.email,
                username: currentUser.email.split('@')[0],
                displayName: currentUser.displayName || 'User',
                photoURL: currentUser.photoURL || `https://ui-avatars.com/api/?name=${currentUser.email}&background=random`,
                bio: '',
                followers: 0,
                following: 0,
                createdAt: Date.now()
            };
            await set(userRef, currentUserData);
        }
        
        // Update UI
        document.getElementById('sidebar-name').textContent = currentUserData.displayName;
        document.getElementById('sidebar-handle').textContent = '@' + currentUserData.username;
        document.getElementById('sidebar-avatar').src = currentUserData.photoURL;
        document.getElementById('compose-avatar').src = currentUserData.photoURL;
    }

    // Post Creation
    window.updateComposeButton = () => {
        const text = document.getElementById('compose-text').value;
        const btn = document.getElementById('post-btn');
        const charCount = document.getElementById('char-count');
        
        charCount.textContent = 280 - text.length;
        charCount.style.opacity = text.length > 0 ? '1' : '0';
        
        if (text.length > 0 || selectedMedia) {
            btn.classList.add('active');
        } else {
            btn.classList.remove('active');
        }
    };

    window.handleMediaSelect = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        
        selectedMedia = file;
        const preview = document.getElementById('media-preview');
        const img = preview.querySelector('img');
        
        img.src = URL.createObjectURL(file);
        preview.style.display = 'block';
        updateComposeButton();
    };

    window.clearMedia = () => {
        selectedMedia = null;
        document.getElementById('media-preview').style.display = 'none';
        document.getElementById('media-input').value = '';
        updateComposeButton();
    };

    window.createPost = async () => {
        const text = document.getElementById('compose-text').value.trim();
        if (!text && !selectedMedia) return;
        
        const btn = document.getElementById('post-btn');
        btn.textContent = 'Posting...';
        btn.disabled = true;
        
        try {
            let mediaUrl = null;
            let mediaType = null;
            
            if (selectedMedia) {
                const fileRef = storageRef(storage, `posts/${currentUser.uid}/${Date.now()}_${selectedMedia.name}`);
                await uploadBytes(fileRef, selectedMedia);
                mediaUrl = await getDownloadURL(fileRef);
                mediaType = selectedMedia.type.startsWith('video') ? 'video' : 'image';
            }
            
            const postRef = push(ref(db, 'posts'));
            const postData = {
                uid: currentUser.uid,
                text: text,
                mediaUrl: mediaUrl,
                mediaType: mediaType,
                timestamp: serverTimestamp(),
                likes: 0,
                replies: 0,
                reposts: 0,
                views: 0
            };
            
            await set(postRef, postData);
            
            // Clear compose
            document.getElementById('compose-text').value = '';
            clearMedia();
            showToast('Posted!');
            
        } catch (error) {
            console.error('Error creating post:', error);
            showToast('Failed to post', 'error');
        } finally {
            btn.textContent = 'Post';
            btn.disabled = false;
        }
    };

    // Feed Loading with Pagination
    async function loadInitialPosts() {
        document.getElementById('feed').innerHTML = '';
        lastPostTimestamp = null;
        hasMorePosts = true;
        await loadMorePosts();
    }

    async function loadMorePosts() {
        if (isLoading || !hasMorePosts) return;
        isLoading = true;
        
        try {
            let postsQuery;
            const postsRef = ref(db, 'posts');
            
            if (!lastPostTimestamp) {
                postsQuery = query(postsRef, orderByChild('timestamp'), limitToLast(POSTS_PER_PAGE));
            } else {
                postsQuery = query(postsRef, orderByChild('timestamp'), endBefore(lastPostTimestamp), limitToLast(POSTS_PER_PAGE));
            }
            
            const snapshot = await get(postsQuery);
            
            if (!snapshot.exists()) {
                hasMorePosts = false;
                document.getElementById('loading-sentinel').style.display = 'none';
                return;
            }
            
            const posts = [];
            snapshot.forEach(child => {
                posts.unshift({ id: child.key, ...child.val() });
            });
            
            if (posts.length > 0) {
                lastPostTimestamp = posts[posts.length - 1].timestamp;
            }
            
            if (posts.length < POSTS_PER_PAGE) {
                hasMorePosts = false;
                document.getElementById('loading-sentinel').style.display = 'none';
            }
            
            // Filter for "Following" tab if needed
            if (currentTab === 'following') {
                const followingSnapshot = await get(ref(db, `following/${currentUser.uid}`));
                const following = followingSnapshot.exists() ? Object.keys(followingSnapshot.val()) : [];
                posts = posts.filter(post => following.includes(post.uid) || post.uid === currentUser.uid);
            }
            
            for (const post of posts) {
                await renderPost(post);
            }
            
            feather.replace();
            
        } catch (error) {
            console.error('Error loading posts:', error);
        } finally {
            isLoading = false;
        }
    }

    async function renderPost(post) {
        const userSnapshot = await get(ref(db, `users/${post.uid}`));
        const user = userSnapshot.val() || {};
        
        const postEl = document.createElement('div');
        postEl.className = 'post';
        postEl.innerHTML = `
            <img src="${user.photoURL || '/default-avatar.png'}" class="avatar" onclick="window.location.href='profile.html?id=${post.uid}'">
            <div class="post-content">
                <div class="post-header">
                    <span class="post-author">${user.displayName || 'User'}</span>
                    ${user.verified ? '<i data-feather="check-circle" style="width:16px; height:16px; color:var(--primary); fill:var(--primary);"></i>' : ''}
                    <span class="post-handle">@${user.username || 'user'} ·</span>
                    <span class="post-time">${formatTime(post.timestamp)}</span>
                </div>
                <div class="post-text">${escapeHtml(post.text)}</div>
                ${post.mediaUrl ? `
                    <div class="post-media">
                        ${post.mediaType === 'video' 
                            ? `<video src="${post.mediaUrl}" controls></video>`
                            : `<img src="${post.mediaUrl}" alt="Post media">`
                        }
                    </div>
                ` : ''}
                <div class="post-actions">
                    <div class="action-btn" onclick="openReplyModal('${post.id}')">
                        <i data-feather="message-circle" style="width:18px; height:18px;"></i>
                        <span>${post.replies || 0}</span>
                    </div>
                    <div class="action-btn" onclick="toggleRepost('${post.id}')">
                        <i data-feather="repeat" style="width:18px; height:18px;"></i>
                        <span>${post.reposts || 0}</span>
                    </div>
                    <div class="action-btn" onclick="toggleLike('${post.id}')">
                        <i data-feather="heart" style="width:18px; height:18px;"></i>
                        <span>${post.likes || 0}</span>
                    </div>
                    <div class="action-btn">
                        <i data-feather="share" style="width:18px; height:18px;"></i>
                    </div>
                </div>
            </div>
        `;
        
        document.getElementById('feed').appendChild(postEl);
        
        // Set up real-time updates for this post
        onValue(ref(db, `posts/${post.id}`), (snapshot) => {
            if (snapshot.exists()) {
                const updated = snapshot.val();
                const el = postEl.querySelector('.action-btn:nth-child(1) span');
                if (el) el.textContent = updated.replies || 0;
                const el2 = postEl.querySelector('.action-btn:nth-child(2) span');
                if (el2) el2.textContent = updated.reposts || 0;
                const el3 = postEl.querySelector('.action-btn:nth-child(3) span');
                if (el3) el3.textContent = updated.likes || 0;
            }
        });
    }

    // Interactions
    window.toggleLike = async (postId) => {
        const likeRef = ref(db, `postLikes/${postId}/${currentUser.uid}`);
        const postRef = ref(db, `posts/${postId}`);
        
        const snapshot = await get(likeRef);
        if (snapshot.exists()) {
            await remove(likeRef);
            await update(postRef, { likes: increment(-1) });
        } else {
            await set(likeRef, true);
            await update(postRef, { likes: increment(1) });
            
            // Create notification
            const postSnapshot = await get(postRef);
            if (postSnapshot.exists()) {
                const post = postSnapshot.val();
                if (post.uid !== currentUser.uid) {
                    await push(ref(db, `notifications/${post.uid}`), {
                        type: 'like',
                        senderId: currentUser.uid,
                        senderName: currentUserData.displayName,
                        senderPhoto: currentUserData.photoURL,
                        postId: postId,
                        timestamp: serverTimestamp()
                    });
                }
            }
        }
    };

    window.toggleRepost = async (postId) => {
        const repostRef = ref(db, `postReposts/${postId}/${currentUser.uid}`);
        const postRef = ref(db, `posts/${postId}`);
        
        const snapshot = await get(repostRef);
        if (snapshot.exists()) {
            await remove(repostRef);
            await update(postRef, { reposts: increment(-1) });
        } else {
            await set(repostRef, true);
            await update(postRef, { reposts: increment(1) });
            showToast('Reposted!');
        }
    };

    // Infinite Scroll
    function setupInfiniteScroll() {
        const sentinel = document.getElementById('loading-sentinel');
        const observer = new IntersectionObserver((entries) => {
            if (entries[0].isIntersecting && !isLoading && hasMorePosts) {
                loadMorePosts();
            }
        }, { rootMargin: '100px' });
        
        observer.observe(sentinel);
    }

    // Real-time new posts listener
    function setupNewPostsListener() {
        const postsRef = ref(db, 'posts');
        onChildAdded(postsRef, async (snapshot) => {
            const post = { id: snapshot.key, ...snapshot.val() };
            // Only prepend if it's a very new post and we're at the top
            if (Date.now() - post.timestamp < 5000 && window.scrollY < 100) {
                await renderPost(post);
            }
        });
    }

    // Tab Switching
    window.switchTab = (tab) => {
        currentTab = tab;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        event.target.classList.add('active');
        loadInitialPosts();
    };

    // Notifications
    async function loadNotifications() {
        const notifRef = ref(db, `notifications/${currentUser.uid}`);
        onValue(notifRef, (snapshot) => {
            let count = 0;
            if (snapshot.exists()) {
                snapshot.forEach(child => {
                    if (!child.val().read) count++;
                });
            }
            const badge = document.getElementById('notif-badge');
            if (count > 0) {
                badge.textContent = count;
                badge.style.display = 'block';
            } else {
                badge.style.display = 'none';
            }
        });
    }

    async function loadUnreadMessages() {
        const chatsRef = ref(db, `userChats/${currentUser.uid}`);
        onValue(chatsRef, (snapshot) => {
            let count = 0;
            if (snapshot.exists()) {
                snapshot.forEach(child => {
                    if (child.val().unreadCount) count += child.val().unreadCount;
                });
            }
            const badge = document.getElementById('msg-badge');
            if (count > 0) {
                badge.textContent = count;
                badge.style.display = 'block';
            } else {
                badge.style.display = 'none';
            }
        });
    }

    // Trends
    async function loadTrends() {
        // Simplified - in production, calculate from hashtags
        const trends = [
            { category: 'Technology', title: '#Programming', count: '125K' },
            { category: 'Design', title: '#UIUX', count: '45K' },
            { category: 'News', title: 'Tech News', count: '32K' }
        ];
        
        const container = document.getElementById('trends-list');
        container.innerHTML = trends.map(t => `
            <div class="trend-item" onclick="searchTrend('${t.title}')">
                <div class="trend-category">${t.category} · Trending</div>
                <div class="trend-title">${t.title}</div>
                <div class="trend-count">${t.count} posts</div>
            </div>
        `).join('');
    }

    // Utilities
    function formatTime(timestamp) {
        if (!timestamp) return '';
        const seconds = Math.floor((Date.now() - timestamp) / 1000);
        if (seconds < 60) return 'now';
        if (seconds < 3600) return Math.floor(seconds / 60) + 'm';
        if (seconds < 86400) return Math.floor(seconds / 3600) + 'h';
        if (seconds < 604800) return Math.floor(seconds / 86400) + 'd';
        return new Date(timestamp).toLocaleDateString();
    }

    function escapeHtml(text) {
        if (!text) return '';
        return text
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
    }

    function showToast(message, type = 'success') {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.style.background = type === 'error' ? 'var(--danger)' : '#1e293b';
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
    }

    window.goToProfile = () => {
        window.location.href = `profile.html?id=${currentUser.uid}`;
    };

    window.openComposeModal = () => {
        document.getElementById('compose-text').focus();
    };

    // Initialize
    feather.replace();
</script>

</body>
