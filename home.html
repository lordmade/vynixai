<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ONA | Mobile</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="no-select">
    <div id="app-wrapper">
        
        <section id="auth-screen">
            <div class="landing-hero">
                <h1 class="logo-large">ONA</h1>
                <p>Moments in motion.</p>
                <button id="open-auth-sheet" class="main-btn">Get Started</button>
            </div>

            <div id="auth-sheet" class="bottom-sheet">
                <div class="sheet-handle"></div>
                <div class="sheet-content">
                    <h2 id="auth-title">Welcome</h2>
                    <form id="auth-form" class="sheet-form">
                        <input type="email" id="email" placeholder="Email" required>
                        <input type="password" id="password" placeholder="Password" required>
                        <button type="submit" id="auth-btn">Log In</button>
                    </form>
                    <p id="toggle-auth" class="toggle-text">New here? <b>Create Account</b></p>
                </div>
            </div>
            <div id="auth-overlay" class="overlay"></div>
        </section>

        <section id="main-app" style="display: none;">
            <header class="navbar">
                <h2 class="logo-small">ONA</h2>
                <i data-lucide="log-out" id="logout-btn"></i>
            </header>

            <div id="feed-view" class="view">
                <div id="feed"></div>
            </div>

            <div id="search-view" class="view" style="display: none;">
                <div class="search-bar"><input type="text" id="search-input" placeholder="Search creators..."></div>
                <div id="search-results"></div>
            </div>

            <div id="profile-view" class="view" style="display: none;">
                <div class="profile-header">
                    <img id="user-profile-img" src="" class="profile-avatar">
                    <h2 id="user-profile-name"></h2>
                </div>
                <div id="user-posts-grid" class="posts-grid"></div>
            </div>

            <nav class="bottom-nav">
                <i data-lucide="home" id="nav-home"></i>
                <i data-lucide="search" id="nav-search"></i>
                <div id="nav-add" class="add-btn-circle"><i data-lucide="plus"></i></div>
                <i data-lucide="heart"></i>
                <i data-lucide="user" id="nav-profile"></i>
            </nav>
        </section>

        <div id="upload-sheet" class="bottom-sheet">
            <div class="sheet-handle"></div>
            <div class="sheet-content">
                <div class="sheet-header">
                    <h3>New Post</h3>
                    <button type="submit" form="upload-form" id="submit-post-btn">Share</button>
                </div>
                <form id="upload-form" class="sheet-form">
                    <div class="file-input-wrapper">
                        <label for="media-files">Select Photos / Videos (Multiple)</label>
                        <input type="file" id="media-files" accept="image/*,video/*" multiple required>
                    </div>
                    <textarea id="caption" placeholder="Write a caption..." required></textarea>
                    <p id="upload-status" style="text-align: center; font-size: 0.8rem; color: var(--primary);"></p>
                </form>
            </div>
        </div>
        <div id="upload-overlay" class="overlay"></div>

    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
