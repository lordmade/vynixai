<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONA | Share Your World</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div id="app-wrapper">
        
        <section id="auth-screen">
            <h1 class="logo">ONA</h1>
            <form id="auth-form" class="form-container">
                <input type="email" id="email" placeholder="Email" required>
                <input type="password" id="password" placeholder="Password" required>
                <button type="submit" id="auth-btn">Log In</button>
            </form>
            <p class="toggle-auth" id="toggle-auth">Don't have an account? <b>Sign up</b></p>
            <p id="auth-error" class="error-msg"></p>
        </section>

        <section id="main-app" style="display: none;">
            <header class="navbar">
                <h2 class="logo-small">ONA</h2>
                <i data-lucide="log-out" id="logout-btn" style="cursor:pointer"></i>
            </header>

            <div id="feed-view">
                <div id="feed">
                    <p class="status-text">Loading ONA feed...</p>
                </div>
            </div>

            <div id="profile-view" style="display: none;">
                <div class="profile-header">
                    <img id="user-profile-img" src="" class="profile-avatar">
                    <div class="profile-info">
                        <h2 id="user-profile-name"></h2>
                        <span class="posts-count">My Gallery</span>
                    </div>
                </div>
                <div id="user-posts-grid" class="posts-grid"></div>
            </div>

            <nav class="bottom-nav">
                <i data-lucide="home" id="nav-home"></i>
                <i data-lucide="search"></i>
                <div id="add-post-btn" class="nav-add-btn"><i data-lucide="plus-square"></i></div>
                <i data-lucide="heart"></i>
                <i data-lucide="user" id="nav-profile"></i>
            </nav>
        </section>

        <div id="upload-modal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <span id="close-modal">&times;</span>
                    <h3>New Post</h3>
                    <button type="submit" form="upload-form" id="submit-post-btn" class="share-link">Share</button>
                </div>
                <form id="upload-form">
                    <input type="file" id="image-file" accept="image/*" required>
                    <textarea id="caption" placeholder="Write a caption..." required></textarea>
                    <p id="upload-status" class="status-text"></p>
                </form>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
