<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Nexus - Home</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/feather-icons"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

    :root {
      --primary: #1877F2;
      --primary-hover: #166FE5;
      --bg: #F0F2F5;
      --card-bg: #FFFFFF;
      --border: #CED0D4;
      --text: #050505;
      --text-secondary: #65676B;
      --text-muted: #8A8D91;
      --hover: #F2F2F2;
      --like: #F3425F;
      --success: #42B72A;
      --shadow: 0 1px 2px rgba(0,0,0,0.1);
      --shadow-lg: 0 4px 12px rgba(0,0,0,0.15);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    body {
      background: var(--bg);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--text);
      margin: 0;
      padding-top: 56px;
      padding-bottom: 60px;
    }

    /* Top Navigation */
    .top-nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 56px;
      background: var(--card-bg);
      box-shadow: var(--shadow);
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .nav-logo {
      font-size: 28px;
      font-weight: 800;
      background: linear-gradient(135deg, #6366F1, #8B5CF6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -1px;
    }

    .nav-search {
      background: var(--bg);
      border: none;
      border-radius: 50px;
      padding: 10px 16px;
      font-size: 15px;
      width: 240px;
      outline: none;
      transition: all 0.2s;
    }

    .nav-search:focus {
      background: #E4E6EB;
      box-shadow: 0 0 0 2px var(--primary);
    }

    .nav-center {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .nav-icon {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      background: var(--bg);
    }

    .nav-icon:hover { background: #E4E6EB; }
    .nav-icon.active { background: var(--primary); color: white; }
    .nav-icon.active svg { stroke: white; }

    .nav-badge {
      position: absolute;
      top: -2px;
      right: -2px;
      background: var(--like);
      color: white;
      font-size: 11px;
      font-weight: 700;
      min-width: 18px;
      height: 18px;
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid var(--card-bg);
      padding: 0 4px;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .user-nav-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.2s;
    }

    .user-nav-avatar:hover { border-color: var(--border); }

    /* Main Layout */
    .main-layout {
      display: grid;
      grid-template-columns: 1fr;
      max-width: 1200px;
      margin: 0 auto;
      gap: 24px;
      padding: 16px;
    }

    @media (min-width: 900px) {
      .main-layout { grid-template-columns: 280px 600px 280px; }
    }

    /* Sidebar */
    .sidebar {
      position: sticky;
      top: 72px;
      height: calc(100vh - 88px);
      overflow-y: auto;
      display: none;
    }

    @media (min-width: 900px) {
      .sidebar { display: block; }
    }

    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 500;
      color: var(--text);
    }

    .sidebar-item:hover { background: var(--hover); }
    .sidebar-item.active { background: #E7F3FF; color: var(--primary); }
    .sidebar-item svg { width: 24px; height: 24px; color: var(--primary); }

    /* Feed */
    .feed {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Create Post Box - Facebook Style */
    .create-post-card {
      background: var(--card-bg);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 12px 16px;
    }

    .create-post-input {
      display: flex;
      gap: 8px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .create-post-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
    }

    .create-post-btn {
      flex: 1;
      background: var(--bg);
      border: none;
      border-radius: 20px;
      padding: 10px 16px;
      font-size: 15px;
      color: var(--text-secondary);
      text-align: left;
      cursor: pointer;
      transition: all 0.2s;
      outline: none;
    }

    .create-post-btn:hover { background: #E4E6EB; }

    .create-post-actions {
      display: flex;
      justify-content: space-between;
      padding-top: 4px;
    }

    .create-post-action {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 8px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 600;
      font-size: 14px;
      color: var(--text-secondary);
    }

    .create-post-action:hover { background: var(--hover); }
    .create-post-action svg { width: 20px; height: 20px; }

    /* Media Preview in Create Post */
    .media-preview-area {
      display: none;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }

    .media-preview-area.active { display: block; }

    .multi-image-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }

    .multi-image-grid img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      border-radius: 8px;
    }

    .video-preview {
      width: 100%;
      max-height: 300px;
      border-radius: 8px;
      background: #000;
    }

    .media-remove-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: rgba(0,0,0,0.7);
      color: white;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Post Card - Facebook Style */
    .post-card {
      background: var(--card-bg);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .post-header {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      gap: 12px;
    }

    .post-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
      cursor: pointer;
    }

    .post-meta {
      flex: 1;
      min-width: 0;
    }

    .post-author {
      font-weight: 600;
      font-size: 15px;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 4px;
      cursor: pointer;
    }

    .post-author:hover { text-decoration: underline; }

    .post-time {
      font-size: 13px;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .post-menu {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
    }

    .post-menu:hover { background: var(--hover); }

    .post-content {
      padding: 4px 16px 16px;
    }

    .post-text {
      font-size: 15px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* Facebook-style Full Width Media */
    .post-media-container {
      width: 100%;
      background: #000;
      position: relative;
    }

    .post-media-full {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      display: block;
      cursor: pointer;
    }

    .post-media-full.video {
      aspect-ratio: 16/9;
    }

    /* Multi-image Carousel */
    .media-carousel {
      position: relative;
      width: 100%;
      aspect-ratio: 1;
      overflow: hidden;
      background: #000;
    }

    .carousel-track {
      display: flex;
      transition: transform 0.3s ease;
      height: 100%;
    }

    .carousel-slide {
      min-width: 100%;
      height: 100%;
    }

    .carousel-slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .carousel-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(255,255,255,0.9);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      z-index: 10;
    }

    .carousel-nav:hover { background: white; transform: translateY(-50%) scale(1.1); }
    .carousel-nav.prev { left: 8px; }
    .carousel-nav.next { right: 8px; }

    .carousel-dots {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 6px;
      z-index: 10;
    }

    .carousel-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.5);
      cursor: pointer;
      transition: all 0.2s;
    }

    .carousel-dot.active { background: white; width: 24px; border-radius: 4px; }

    .carousel-counter {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(0,0,0,0.6);
      color: white;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 600;
      z-index: 10;
    }

    /* Video Container */
    .video-container {
      position: relative;
      width: 100%;
      aspect-ratio: 16/9;
      background: #000;
    }

    .video-container video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .video-play-btn {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: rgba(255,255,255,0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
    }

    .video-play-btn:hover { transform: translate(-50%, -50%) scale(1.1); }

    /* Repost Card - Facebook Style */
    .repost-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin: 8px 0;
      overflow: hidden;
    }

    .repost-header {
      display: flex;
      align-items: center;
      padding: 12px;
      gap: 10px;
      background: rgba(24, 119, 242, 0.05);
      border-bottom: 1px solid var(--border);
    }

    .repost-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      object-fit: cover;
    }

    .repost-info {
      flex: 1;
    }

    .repost-author {
      font-weight: 600;
      font-size: 14px;
      color: var(--text);
    }

    .repost-label {
      font-size: 12px;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .repost-body {
      padding: 12px;
    }

    /* Post Actions */
    .post-stats {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
      color: var(--text-secondary);
    }

    .post-actions {
      display: flex;
      padding: 4px 8px;
    }

    .post-action {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 600;
      font-size: 14px;
      color: var(--text-secondary);
    }

    .post-action:hover { background: var(--hover); }
    .post-action.liked { color: var(--like); }
    .post-action.reposted { color: var(--success); }
    .post-action.liked svg { fill: var(--like); }
    .post-action.reposted svg { fill: var(--success); }

    /* Comments Section */
    .comments-section {
      border-top: 1px solid var(--border);
      padding: 12px 16px;
    }

    .comment {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .comment-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
    }

    .comment-bubble {
      background: var(--bg);
      border-radius: 18px;
      padding: 10px 14px;
      flex: 1;
    }

    .comment-author {
      font-weight: 600;
      font-size: 13px;
      margin-bottom: 2px;
    }

    .comment-text {
      font-size: 14px;
      line-height: 1.4;
    }

    .comment-actions {
      display: flex;
      gap: 16px;
      margin-top: 6px;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
    }

    .comment-action {
      cursor: pointer;
      transition: all 0.2s;
    }

    .comment-action:hover { color: var(--primary); }

    .comment-input-wrapper {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    .comment-input {
      flex: 1;
      background: var(--bg);
      border: none;
      border-radius: 20px;
      padding: 8px 14px;
      font-size: 14px;
      outline: none;
    }

    /* Verified Badge */
    .verified-badge {
      width: 16px;
      height: 16px;
      color: #1DA1F2;
      flex-shrink: 0;
    }

    .verified-badge.premium { color: #FFD700; }

    /* Bottom Navigation (Mobile) */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 56px;
      background: var(--card-bg);
      box-shadow: 0 -1px 4px rgba(0,0,0,0.1);
      display: flex;
      align-items: center;
      justify-content: space-around;
      z-index: 500;
    }

    @media (min-width: 900px) {
      .bottom-nav { display: none; }
    }

    .bottom-nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      padding: 8px 16px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
    }

    .bottom-nav-item.active { color: var(--primary); }
    .bottom-nav-item svg { width: 24px; height: 24px; }
    .bottom-nav-item span { font-size: 11px; font-weight: 500; }

    /* Toast Notification */
    .toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #1A1A1A;
      color: white;
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 500;
      font-size: 14px;
      z-index: 1000;
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .toast.success { background: var(--success); }
    .toast.error { background: var(--like); }

    /* Loading Spinner */
    .spinner {
      width: 24px;
      height: 24px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .infinite-loader {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      gap: 12px;
      color: var(--text-secondary);
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.8);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .modal-overlay.active { display: flex; }

    .modal-content {
      max-width: 90%;
      max-height: 90%;
    }

    .modal-content img,
    .modal-content video {
      max-width: 100%;
      max-height: 90vh;
      border-radius: 8px;
    }

    .modal-close {
      position: absolute;
      top: 20px;
      left: 20px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(10px);
    }

    /* Right Sidebar */
    .right-sidebar {
      display: none;
      position: sticky;
      top: 72px;
      height: calc(100vh - 88px);
      overflow-y: auto;
    }

    @media (min-width: 1100px) {
      .right-sidebar { display: block; }
    }

    .contact-list {
      background: var(--card-bg);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 12px;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .contact-item:hover { background: var(--hover); }

    .contact-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      object-fit: cover;
    }

    .contact-name {
      font-weight: 500;
      font-size: 14px;
    }

    .online-indicator {
      width: 10px;
      height: 10px;
      background: var(--success);
      border-radius: 50%;
      border: 2px solid var(--card-bg);
      position: absolute;
      bottom: 0;
      right: 0;
    }

    /* Responsive */
    @media (max-width: 640px) {
      body { padding-bottom: 56px; }
      .nav-search { display: none; }
      .create-post-action span { display: none; }
      .post-stats { flex-direction: column; gap: 4px; align-items: flex-start; }
    }

    /* Hidden file input */
    .hidden-input { display: none; }

    /* Upload Progress */
    .upload-progress {
      position: fixed;
      top: 70px;
      right: 16px;
      background: var(--card-bg);
      border-radius: 8px;
      box-shadow: var(--shadow-lg);
      padding: 16px;
      min-width: 280px;
      z-index: 600;
      display: none;
    }

    .upload-progress.active { display: block; }

    .progress-bar {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 8px;
    }

    .progress-fill {
      height: 100%;
      background: var(--primary);
      border-radius: 2px;
      width: 0%;
      transition: width 0.3s;
    }

    /* Notifications Panel */
    .notif-panel {
      position: fixed;
      top: 56px;
      right: 0;
      width: 360px;
      max-width: 100%;
      height: calc(100vh - 56px);
      background: var(--card-bg);
      box-shadow: var(--shadow-lg);
      z-index: 400;
      transform: translateX(100%);
      transition: transform 0.3s;
      overflow-y: auto;
    }

    .notif-panel.active { transform: translateX(0); }

    .notif-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .notif-title {
      font-size: 20px;
      font-weight: 700;
    }

    .notif-item {
      display: flex;
      gap: 12px;
      padding: 12px 16px;
      cursor: pointer;
      transition: all 0.2s;
      border-bottom: 1px solid var(--border);
    }

    .notif-item:hover { background: var(--hover); }
    .notif-item.unread { background: #E7F3FF; }

    .notif-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
    }

    .notif-content { flex: 1; }
    .notif-text { font-size: 14px; line-height: 1.4; }
    .notif-time { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }
  </style>
  <base target="_blank">
</head>
<body>
  <!-- Top Navigation -->
  <nav class="top-nav">
    <div class="nav-left">
      <span class="nav-logo">Nexus</span>
      <input type="text" class="nav-search" placeholder="Search Nexus" id="global-search">
    </div>
    <div class="nav-center">
      <div class="nav-icon active" onclick="window.location.href='home.html'">
        <i data-feather="home"></i>
      </div>
      <div class="nav-icon" onclick="toggleNotifications()">
        <i data-feather="bell"></i>
        <span class="nav-badge" id="notif-badge" style="display:none;">0</span>
      </div>
      <div class="nav-icon" onclick="window.location.href='messages.html'">
        <i data-feather="message-circle"></i>
        <span class="nav-badge" id="msg-badge" style="display:none;">0</span>
      </div>
    </div>
    <div class="nav-right">
      <img src="https://abs.twimg.com/sticky/default_profile_images/default_profile_normal.png" 
           class="user-nav-avatar" id="nav-avatar" onclick="window.location.href='profile.html'">
    </div>
  </nav>

  <!-- Main Layout -->
  <div class="main-layout">
    <!-- Left Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-item active" onclick="window.location.href='home.html'">
        <i data-feather="home"></i>

      <div class="sidebar-item" onclick="toggleNotifications()">

      <div class="sidebar-item" onclick="window.location.href='messages.html'">

    <!-- Main Feed -->
    <main class="feed">
      <!-- Create Post Card -->
      <div class="create-post-card">
        <div class="create-post-input">
          <img src="https://abs.twimg.com/sticky/default_profile_images/default_profile_normal.png" 
               class="create-post-avatar" id="create-avatar">
          <button class="create-post-btn" id="create-post-btn">What's on your mind?</button>

        <!-- Media Preview -->
        <div class="media-preview-area" id="media-preview-area">

          <video class="video-preview" id="video-preview" controls style="display:none;"></video>

        <div class="create-post-actions">

          <div class="create-post-action" onclick="document.getElementById('video-input').click()">
            <i data-feather="video" style="color:#F3425F;"></i>

        <input type="file" id="photo-input" class="hidden-input" accept="image/*" multiple>

      <!-- Feed End -->
      <div id="feed-end" style="text-align:center;padding:24px;color:var(--text-secondary);display:none;">
        <p>You're all caught up! 🎉</p>

    <!-- Right Sidebar -->
    <aside class="right-sidebar">
      <div class="contact-list">
        <h3 style="margin-bottom:12px;font-size:16px;color:var(--text-secondary);">Contacts</h3>
        <div id="contacts-list">
          <div style="text-align:center;padding:20px;color:var(--text-secondary);">
            Loading contacts...
          </div>
        </div>
      </div>

  <!-- Bottom Navigation (Mobile) -->
  <nav class="bottom-nav">
    <div class="bottom-nav-item active" onclick="window.location.href='home.html'">
      <i data-feather="home"></i>
      <span>Home</span>
    </div>
    <div class="bottom-nav-item" onclick="toggleNotifications()">
      <i data-feather="bell"></i>
      <span>Alerts</span>
      <span class="nav-badge" id="mobile-notif-badge" style="display:none;position:absolute;top:4px;right:8px;min-width:16px;height:16px;font-size:10px;padding:0 3px;">0</span>
    </div>
    <div class="bottom-nav-item" onclick="window.location.href='messages.html'">
      <i data-feather="message-circle"></i>
      <span>Chat</span>
    </div>
    <div class="bottom-nav-item" onclick="window.location.href='profile.html'">
      <i data-feather="user"></i>
      <span>Profile</span>
    </div>
  </nav>

  <!-- Notifications Panel -->
  <div class="notif-panel" id="notif-panel">
    <div class="notif-header">
      <span class="notif-title">Notifications</span>
      <button onclick="toggleNotifications()" style="background:none;border:none;cursor:pointer;">
        <i data-feather="x" style="width:24px;height:24px;"></i>
      </button>
    </div>
    <div id="notif-list"></div>
  </div>

  <!-- Media Modal -->
  <div class="modal-overlay" id="media-modal" onclick="closeMediaModal()">
    <button class="modal-close" onclick="closeMediaModal()">
      <i data-feather="x" style="width:24px;height:24px;"></i>
    </button>
    <div class="modal-content" id="modal-content" onclick="event.stopPropagation()"></div>
  </div>

  <!-- Upload Progress -->
  <div class="upload-progress" id="upload-progress">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px;">
      <div class="spinner" style="width:20px;height:20px;border-width:2px;"></div>
      <span style="font-weight:600;">Uploading post...</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
    <div style="font-size:13px;color:var(--text-secondary);margin-top:8px;" id="upload-status">
      Uploading media...
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.11/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.6.11/firebase-auth.js";
    import { getDatabase, ref, push, set, onChildAdded, onValue, get, runTransaction, remove, query, orderByChild, limitToLast, endAt } from "https://www.gstatic.com/firebasejs/9.6.11/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBOyZ3As4GTuNvjemvPF_SpsC6m6vqtNhc",
      authDomain: "fire-b-a8878.firebaseapp.com",
      databaseURL: "https://fire-b-a8878.firebaseio.com",
      projectId: "fire-b-a8878",
      storageBucket: "fire-b-a8878.appspot.com",
      messagingSenderId: "658673187627",
      appId: "1:658673187627:web:6e4c29af661785f0afa36e",
      measurementId: "G-V4W97VMSKL"
    };

    const CLOUD_NAME = "dqkujefxj";
    const UPLOAD_PRESET = "banter_box";
    
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    // State
    let currentUser = null;
    let currentUsername = null;
    let userAvatar = null;
    let followingList = new Set();
    let displayedPosts = [];
    let lastTimestamp = Date.now();
    let isLoading = false;
    let hasMore = true;
    let selectedImages = [];
    let selectedVideo = null;
    let unreadNotifs = 0;
    let unreadMsgs = 0;

    const feedStream = document.getElementById('feed-stream');
    const infiniteLoader = document.getElementById('infinite-loader');
    const feedEnd = document.getElementById('feed-end');
    const scrollSentinel = document.getElementById('scroll-sentinel');

    // Initialize Feather Icons
    feather.replace();

    // Auth State
    onAuthStateChanged(auth, async (user) => {
      if (!user) { window.location.href = "signup.html"; return; }
      
      currentUser = user;
      const userRef = ref(db, 'users/' + user.uid);
      const snapshot = await get(userRef);
      
      if (snapshot.exists()) {
        const userData = snapshot.val();
        currentUsername = userData.username || userData.displayName || user.email.split('@')[0];
        userAvatar = userData.photoURL || userData.avatarUrl || "https://abs.twimg.com/sticky/default_profile_images/default_profile_normal.png";
      } else {
        currentUsername = user.email.split('@')[0];
        userAvatar = "https://abs.twimg.com/sticky/default_profile_images/default_profile_normal.png";
        await set(userRef, {
          username: currentUsername,
          email: user.email,
          createdAt: Date.now(),
          photoURL: userAvatar,
          verified: false
        });
      }

      // Update UI
      document.getElementById('nav-avatar').src = userAvatar;
      document.getElementById('create-avatar').src = userAvatar;
      
      loadFollowing();
      loadNotifications();
      loadContacts();
      loadInitialPosts();
    });

    // Load Following List
    function loadFollowing() {
      if (!currentUser) return;
      onValue(ref(db, 'following/' + currentUser.uid), (snapshot) => {
        followingList.clear();
        if (snapshot.exists()) {
          snapshot.forEach(child => followingList.add(child.key));
        }
        refreshFeed();
      });
    }

    // Load Notifications
    function loadNotifications() {
      if (!currentUser) return;
      onValue(ref(db, 'notifications/' + currentUser.uid), (snapshot) => {
        unreadNotifs = 0;
        const notifs = [];
        
        if (snapshot.exists()) {
          snapshot.forEach(child => {
            const notif = child.val();
            notif.key = child.key;
            notifs.push(notif);
            if (!notif.read) unreadNotifs++;
          });
        }

        updateNotifBadges();
        renderNotifications(notifs);
      });
    }

    function updateNotifBadges() {
      const badges = ['notif-badge', 'mobile-notif-badge'];
      badges.forEach(id => {
        const badge = document.getElementById(id);
        if (badge) {
          if (unreadNotifs > 0) {
            badge.textContent = unreadNotifs > 99 ? '99+' : unreadNotifs;
            badge.style.display = 'flex';
          } else {
            badge.style.display = 'none';
          }
        }
      });
    }

    function renderNotifications(notifs) {
      const list = document.getElementById('notif-list');
      if (notifs.length === 0) {
        list.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-secondary);">No notifications yet</div>';
        return;
      }

      notifs.sort((a, b) => b.timestamp - a.timestamp);
      list.innerHTML = notifs.map(n => `
        <div class="notif-item ${n.read ? '' : 'unread'}" onclick="handleNotifClick('${n.key}', '${n.type}', '${n.postId || ''}')">
          <img src="${n.senderAvatar || 'https://abs.twimg.com/sticky/default_profile_images/default_profile_normal.png'}" class="notif-avatar">
          <div class="notif-content">
            <div class="notif-text"><strong>${n.senderName}</strong> ${getNotifText(n.type)}</div>
            <div class="notif-time">${getTimeAgo(n.timestamp)}</div>
          </div>
        </div>
      `).join('');
    }

    function getNotifText(type) {
      const texts = {
        like: 'liked your post',
        comment: 'commented on your post',
        follow: 'started following you',
        repost: 'reposted your post',
        message: 'sent you a message'
      };
      return texts[type] || 'interacted with you';
    }

    window.handleNotifClick = async function(key, type, postId) {
      await set(ref(db, 'notifications/' + currentUser.uid + '/' + key + '/read'), true);
      if (postId) {
        const el = document.getElementById('post-' + postId);
        if (el) {
          el.scrollIntoView({ behavior: 'smooth', block: 'center' });
          el.style.animation = 'pulse 2s';
        }
      }
      toggleNotifications();
    }

    window.toggleNotifications = function() {
      document.getElementById('notif-panel').classList.toggle('active');
    }

    // Load Contacts
    function loadContacts() {
      const list = document.getElementById('contacts-list');
      list.innerHTML = '<div style="text-align:center;padding:20px;color:var(--text-secondary);">Contacts coming soon</div>';
    }

    // True Infinite Scroll - Load from DB on demand
    async function loadInitialPosts() {
      feedStream.innerHTML = '';
      displayedPosts = [];
      lastTimestamp = Date.now();
      hasMore = true;
      await loadMorePosts();
      initScrollObserver();
    }

    async function loadMorePosts() {
      if (isLoading || !hasMore) return;
      isLoading = true;
      infiniteLoader.style.display = 'flex';

      try {
        const postsRef = ref(db, 'posts');
        const postsQuery = query(
          postsRef,
          orderByChild('timestamp'),
          endAt(lastTimestamp - 1),
          limitToLast(10)
        );

        const snapshot = await get(postsQuery);
        
        if (!snapshot.exists()) {
          hasMore = false;
          feedEnd.style.display = 'block';
          infiniteLoader.style.display = 'none';
          return;
        }

        let posts = [];
        snapshot.forEach(child => {
          posts.push({ key: child.key, data: child.val() });
        });

        posts.reverse();

        for (const post of posts) {
          await renderPost(post.key, post.data);
          displayedPosts.push(post);
          if (post.data.timestamp < lastTimestamp) {
            lastTimestamp = post.data.timestamp;
          }
        }

        feather.replace();

      } catch (err) {
        console.error('Load error:', err);
        showToast('Failed to load posts', 'error');
      } finally {
        isLoading = false;
        infiniteLoader.style.display = 'none';
      }
    }

    function initScrollObserver() {
      const observer = new IntersectionObserver((entries) => {
        if (entries[0].isIntersecting && !isLoading && hasMore) {
          loadMorePosts();
        }
      }, { rootMargin: '100px' });

      observer.observe(scrollSentinel);
    }

    function refreshFeed() {
      displayedPosts = [];
      lastTimestamp = Date.now();
      feedStream.innerHTML = '';
      loadInitialPosts();
    }

    // Render Post - Facebook Style
    async function renderPost(key, post) {
      if (document.getElementById('post-' + key)) return;

      const userRef = ref(db, 'users/' + post.uid);
      const userSnap = await get(userRef);
      const userData = userSnap.val() || {};
      const authorName = userData.username || userData.displayName || 'User';
      const authorAvatar = userData.photoURL || userData.avatarUrl || "https://abs.twimg.com/sticky/default_profile_images/default_profile_normal.png";
      const isVerified = userData.verified || false;
      const isOwnPost = currentUser && currentUser.uid === post.uid;

      const timeAgo = getTimeAgo(post.timestamp);

      // Build media HTML
      let mediaHtml = '';
      if (post.mediaUrls && post.mediaUrls.length > 0) {
        if (post.mediaType === 'video') {
          mediaHtml = `
            <div class="video-container" onclick="openMediaModal('${post.mediaUrls[0]}', 'video')">
              <video src="${post.mediaUrls[0]}" preload="metadata"></video>
              <div class="video-play-btn">
                <i data-feather="play" style="width:28px;height:28px;margin-left:4px;"></i>
              </div>
            </div>
          `;
        } else if (post.mediaUrls.length === 1) {
          mediaHtml = `
            <div class="post-media-container" onclick="openMediaModal('${post.mediaUrls[0]}', 'image')">
              <img src="${post.mediaUrls[0]}" class="post-media-full" loading="lazy">
            </div>
          `;
        } else {
          // Multiple images - Facebook style carousel
          mediaHtml = `
            <div class="media-carousel" id="carousel-${key}">
              <div class="carousel-track">
                ${post.mediaUrls.map((url, i) => `
                  <div class="carousel-slide">
                    <img src="${url}" loading="lazy" onclick="openMediaModal('${url}', 'image')">
                  </div>
                `).join('')}
              </div>
              ${post.mediaUrls.length > 1 ? `
                <button class="carousel-nav prev" onclick="prevSlide('${key}')">
                  <i data-feather="chevron-left" style="width:20px;height:20px;"></i>
                </button>
                <button class="carousel-nav next" onclick="nextSlide('${key}')">
                  <i data-feather="chevron-right" style="width:20px;height:20px;"></i>
                </button>
              ` : ''}
              <div class="carousel-dots">
                ${post.mediaUrls.map((_, i) => `
                  <div class="carousel-dot ${i === 0 ? 'active' : ''}" onclick="goToSlide('${key}', ${i})"></div>
                `).join('')}
              </div>
              <div class="carousel-counter">1 / ${post.mediaUrls.length}</div>
            </div>
          `;
        }
      }

      // Verified badge
      const verifiedBadge = isVerified ? `
        <svg class="verified-badge" viewBox="0 0 24 24" fill="currentColor">
          <path d="M22.25 12c0-1.43-.88-2.67-2.19-3.34.46-1.39.2-2.9-.81-3.91s-2.52-1.27-3.91-.81c-.66-1.31-1.91-2.19-3.34-2.19s-2.67.88-3.33 2.19c-1.4-.46-2.91-.2-3.92.81s-1.26 2.52-.8 3.91c-1.31.67-2.2 1.91-2.2 3.34s.89 2.67 2.2 3.34c-.46 1.39-.21 2.9.8 3.91s2.52 1.26 3.91.81c.67 1.31 1.91 2.19 3.34 2.19s2.68-.88 3.34-2.19c1.39.45 2.9.2 3.91-.81s1.27-2.52.81-3.91c1.31-.67 2.19-1.91 2.19-3.34zm-11.71 4.2L6.8 12.46l1.41-1.42 2.26 2.26 4.8-5.23 1.47 1.36-6.2 6.77z"/>
        </svg>
      ` : '';

      const el = document.createElement('div');
      el.className = 'post-card';
      el.id = 'post-' + key;
      el.innerHTML = `
        <div class="post-header">
          <img src="${authorAvatar}" class="post-avatar" onclick="window.location.href='profile.html?id=${post.uid}'">
          <div class="post-meta">
            <div class="post-author">
              ${authorName}
              ${verifiedBadge}
            </div>
            <div class="post-time">
              ${timeAgo}
              ${post.isRepost ? ' · Reposted' : ''}
            </div>
          </div>
          <div class="post-menu">
            <i data-feather="more-horizontal" style="width:20px;height:20px;color:var(--text-secondary);"></i>
          </div>
        </div>
        
        ${post.isRepost && post.originalPost ? `
          <div class="repost-card">
            <div class="repost-header">
              <img src="${post.originalPost.avatar || authorAvatar}" class="repost-avatar">
              <div class="repost-info">
                <div class="repost-author">${post.originalPost.author || 'User'}</div>
                <div class="repost-label">
                  <i data-feather="repeat" style="width:12px;height:12px;"></i>
                  Reposted by ${isOwnPost ? 'you' : currentUsername}
                </div>
              </div>
            </div>
            <div class="repost-body">
              <div class="post-text">${escapeHtml(post.text || '')}</div>
              ${mediaHtml}
            </div>
          </div>
        ` : `
          ${post.text ? `<div class="post-content"><div class="post-text">${escapeHtml(post.text)}</div></div>` : ''}
          ${mediaHtml}
        `}

        <div class="post-stats">
          <span id="like-stat-${key}">${formatCount(post.likes || 0)} reactions</span>
          <span>${formatCount(post.commentCount || 0)} comments · ${formatCount(post.repostCount || 0)} shares</span>
        </div>

        <div class="post-actions">
          <div class="post-action" id="like-btn-${key}" onclick="toggleLike('${key}')">
            <i data-feather="heart" style="width:20px;height:20px;"></i>
            <span>Like</span>
          </div>
          <div class="post-action" onclick="openComments('${key}')">
            <i data-feather="message-circle" style="width:20px;height:20px;"></i>
            <span>Comment</span>
          </div>
          <div class="post-action" id="repost-btn-${key}" onclick="toggleRepost('${key}', ${JSON.stringify(post).replace(/"/g, '&quot;')})">
            <i data-feather="repeat" style="width:20px;height:20px;"></i>
            <span>Repost</span>
          </div>
        </div>

        <div class="comments-section" id="comments-${key}" style="display:none;">
          <div id="comments-list-${key}"></div>
          <div class="comment-input-wrapper">
            <img src="${userAvatar}" class="comment-avatar">
            <input type="text" class="comment-input" placeholder="Write a comment..." 
                   onkeypress="if(event.key==='Enter')postComment('${key}', this)">
          </div>
        </div>
      `;

      feedStream.appendChild(el);

      // Real-time updates
      onValue(ref(db, 'posts/' + key + '/likes'), snap => {
        const count = snap.val() || 0;
        const stat = document.getElementById('like-stat-' + key);
        if (stat) stat.textContent = formatCount(count) + ' reactions';
      });

      onValue(ref(db, 'postLikes/' + key + '/' + currentUser?.uid), snap => {
        const btn = document.getElementById('like-btn-' + key);
        if (btn) {
          if (snap.exists()) {
            btn.classList.add('liked');
            btn.querySelector('svg').style.fill = 'var(--like)';
          } else {
            btn.classList.remove('liked');
            btn.querySelector('svg').style.fill = 'none';
          }
        }
      });

      // Initialize carousels
      if (post.mediaUrls && post.mediaUrls.length > 1) {
        window.carousels = window.carousels || {};
        window.carousels[key] = { index: 0, total: post.mediaUrls.length };
      }

      feather.replace();
    }

    // Carousel Functions
    window.prevSlide = function(key) {
      const c = window.carousels[key];
      if (!c) return;
      c.index = c.index > 0 ? c.index - 1 : c.total - 1;
      updateCarousel(key);
    }

    window.nextSlide = function(key) {
      const c = window.carousels[key];
      if (!c) return;
      c.index = c.index < c.total - 1 ? c.index + 1 : 0;
      updateCarousel(key);
    }

    window.goToSlide = function(key, index) {
      const c = window.carousels[key];
      if (!c) return;
      c.index = index;
      updateCarousel(key);
    }

    function updateCarousel(key) {
      const c = window.carousels[key];
      const track = document.querySelector('#carousel-' + key + ' .carousel-track');
      const dots = document.querySelectorAll('#carousel-' + key + ' .carousel-dot');
      const counter = document.querySelector('#carousel-' + key + ' .carousel-counter');
      
      if (track) track.style.transform = 'translateX(-' + (c.index * 100) + '%)';
      dots.forEach((d, i) => d.classList.toggle('active', i === c.index));
      if (counter) counter.textContent = (c.index + 1) + ' / ' + c.total;
    }

    // Media Functions
    window.openMediaModal = function(src, type) {
      const modal = document.getElementById('media-modal');
      const content = document.getElementById('modal-content');
      
      if (type === 'video') {
        content.innerHTML = '<video src="' + src + '" controls autoplay style="max-width:100%;max-height:90vh;border-radius:8px;"></video>';
      } else {
        content.innerHTML = '<img src="' + src + '" style="max-width:100%;max-height:90vh;border-radius:8px;">';
      }
      
      modal.classList.add('active');
    }

    window.closeMediaModal = function() {
      document.getElementById('media-modal').classList.remove('active');
      document.getElementById('modal-content').innerHTML = '';
    }

    // Like Function
    window.toggleLike = async function(key) {
      if (!currentUser) { showToast('Please login', 'error'); return; }
      
      const likeRef = ref(db, 'postLikes/' + key + '/' + currentUser.uid);
      const postRef = ref(db, 'posts/' + key);
      const snap = await get(likeRef);
      
      if (snap.exists()) {
        await set(likeRef, null);
        await runTransaction(postRef, p => { if (p) p.likes = Math.max((p.likes || 0) - 1, 0); return p; });
      } else {
        await set(likeRef, true);
        await runTransaction(postRef, p => { if (p) p.likes = (p.likes || 0) + 1; return p; });
        
        // Notify post owner
        const postSnap = await get(postRef);
        if (postSnap.exists() && postSnap.val().uid !== currentUser.uid) {
          await push(ref(db, 'notifications/' + postSnap.val().uid), {
            type: 'like',
            senderId: currentUser.uid,
            senderName: currentUsername,
            senderAvatar: userAvatar,
            postId: key,
            timestamp: Date.now(),
            read: false
          });
        }
      }
    }

    // Repost Function
    window.toggleRepost = async function(key, postData) {
      if (!currentUser) { showToast('Please login', 'error'); return; }
      
      const repostRef = ref(db, 'posts/' + key + '/reposts/' + currentUser.uid);
      const snap = await get(repostRef);
      
      if (snap.exists()) {
        await set(repostRef, null);
        await runTransaction(ref(db, 'posts/' + key), p => { 
          if (p) p.repostCount = Math.max((p.repostCount || 0) - 1, 0); 
          return p; 
        });
        showToast('Repost removed', 'success');
      } else {
        await set(repostRef, { timestamp: Date.now() });
        await runTransaction(ref(db, 'posts/' + key), p => { 
          if (p) p.repostCount = (p.repostCount || 0) + 1; 
          return p; 
        });

        // Create repost
        const userRef = ref(db, 'users/' + post.uid);
        const userSnap = await get(userRef);
        const originalData = userSnap.val() || {};

        await push(ref(db, 'posts'), {
          uid: currentUser.uid,
          username: currentUsername,
          text: postData.text || '',
          mediaUrls: postData.mediaUrls || [],
          mediaType: postData.mediaType || '',
          timestamp: Date.now(),
          likes: 0,
          commentCount: 0,
          reachCount: 0,
          repostCount: 0,
          isRepost: true,
          originalPost: {
            uid: post.uid,
            author: originalData.username || originalData.displayName || 'User',
            avatar: originalData.photoURL || originalData.avatarUrl
          },
          originalPostId: key
        });

        // Notify original poster
        if (postData.uid !== currentUser.uid) {
          await push(ref(db, 'notifications/' + postData.uid), {
            type: 'repost',
            senderId: currentUser.uid,
            senderName: currentUsername,
            senderAvatar: userAvatar,
            postId: key,
            timestamp: Date.now(),
            read: false
          });
        }

        showToast('Post reposted!', 'success');
        refreshFeed();
      }
    }

    // Comments
    window.openComments = async function(key) {
      const section = document.getElementById('comments-' + key);
      const list = document.getElementById('comments-list-' + key);
      
      section.style.display = 'block';
      list.innerHTML = '<div style="text-align:center;padding:20px;color:var(--text-secondary);">Loading comments...</div>';

      onValue(ref(db, 'postComments/' + key), async (snapshot) => {
        list.innerHTML = '';
        
        if (snapshot.exists()) {
          const comments = [];
          snapshot.forEach(child => comments.push(child.val()));
          
          for (const c of comments) {
            const userRef = ref(db, 'users/' + c.uid);
            const userSnap = await get(userRef);
            const userData = userSnap.val() || {};
            const avatar = userData.photoURL || userData.avatarUrl || "https://abs.twimg.com/sticky/default_profile_images/default_profile_normal.png";
            
            const div = document.createElement('div');
            div.className = 'comment';
            div.innerHTML = `
              <img src="${avatar}" class="comment-avatar">
              <div class="comment-bubble">
                <div class="comment-author">${c.username}</div>
                <div class="comment-text">${escapeHtml(c.text)}</div>
                <div class="comment-actions">
                  <span class="comment-action">Like</span>
                  <span class="comment-action">Reply</span>
                  <span style="color:var(--text-secondary);">${getTimeAgo(c.timestamp)}</span>
                </div>
              </div>
            `;
            list.appendChild(div);
          }
        } else {
          list.innerHTML = '<div style="text-align:center;padding:20px;color:var(--text-secondary);">No comments yet</div>';
        }
        
        feather.replace();
      });
    }

    window.postComment = async function(key, input) {
      const text = input.value.trim();
      if (!text || !currentUser) return;

      await push(ref(db, 'postComments/' + key), {
        uid: currentUser.uid,
        username: currentUsername,
        text: text,
        timestamp: Date.now(),
        likeCount: 0
      });

      await runTransaction(ref(db, 'posts/' + key), p => {
        if (p) p.commentCount = (p.commentCount || 0) + 1;
        return p;
      });

      input.value = '';

      // Notify post owner
      const postSnap = await get(ref(db, 'posts/' + key));
      if (postSnap.exists() && postSnap.val().uid !== currentUser.uid) {
        await push(ref(db, 'notifications/' + postSnap.val().uid), {
          type: 'comment',
          senderId: currentUser.uid,
          senderName: currentUsername,
          senderAvatar: userAvatar,
          postId: key,
          commentText: text,
          timestamp: Date.now(),
          read: false
        });
      }
    }

    // Create Post with Multiple Images
    document.getElementById('photo-input').addEventListener('change', (e) => {
      const files = Array.from(e.target.files);
      if (files.length > 0) {
        selectedImages = files;
        selectedVideo = null;
        showMediaPreview();
      }
    });

    document.getElementById('video-input').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        if (file.size > 100 * 1024 * 1024) {
          showToast('Video must be under 100MB', 'error');
          return;
        }
        selectedVideo = file;
        selectedImages = [];
        showMediaPreview();
      }
    });

    function showMediaPreview() {
      const area = document.getElementById('media-preview-area');
      const grid = document.getElementById('multi-image-grid');
      const video = document.getElementById('video-preview');

      area.classList.add('active');
      grid.innerHTML = '';
      video.style.display = 'none';

      if (selectedVideo) {
        video.src = URL.createObjectURL(selectedVideo);
        video.style.display = 'block';
      } else if (selectedImages.length > 0) {
        selectedImages.forEach((file, i) => {
          const img = document.createElement('img');
          img.src = URL.createObjectURL(file);
          if (i >= 4) img.style.opacity = '0.5';
          grid.appendChild(img);
        });
        if (selectedImages.length > 4) {
          const more = document.createElement('div');
          more.style.cssText = 'position:absolute;bottom:8px;right:8px;background:rgba(0,0,0,0.7);color:white;padding:4px 8px;border-radius:4px;font-size:12px;font-weight:600;';
          more.textContent = '+' + (selectedImages.length - 4);
          grid.style.position = 'relative';
          grid.appendChild(more);
        }
      }

      feather.replace();
    }

    window.clearMedia = function() {
      selectedImages = [];
      selectedVideo = null;
      document.getElementById('media-preview-area').classList.remove('active');
      document.getElementById('photo-input').value = '';
      document.getElementById('video-input').value = '';
    }

    // Post Button
    document.getElementById('create-post-btn').addEventListener('click', async () => {
      const text = prompt("What's on your mind?");
      if (!text && selectedImages.length === 0 && !selectedVideo) return;

      // Show upload progress
      const progress = document.getElementById('upload-progress');
      const fill = document.getElementById('progress-fill');
      const status = document.getElementById('upload-status');
      progress.classList.add('active');
      fill.style.width = '0%';

      try {
        let mediaUrls = [];
        let mediaType = '';

        if (selectedImages.length > 0) {
          mediaType = 'images';
          for (let i = 0; i < selectedImages.length; i++) {
            status.textContent = 'Uploading image ' + (i + 1) + ' of ' + selectedImages.length;
            fill.style.width = ((i / selectedImages.length) * 80) + '%';
            
            const fd = new FormData();
            fd.append('file', selectedImages[i]);
            fd.append('upload_preset', UPLOAD_PRESET);
            
            const res = await fetch('https://api.cloudinary.com/v1_1/' + CLOUD_NAME + '/image/upload', {
              method: 'POST',
              body: fd
            });
            const data = await res.json();
            if (data.secure_url) mediaUrls.push(data.secure_url);
          }
        } else if (selectedVideo) {
          status.textContent = 'Uploading video...';
          fill.style.width = '40%';
          
          const fd = new FormData();
          fd.append('file', selectedVideo);
          fd.append('upload_preset', UPLOAD_PRESET);
          
          const res = await fetch('https://api.cloudinary.com/v1_1/' + CLOUD_NAME + '/video/upload', {
            method: 'POST',
            body: fd
          });
          const data = await res.json();
          if (data.secure_url) {
            mediaUrls = [data.secure_url];
            mediaType = 'video';
          }
        }

        status.textContent = 'Publishing post...';
        fill.style.width = '90%';

        await push(ref(db, 'posts'), {
          uid: currentUser.uid,
          username: currentUsername,
          text: text || '',
          mediaUrls: mediaUrls,
          mediaType: mediaType,
          timestamp: Date.now(),
          likes: 0,
          commentCount: 0,
          reachCount: 0,
          repostCount: 0
        });

        fill.style.width = '100%';
        clearMedia();
        showToast('Posted successfully!', 'success');
        
        setTimeout(() => {
          progress.classList.remove('active');
          refreshFeed();
        }, 500);

      } catch (err) {
        console.error('Post error:', err);
        showToast('Failed to post', 'error');
        progress.classList.remove('active');
      }
    });

    // Logout
    document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));

    // Utilities
    function getTimeAgo(timestamp) {
      const diff = Math.floor((Date.now() - timestamp) / 1000);
      if (diff < 60) return 'Just now';
      if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
      if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
      if (diff < 604800) return Math.floor(diff / 86400) + 'd ago';
      return new Date(timestamp).toLocaleDateString();
    }

    function formatCount(n) {
      if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
      if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
      return n.toString();
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function showToast(msg, type = 'success') {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.className = 'toast show ' + type;
      setTimeout(() => toast.classList.remove('show'), 3000);
    }
  </script>
</body>
</html>
