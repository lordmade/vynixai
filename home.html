<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ONA | Home</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div id="app-wrapper">
        
        <!-- Auth Screen -->
        <section id="auth-screen">
            <h1 class="logo">ONA</h1>
            <form id="auth-form" class="form-container">
                <input type="email" id="email" placeholder="Email" required autocomplete="email">
                <input type="password" id="password" placeholder="Password" required autocomplete="current-password">
                <button type="submit" id="auth-btn">Log In</button>
            </form>
            <p class="toggle-auth" id="toggle-auth">Don't have an account? <b>Sign up</b></p>
            <p id="auth-error" class="error-msg"></p>
        </section>

        <!-- Main App -->
        <section id="main-app" style="display: none;">
            <header class="navbar">
                <h2 class="logo-small">ONA</h2>
                <div class="nav-actions">
                    <i data-lucide="heart" style="cursor:pointer; margin-right: 15px;"></i>
                    <i data-lucide="log-out" id="logout-btn" style="cursor:pointer"></i>
                </div>
            </header>

            <!-- Feed View -->
            <div id="feed-view" class="view">
                <div id="feed"></div>
                <div class="empty-state" id="feed-empty" style="display: none;">
                    <i data-lucide="camera" style="width: 48px; height: 48px;"></i>
                    <p>No posts yet. Be the first to share!</p>
                </div>
            </div>

            <!-- Search View -->
            <div id="search-view" class="view" style="display: none;">
                <div class="search-container">
                    <div class="search-box">
                        <i data-lucide="search" style="width: 16px; height: 16px; color: var(--text-grey);"></i>
                        <input type="text" id="search-input" placeholder="Search users..." autocomplete="off">
                    </div>
                </div>
                <div id="search-results"></div>
                <div class="empty-state" id="search-empty">
                    <i data-lucide="users" style="width: 48px; height: 48px;"></i>
                    <p>Search for users to follow</p>
                </div>
            </div>

            <!-- Profile View -->
            <div id="profile-view" class="view" style="display: none;">
                <div class="profile-header">
                    <div class="profile-avatar-container">
                        <img id="user-profile-img" src="" class="profile-avatar" alt="Profile">
                    </div>
                    <div class="profile-info">
                        <h2 id="user-profile-name"></h2>
                        <div class="profile-stats">
                            <span><strong id="posts-count">0</strong> posts</span>
                        </div>
                    </div>
                </div>
                <div id="user-posts-grid" class="posts-grid"></div>
                <div class="empty-state" id="profile-empty" style="display: none;">
                    <i data-lucide="image" style="width: 48px; height: 48px;"></i>
                    <p>No posts yet</p>
                </div>
            </div>

            <!-- Bottom Navigation -->
            <nav class="bottom-nav">
                <i data-lucide="home" id="nav-home" class="nav-active"></i>
                <i data-lucide="search" id="nav-search"></i>
                <div id="add-post-btn" class="nav-add-btn">
                    <i data-lucide="plus"></i>
                </div>
                <i data-lucide="heart"></i>
                <i data-lucide="user" id="nav-profile"></i>
            </nav>
        </section>

        <!-- Bottom Sheet Upload Modal -->
        <div id="upload-modal" class="modal">
            <div class="modal-content">
                <!-- Drag Handle -->
                <div class="modal-drag-handle" id="modal-drag-handle"></div>
                
                <!-- Header -->
                <div class="modal-header">
                    <div class="close-btn" id="close-modal">
                        <i data-lucide="x" style="width: 20px; height: 20px;"></i>
                    </div>
                    <h3>New Post</h3>
                    <button type="submit" form="upload-form" id="submit-post-btn" class="share-link">Share</button>
                </div>
                
                <!-- Body -->
                <div class="modal-body">
                    <form id="upload-form">
                        <!-- Image Preview Area -->
                        <div class="image-preview-container" id="preview-container">
                            <input type="file" id="image-file" accept="image/*" required capture="environment">
                            <div class="upload-placeholder">
                                <i data-lucide="image-plus" style="width: 48px; height: 48px;"></i>
                                <span>Tap to upload photo</span>
                                <small>or take a picture</small>
                            </div>
                            <img class="preview-image" id="preview-img" alt="Preview">
                            <button type="button" class="change-image-btn" id="change-image">
                                <i data-lucide="refresh-cw" style="width: 14px; height: 14px; vertical-align: middle; margin-right: 4px;"></i>
                                Change
                            </button>
                        </div>
                        
                        <!-- Caption Input -->
                        <div class="caption-container">
                            <div class="caption-header">
                                <img id="current-user-avatar" src="" alt="">
                                <span id="current-user-name">username</span>
                            </div>
                            <textarea 
                                id="caption" 
                                placeholder="Write a caption..." 
                                maxlength="2200"
                                rows="3"
                            ></textarea>
                            <div class="caption-footer">
                                <div class="upload-options">
                                    <button type="button" class="option-btn" id="btn-location">
                                        <i data-lucide="map-pin" style="width: 16px; height: 16px;"></i>
                                        <span>Location</span>
                                    </button>
                                    <button type="button" class="option-btn" id="btn-tag">
                                        <i data-lucide="at-sign" style="width: 16px; height: 16px;"></i>
                                        <span>Tag</span>
                                    </button>
                                </div>
                                <span class="char-count" id="char-count">0/2200</span>
                            </div>
                        </div>
                    </form>
                    
                    <!-- Loading State -->
                    <div class="upload-loading" id="upload-loading">
                        <div class="spinner"></div>
                        <p>Uploading your post...</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Image Lightbox Modal -->
        <div id="lightbox-modal" class="lightbox">
            <div class="lightbox-content">
                <span class="lightbox-close" id="lightbox-close">&times;</span>
                <img id="lightbox-img" src="" alt="Full size">
            </div>
        </div>
    </div>
    
    <script type="module" src="app.js"></script>
</body>
</html>
