<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONA - Share Your World</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app-wrapper">
        <section id="auth-screen">
            <h1 class="logo">ONA</h1>
            <form id="auth-form" class="form-container">
                <input type="email" id="email" placeholder="Email" required>
                <input type="password" id="password" placeholder="Password" required>
                <button type="submit" id="auth-btn">Log In</button>
            </form>
            <p class="toggle-auth" id="toggle-auth">Don't have an account? <b>Sign up</b></p>
            <p id="auth-error" class="error-msg"></p>
        </section>

        <section id="main-app" style="display: none;">
            <header class="navbar">
                <h2 class="logo-small">ONA</h2>
                <button id="logout-btn">Logout</button>
            </header>
            <div id="feed"></div>
            <div id="fab">+</div>
        </section>

        <div id="upload-modal" class="modal">
            <div class="modal-content">
                <span id="close-modal">&times;</span>
                <h3>New Post</h3>
                <form id="upload-form" class="form-container">
                    <input type="file" id="image-file" accept="image/*" required>
                    <textarea id="caption" placeholder="Write a caption..." required></textarea>
                    <button type="submit" id="submit-post-btn">Share</button>
                    <p id="upload-status"></p>
                </form>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
