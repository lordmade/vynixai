<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vynix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/feather-icons"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366F1;
            --primary-dark: #4F46E5;
            --background: #F8FAFC;
            --surface: #FFFFFF;
            --border: #E2E8F0;
            --text-primary: #0F172A;
            --text-secondary: #64748B;
            --text-muted: #94A3B8;
            --like: #F43F5E;
            --story-gradient: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--background);
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            padding-bottom: calc(90px + env(safe-area-inset-bottom));
        }
        
        /* Shimmer Effect */
        .shimmer {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 8px;
        }
        
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        
        .story-shimmer {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        
        .post-shimmer {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
        }
        
        /* Stories */
        .stories-wrapper {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 16px 0;
            position: sticky;
            top: 60px;
            z-index: 40;
        }
        
        .stories-container {
            display: flex;
            flex-direction: row;
            flex-wrap: nowrap;
            gap: 16px;
            padding: 0 16px;
            overflow-x: auto;
            overflow-y: hidden;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        
        .stories-container::-webkit-scrollbar { display: none; }
        
        .story-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            flex-shrink: 0;
            scroll-snap-align: start;
            transition: transform 0.2s;
            position: relative;
        }
        
        .story-item:active { transform: scale(0.92); }
        
        .story-delete {
            position: absolute;
            top: -4px;
            right: -4px;
            background: var(--like);
            color: white;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--surface);
            z-index: 10;
        }
        
        .story-item:hover .story-delete { display: flex; }
        
        .story-ring {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            padding: 3px;
            background: var(--story-gradient);
            position: relative;
        }
        
        .story-ring.seen { background: #E2E8F0; }
        
        .story-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 3px solid var(--surface);
            object-fit: cover;
        }
        
        .story-add-btn {
            position: absolute;
            bottom: 0;
            right: 0;
            background: var(--primary);
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid var(--surface);
        }
        
        .story-label {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-secondary);
            max-width: 72px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        /* Posts */
        .app-container { max-width: 100%; margin: 0 auto; }
        @media (min-width: 1024px) { .app-container { max-width: 600px; border-left: 1px solid var(--border); border-right: 1px solid var(--border); } }
        
        .header {
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .post-card {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 16px;
            animation: fadeIn 0.3s ease-out;
            position: relative;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .post-menu {
            position: absolute;
            top: 16px;
            right: 16px;
            opacity: 0;
            transition: opacity 0.2s;
        }
        
        .post-card:hover .post-menu { opacity: 1; }
        .post-menu.active { opacity: 1; }
        
        .post-menu-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 4px;
            border-radius: 50%;
        }
        
        .post-menu-btn:active { background: var(--background); }
        
        .post-dropdown {
            position: absolute;
            top: 40px;
            right: 0;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            display: none;
            min-width: 150px;
            z-index: 20;
            overflow: hidden;
        }
        
        .post-dropdown.active { display: block; }
        
        .dropdown-item {
            padding: 12px 16px;
            font-size: 14px;
            color: var(--text-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
        }
        
        .dropdown-item:hover { background: var(--background); }
        .dropdown-item.delete { color: var(--like); }
        
        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
        }
        
        .post-header { display: flex; gap: 12px; margin-bottom: 12px; padding-right: 40px; }
        .post-author { font-weight: 700; font-size: 15px; }
        .post-meta { color: var(--text-secondary); font-size: 14px; }
        .post-text { font-size: 16px; line-height: 1.5; margin-bottom: 12px; word-wrap: break-word; }
        
        .post-media {
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 12px;
            border: 1px solid var(--border);
        }
        
        .post-media img, .post-media video {
            width: 100%;
            max-height: 500px;
            object-fit: cover;
            display: block;
        }
        
        .actions {
            display: flex;
            justify-content: space-between;
            max-width: 400px;
        }
        
        .action-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 600;
            padding: 8px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s;
            background: none;
            border: none;
            font-family: inherit;
        }
        
        .action-btn:active { transform: scale(0.9); }
        .action-btn.liked { color: var(--like); }
        .action-btn.active { color: var(--primary); }
        
        /* Comments Section */
        .comments-section {
            border-top: 1px solid var(--border);
            margin-top: 12px;
            padding-top: 12px;
            display: none;
        }
        
        .comments-section.active { display: block; }
        
        .comment {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
            animation: slideIn 0.3s ease-out;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        .comment-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
        }
        
        .comment-content { flex: 1; }
        .comment-author { font-weight: 600; font-size: 14px; }
        .comment-text { font-size: 14px; color: var(--text-primary); margin-top: 2px; }
        .comment-time { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
        
        .comment-input-wrapper {
            display: flex;
            gap: 12px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }
        
        .comment-input {
            flex: 1;
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 8px 16px;
            font-size: 14px;
            outline: none;
            font-family: inherit;
        }
        
        .comment-submit {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 600;
            cursor: pointer;
            opacity: 0.5;
        }
        
        .comment-submit.active { opacity: 1; }
        
        /* Bottom Nav */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
            display: flex;
            justify-content: space-around;
            z-index: 100;
        }
        
        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px;
            color: var(--text-secondary);
            background: none;
            border: none;
            font-family: inherit;
            cursor: pointer;
        }
        
        .nav-item.active { color: var(--primary); }
        .nav-item span { font-size: 11px; font-weight: 600; }
        
        .fab {
            width: 56px;
            height: 56px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(99,102,241,0.4);
            transform: translateY(-20px);
            cursor: pointer;
        }
        
        .fab:active { transform: translateY(-20px) scale(0.9); }
        
        /* Modals */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        
        .bottom-sheet {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--surface);
            border-radius: 24px 24px 0 0;
            padding: 20px;
            padding-bottom: calc(20px + env(safe-area-inset-bottom));
            transform: translateY(100%);
            transition: transform 0.3s;
            z-index: 201;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .modal-overlay.active ~ .bottom-sheet { transform: translateY(0); }
        
        /* Confirmation Modal */
        .confirm-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: var(--surface);
            border-radius: 20px;
            padding: 24px;
            width: 90%;
            max-width: 320px;
            z-index: 210;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .confirm-modal.active {
            opacity: 1;
            pointer-events: auto;
            transform: translate(-50%, -50%) scale(1);
        }
        
        .confirm-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 8px;
            text-align: center;
        }
        
        .confirm-text {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 20px;
            text-align: center;
        }
        
        .confirm-buttons {
            display: flex;
            gap: 12px;
        }
        
        .confirm-btn {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            font-size: 15px;
        }
        
        .confirm-btn.cancel {
            background: var(--background);
            color: var(--text-primary);
        }
        
        .confirm-btn.confirm {
            background: var(--like);
            color: white;
        }
        
        .upload-progress {
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            overflow: hidden;
            margin: 12px 0;
            display: none;
        }
        
        .upload-progress.active { display: block; }
        
        .progress-bar-fill {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.3s;
        }
        
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #1e293b;
            color: white;
            padding: 12px 24px;
            border-radius: 9999px;
            font-weight: 500;
            opacity: 0;
            transition: all 0.3s;
            z-index: 9999;
            pointer-events: none;
        }
        
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        
        /* Story Viewer */
        .story-viewer {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 300;
            display: none;
            flex-direction: column;
        }
        
        .story-viewer.active { display: flex; }
        
        .story-progress-bar {
            flex: 1;
            height: 3px;
            background: rgba(255,255,255,0.3);
            margin: 0 2px;
            border-radius: 3px;
            overflow: hidden;
        }
        
        .story-progress-fill {
            height: 100%;
            background: white;
            width: 0%;
        }
        
        .delete-story-btn {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.2);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 12px 24px;
            border-radius: 24px;
            cursor: pointer;
            display: none;
        }
        
        .story-viewer.own-story .delete-story-btn { display: block; }
        
        @media (min-width: 1024px) {
            .bottom-nav { display: none; }
            body { padding-bottom: 0; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <!-- Header -->
    <header class="header">
        <img src="" id="header-avatar" class="avatar" style="width: 32px; height: 32px; cursor: pointer;" onclick="goToProfile()">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="color: var(--primary);">
            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
        </svg>
        <button style="background: none; border: none;" onclick="showToast('Settings')">
            <i data-feather="settings" style="width: 20px; height: 20px; color: var(--text-primary);"></i>
        </button>
    </header>

    <!-- Stories with Shimmer -->
    <div class="stories-wrapper">
        <div class="stories-container" id="stories-container">
            <!-- Shimmer loading -->
            <div class="shimmer story-shimmer"></div>
            <div class="shimmer story-shimmer"></div>
            <div class="shimmer story-shimmer"></div>
            <div class="shimmer story-shimmer"></div>
            <div class="shimmer story-shimmer"></div>
        </div>
    </div>

    <!-- Posts Feed with Shimmer -->
    <div id="feed">
        <div class="post-shimmer">
            <div style="display: flex; gap: 12px; margin-bottom: 12px;">
                <div class="shimmer" style="width: 48px; height: 48px; border-radius: 50%;"></div>
                <div style="flex: 1;">
                    <div class="shimmer" style="width: 120px; height: 16px; margin-bottom: 8px;"></div>
                    <div class="shimmer" style="width: 80px; height: 14px;"></div>
                </div>
            </div>
            <div class="shimmer" style="width: 100%; height: 200px; border-radius: 16px;"></div>
        </div>
        <div class="post-shimmer">
            <div style="display: flex; gap: 12px; margin-bottom: 12px;">
                <div class="shimmer" style="width: 48px; height: 48px; border-radius: 50%;"></div>
                <div style="flex: 1;">
                    <div class="shimmer" style="width: 100px; height: 16px; margin-bottom: 8px;"></div>
                    <div class="shimmer" style="width: 60px; height: 14px;"></div>
                </div>
            </div>
            <div class="shimmer" style="width: 100%; height: 150px; border-radius: 16px;"></div>
        </div>
    </div>
</div>

<!-- Bottom Navigation -->
<nav class="bottom-nav">
    <button class="nav-item active" onclick="window.scrollTo({top:0,behavior:'smooth'})">
        <i data-feather="home" style="width: 24px; height: 24px;"></i>
        <span>Home</span>
    </button>
    <button class="nav-item" onclick="showToast('Search')">
        <i data-feather="search" style="width: 24px; height: 24px;"></i>
        <span>Search</span>
    </button>
    <button class="fab" onclick="openCompose()">
        <i data-feather="plus" style="width: 28px; height: 28px;"></i>
    </button>
    <button class="nav-item" onclick="showToast('Notifications')">
        <i data-feather="bell" style="width: 24px; height: 24px;"></i>
        <span>Alerts</span>
    </button>
    <button class="nav-item" onclick="goToProfile()">
        <i data-feather="user" style="width: 24px; height: 24px;"></i>
        <span>Profile</span>
    </button>
</nav>

<!-- Compose Modal -->
<div class="modal-overlay" onclick="closeCompose()"></div>
<div class="bottom-sheet">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
        <button onclick="closeCompose()" style="background: none; border: none; color: var(--text-secondary); font-size: 15px;">Cancel</button>
        <button id="post-btn" onclick="createPost()" style="background: var(--primary); color: white; border: none; padding: 8px 20px; border-radius: 9999px; font-weight: 700; opacity: 0.5;" disabled>Post</button>
    </div>
    
    <div style="display: flex; gap: 12px; margin-bottom: 16px;">
        <img src="" id="compose-avatar" class="avatar" style="width: 40px; height: 40px;">
        <textarea id="compose-text" placeholder="What's happening?" style="flex: 1; border: none; outline: none; font-size: 18px; resize: none; height: 120px; font-family: inherit;" oninput="updatePostButton()"></textarea>
    </div>
    
    <div id="media-preview" style="display: none; position: relative; margin-bottom: 16px; border-radius: 16px; overflow: hidden;">
        <img id="preview-img" style="width: 100%; max-height: 300px; object-fit: cover;">
        <button onclick="clearMedia()" style="position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.6); color: white; border: none; width: 32px; height: 32px; border-radius: 50%; cursor: pointer;">
            <i data-feather="x" style="width: 18px; height: 18px;"></i>
        </button>
    </div>
    
    <div class="upload-progress" id="upload-progress">
        <div class="progress-bar-fill" id="progress-fill"></div>
    </div>
    
    <div style="border-top: 1px solid var(--border); padding-top: 16px; display: flex; justify-content: space-between; align-items: center;">
        <div style="display: flex; gap: 16px;">
            <input type="file" id="media-input" accept="image/*,video/*" style="display: none;" onchange="handleMediaSelect(event)">
            <button onclick="document.getElementById('media-input').click()" style="background: none; border: none; color: var(--primary); cursor: pointer;">
                <i data-feather="image" style="width: 22px; height: 22px;"></i>
            </button>
        </div>
        <span id="char-count" style="color: var(--text-muted); font-size: 14px;">280</span>
    </div>
</div>

<!-- Story File Input -->
<input type="file" id="story-input" accept="image/*,video/*" style="display: none;" onchange="uploadStory(event)">

<!-- Story Viewer -->
<div class="story-viewer" id="story-viewer">
    <div style="display: flex; padding: 12px; padding-top: calc(12px + env(safe-area-inset-top)); gap: 4px;" id="story-progress-container"></div>
    <div style="flex: 1; display: flex; align-items: center; justify-content: center; position: relative;" onclick="closeStoryViewer()">
        <img id="story-display-img" style="max-width: 100%; max-height: 80vh; object-fit: contain;">
    </div>
    <button class="delete-story-btn" onclick="confirmDeleteStory()">Delete Story</button>
</div>

<!-- Confirmation Modal -->
<div class="modal-overlay" id="confirm-overlay" onclick="closeConfirmModal()"></div>
<div class="confirm-modal" id="confirm-modal">
    <div class="confirm-title" id="confirm-title">Delete Post?</div>
    <div class="confirm-text" id="confirm-text">This action cannot be undone.</div>
    <div class="confirm-buttons">
        <button class="confirm-btn cancel" onclick="closeConfirmModal()">Cancel</button>
        <button class="confirm-btn confirm" id="confirm-action-btn" onclick="executeDelete()">Delete</button>
    </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, onValue, onChildAdded, onChildChanged, onChildRemoved, push, set, get, update, remove, query, orderByChild, limitToLast, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const CLOUDINARY_CLOUD_NAME = 'dqkujefxj';
    const CLOUDINARY_UPLOAD_PRESET = 'banter_box';
    
    const firebaseConfig = {
        apiKey: "AIzaSyBOyZ3As4GTuNvjemvPF_SpsC6m6vqtNhc",
        authDomain: "fire-b-a8878.firebaseapp.com",
        databaseURL: "https://fire-b-a8878.firebaseio.com",
        projectId: "fire-b-a8878",
        storageBucket: "fire-b-a8878.appspot.com",
        messagingSenderId: "658673187627",
        appId: "1:658673187627:web:6e4c29af661785f0afa36e"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    let currentUser = null;
    let currentUserData = null;
    let selectedMedia = null;
    let currentStories = [];
    let postsMap = new Map(); // Track rendered posts
    let deleteCallback = null;
    let currentStoryId = null;
    let currentStoryOwner = null;

    async function uploadToCloudinary(file, folder = 'posts') {
        const formData = new FormData();
        formData.append('file', file);
        formData.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);
        formData.append('folder', folder);
        
        const response = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/upload`, {
            method: 'POST',
            body: formData
        });
        
        if (!response.ok) throw new Error('Upload failed');
        return await response.json();
    }

    onAuthStateChanged(auth, async (user) => {
        if (!user) {
            window.location.href = 'auth.html';
            return;
        }
        currentUser = user;
        await loadUserData();
        setupStoriesListeners();
        setupPostsListeners();
    });

    async function loadUserData() {
        const userRef = ref(db, `users/${currentUser.uid}`);
        const snapshot = await get(userRef);
        
        if (snapshot.exists()) {
            currentUserData = snapshot.val();
        } else {
            currentUserData = {
                uid: currentUser.uid,
                email: currentUser.email,
                username: currentUser.email.split('@')[0],
                displayName: currentUser.displayName || 'User',
                photoURL: currentUser.photoURL || `https://ui-avatars.com/api/?name=${currentUser.email}&background=6366F1&color=fff`,
                createdAt: Date.now()
            };
            await set(userRef, currentUserData);
        }
        
        document.getElementById('header-avatar').src = currentUserData.photoURL;
        document.getElementById('compose-avatar').src = currentUserData.photoURL;
    }

    // Optimized Stories with Real-time Updates
    function setupStoriesListeners() {
        const storiesRef = query(ref(db, 'stories'), orderByChild('timestamp'), limitToLast(20));
        
        onChildAdded(storiesRef, (snapshot) => {
            const story = { id: snapshot.key, ...snapshot.val() };
            if (Date.now() - story.timestamp < 24 * 60 * 60 * 1000) {
                addStoryToDOM(story);
            }
        });
        
        onChildChanged(storiesRef, (snapshot) => {
            const story = { id: snapshot.key, ...snapshot.val() };
            updateStoryInDOM(story);
        });
        
        onChildRemoved(storiesRef, (snapshot) => {
            removeStoryFromDOM(snapshot.key);
        });
    }

    function addStoryToDOM(story, prepend = false) {
        const container = document.getElementById('stories-container');
        
        // Remove shimmers on first load
        if (container.querySelector('.shimmer')) {
            container.innerHTML = '';
            
            // Add "Your Story" button
            const addBtn = document.createElement('div');
            addBtn.className = 'story-item';
            addBtn.onclick = triggerStoryUpload;
            addBtn.innerHTML = `
                <div class="story-ring">
                    <img src="${currentUserData.photoURL}" class="story-img" style="opacity: 0.8;">
                    <div class="story-add-btn">
                        <i data-feather="plus" style="width: 14px; height: 14px;"></i>
                    </div>
                </div>
                <span class="story-label">Your Story</span>
            `;
            container.appendChild(addBtn);
            feather.replace();
        }
        
        const isOwner = story.uid === currentUser.uid;
        const isViewed = story.viewed?.[currentUser.uid];
        
        const storyEl = document.createElement('div');
        storyEl.className = 'story-item';
        storyEl.id = `story-${story.id}`;
        storyEl.onclick = () => viewStory(story);
        
        storyEl.innerHTML = `
            ${isOwner ? `<div class="story-delete" onclick="event.stopPropagation(); confirmDeleteStory('${story.id}')"><i data-feather="x" style="width: 12px; height: 12px;"></i></div>` : ''}
            <div class="story-ring ${isViewed ? 'seen' : ''}">
                <img src="${story.mediaUrl}" class="story-img" loading="lazy">
            </div>
            <span class="story-label">${isOwner ? 'Your Story' : story.username}</span>
        `;
        
        if (prepend && container.children[1]) {
            container.insertBefore(storyEl, container.children[1]);
        } else {
            container.appendChild(storyEl);
        }
        
        currentStories.push(story);
        feather.replace();
    }

    function updateStoryInDOM(story) {
        const el = document.getElementById(`story-${story.id}`);
        if (!el) return;
        
        const ring = el.querySelector('.story-ring');
        if (story.viewed?.[currentUser.uid]) {
            ring.classList.add('seen');
        }
    }

    function removeStoryFromDOM(storyId) {
        const el = document.getElementById(`story-${storyId}`);
        if (el) el.remove();
        currentStories = currentStories.filter(s => s.id !== storyId);
    }

    // Optimized Posts with Real-time Updates (No Full Reload)
    function setupPostsListeners() {
        const postsRef = query(ref(db, 'posts'), orderByChild('timestamp'), limitToLast(50));
        
        onChildAdded(postsRef, async (snapshot) => {
            const post = { id: snapshot.key, ...snapshot.val() };
            if (!postsMap.has(post.id)) {
                postsMap.set(post.id, post);
                await renderPost(post, true);
            }
        });
        
        onChildChanged(postsRef, (snapshot) => {
            const post = { id: snapshot.key, ...snapshot.val() };
            postsMap.set(post.id, post);
            updatePostInDOM(post);
        });
        
        onChildRemoved(postsRef, (snapshot) => {
            removePostFromDOM(snapshot.key);
            postsMap.delete(snapshot.key);
        });
    }

    async function renderPost(post, prepend = false) {
        // Remove shimmers
        const existingShimmer = document.querySelector('.post-shimmer');
        if (existingShimmer) {
            document.getElementById('feed').innerHTML = '';
        }
        
        const userSnapshot = await get(ref(db, `users/${post.uid}`));
        const user = userSnapshot.val() || {};
        const isOwner = post.uid === currentUser.uid;
        
        const div = document.createElement('div');
        div.className = 'post-card';
        div.id = `post-${post.id}`;
        div.dataset.postId = post.id;
        
        div.innerHTML = `
            ${isOwner ? `
            <div class="post-menu" id="menu-${post.id}">
                <button class="post-menu-btn" onclick="togglePostMenu('${post.id}', event)">
                    <i data-feather="more-horizontal" style="width: 20px; height: 20px;"></i>
                </button>
                <div class="post-dropdown" id="dropdown-${post.id}">
                    <button class="dropdown-item delete" onclick="confirmDeletePost('${post.id}')">
                        <i data-feather="trash-2" style="width: 16px; height: 16px;"></i>
                        Delete
                    </button>
                </div>
            </div>
            ` : ''}
            
            <div class="post-header">
                <img src="${user.photoURL}" class="avatar" onclick="goToProfile('${post.uid}')" style="cursor: pointer;">
                <div style="flex: 1; min-width: 0;">
                    <div class="post-author" style="display: flex; align-items: center; gap: 4px;">
                        ${user.displayName}
                        ${user.verified ? '<i data-feather="check-circle" style="width: 14px; height: 14px; color: var(--primary); fill: var(--primary);"></i>' : ''}
                    </div>
                    <div class="post-meta">@${user.username} · ${formatTime(post.timestamp)}</div>
                </div>
            </div>
            
            <div class="post-text" id="text-${post.id}">${escapeHtml(post.text)}</div>
            
            ${post.mediaUrl ? `
                <div class="post-media" id="media-${post.id}">
                    ${post.mediaType === 'video' ? 
                        `<video src="${post.mediaUrl}" controls playsinline style="width: 100%;"></video>` :
                        `<img src="${post.mediaUrl}" style="width: 100%; display: block;" loading="lazy">`
                    }
                </div>
            ` : ''}
            
            <div class="actions">
                <button class="action-btn ${post.likes?.[currentUser.uid] ? 'liked' : ''}" id="like-btn-${post.id}" onclick="toggleLike('${post.id}')">
                    <i data-feather="heart" style="width: 20px; height: 20px;" id="like-icon-${post.id}" ${post.likes?.[currentUser.uid] ? 'fill="currentColor"' : ''}></i>
                    <span id="like-count-${post.id}">${Object.keys(post.likes || {}).length}</span>
                </button>
                
                <button class="action-btn" id="comment-btn-${post.id}" onclick="toggleComments('${post.id}')">
                    <i data-feather="message-circle" style="width: 20px; height: 20px;"></i>
                    <span id="comment-count-${post.id}">${Object.keys(post.comments || {}).length}</span>
                </button>
                
                <button class="action-btn" onclick="showToast('Share coming soon')">
                    <i data-feather="share" style="width: 20px; height: 20px;"></i>
                </button>
            </div>
            
            <div class="comments-section" id="comments-${post.id}">
                <div id="comments-list-${post.id}" style="margin-bottom: 12px;"></div>
                <div class="comment-input-wrapper">
                    <img src="${currentUserData.photoURL}" class="comment-avatar">
                    <input type="text" class="comment-input" id="comment-input-${post.id}" placeholder="Write a comment..." onkeypress="handleCommentKeypress(event, '${post.id}')" oninput="updateCommentButton('${post.id}')">
                    <button class="comment-submit" id="comment-submit-${post.id}" onclick="submitComment('${post.id}')" disabled>Post</button>
                </div>
            </div>
        `;
        
        const feed = document.getElementById('feed');
        if (prepend && feed.firstChild) {
            feed.insertBefore(div, feed.firstChild);
        } else {
            feed.appendChild(div);
        }
        
        // Load existing comments
        if (post.comments) {
            Object.entries(post.comments).forEach(([commentId, comment]) => {
                renderComment(post.id, commentId, comment);
            });
        }
        
        feather.replace();
    }

    function updatePostInDOM(post) {
        const postEl = document.getElementById(`post-${post.id}`);
        if (!postEl) return;
        
        // Update like count and state
        const likeCount = Object.keys(post.likes || {}).length;
        const userLiked = post.likes?.[currentUser.uid];
        const likeBtn = document.getElementById(`like-btn-${post.id}`);
        const likeCountEl = document.getElementById(`like-count-${post.id}`);
        const likeIcon = document.getElementById(`like-icon-${post.id}`);
        
        if (likeCountEl) likeCountEl.textContent = likeCount;
        if (likeBtn) {
            if (userLiked) {
                likeBtn.classList.add('liked');
                likeIcon.setAttribute('fill', 'currentColor');
            } else {
                likeBtn.classList.remove('liked');
                likeIcon.removeAttribute('fill');
            }
        }
        
        // Update comment count
        const commentCountEl = document.getElementById(`comment-count-${post.id}`);
        if (commentCountEl) {
            commentCountEl.textContent = Object.keys(post.comments || {}).length;
        }
        
        // Update comments list if new comments added
        if (post.comments) {
            Object.entries(post.comments).forEach(([commentId, comment]) => {
                const existingComment = document.getElementById(`comment-${post.id}-${commentId}`);
                if (!existingComment) {
                    renderComment(post.id, commentId, comment);
                }
            });
        }
    }

    function removePostFromDOM(postId) {
        const el = document.getElementById(`post-${postId}`);
        if (el) {
            el.style.animation = 'fadeOut 0.3s ease-out';
            setTimeout(() => el.remove(), 300);
        }
    }

    // Interactions
    window.togglePostMenu = (postId, event) => {
        event.stopPropagation();
        const dropdown = document.getElementById(`dropdown-${postId}`);
        const allDropdowns = document.querySelectorAll('.post-dropdown');
        allDropdowns.forEach(d => {
            if (d !== dropdown) d.classList.remove('active');
        });
        dropdown.classList.toggle('active');
    };

    // Close menus when clicking outside
    document.addEventListener('click', () => {
        document.querySelectorAll('.post-dropdown').forEach(d => d.classList.remove('active'));
    });

    window.toggleLike = async (postId) => {
        const postRef = ref(db, `posts/${postId}/likes/${currentUser.uid}`);
        const snapshot = await get(postRef);
        
        // Optimistic UI update
        const likeBtn = document.getElementById(`like-btn-${postId}`);
        const isLiked = likeBtn.classList.contains('liked');
        
        if (isLiked) {
            await remove(postRef);
        } else {
            await set(postRef, true);
            if (navigator.vibrate) navigator.vibrate(50);
        }
        // DOM will update via onChildChanged listener
    };

    // Comments System
    window.toggleComments = (postId) => {
        const section = document.getElementById(`comments-${postId}`);
        section.classList.toggle('active');
        if (section.classList.contains('active')) {
            document.getElementById(`comment-input-${postId}`).focus();
        }
    };

    window.updateCommentButton = (postId) => {
        const input = document.getElementById(`comment-input-${postId}`);
        const btn = document.getElementById(`comment-submit-${postId}`);
        btn.disabled = !input.value.trim();
        btn.classList.toggle('active', !!input.value.trim());
    };

    window.handleCommentKeypress = (event, postId) => {
        if (event.key === 'Enter') {
            submitComment(postId);
        }
    };

    window.submitComment = async (postId) => {
        const input = document.getElementById(`comment-input-${postId}`);
        const text = input.value.trim();
        if (!text) return;
        
        const btn = document.getElementById(`comment-submit-${postId}`);
        btn.disabled = true;
        btn.textContent = '...';
        
        try {
            const commentRef = push(ref(db, `posts/${postId}/comments`));
            await set(commentRef, {
                uid: currentUser.uid,
                text: text,
                timestamp: serverTimestamp()
            });
            
            input.value = '';
            updateCommentButton(postId);
        } catch (error) {
            console.error(error);
            showToast('Failed to post comment');
        } finally {
            btn.textContent = 'Post';
            btn.disabled = false;
        }
    };

    async function renderComment(postId, commentId, comment) {
        const container = document.getElementById(`comments-list-${postId}`);
        if (!container) return;
        
        // Check if already rendered
        if (document.getElementById(`comment-${postId}-${commentId}`)) return;
        
        const userSnapshot = await get(ref(db, `users/${comment.uid}`));
        const user = userSnapshot.val() || {};
        
        const div = document.createElement('div');
        div.className = 'comment';
        div.id = `comment-${postId}-${commentId}`;
        div.innerHTML = `
            <img src="${user.photoURL}" class="comment-avatar">
            <div class="comment-content">
                <div class="comment-author">${user.displayName}</div>
                <div class="comment-text">${escapeHtml(comment.text)}</div>
                <div class="comment-time">${formatTime(comment.timestamp)}</div>
            </div>
        `;
        
        container.appendChild(div);
    }

    // Delete System with Custom Modal
    window.confirmDeletePost = (postId) => {
        deleteCallback = () => deletePost(postId);
        showConfirmModal('Delete Post?', 'This action cannot be undone. Your post will be permanently removed.', 'Delete');
    };

    window.confirmDeleteStory = (storyId) => {
        if (!storyId && currentStoryId) {
            storyId = currentStoryId;
        }
        if (!storyId) return;
        
        deleteCallback = () => deleteStory(storyId);
        showConfirmModal('Delete Story?', 'This story will be permanently deleted.', 'Delete');
    };

    function showConfirmModal(title, text, confirmText) {
        document.getElementById('confirm-title').textContent = title;
        document.getElementById('confirm-text').textContent = text;
        document.getElementById('confirm-action-btn').textContent = confirmText;
        document.getElementById('confirm-overlay').classList.add('active');
        document.getElementById('confirm-modal').classList.add('active');
    }

    window.closeConfirmModal = () => {
        document.getElementById('confirm-overlay').classList.remove('active');
        document.getElementById('confirm-modal').classList.remove('active');
        deleteCallback = null;
    };

    window.executeDelete = async () => {
        if (!deleteCallback) return;
        await deleteCallback();
        closeConfirmModal();
    };

    async function deletePost(postId) {
        try {
            await remove(ref(db, `posts/${postId}`));
            showToast('Post deleted');
        } catch (error) {
            console.error(error);
            showToast('Failed to delete');
        }
    }

    async function deleteStory(storyId) {
        try {
            await remove(ref(db, `stories/${storyId}`));
            closeStoryViewer();
            showToast('Story deleted');
        } catch (error) {
            console.error(error);
            showToast('Failed to delete');
        }
    }

    // Stories Upload & View
    window.triggerStoryUpload = () => {
        document.getElementById('story-input').click();
    };

    window.uploadStory = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        
        showToast('Uploading...');
        
        try {
            const result = await uploadToCloudinary(file, 'stories');
            const storyRef = push(ref(db, 'stories'));
            await set(storyRef, {
                uid: currentUser.uid,
                username: currentUserData.username,
                userPhoto: currentUserData.photoURL,
                mediaUrl: result.secure_url,
                mediaType: result.resource_type,
                timestamp: serverTimestamp(),
                viewed: { [currentUser.uid]: true }
            });
            showToast('Story added!');
        } catch (error) {
            console.error(error);
            showToast('Upload failed');
        }
    };

    window.viewStory = (story) => {
        currentStoryId = story.id;
        currentStoryOwner = story.uid;
        
        const viewer = document.getElementById('story-viewer');
        const img = document.getElementById('story-display-img');
        
        img.src = story.mediaUrl;
        
        if (story.uid === currentUser.uid) {
            viewer.classList.add('own-story');
        } else {
            viewer.classList.remove('own-story');
            // Mark as viewed
            update(ref(db, `stories/${story.id}/viewed/${currentUser.uid}`), true);
        }
        
        viewer.classList.add('active');
        
        // Progress bar animation
        const progressContainer = document.getElementById('story-progress-container');
        progressContainer.innerHTML = '<div class="story-progress-bar"><div class="story-progress-fill" style="width: 0%; transition: width 5s linear;"></div></div>';
        
        setTimeout(() => {
            document.querySelector('.story-progress-fill').style.width = '100%';
        }, 50);
        
        // Auto close
        setTimeout(() => {
            closeStoryViewer();
        }, 5000);
    };

    window.closeStoryViewer = () => {
        document.getElementById('story-viewer').classList.remove('active');
        currentStoryId = null;
        currentStoryOwner = null;
    };

    // Compose Post
    window.openCompose = () => {
        document.querySelector('.modal-overlay').classList.add('active');
    };

    window.closeCompose = () => {
        document.querySelector('.modal-overlay').classList.remove('active');
        clearMedia();
    };

    window.updatePostButton = () => {
        const text = document.getElementById('compose-text').value;
        const btn = document.getElementById('post-btn');
        document.getElementById('char-count').textContent = 280 - text.length;
        
        btn.disabled = !text.trim() && !selectedMedia;
        btn.style.opacity = (text.trim() || selectedMedia) ? '1' : '0.5';
    };

    window.handleMediaSelect = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        
        selectedMedia = file;
        const preview = document.getElementById('media-preview');
        document.getElementById('preview-img').src = URL.createObjectURL(file);
        preview.style.display = 'block';
        updatePostButton();
    };

    window.clearMedia = () => {
        selectedMedia = null;
        document.getElementById('media-preview').style.display = 'none';
        document.getElementById('media-input').value = '';
        updatePostButton();
    };

    window.createPost = async () => {
        const text = document.getElementById('compose-text').value.trim();
        if (!text && !selectedMedia) return;
        
        const btn = document.getElementById('post-btn');
        const progress = document.getElementById('upload-progress');
        const progressFill = document.getElementById('progress-fill');
        
        btn.disabled = true;
        btn.textContent = 'Posting...';
        progress.classList.add('active');
        
        try {
            let mediaUrl = null;
            let mediaType = null;
            
            if (selectedMedia) {
                progressFill.style.width = '30%';
                const result = await uploadToCloudinary(selectedMedia, 'posts');
                progressFill.style.width = '100%';
                mediaUrl = result.secure_url;
                mediaType = result.resource_type;
            }
            
            const postRef = push(ref(db, 'posts'));
            await set(postRef, {
                uid: currentUser.uid,
                text: text,
                mediaUrl: mediaUrl,
                mediaType: mediaType,
                timestamp: serverTimestamp(),
                likes: {},
                comments: {}
            });
            
            document.getElementById('compose-text').value = '';
            closeCompose();
            showToast('Posted!');
        } catch (error) {
            console.error(error);
            showToast('Upload failed');
        } finally {
            btn.disabled = false;
            btn.textContent = 'Post';
            progress.classList.remove('active');
            progressFill.style.width = '0%';
        }
    };

    // Utilities
    function formatTime(timestamp) {
        if (!timestamp) return 'now';
        const secs = Math.floor((Date.now() - timestamp) / 1000);
        if (secs < 60) return 'now';
        if (secs < 3600) return Math.floor(secs/60) + 'm';
        if (secs < 86400) return Math.floor(secs/3600) + 'h';
        return Math.floor(secs/86400) + 'd';
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    window.showToast = (msg) => {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
    };

    window.goToProfile = (uid) => {
        window.location.href = `profile.html?id=${uid || currentUser.uid}`;
    };

    feather.replace();
</script>

</body>
</html>
