<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONA - Share Your World</title>
    <style>
        /* --- CSS: THE LOOK OF ONA --- */
        :root {
            --primary: #0095f6; /* Classic social media blue */
            --bg-color: #fafafa;
            --border-color: #dbdbdb;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }

        /* Mobile-first App Container */
        #app-wrapper {
            width: 100%;
            max-width: 470px; /* Phone-like width on desktop */
            background-color: white;
            min-height: 100vh;
            border-left: 1px solid var(--border-color);
            border-right: 1px solid var(--border-color);
            position: relative;
        }

        /* --- Auth Screen Styling --- */
        #auth-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            padding: 20px;
            text-align: center;
        }

        h1.logo {
            font-size: 2.5rem;
            margin-bottom: 20px;
            font-style: italic;
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 300px;
            gap: 10px;
        }

        input {
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background: #fafafa;
        }

        button {
            padding: 10px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover { background-color: #007bb5; }
        button:disabled { background-color: #b2dffc; cursor: not-allowed; }

        .toggle-auth {
            margin-top: 15px;
            font-size: 0.9rem;
            color: var(--primary);
            cursor: pointer;
        }

        /* --- Main App Styling --- */
        #main-app {
            display: none; /* Hidden until logged in */
            padding-bottom: 70px; /* Space for bottom nav */
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            background: white;
            z-index: 10;
        }

        /* --- Feed & Posts --- */
        .post {
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
            margin-bottom: 15px;
        }

        .post-header {
            display: flex;
            align-items: center;
            padding: 10px;
            gap: 10px;
            font-weight: bold;
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
        }

        .post-image {
            width: 100%;
            max-height: 500px;
            object-fit: cover;
        }

        .post-caption {
            padding: 10px;
            font-size: 0.95rem;
        }

        .post-caption strong { margin-right: 5px; }

        /* --- Floating Action Button & Modal --- */
        #fab {
            position: fixed;
            bottom: 20px;
            right: calc(50% - 215px); /* Keep relative to app wrapper */
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background-color: var(--primary);
            color: white;
            font-size: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            cursor: pointer;
            z-index: 100;
        }

        @media (max-width: 470px) {
            #fab { right: 20px; }
        }

        #upload-modal {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.95);
            z-index: 200;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
        }

        #close-modal { align-self: flex-end; font-size: 24px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="app-wrapper">
        
        <div id="auth-screen">
            <h1 class="logo">ONA</h1>
            <p id="auth-subtitle">Sign in to see photos from your friends.</p>
            
            <form id="auth-form" class="auth-form">
                <input type="email" id="email" placeholder="Email address" required>
                <input type="password" id="password" placeholder="Password" required>
                <button type="submit" id="auth-btn">Log In</button>
            </form>
            
            <p class="toggle-auth" id="toggle-auth">Don't have an account? <b>Sign up</b></p>
            <p id="auth-error" style="color: red; font-size: 0.8rem; margin-top: 10px;"></p>
        </div>

        <div id="main-app">
            <header>
                <h2 class="logo" style="margin: 0; font-size: 1.5rem;">ONA</h2>
                <button id="logout-btn" style="padding: 5px 10px; background: transparent; color: black; border: 1px solid var(--border-color);">Logout</button>
            </header>

            <div id="feed">
                <p style="text-align: center; color: gray; margin-top: 20px;">Loading posts...</p>
            </div>

            <div id="fab">+</div>
        </div>

        <div id="upload-modal" style="display: none;">
            <div id="close-modal">&times;</div>
            <h2 style="text-align: center;">New Post</h2>
            
            <form id="upload-form" class="auth-form" style="margin: 0 auto;">
                <input type="file" id="image-file" accept="image/*" required>
                <textarea id="caption" placeholder="Write a caption..." rows="3" style="padding:10px; border:1px solid var(--border-color); border-radius:4px;" required></textarea>
                <button type="submit" id="submit-post-btn">Share</button>
                <p id="upload-status" style="text-align: center; color: var(--primary); font-size: 0.9rem;"></p>
            </form>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, push, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // --- Configuration ---
        const firebaseConfig = {
            apiKey: "AIzaSyBOyZ3As4GTuNvjemvPF_SpsC6m6vqtNhc",
            authDomain: "fire-b-a8878.firebaseapp.com",
            databaseURL: "https://fire-b-a8878.firebaseio.com",
            projectId: "fire-b-a8878",
            storageBucket: "fire-b-a8878.appspot.com",
            messagingSenderId: "658673187627",
            appId: "1:658673187627:web:6e4c29af661785f0afa36e"
        };
        const CLOUD_NAME = "dqkujefxj";
        const UPLOAD_PRESET = "banter_box";
        const DEFAULT_AVG = "https://abs.twimg.com/sticky/default_profile_images/default_profile_normal.png";

        // --- Initialize Firebase ---
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // --- DOM Elements ---
        const authScreen = document.getElementById('auth-screen');
        const mainApp = document.getElementById('main-app');
        const authForm = document.getElementById('auth-form');
        const toggleAuthBtn = document.getElementById('toggle-auth');
        const authBtn = document.getElementById('auth-btn');
        const authError = document.getElementById('auth-error');
        const logoutBtn = document.getElementById('logout-btn');
        const feedContainer = document.getElementById('feed');
        
        const fab = document.getElementById('fab');
        const uploadModal = document.getElementById('upload-modal');
        const closeModal = document.getElementById('close-modal');
        const uploadForm = document.getElementById('upload-form');
        const uploadStatus = document.getElementById('upload-status');
        const submitPostBtn = document.getElementById('submit-post-btn');

        let isLoginMode = true;
        let currentUser = null;

        // --- 1. Authentication Logic ---
        toggleAuthBtn.addEventListener('click', () => {
            isLoginMode = !isLoginMode;
            authBtn.innerText = isLoginMode ? "Log In" : "Sign Up";
            toggleAuthBtn.innerHTML = isLoginMode ? "Don't have an account? <b>Sign up</b>" : "Already have an account? <b>Log in</b>";
            authError.innerText = "";
        });

        authForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            authBtn.disabled = true;

            try {
                if (isLoginMode) {
                    await signInWithEmailAndPassword(auth, email, password);
                } else {
                    await createUserWithEmailAndPassword(auth, email, password);
                }
            } catch (error) {
                authError.innerText = error.message.replace("Firebase: ", "");
            }
            authBtn.disabled = false;
        });

        logoutBtn.addEventListener('click', () => signOut(auth));

        // Watch for login/logout changes
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                authScreen.style.display = 'none';
                mainApp.style.display = 'block';
                loadFeed(); // Fetch posts when logged in
            } else {
                currentUser = null;
                authScreen.style.display = 'flex';
                mainApp.style.display = 'none';
                uploadModal.style.display = 'none';
            }
        });

        // --- 2. Upload Logic (Cloudinary + Firebase DB) ---
        fab.addEventListener('click', () => uploadModal.style.display = 'flex');
        closeModal.addEventListener('click', () => uploadModal.style.display = 'none');

        uploadForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const file = document.getElementById('image-file').files[0];
            const caption = document.getElementById('caption').value;

            submitPostBtn.disabled = true;
            uploadStatus.innerText = "Uploading image to ONA...";

            try {
                // Step A: Upload to Cloudinary
                const formData = new FormData();
                formData.append("file", file);
                formData.append("upload_preset", UPLOAD_PRESET);

                const response = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {
                    method: "POST", body: formData
                });
                const data = await response.json();
                
                if (!data.secure_url) throw new Error("Cloudinary upload failed.");

                uploadStatus.innerText = "Saving post...";

                // Step B: Save to Firebase Realtime Database
                const newPostRef = push(ref(db, 'posts'));
                await set(newPostRef, {
                    authorId: currentUser.uid,
                    authorEmail: currentUser.email,
                    authorAvatar: DEFAULT_AVG, // Using your default avatar here!
                    imageUrl: data.secure_url,
                    caption: caption,
                    timestamp: Date.now()
                });

                // Reset and close modal
                uploadForm.reset();
                uploadModal.style.display = 'none';
            } catch (error) {
                console.error(error);
                uploadStatus.innerText = "Error uploading post. Try again.";
            } finally {
                submitPostBtn.disabled = false;
                setTimeout(() => uploadStatus.innerText = "", 3000);
            }
        });

        // --- 3. Feed Logic (Read from Firebase) ---
        function loadFeed() {
            const postsRef = ref(db, 'posts');
            
            // onValue listens for real-time updates!
            onValue(postsRef, (snapshot) => {
                feedContainer.innerHTML = ''; // Clear loading text
                const postsData = snapshot.val();

                if (!postsData) {
                    feedContainer.innerHTML = '<p style="text-align:center; margin-top: 20px;">No posts yet. Be the first!</p>';
                    return;
                }

                // Convert Firebase object into an array and sort newest to oldest
                const postsArray = Object.keys(postsData).map(key => {
                    return { id: key, ...postsData[key] };
                }).sort((a, b) => b.timestamp - a.timestamp);

                // Render each post
                postsArray.forEach(post => {
                    // Extract just the username from the email (e.g. user@gmail.com -> user)
                    const username = post.authorEmail.split('@')[0];
                    
                    const postHTML = `
                        <div class="post">
                            <div class="post-header">
                                <img src="${post.authorAvatar}" class="avatar" alt="Avatar">
                                <span>${username}</span>
                            </div>
                            <img src="${post.imageUrl}" class="post-image" alt="Post Image">
                            <div class="post-caption">
                                <strong>${username}</strong> ${post.caption}
                            </div>
                        </div>
                    `;
                    feedContainer.insertAdjacentHTML('beforeend', postHTML);
                });
            });
        }
    </script>
</body>
</html>
