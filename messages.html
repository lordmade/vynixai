<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vynix · Messages</title>
    <script src="https://unpkg.com/feather-icons"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root,[data-theme="light"]{
            --primary:#2C6BED;
            --primary-dark:#1A56D6;
            --primary-rgb:44,107,237;
            --background:#F8F9FA;
            --surface:#FFFFFF;
            --surface2:#F0F2F5;
            --surface3:#E4E6EB;
            --border:#E8EAEF;
            --text-primary:#0F1419;
            --text-secondary:#536471;
            --text-muted:#8B98A5;
            --like:#F91880;
            --online:#00BA7C;
            --bubble-out:#2C6BED;
            --bubble-in:#F0F2F5;
            --bubble-out-text:#fff;
            --bubble-in-text:#0F1419;
            --shadow:0 2px 8px rgba(0,0,0,0.04);
            --shadow-lg:0 12px 28px rgba(0,0,0,0.12);
            --header-bg:rgba(255,255,255,0.85);
        }
        [data-theme="dark"]{
            --primary:#1D9BF0;
            --primary-dark:#1A8CD8;
            --primary-rgb:29,155,240;
            --background:#000000;
            --surface:#16181C;
            --surface2:#202327;
            --surface3:#2F3336;
            --border:#2F3336;
            --text-primary:#E7E9EA;
            --text-secondary:#71767B;
            --text-muted:#536471;
            --like:#F91880;
            --online:#00BA7C;
            --bubble-out:#1D9BF0;
            --bubble-in:#202327;
            --bubble-out-text:#fff;
            --bubble-in-text:#E7E9EA;
            --shadow:0 2px 8px rgba(255,255,255,0.02);
            --shadow-lg:0 12px 28px rgba(0,0,0,0.4);
            --header-bg:rgba(0,0,0,0.85);
        }

        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
        html,body{height:100%;overflow:hidden;}
        body{
            font-family:'DM Sans',sans-serif;
            background:var(--background);
            color:var(--text-primary);
            -webkit-font-smoothing:antialiased;
            transition:background 0.3s,color 0.3s;
        }

        @keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
        @keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}
        @keyframes spin{to{transform:rotate(360deg);}}
        @keyframes msgIn{from{opacity:0;transform:translateY(8px) scale(0.98);}to{opacity:1;transform:translateY(0) scale(1);}}
        @keyframes typingBounce{0%,80%,100%{transform:translateY(0);opacity:.5;}40%{transform:translateY(-5px);opacity:1;}}
        @keyframes badgePop{from{transform:scale(0);}80%{transform:scale(1.15);}to{transform:scale(1);}}

        .shimmer{
            background:linear-gradient(90deg,var(--surface2) 25%,var(--surface3) 50%,var(--surface2) 75%);
            background-size:200% 100%;
            animation:shimmer 1.6s infinite;
            border-radius:6px;
        }

        /* ══ SHELL ══ */
        .app{
            display:flex;height:100dvh;
            max-width:1200px;margin:0 auto;
            border-left:1px solid var(--border);
            border-right:1px solid var(--border);
            background:var(--surface);
        }
        @media(max-width:1024px){.app{max-width:100%;border:none;}}

        /* ══ SIDEBAR ══ */
        .sidebar{
            width:340px;flex-shrink:0;display:flex;flex-direction:column;
            background:var(--surface);
            border-right:1px solid var(--border);
            transition:background 0.3s;
        }
        @media(max-width:680px){
            .sidebar{position:fixed;inset:0;width:100%;z-index:10;transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);}
            .sidebar.slide-out{transform:translateX(-100%);}
        }

        /* Header */
        .sidebar-header{
            display:flex;align-items:center;gap:12px;
            padding:calc(env(safe-area-inset-top) + 16px) 20px 14px;
            background:var(--surface);
            flex-shrink:0;position:sticky;top:0;z-index:5;
        }
        .sidebar-title{
            font-size:24px;font-weight:700;
            flex:1;color:var(--text-primary);
            letter-spacing:-0.5px;
        }
        .icon-btn{
            width:40px;height:40px;border-radius:50%;border:none;
            background:var(--surface2);color:var(--text-primary);
            cursor:pointer;display:flex;align-items:center;justify-content:center;
            transition:background 0.2s,transform 0.1s;flex-shrink:0;
        }
        .icon-btn:hover{background:var(--surface3);}
        .icon-btn:active{transform:scale(0.95);}

        /* Search */
        .search-wrap{padding:0 16px 12px;flex-shrink:0;}
        .search-inner{
            display:flex;align-items:center;gap:10px;
            background:var(--surface2);
            border-radius:12px;padding:10px 14px;
            border:1.5px solid transparent;
            transition:border-color 0.2s,background 0.2s;
        }
        .search-inner:focus-within{
            border-color:var(--primary);
            background:var(--surface);
            box-shadow:0 0 0 3px rgba(var(--primary-rgb),0.1);
        }
        .search-inner svg{color:var(--text-muted);flex-shrink:0;transition:color 0.2s;}
        .search-inner:focus-within svg{color:var(--primary);}
        .search-input{
            flex:1;border:none;outline:none;background:transparent;
            font-size:15px;font-family:'DM Sans',sans-serif;
            color:var(--text-primary);
        }
        .search-input::placeholder{color:var(--text-muted);}

        /* Conv List */
        .conv-list{overflow-y:auto;flex:1;overscroll-behavior:contain;padding:0 8px;}
        .conv-list::-webkit-scrollbar{width:0;}

        /* Friend Cards */
        .conv-item{
            display:flex;align-items:center;gap:14px;
            padding:12px;margin-bottom:4px;
            border-radius:14px;
            cursor:pointer;background:transparent;
            transition:background 0.2s ease, transform 0.1s;
            position:relative;animation:fadeUp 0.3s ease-out both;
        }
        .conv-item:hover{background:var(--surface2);}
        .conv-item.active{
            background:var(--surface2);
            box-shadow: inset 3px 0 0 var(--primary);
        }
        
        .conv-avatar-wrap{position:relative;flex-shrink:0;}
        .conv-avatar{
            width:52px;height:52px;border-radius:50%;object-fit:cover;
            border:2px solid var(--surface);
            box-shadow:var(--shadow);
        }
        .list-online-dot{
            position:absolute;bottom:2px;right:2px;
            width:12px;height:12px;border-radius:50%;
            background:var(--online);
            border:2px solid var(--surface);
            display:none;
        }
        .list-online-dot.is-online{display:block;}

        .conv-body{flex:1;min-width:0;}
        .conv-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
        .conv-name{
            font-size:16px;font-weight:600;
            color:var(--text-primary);
            overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
        }
        .conv-time{font-size:12px;color:var(--text-muted);flex-shrink:0;}
        .conv-time.unread-time{color:var(--primary);font-weight:600;}

        .conv-preview{
            font-size:14px;color:var(--text-secondary);
            overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
            display:flex;align-items:center;gap:4px;
        }
        .conv-preview.unread-p{color:var(--text-primary);font-weight:600;}
        .typing-text{color:var(--online);font-weight:500;display:none;align-items:center;gap:4px;}
        .conv-item.is-typing .typing-text{display:flex;}
        .conv-item.is-typing .preview-text{display:none;}

        .unread-badge{
            min-width:22px;height:22px;border-radius:11px;
            background:var(--primary);color:white;
            font-size:12px;font-weight:700;
            display:none;align-items:center;justify-content:center;
            padding:0 6px;flex-shrink:0;
            animation:badgePop 0.3s cubic-bezier(0.34,1.56,0.64,1);
        }
        .unread-badge.show{display:flex;}

        /* ══ CHAT PANE ══ */
        .chat-pane{
            flex:1;display:flex;flex-direction:column;
            background:var(--background);min-width:0;
            position:relative;
        }
        @media(max-width:680px){
            .chat-pane{position:fixed;inset:0;z-index:200;transform:translateX(100%);transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);}
            .chat-pane.open{transform:translateX(0);}
        }

        /* Floating Chat Header */
        .chat-header{
            position:sticky;top:0;z-index:100;
            display:flex;align-items:center;gap:12px;
            padding:calc(env(safe-area-inset-top) + 12px) 20px 12px;
            background:var(--header-bg);
            backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
            border-bottom:1px solid var(--border);
            box-shadow:var(--shadow);
        }
        .chat-back-btn{
            background:none;border:none;color:var(--text-primary);
            cursor:pointer;padding:8px;border-radius:50%;margin-left:-8px;
            display:none;align-items:center;justify-content:center;
            transition:background 0.2s;flex-shrink:0;
        }
        .chat-back-btn:hover{background:var(--surface2);}
        @media(max-width:680px){.chat-back-btn{display:flex;}}

        .chat-avatar-wrap{position:relative;flex-shrink:0;cursor:pointer;}
        .chat-avatar{
            width:44px;height:44px;border-radius:50%;
            object-fit:cover;border:2px solid var(--border);
        }
        .chat-info{flex:1;min-width:0;cursor:pointer;display:flex;flex-direction:column;justify-content:center;}
        .chat-name{
            font-size:17px;font-weight:700;
            color:var(--text-primary);
            overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
            line-height:1.2;
        }
        .chat-sub{
            font-size:13px;color:var(--text-secondary);
            margin-top:2px;transition:color 0.2s;
        }
        .chat-sub.online-text{color:var(--online);font-weight:500;}
        
        .chat-actions{display:flex;gap:4px;align-items:center;}
        .chat-action-btn{
            width:38px;height:38px;border-radius:50%;background:none;border:none;
            color:var(--text-secondary);cursor:pointer;
            display:flex;align-items:center;justify-content:center;
            transition:background 0.2s,color 0.2s;
        }
        .chat-action-btn:hover{background:var(--surface2);color:var(--primary);}
        .chat-action-btn.danger:hover{color:var(--like);background:rgba(249, 24, 128, 0.1);}

        /* Messages */
        .messages-area{
            flex:1;overflow-y:auto;
            padding:20px;
            display:flex;flex-direction:column;gap:4px;
            overscroll-behavior:contain;
        }
        .messages-area::-webkit-scrollbar{width:6px;}
        .messages-area::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

        .date-sep{
            align-self:center;
            background:var(--surface2);
            color:var(--text-secondary);
            font-size:12px;font-weight:600;
            padding:6px 14px;border-radius:16px;
            margin:16px 0;
        }

        .msg-row{
            display:flex;align-items:flex-end;gap:8px;
            animation:msgIn 0.2s cubic-bezier(0.34,1.2,0.64,1);
            margin-bottom:2px;
        }
        .msg-row.out{flex-direction:row-reverse;}
        .msg-row.gap{margin-top:12px;}
        .msg-avatar-sm{
            width:28px;height:28px;border-radius:50%;
            object-fit:cover;flex-shrink:0;cursor:pointer;
        }
        .msg-avatar-sm.hidden{opacity:0;pointer-events:none;}
        .msg-row.out .msg-avatar-sm{display:none;}

        .msg-content{max-width:75%;display:flex;flex-direction:column;gap:2px;}
        .msg-row.out .msg-content{align-items:flex-end;}

        .bubble{
            padding:10px 16px;
            font-size:15px;line-height:1.5;
            word-break:break-word;
            box-shadow:var(--shadow);
        }
        .msg-row.out .bubble{
            background:var(--bubble-out);
            color:var(--bubble-out-text);
            border-radius:20px 20px 4px 20px;
        }
        .msg-row.in .bubble{
            background:var(--bubble-in);
            color:var(--bubble-in-text);
            border-radius:20px 20px 20px 4px;
        }

        .msg-meta{
            display:flex;align-items:center;gap:4px;
            font-size:11px;color:var(--text-muted);
            padding:0 4px;margin-top:2px;
        }
        .msg-row.out .msg-meta{flex-direction:row-reverse;}
        .tick svg{width:15px;height:15px;color:var(--text-muted);}
        .tick.read svg{color:var(--online);}

        /* Native Typing Indicator */
        .typing-slot{
            display:none;align-items:flex-end;gap:8px;
            margin-top:12px;padding:0 20px 10px;
        }
        .typing-slot.show{display:flex;}
        .typing-avatar{width:28px;height:28px;border-radius:50%;object-fit:cover;}
        .typing-dots{
            background:var(--bubble-in);
            border-radius:20px 20px 20px 4px;
            padding:12px 16px;
            display:flex;gap:5px;align-items:center;
            box-shadow:var(--shadow);
        }
        .typing-dot{
            width:7px;height:7px;border-radius:50%;
            background:var(--text-secondary);
            animation:typingBounce 1.4s infinite ease-in-out both;
        }
        .typing-dot:nth-child(1){animation-delay:-0.32s;}
        .typing-dot:nth-child(2){animation-delay:-0.16s;}

        /* Input */
        .input-area{
            padding:12px 20px calc(env(safe-area-inset-bottom) + 12px);
            background:var(--surface);
            border-top:1px solid var(--border);
            display:flex;align-items:flex-end;gap:12px;
            flex-shrink:0;z-index:10;
        }
        .input-wrap{
            flex:1;display:flex;align-items:flex-end;
            background:var(--surface2);
            border-radius:24px;padding:10px 14px;gap:8px;
            transition:background 0.2s;
        }
        .input-wrap:focus-within{background:var(--surface3);}
        .attach-btn{
            background:none;border:none;color:var(--text-secondary);
            cursor:pointer;padding:4px;display:flex;
            transition:color 0.2s;flex-shrink:0;border-radius:50%;
        }
        .attach-btn:hover{color:var(--primary);background:var(--surface);}
        .msg-input{
            flex:1;border:none;outline:none;background:transparent;
            font-size:16px;font-family:'DM Sans',sans-serif;
            color:var(--text-primary);resize:none;
            max-height:120px;line-height:1.4;padding:2px 0;
        }
        .msg-input::placeholder{color:var(--text-muted);}
        .send-btn{
            width:44px;height:44px;border-radius:50%;border:none;
            background:var(--primary);color:white;
            display:flex;align-items:center;justify-content:center;
            cursor:pointer;flex-shrink:0;
            transition:transform 0.1s,background 0.2s;
        }
        .send-btn:hover{background:var(--primary-dark);}
        .send-btn:active{transform:scale(0.95);}
        .send-btn:disabled{opacity:0.5;cursor:not-allowed;}

        /* Empty State */
        .chat-empty{
            flex:1;display:flex;flex-direction:column;
            align-items:center;justify-content:center;
            text-align:center;color:var(--text-muted);
        }
        .chat-empty-icon{
            width:80px;height:80px;border-radius:50%;
            background:var(--surface2);
            display:flex;align-items:center;justify-content:center;
            margin-bottom:20px;color:var(--primary);
        }
        .chat-empty h3{font-size:22px;font-weight:700;color:var(--text-primary);margin-bottom:8px;}
        .chat-empty p{font-size:15px;color:var(--text-secondary);}

    </style>
</head>
<body>
<div class="app">

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <button class="icon-btn" onclick="window.location.href='home.html'" title="Back">
                <i data-feather="arrow-left" style="width:20px;height:20px;"></i>
            </button>
            <span class="sidebar-title">Chats</span>
            <button class="icon-btn" onclick="openNewChat()" title="New Message">
                <i data-feather="edit" style="width:20px;height:20px;"></i>
            </button>
        </div>
        <div class="search-wrap">
            <div class="search-inner">
                <i data-feather="search" style="width:18px;height:18px;"></i>
                <input type="text" class="search-input" id="conv-search" placeholder="Search chats" oninput="filterConvs(this.value)">
            </div>
        </div>
        <div class="conv-list" id="conv-list">
            <div id="skeletons">
                <div style="display:flex;gap:14px;padding:12px;align-items:center;">
                    <div class="shimmer" style="width:52px;height:52px;border-radius:50%;flex-shrink:0;"></div>
                    <div style="flex:1;"><div class="shimmer" style="height:14px;width:50%;margin-bottom:10px;"></div><div class="shimmer" style="height:12px;width:80%;"></div></div>
                </div>
            </div>
        </div>
    </div>

    <div class="chat-pane" id="chat-pane">
        <div class="chat-empty" id="chat-empty">
            <div class="chat-empty-icon">
                <i data-feather="message-square" style="width:40px;height:40px;"></i>
            </div>
            <h3>Your Messages</h3>
            <p>Select a conversation or start a new one to chat.</p>
        </div>

        <div id="chat-view" style="display:none;flex:1;min-height:0;flex-direction:column;">
            <div class="chat-header">
                <button class="chat-back-btn" onclick="closeChat()">
                    <i data-feather="arrow-left" style="width:24px;height:24px;"></i>
                </button>
                <div class="chat-avatar-wrap" onclick="goToOtherProfile()">
                    <img id="chat-avatar" class="chat-avatar" src="" alt="">
                </div>
                <div class="chat-info" onclick="goToOtherProfile()">
                    <div class="chat-name" id="chat-name">—</div>
                    <div class="chat-sub" id="chat-last-seen">Loading...</div>
                </div>
                <div class="chat-actions">
                    <button class="chat-action-btn danger" onclick="deleteCurrentChat()" title="Delete Chat">
                        <i data-feather="trash-2" style="width:20px;height:20px;"></i>
                    </button>
                    <button class="chat-action-btn" onclick="goToOtherProfile()" title="Profile">
                        <i data-feather="info" style="width:20px;height:20px;"></i>
                    </button>
                </div>
            </div>

            <div class="messages-area" id="messages-area">
                </div>

            <div class="typing-slot" id="typing-slot">
                <img id="typing-avatar" class="typing-avatar" src="" alt="">
                <div class="typing-dots">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                </div>
            </div>

            <div class="input-area">
                <div class="input-wrap">
                    <button class="attach-btn" onclick="document.getElementById('img-input').click()" title="Attach image">
                        <i data-feather="image" style="width:22px;height:22px;"></i>
                    </button>
                    <textarea class="msg-input" id="msg-input" placeholder="Type a message..." rows="1" oninput="onMsgInput()" onkeydown="onMsgKeydown(event)"></textarea>
                </div>
                <input type="file" id="img-input" accept="image/*" style="display:none;" onchange="handleImgAttach(event)">
                <button class="send-btn" id="send-btn" onclick="sendMessage()" disabled>
                    <i data-feather="send" style="width:20px;height:20px;margin-left:2px;"></i>
                </button>
            </div>
        </div>
    </div>
</div>

async function idbSet(k,v){const d=await openIDB();return new Promise((res,rej)=>{const tx=d.transaction(IDB_STORE,'readwrite');tx.objectStore(IDB_STORE).put(v,k);tx.oncomplete=res;tx.onerror=e=>rej(e.target.error);});}

async function importPub(b64){return crypto.subtle.importKey('spki',b64d(b64),{name:'ECDH',namedCurve:'P-256'},true,[]);}
const skCache={};
async function getSharedKey(myKp,otherPubB64){if(skCache[otherPubB64])return skCache[otherPubB64];const pub=await importPub(otherPubB64);const bits=await crypto.subtle.deriveBits({name:'ECDH',public:pub},myKp.privateKey,256);const k=await crypto.subtle.importKey('raw',bits,{name:'AES-GCM',length:256},false,['encrypt','decrypt']);skCache[otherPubB64]=k;return k;}
async function encMsg(sk,plain){const iv=crypto.getRandomValues(new Uint8Array(12));const ct=await crypto.subtle.encrypt({name:'AES-GCM',iv},sk,new TextEncoder().encode(plain));return{iv:b64e(iv),ct:b64e(ct)};}
async function decMsg(sk,ivB64,ctB64){try{const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64d(ivB64)},sk,b64d(ctB64));return new TextDecoder().decode(pt);}catch{return'🔒 (encrypted on another device)';}}

let me=null,meData=null,myKP=null;
let chatId=null,otherUid=null,otherData=null,chatSK=null;
let allConvs=[],loadedIds=new Set(),typingTimer=null,presenceRef=null;

onAuthStateChanged(auth,async user=>{
    if(!user){window.location.href='auth.html';return;}
    me=user;
    await loadMe();await setupKeys();
    setupMyPresence();
    listenConvs();
    feather.replace();
});

// Setup Current User Presence
function setupMyPresence() {
    const myConnectionsRef = ref(db, `users/${me.uid}/online`);
    const lastSeenRef = ref(db, `users/${me.uid}/lastSeen`);
    const connectedRef = ref(db, '.info/connected');
    
    onValue(connectedRef, (snap) => {
        if (snap.val() === true) {
            onDisconnect(myConnectionsRef).set(false);
            onDisconnect(lastSeenRef).set(serverTimestamp());
            set(myConnectionsRef, true);
        }
    });
}

async function loadMe(){const s=await get(ref(db,`users/${me.uid}`));meData=s.val()||{uid:me.uid,displayName:'User',username:'user',photoURL:au({uid:me.uid})};}
async function setupKeys(){myKP=await getOrCreateKP(me.uid);const pub=await exportPub(myKP);const snap=await get(ref(db,`users/${me.uid}/pubKey`));if(!snap.exists()||snap.val()!==pub)await update(ref(db,`users/${me.uid}`),{pubKey:pub});}
async function deriveSharedKey(uid){const snap=await get(ref(db,`users/${uid}/pubKey`));if(!snap.exists())return null;return getSharedKey(myKP,snap.val());}

// ── CONV LIST ──
function listenConvs(){
    onValue(ref(db,`userChats/${me.uid}`),async snap=>{
        document.getElementById('skeletons')?.remove();
        if(!snap.exists()){document.getElementById('conv-list').innerHTML='';allConvs=[];return;}
        const entries=[],ps=[];
        snap.forEach(child=>{
            const d={chatId:child.key,...child.val()};
            ps.push((async()=>{
                if(!d.otherUid)return;
                const us=await get(ref(db,`users/${d.otherUid}`));
                d.od=us.val()||{displayName:'User',photoURL:au({uid:d.otherUid}),username:'user'};
                if(d.lastIv&&d.lastCt){try{const sk=await deriveSharedKey(d.otherUid);d.lastMsg=sk?await decMsg(sk,d.lastIv,d.lastCt):'🔒 Encrypted';}catch{d.lastMsg='🔒 Encrypted';}}
                else d.lastMsg=d.lastMsg||'';
                entries.push(d);
            })());
        });
        await Promise.all(ps);
        entries.sort((a,b)=>(b.lastTs||0)-(a.lastTs||0));
        allConvs=entries;renderConvList(entries);
    });
}

function renderConvList(convs){
    const list=document.getElementById('conv-list');
    const q=(document.getElementById('conv-search').value||'').toLowerCase();
    const filtered=q?convs.filter(c=>(c.od?.displayName||'').toLowerCase().includes(q)||(c.od?.username||'').toLowerCase().includes(q)):convs;
    list.innerHTML='';
    filtered.forEach((c,i)=>{
        const u=c.od||{},photo=u.photoURL||au(u),name=u.displayName||u.username||'User',unread=c.unreadCount||0,isAct=c.chatId===chatId;
        const item=document.createElement('div');
        item.className=`conv-item${isAct?' active':''}`;item.id=`conv-${c.chatId}`;item.style.animationDelay=`${i*30}ms`;
        
        // Listen globally for typing in the list view
        onValue(ref(db,`messages/${c.chatId}/typing/${c.otherUid}`), snap => {
            if(snap.exists()) item.classList.add('is-typing');
            else item.classList.remove('is-typing');
        });

        item.innerHTML=`
            <div class="conv-avatar-wrap">
                <img class="conv-avatar" src="${photo}" alt="">
                <div class="list-online-dot ${u.online ? 'is-online' : ''}"></div>
            </div>
            <div class="conv-body">
                <div class="conv-top">
                    <span class="conv-name">${esc(name)}</span>
                    <span class="conv-time${unread>0?' unread-time':''}">${fmtTime(c.lastTs)}</span>
                </div>
                <div class="conv-preview${unread>0?' unread-p':''}">
                    <span class="typing-text"><i data-feather="edit-2" style="width:12px;height:12px;"></i> typing...</span>
                    <span class="preview-text">${esc(c.lastMsg||'Start a conversation')}</span>
                </div>
            </div>
            <div class="unread-badge${unread>0?' show':''}">${unread>9?'9+':unread}</div>
        `;
        item.addEventListener('click',()=>openChat(c.chatId,c.otherUid));
        list.appendChild(item);
    });
    feather.replace();
}
window.filterConvs=()=>renderConvList(allConvs);

// ── DELETE CHAT INSIDE HEADER ──
window.deleteCurrentChat = async () => {
    if(!chatId) return;
    if(!confirm(`Delete conversation with ${otherData.displayName || 'this user'}? This action cannot be undone.`)) return;
    await remove(ref(db,`userChats/${me.uid}/${chatId}`));
    closeChat();
};

// ── OPEN CHAT & REAL-TIME PRESENCE ──
window.openChat=async(cid,uid)=>{
    if(chatId&&chatId!==cid){try{off(ref(db,`messages/${chatId}/msgs`));off(ref(db,`messages/${chatId}/typing/${uid}`));if(presenceRef) off(presenceRef);}catch{}loadedIds.clear();}
    chatId=cid;otherUid=uid;
    document.querySelectorAll('.conv-item').forEach(el=>el.classList.remove('active'));
    document.getElementById(`conv-${cid}`)?.classList.add('active');
    
    // Initial user load
    const us=await get(ref(db,`users/${uid}`));
    otherData=us.val()||{displayName:'User',photoURL:au({uid}),username:uid};
    document.getElementById('chat-avatar').src=otherData.photoURL||au(otherData);
    document.getElementById('chat-name').textContent=otherData.displayName||otherData.username||'User';
    document.getElementById('typing-avatar').src=otherData.photoURL||au(otherData);
    
    // Real-Time Presence Listener for Header
    presenceRef = ref(db, `users/${uid}`);
    onValue(presenceRef, snap => {
        const data = snap.val();
        const ls = document.getElementById('chat-last-seen');
        if(data && data.online) {
            ls.textContent = 'Online';
            ls.classList.add('online-text');
        } else if(data && data.lastSeen) {
            ls.textContent = `Last seen ${fmtTime(data.lastSeen)}`;
            ls.classList.remove('online-text');
        } else {
            ls.textContent = 'Offline';
            ls.classList.remove('online-text');
        }
    });

    chatSK=await deriveSharedKey(uid);
    document.getElementById('chat-empty').style.display='none';
    const cv=document.getElementById('chat-view');cv.style.display='flex';
    const area=document.getElementById('messages-area');
    area.innerHTML='';
    
    if(window.innerWidth<=680){document.getElementById('chat-pane').classList.add('open');document.getElementById('sidebar').classList.add('slide-out');}
    await update(ref(db,`userChats/${me.uid}/${cid}`),{unreadCount:0}).catch(()=>{});
    listenMsgs(cid);listenTyping(cid,uid);
    setTimeout(()=>document.getElementById('msg-input')?.focus(),350);
};

window.closeChat=()=>{
    document.getElementById('chat-pane').classList.remove('open');
    document.getElementById('sidebar').classList.remove('slide-out');
    if(presenceRef) off(presenceRef);
    chatId=null;otherUid=null;otherData=null;chatSK=null;
    document.querySelectorAll('.conv-item').forEach(el=>el.classList.remove('active'));
    document.getElementById('chat-empty').style.display='flex';
    document.getElementById('chat-view').style.display='none';
};

// ── MESSAGES ──
function listenMsgs(cid){
    loadedIds.clear();
    onChildAdded(ref(db,`messages/${cid}/msgs`),async snap=>{
        if(loadedIds.has(snap.key))return;loadedIds.add(snap.key);
        await renderMsg({id:snap.key,...snap.val()});scrollBot();
        if(snap.val().senderId!==me.uid&&chatId===cid)update(ref(db,`userChats/${me.uid}/${cid}`),{unreadCount:0}).catch(()=>{});
    });
}
async function renderMsg(msg){
    const area=document.getElementById('messages-area'),isMine=msg.senderId===me.uid;
    const msgDate=new Date(msg.timestamp||Date.now()).toDateString();
    const lastSep=area.querySelector('.date-sep:last-of-type');
    if(!lastSep||lastSep.dataset.date!==msgDate){const s=document.createElement('div');s.className='date-sep';s.dataset.date=msgDate;s.textContent=fmtDateSep(msg.timestamp);area.appendChild(s);}
    const prevRow=area.querySelector('.msg-row:last-of-type');
    const prevSender=prevRow?.dataset.sender;
    const showAv=!isMine&&prevSender!==msg.senderId;
    const row=document.createElement('div');
    row.className=`msg-row ${isMine?'out':'in'}${showAv?' gap':''}`;
    row.dataset.sender=msg.senderId;row.id=`msg-${msg.id}`;
    const avSrc=isMine?(meData?.photoURL||au(meData)):(otherData?.photoURL||au(otherData));
    
    let displayText='',isImg=false;
    if(msg.iv&&msg.ct){displayText=chatSK?await decMsg(chatSK,msg.iv,msg.ct):'🔒 Encrypted';}
    else if(msg.imageUrl){isImg=true;displayText=msg.imageUrl;}
    else displayText=msg.text||'';
    
    const bubbleHTML=isImg?`<img class="bubble-img" src="${displayText}" alt="" style="max-width:200px;border-radius:12px;">`:`<div class="bubble">${esc(displayText).replace(/\n/g,'<br>')}</div>`;
    const tick=isMine?`<span class="tick read"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>`:'';
    row.innerHTML=`${!isMine?`<img class="msg-avatar-sm${showAv?'':' hidden'}" src="${avSrc}" alt="">`:''}
        <div class="msg-content">${bubbleHTML}<div class="msg-meta"><span>${fmtMsgTime(msg.timestamp)}</span>${tick}</div></div>`;
    area.appendChild(row);
}
function scrollBot(){const a=document.getElementById('messages-area');if(a)a.scrollTo({top:a.scrollHeight,behavior:'smooth'});}

// ── SEND & TYPING ──
window.sendMessage=async()=>{
    const input=document.getElementById('msg-input'),text=input.value.trim();
    if(!text||!chatId)return;
    input.value='';resizeInput();document.getElementById('send-btn').disabled=true;stopTyping();
    const ts=Date.now();let msgData={senderId:me.uid,timestamp:ts};let previewUpdates={lastTs:ts};
    if(chatSK){const enc=await encMsg(chatSK,text);msgData.iv=enc.iv;msgData.ct=enc.ct;const pEnc=await encMsg(chatSK,text);previewUpdates.lastIv=pEnc.iv;previewUpdates.lastCt=pEnc.ct;previewUpdates.lastMsg='';}
    else{msgData.text=text;previewUpdates.lastMsg=text;}
    await push(ref(db,`messages/${chatId}/msgs`),msgData);
    const ocSnap=await get(ref(db,`userChats/${otherUid}/${chatId}`));
    const pU=(ocSnap.exists()?ocSnap.val().unreadCount:0)||0;
    const upd={};
    upd[`userChats/${me.uid}/${chatId}`]={...previewUpdates,otherUid,unreadCount:0};
    upd[`userChats/${otherUid}/${chatId}`]={...previewUpdates,otherUid:me.uid,unreadCount:pU+1};
    await update(ref(db),upd);
};
window.onMsgInput=()=>{resizeInput();const has=document.getElementById('msg-input').value.trim().length>0;document.getElementById('send-btn').disabled=!has;if(has)startTyping();else stopTyping();};
window.onMsgKeydown=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}};
function resizeInput(){const el=document.getElementById('msg-input');el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px';}
function startTyping(){if(!chatId)return;set(ref(db,`messages/${chatId}/typing/${me.uid}`),true);clearTimeout(typingTimer);typingTimer=setTimeout(stopTyping,3000);}
function stopTyping(){if(!chatId)return;remove(ref(db,`messages/${chatId}/typing/${me.uid}`));clearTimeout(typingTimer);}
function listenTyping(cid,uid){onValue(ref(db,`messages/${cid}/typing/${uid}`),snap=>{const sl=document.getElementById('typing-slot');if(snap.exists()){sl.classList.add('show');scrollBot();}else sl.classList.remove('show');});}

// Helpers
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
function au(u){return`https://ui-avatars.com/api/?name=${encodeURIComponent((u&&(u.displayName||u.username||u.uid||'U')))}&background=random`;}
function fmtTime(ts){if(!ts)return'';const d=new Date(ts),now=new Date(),diff=now-d;if(diff<60000)return'just now';if(diff<3600000)return Math.floor(diff/60000)+'m';if(d.toDateString()===now.toDateString())return d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});if(diff<7*86400000)return d.toLocaleDateString([],{weekday:'short'});return d.toLocaleDateString([],{month:'short',day:'numeric'});}
function fmtMsgTime(ts){if(!ts)return'';return new Date(ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}
function fmtDateSep(ts){if(!ts)return'';const d=new Date(ts),now=new Date();if(d.toDateString()===now.toDateString())return'Today';const y=new Date(now);y.setDate(now.getDate()-1);if(d.toDateString()===y.toDateString())return'Yesterday';return d.toLocaleDateString([],{weekday:'short',month:'short',day:'numeric'});}
</script>
