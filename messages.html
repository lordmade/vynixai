<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vynix · Messages</title>
    <script src="https://unpkg.com/feather-icons"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366F1;
            --primary-dark: #4F46E5;
            --background: #F8FAFC;
            --surface: #FFFFFF;
            --border: #E2E8F0;
            --text-primary: #0F172A;
            --text-secondary: #64748B;
            --text-muted: #94A3B8;
            --like: #F43F5E;
            --verified: #1D9BF0;
            --bubble-out: #6366F1;
            --bubble-in:  #F1F5F9;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--background);
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            height: 100dvh;
            display: flex; flex-direction: column;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes shimmer {
            0%   { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .shimmer {
            background: linear-gradient(90deg,#f0f0f0 25%,#e8e8e8 50%,#f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 6px;
        }

        /* ══════════════════════════════
           INBOX VIEW
        ══════════════════════════════ */
        #inbox-view {
            display: flex; flex-direction: column;
            height: 100dvh; overflow: hidden;
        }

        .inbox-header {
            position: sticky; top: 0; z-index: 50;
            background: rgba(255,255,255,0.97);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 14px 16px;
            display: flex; align-items: center; justify-content: space-between;
            flex-shrink: 0;
        }
        .inbox-title { font-size: 20px; font-weight: 800; }
        .new-msg-btn {
            background: none; border: none; color: var(--primary);
            cursor: pointer; padding: 6px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.15s;
        }
        .new-msg-btn:hover { background: rgba(99,102,241,0.08); }

        /* Search bar in inbox */
        .inbox-search {
            padding: 10px 16px; background: var(--surface);
            border-bottom: 1px solid var(--border); flex-shrink: 0;
        }
        .inbox-search-inner {
            display: flex; align-items: center; gap: 8px;
            background: var(--background); border-radius: 9999px;
            padding: 9px 14px; border: 1px solid var(--border);
        }
        .inbox-search-inner i { color: var(--text-muted); flex-shrink: 0; }
        .inbox-search-inner input {
            flex: 1; border: none; outline: none; background: transparent;
            font-size: 15px; font-family: inherit; color: var(--text-primary);
        }
        .inbox-search-inner input::placeholder { color: var(--text-muted); }

        .chat-list { flex: 1; overflow-y: auto; padding-bottom: calc(80px + env(safe-area-inset-bottom)); }

        /* Chat row */
        .chat-row {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 16px; cursor: pointer;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            transition: background 0.15s;
            animation: fadeIn 0.3s ease-out both;
            position: relative;
        }
        .chat-row:hover { background: #f8f9ff; }
        .chat-row.unread { background: rgba(99,102,241,0.03); }

        .chat-avatar-wrap { position: relative; flex-shrink: 0; }
        .chat-avatar {
            width: 52px; height: 52px; border-radius: 50%;
            object-fit: cover; display: block;
        }
        .online-dot {
            position: absolute; bottom: 2px; right: 2px;
            width: 12px; height: 12px; border-radius: 50%;
            background: #22C55E; border: 2px solid var(--surface);
        }

        .chat-info { flex: 1; min-width: 0; }
        .chat-name-row {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 3px;
        }
        .chat-name {
            font-size: 15px; font-weight: 700;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .chat-time { font-size: 12px; color: var(--text-muted); flex-shrink: 0; }

        .chat-preview-row {
            display: flex; align-items: center; justify-content: space-between; gap: 8px;
        }
        .chat-preview {
            font-size: 14px; color: var(--text-secondary);
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
            flex: 1;
        }
        .chat-preview.bold { font-weight: 600; color: var(--text-primary); }
        .chat-unread-badge {
            background: var(--primary); color: white;
            font-size: 11px; font-weight: 700;
            min-width: 20px; height: 20px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            padding: 0 5px; flex-shrink: 0;
        }

        /* ══════════════════════════════
           NEW MESSAGE MODAL
        ══════════════════════════════ */
        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            z-index: 200; opacity: 0; pointer-events: none;
            transition: opacity 0.3s;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }

        .bottom-sheet {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--surface); border-radius: 24px 24px 0 0;
            padding: 20px; padding-bottom: calc(20px + env(safe-area-inset-bottom));
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
            z-index: 201; max-height: 75vh; overflow-y: auto;
        }
        .modal-overlay.active ~ .bottom-sheet { transform: translateY(0); }

        .sheet-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 16px;
        }
        .sheet-title { font-size: 17px; font-weight: 700; }
        .sheet-close {
            background: none; border: none; color: var(--text-secondary);
            cursor: pointer; font-size: 15px; font-family: inherit; font-weight: 600;
        }

        .user-select-item {
            display: flex; align-items: center; gap: 12px;
            padding: 10px 0; cursor: pointer; border-radius: 12px;
            transition: background 0.15s;
        }
        .user-select-item:hover { background: var(--background); padding-left: 8px; }
        .user-select-item img {
            width: 42px; height: 42px; border-radius: 50%; object-fit: cover;
        }
        .user-select-name { font-weight: 600; font-size: 15px; }
        .user-select-handle { font-size: 13px; color: var(--text-muted); }

        /* ══════════════════════════════
           CHAT THREAD VIEW
        ══════════════════════════════ */
        #chat-view {
            display: none; flex-direction: column;
            height: 100dvh; overflow: hidden;
        }
        #chat-view.active { display: flex; }

        .chat-header {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 16px;
            background: rgba(255,255,255,0.97);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0; z-index: 10;
        }
        .chat-back {
            background: none; border: none; cursor: pointer;
            color: var(--text-primary); padding: 6px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.15s;
        }
        .chat-back:hover { background: var(--background); }

        .chat-header-avatar {
            width: 38px; height: 38px; border-radius: 50%;
            object-fit: cover; cursor: pointer;
        }
        .chat-header-info { flex: 1; cursor: pointer; }
        .chat-header-name { font-size: 15px; font-weight: 700; }
        .chat-header-status { font-size: 12px; color: #22C55E; font-weight: 500; }
        .chat-header-status.offline { color: var(--text-muted); }

        .chat-header-actions {
            display: flex; gap: 4px;
        }
        .chat-action-btn {
            background: none; border: none; color: var(--text-secondary);
            cursor: pointer; padding: 8px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.15s;
        }
        .chat-action-btn:hover { background: var(--background); color: var(--primary); }

        /* Messages area */
        .messages-area {
            flex: 1; overflow-y: auto;
            padding: 16px 16px 8px;
            display: flex; flex-direction: column; gap: 4px;
            scroll-behavior: smooth;
        }

        /* Date divider */
        .date-divider {
            text-align: center; font-size: 12px; font-weight: 600;
            color: var(--text-muted); padding: 8px 0;
            display: flex; align-items: center; gap: 12px;
        }
        .date-divider::before, .date-divider::after {
            content: ''; flex: 1; height: 1px; background: var(--border);
        }

        /* Bubble */
        .msg-row {
            display: flex; align-items: flex-end; gap: 8px;
            animation: slideUp 0.2s ease-out both;
        }
        .msg-row.out { flex-direction: row-reverse; }

        .msg-avatar {
            width: 28px; height: 28px; border-radius: 50%;
            object-fit: cover; flex-shrink: 0; margin-bottom: 2px;
        }
        .msg-avatar.hidden { visibility: hidden; }

        .msg-bubble {
            max-width: 72%; padding: 10px 14px;
            border-radius: 18px; font-size: 15px; line-height: 1.45;
            word-wrap: break-word; position: relative;
        }
        .msg-row.in  .msg-bubble {
            background: var(--bubble-in); color: var(--text-primary);
            border-bottom-left-radius: 4px;
        }
        .msg-row.out .msg-bubble {
            background: var(--bubble-out); color: white;
            border-bottom-right-radius: 4px;
        }

        .msg-bubble img {
            max-width: 100%; border-radius: 12px; display: block; margin-top: 4px;
        }

        .msg-time {
            font-size: 11px; color: var(--text-muted);
            text-align: right; margin-top: 2px; padding: 0 4px;
        }
        .msg-row.out .msg-time { text-align: right; }

        .msg-status { font-size: 11px; color: rgba(255,255,255,0.7); margin-left: 4px; }

        /* Typing indicator */
        .typing-indicator {
            display: flex; align-items: center; gap: 8px;
            padding: 8px 0;
        }
        .typing-dots { display: flex; gap: 4px; padding: 10px 14px; background: var(--bubble-in); border-radius: 18px; border-bottom-left-radius: 4px; }
        .typing-dot {
            width: 7px; height: 7px; border-radius: 50%; background: var(--text-muted);
            animation: typingBounce 1.4s infinite;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typingBounce {
            0%,60%,100% { transform: translateY(0); }
            30%          { transform: translateY(-6px); }
        }

        /* Input bar */
        .input-bar {
            display: flex; align-items: flex-end; gap: 8px;
            padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
            background: var(--surface); border-top: 1px solid var(--border);
            flex-shrink: 0;
        }

        .input-actions { display: flex; gap: 2px; }
        .input-action-btn {
            background: none; border: none; color: var(--primary);
            cursor: pointer; padding: 8px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.15s;
        }
        .input-action-btn:hover { background: rgba(99,102,241,0.08); }

        .msg-input-wrap {
            flex: 1; background: var(--background);
            border: 1.5px solid var(--border); border-radius: 22px;
            padding: 10px 16px; transition: border-color 0.2s;
            max-height: 120px; overflow-y: auto;
        }
        .msg-input-wrap:focus-within { border-color: var(--primary); }

        #msg-input {
            border: none; outline: none; background: transparent;
            font-size: 15px; font-family: inherit; color: var(--text-primary);
            width: 100%; resize: none; max-height: 100px;
            overflow-y: auto; line-height: 1.4;
        }
        #msg-input::placeholder { color: var(--text-muted); }

        .send-btn {
            width: 42px; height: 42px; border-radius: 50%;
            background: var(--primary); color: white;
            border: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; transition: all 0.2s;
            opacity: 0.5;
        }
        .send-btn.active { opacity: 1; }
        .send-btn:active { transform: scale(0.92); }

        /* ── Empty state ── */
        .empty-state {
            padding: 72px 24px; text-align: center; color: var(--text-muted);
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .empty-icon {
            width: 72px; height: 72px; border-radius: 50%;
            background: var(--background);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 16px; color: var(--text-muted);
        }
        .empty-state h3 { font-size: 18px; font-weight: 700; color: var(--text-secondary); margin-bottom: 6px; }
        .empty-state p { font-size: 14px; margin-bottom: 20px; }
        .start-chat-btn {
            background: var(--primary); color: white;
            border: none; padding: 12px 28px; border-radius: 9999px;
            font-size: 15px; font-weight: 700; cursor: pointer;
            font-family: inherit; transition: opacity 0.2s;
        }
        .start-chat-btn:hover { opacity: 0.88; }

        /* Bottom Nav (inbox only) */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(255,255,255,0.95); backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
            display: flex; justify-content: space-around; z-index: 100;
        }
        .nav-item {
            flex: 1; display: flex; flex-direction: column; align-items: center;
            gap: 4px; padding: 8px; color: var(--text-secondary);
            background: none; border: none; font-family: inherit;
            cursor: pointer; transition: color 0.2s; position: relative;
        }
        .nav-item.active { color: var(--primary); }
        .nav-item span { font-size: 11px; font-weight: 600; }
        .nav-badge {
            position: absolute; top: 4px; right: calc(50% - 16px);
            background: var(--like); color: white;
            font-size: 10px; font-weight: 700;
            min-width: 18px; height: 18px; border-radius: 9px;
            display: none; align-items: center; justify-content: center;
            padding: 0 5px; border: 2px solid var(--surface);
        }
        .nav-badge.show { display: flex; }
        .fab {
            width: 56px; height: 56px; background: var(--primary); color: white;
            border: none; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 20px rgba(99,102,241,0.4);
            transform: translateY(-20px); cursor: pointer; transition: transform 0.2s;
        }
        .fab:active { transform: translateY(-20px) scale(0.9); }

        .toast {
            position: fixed; bottom: 100px; left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #1e293b; color: white; padding: 12px 24px;
            border-radius: 9999px; font-weight: 500; opacity: 0;
            transition: all 0.3s; z-index: 9999; pointer-events: none;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        @media (min-width: 1024px) {
            .bottom-nav { display: none; }
        }
    </style>
</head>
<body>

<!-- ══ INBOX VIEW ══ -->
<div id="inbox-view">
    <header class="inbox-header">
        <span class="inbox-title">Messages</span>
        <button class="new-msg-btn" onclick="openNewMessage()" title="New message">
            <i data-feather="edit" style="width:20px;height:20px;"></i>
        </button>
    </header>

    <div class="inbox-search">
        <div class="inbox-search-inner">
            <i data-feather="search" style="width:16px;height:16px;"></i>
            <input type="text" placeholder="Search messages" oninput="filterChats(this.value)">
        </div>
    </div>

    <div class="chat-list" id="chat-list">
        <!-- Shimmer -->
        ${[0,1,2,3].map(()=>`
        <div style="display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border);background:var(--surface);">
            <div class="shimmer" style="width:52px;height:52px;border-radius:50%;flex-shrink:0;"></div>
            <div style="flex:1;">
                <div class="shimmer" style="width:60%;height:15px;margin-bottom:8px;"></div>
                <div class="shimmer" style="width:80%;height:13px;"></div>
            </div>
        </div>`).join('')}
    </div>

    <!-- Bottom Nav -->
    <nav class="bottom-nav">
        <button class="nav-item" onclick="window.location.href='home.html'">
            <i data-feather="home"></i><span>Home</span>
        </button>
        <button class="nav-item" onclick="window.location.href='search.html'">
            <i data-feather="search"></i><span>Search</span>
        </button>
        <button class="fab" onclick="window.location.href='home.html'">
            <i data-feather="plus" style="width:28px;height:28px;"></i>
        </button>
        <button class="nav-item" onclick="window.location.href='notifications.html'">
            <i data-feather="bell"></i><span>Alerts</span>
            <span class="nav-badge" id="badge-notifications"></span>
        </button>
        <button class="nav-item active">
            <i data-feather="mail"></i><span>Messages</span>
        </button>
    </nav>
</div>

<!-- ══ CHAT THREAD VIEW ══ -->
<div id="chat-view">
    <header class="chat-header">
        <button class="chat-back" onclick="closeChat()">
            <i data-feather="arrow-left" style="width:20px;height:20px;"></i>
        </button>
        <img id="chat-header-avatar" class="chat-header-avatar" src="" onclick="goToOtherProfile()">
        <div class="chat-header-info" onclick="goToOtherProfile()">
            <div class="chat-header-name" id="chat-header-name">—</div>
            <div class="chat-header-status" id="chat-header-status">Online</div>
        </div>
        <div class="chat-header-actions">
            <button class="chat-action-btn" onclick="showToast('Voice call coming soon')">
                <i data-feather="phone" style="width:18px;height:18px;"></i>
            </button>
            <button class="chat-action-btn" onclick="showToast('Video call coming soon')">
                <i data-feather="video" style="width:18px;height:18px;"></i>
            </button>
        </div>
    </header>

    <div class="messages-area" id="messages-area"></div>

    <div class="input-bar">
        <div class="input-actions">
            <label class="input-action-btn" title="Attach image">
                <i data-feather="image" style="width:20px;height:20px;"></i>
                <input type="file" accept="image/*" style="display:none;" onchange="sendImageMessage(event)">
            </label>
        </div>
        <div class="msg-input-wrap">
            <textarea
                id="msg-input"
                rows="1"
                placeholder="Message…"
                oninput="onMsgInput(this)"
                onkeydown="onMsgKeydown(event)"
            ></textarea>
        </div>
        <button class="send-btn" id="send-btn" onclick="sendMessage()">
            <i data-feather="send" style="width:18px;height:18px;"></i>
        </button>
    </div>
</div>

<!-- New message bottom sheet -->
<div class="modal-overlay" id="new-msg-overlay" onclick="closeNewMessage()"></div>
<div class="bottom-sheet" id="new-msg-sheet">
    <div class="sheet-header">
        <span class="sheet-title">New Message</span>
        <button class="sheet-close" onclick="closeNewMessage()">Cancel</button>
    </div>
    <div id="user-select-list"></div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
    import { initializeApp }      from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, get, set, push, update, remove, onValue, onChildAdded, query, orderByChild, limitToLast, serverTimestamp }
        from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const CLOUDINARY_CLOUD = 'dqkujefxj';
    const CLOUDINARY_PRESET = 'banter_box';

    const firebaseConfig = {
        apiKey: "AIzaSyBOyZ3As4GTuNvjemvPF_SpsC6m6vqtNhc",
        authDomain: "fire-b-a8878.firebaseapp.com",
        databaseURL: "https://fire-b-a8878.firebaseio.com",
        projectId: "fire-b-a8878",
        storageBucket: "fire-b-a8878.appspot.com",
        messagingSenderId: "658673187627",
        appId: "1:658673187627:web:6e4c29af661785f0afa36e"
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getDatabase(app);

    let currentUser     = null;
    let currentUserData = null;
    let allUsers        = [];
    let allChats        = [];   // enriched chat objects
    let activeChatId    = null;
    let activeChatUser  = null;
    let msgListener     = null;

    onAuthStateChanged(auth, async user => {
        if (!user) { window.location.href = 'auth.html'; return; }
        currentUser = user;
        await loadCurrentUser();
        await loadUsers();
        listenChats();
        setupBadgeListeners();
        feather.replace();
    });

    async function loadCurrentUser() {
        const snap = await get(ref(db, `users/${currentUser.uid}`));
        currentUserData = snap.val() || { uid: currentUser.uid, photoURL:'', username:'' };
    }

    async function loadUsers() {
        const snap = await get(ref(db, 'users'));
        allUsers = [];
        if (snap.exists()) snap.forEach(c => { if (c.key !== currentUser.uid) allUsers.push({ uid: c.key, ...c.val() }); });
    }

    // ── Chat list ──
    function listenChats() {
        onValue(ref(db, `userChats/${currentUser.uid}`), async snap => {
            const chatList = document.getElementById('chat-list');

            if (!snap.exists()) {
                chatList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon"><i data-feather="message-circle" style="width:28px;height:28px;"></i></div>
                        <h3>No messages yet</h3>
                        <p>Start a conversation with someone</p>
                        <button class="start-chat-btn" onclick="openNewMessage()">New Message</button>
                    </div>`;
                feather.replace();
                return;
            }

            const entries = [];
            snap.forEach(c => entries.push({ chatId: c.key, ...c.val() }));
            entries.sort((a,b) => (b.lastTimestamp||0) - (a.lastTimestamp||0));

            // Enrich with other user's info
            allChats = await Promise.all(entries.map(async e => {
                const otherUid = e.otherUid;
                const userSnap = await get(ref(db, `users/${otherUid}`));
                return { ...e, otherUser: userSnap.val() || {} };
            }));

            renderChatList(allChats);
        });
    }

    function renderChatList(chats) {
        const chatList = document.getElementById('chat-list');
        if (chats.length === 0) {
            chatList.innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon"><i data-feather="message-circle" style="width:28px;height:28px;"></i></div>
                    <h3>No messages yet</h3>
                    <p>Start a conversation with someone</p>
                    <button class="start-chat-btn" onclick="openNewMessage()">New Message</button>
                </div>`;
            feather.replace();
            return;
        }

        chatList.innerHTML = chats.map((c, i) => {
            const u = c.otherUser;
            const unread = c.unreadCount || 0;
            const photo = u.photoURL || avatarUrl(u);
            const preview = c.lastMessage || 'Start a conversation';
            const isImage = c.lastMessageType === 'image';

            return `
            <div class="chat-row ${unread > 0 ? 'unread' : ''}"
                 style="animation-delay:${i*40}ms"
                 onclick="openChat('${c.chatId}','${c.otherUid}')">
                <div class="chat-avatar-wrap">
                    <img class="chat-avatar" src="${photo}" loading="lazy">
                    <div class="online-dot" style="display:none;" id="online-${c.otherUid}"></div>
                </div>
                <div class="chat-info">
                    <div class="chat-name-row">
                        <span class="chat-name">${esc(u.displayName||u.username||'User')}</span>
                        <span class="chat-time">${formatTime(c.lastTimestamp)}</span>
                    </div>
                    <div class="chat-preview-row">
                        <span class="chat-preview ${unread > 0 ? 'bold' : ''}">
                            ${isImage ? '📷 Photo' : esc(preview)}
                        </span>
                        ${unread > 0 ? `<span class="chat-unread-badge">${unread > 99 ? '99+' : unread}</span>` : ''}
                    </div>
                </div>
            </div>`;
        }).join('');

        feather.replace();
    }

    window.filterChats = (q) => {
        if (!q.trim()) { renderChatList(allChats); return; }
        const ql = q.toLowerCase();
        const filtered = allChats.filter(c =>
            c.otherUser?.displayName?.toLowerCase().includes(ql) ||
            c.otherUser?.username?.toLowerCase().includes(ql) ||
            (c.lastMessage||'').toLowerCase().includes(ql)
        );
        renderChatList(filtered);
    };

    // ── Open / close chat ──
    window.openChat = async (chatId, otherUid) => {
        activeChatId   = chatId;

        // Load other user
        const snap = await get(ref(db, `users/${otherUid}`));
        activeChatUser = { uid: otherUid, ...snap.val() };

        // Update header
        document.getElementById('chat-header-avatar').src = activeChatUser.photoURL || avatarUrl(activeChatUser);
        document.getElementById('chat-header-name').textContent = activeChatUser.displayName || activeChatUser.username || 'User';
        document.getElementById('chat-header-status').textContent = 'Online';
        document.getElementById('chat-header-status').className = 'chat-header-status';

        // Show chat view, hide inbox
        document.getElementById('inbox-view').style.display = 'none';
        document.getElementById('chat-view').classList.add('active');

        // Clear messages area
        document.getElementById('messages-area').innerHTML = '';

        // Mark as read
        await update(ref(db, `userChats/${currentUser.uid}/${chatId}`), { unreadCount: 0 });

        // Detach old listener
        if (msgListener) { msgListener(); msgListener = null; }

        // Listen to messages
        listenMessages(chatId);

        document.getElementById('msg-input').focus();
        feather.replace();
    };

    window.closeChat = () => {
        if (msgListener) { msgListener(); msgListener = null; }
        activeChatId   = null;
        activeChatUser = null;
        document.getElementById('chat-view').classList.remove('active');
        document.getElementById('inbox-view').style.display = 'flex';
        feather.replace();
    };

    window.goToOtherProfile = () => {
        if (activeChatUser) window.location.href = `profile.html?id=${activeChatUser.uid}`;
    };

    // ── Messages ──
    function listenMessages(chatId) {
        const msgsRef = ref(db, `chats/${chatId}/messages`);
        let initial = true;
        const rendered = new Set();

        msgListener = onValue(msgsRef, snap => {
            const area = document.getElementById('messages-area');

            if (!snap.exists()) {
                area.innerHTML = `<div style="text-align:center;color:var(--text-muted);font-size:14px;padding:32px 0;">Say hello 👋</div>`;
                return;
            }

            const msgs = [];
            snap.forEach(c => msgs.push({ id: c.key, ...c.val() }));
            msgs.sort((a,b) => (a.timestamp||0) - (b.timestamp||0));

            if (initial) {
                area.innerHTML = '';
                let lastDate = '';
                msgs.forEach(msg => {
                    const dateStr = formatDateDivider(msg.timestamp);
                    if (dateStr !== lastDate) {
                        area.insertAdjacentHTML('beforeend', `<div class="date-divider">${dateStr}</div>`);
                        lastDate = dateStr;
                    }
                    area.insertAdjacentHTML('beforeend', msgBubbleHtml(msg));
                    rendered.add(msg.id);
                });
                scrollToBottom();
                feather.replace();
                initial = false;
            } else {
                // Only render new messages
                msgs.forEach(msg => {
                    if (rendered.has(msg.id)) return;
                    rendered.add(msg.id);
                    area.insertAdjacentHTML('beforeend', msgBubbleHtml(msg));
                    scrollToBottom();
                    feather.replace();
                });
            }
        });
    }

    function msgBubbleHtml(msg) {
        const isOut = msg.uid === currentUser.uid;
        const showAvatar = !isOut;
        const photo = activeChatUser?.photoURL || avatarUrl(activeChatUser || {});

        return `
        <div class="msg-row ${isOut ? 'out' : 'in'}">
            ${showAvatar ? `<img class="msg-avatar" src="${photo}">` : `<div style="width:28px;flex-shrink:0;"></div>`}
            <div>
                <div class="msg-bubble">
                    ${msg.imageUrl ? `<img src="${msg.imageUrl}" style="max-width:220px;">` : ''}
                    ${msg.text ? esc(msg.text) : ''}
                    ${isOut ? `<span class="msg-status">${msg.read ? '✓✓' : '✓'}</span>` : ''}
                </div>
                <div class="msg-time">${formatMsgTime(msg.timestamp)}</div>
            </div>
        </div>`;
    }

    function scrollToBottom() {
        const area = document.getElementById('messages-area');
        setTimeout(() => { area.scrollTop = area.scrollHeight; }, 50);
    }

    // ── Send ──
    window.onMsgInput = (el) => {
        el.style.height = 'auto';
        el.style.height = Math.min(el.scrollHeight, 100) + 'px';
        const hasText = el.value.trim().length > 0;
        document.getElementById('send-btn').classList.toggle('active', hasText);
    };

    window.onMsgKeydown = (e) => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    };

    window.sendMessage = async () => {
        const input = document.getElementById('msg-input');
        const text  = input.value.trim();
        if (!text || !activeChatId) return;

        input.value = '';
        input.style.height = 'auto';
        document.getElementById('send-btn').classList.remove('active');

        await pushMessage({ text, type: 'text' });
    };

    window.sendImageMessage = async (e) => {
        const file = e.target.files[0];
        if (!file || !activeChatId) return;
        e.target.value = '';

        showToast('Sending image…');
        try {
            const fd = new FormData();
            fd.append('file', file);
            fd.append('upload_preset', CLOUDINARY_PRESET);
            const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/upload`, { method:'POST', body: fd });
            const data = await res.json();
            await pushMessage({ imageUrl: data.secure_url, text: '', type: 'image' });
        } catch {
            showToast('Image send failed');
        }
    };

    async function pushMessage({ text, imageUrl, type }) {
        const chatRef   = ref(db, `chats/${activeChatId}/messages`);
        const msgRef    = push(chatRef);
        const timestamp = serverTimestamp();

        await set(msgRef, {
            uid: currentUser.uid,
            text: text || '',
            imageUrl: imageUrl || null,
            type,
            timestamp,
            read: false
        });

        // Update userChats for both sides
        const preview = type === 'image' ? '📷 Photo' : text;
        const otherUid = activeChatUser.uid;

        const updates = {};
        updates[`userChats/${currentUser.uid}/${activeChatId}/lastMessage`]     = preview;
        updates[`userChats/${currentUser.uid}/${activeChatId}/lastMessageType`] = type;
        updates[`userChats/${currentUser.uid}/${activeChatId}/lastTimestamp`]   = timestamp;
        updates[`userChats/${currentUser.uid}/${activeChatId}/otherUid`]        = otherUid;
        updates[`userChats/${otherUid}/${activeChatId}/lastMessage`]            = preview;
        updates[`userChats/${otherUid}/${activeChatId}/lastMessageType`]        = type;
        updates[`userChats/${otherUid}/${activeChatId}/lastTimestamp`]          = timestamp;
        updates[`userChats/${otherUid}/${activeChatId}/otherUid`]              = currentUser.uid;
        updates[`userChats/${otherUid}/${activeChatId}/unreadCount`]           =
            ((await get(ref(db, `userChats/${otherUid}/${activeChatId}/unreadCount`))).val() || 0) + 1;

        await update(ref(db), updates);
    }

    // ── New message sheet ──
    window.openNewMessage = () => {
        const list = document.getElementById('user-select-list');
        list.innerHTML = allUsers.map(u => `
            <div class="user-select-item" onclick="startChat('${u.uid}')">
                <img src="${u.photoURL || avatarUrl(u)}" loading="lazy">
                <div>
                    <div class="user-select-name">${esc(u.displayName||u.username||'User')}</div>
                    <div class="user-select-handle">@${esc(u.username||'')}</div>
                </div>
            </div>
        `).join('') || '<p style="color:var(--text-muted);padding:16px;text-align:center;">No users found</p>';

        document.getElementById('new-msg-overlay').classList.add('active');
        feather.replace();
    };

    window.closeNewMessage = () => {
        document.getElementById('new-msg-overlay').classList.remove('active');
    };

    window.startChat = async (otherUid) => {
        closeNewMessage();

        // Generate deterministic chat ID
        const ids   = [currentUser.uid, otherUid].sort();
        const chatId = ids.join('_');

        // Ensure the chat entry exists
        const chatSnap = await get(ref(db, `userChats/${currentUser.uid}/${chatId}`));
        if (!chatSnap.exists()) {
            await update(ref(db), {
                [`userChats/${currentUser.uid}/${chatId}/otherUid`]:  otherUid,
                [`userChats/${currentUser.uid}/${chatId}/unreadCount`]: 0,
                [`userChats/${otherUid}/${chatId}/otherUid`]:          currentUser.uid,
                [`userChats/${otherUid}/${chatId}/unreadCount`]:       0,
            });
        }

        openChat(chatId, otherUid);
    };

    // ── Badges ──
    function setupBadgeListeners() {
        onValue(ref(db, `notifications/${currentUser.uid}`), snap => {
            let c = 0;
            if (snap.exists()) snap.forEach(ch => { if (!ch.val().read) c++; });
            updateBadge('badge-notifications', c);
        });
    }

    function updateBadge(id, count) {
        const b = document.getElementById(id);
        if (!b) return;
        if (count > 0) { b.textContent = count > 99 ? '99+' : count; b.classList.add('show'); }
        else b.classList.remove('show');
    }

    // ── Utils ──
    function esc(str) {
        const d = document.createElement('div'); d.textContent = str||''; return d.innerHTML;
    }

    function avatarUrl(u) {
        return `https://ui-avatars.com/api/?name=${encodeURIComponent((u&&(u.username||u.displayName))||'U')}&background=random`;
    }

    function formatTime(ts) {
        if (!ts) return '';
        const s = Math.floor((Date.now()-ts)/1000);
        if (s < 60)    return 'now';
        if (s < 3600)  return Math.floor(s/60)   + 'm';
        if (s < 86400) return Math.floor(s/3600)  + 'h';
        return new Date(ts).toLocaleDateString('en-US',{month:'short',day:'numeric'});
    }

    function formatMsgTime(ts) {
        if (!ts) return '';
        return new Date(ts).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true});
    }

    function formatDateDivider(ts) {
        if (!ts) return 'Today';
        const d   = new Date(ts);
        const now = new Date();
        const diff = Math.floor((now - d) / 86400000);
        if (diff === 0) return 'Today';
        if (diff === 1) return 'Yesterday';
        return d.toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'});
    }

    window.showToast = msg => {
        const t = document.getElementById('toast');
        t.textContent = msg; t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2500);
    };

    feather.replace();
</script>
</body>
</html>
