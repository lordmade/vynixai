<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vynix · Messages</title>
    <script src="https://unpkg.com/feather-icons"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        /* ══ THEME SYSTEM ══ */
        :root,[data-theme="light"]{
            --primary:#6366F1;--primary-dark:#4F46E5;--primary-rgb:99,102,241;
            --background:#F8FAFC;--surface:#FFFFFF;--surface2:#F1F5F9;--surface3:#E2E8F0;
            --border:#E2E8F0;--text-primary:#0F172A;--text-secondary:#64748B;--text-muted:#94A3B8;
            --like:#F43F5E;--verified:#1D9BF0;
            --bubble-out:linear-gradient(135deg,#6366F1,#818CF8);
            --bubble-in:var(--surface2);
            --bubble-out-text:#fff;--bubble-in-text:var(--text-primary);
            --shadow:0 1px 4px rgba(0,0,0,0.06);--shadow-lg:0 8px 32px rgba(0,0,0,0.10);
        }
        [data-theme="dark"]{
            --primary:#818CF8;--primary-dark:#6366F1;--primary-rgb:129,140,248;
            --background:#0F172A;--surface:#1E293B;--surface2:#334155;--surface3:#475569;
            --border:#334155;--text-primary:#F1F5F9;--text-secondary:#94A3B8;--text-muted:#64748B;
            --like:#FB7185;--verified:#38BDF8;
            --bubble-out:linear-gradient(135deg,#6366F1,#818CF8);
            --bubble-in:#334155;--bubble-out-text:#fff;--bubble-in-text:#F1F5F9;
            --shadow:0 1px 4px rgba(0,0,0,0.3);--shadow-lg:0 8px 32px rgba(0,0,0,0.5);
        }
        [data-theme="midnight"]{
            --primary:#C084FC;--primary-dark:#A855F7;--primary-rgb:192,132,252;
            --background:#09090B;--surface:#18181B;--surface2:#27272A;--surface3:#3F3F46;
            --border:#3F3F46;--text-primary:#FAFAFA;--text-secondary:#A1A1AA;--text-muted:#71717A;
            --like:#F472B6;--verified:#67E8F9;
            --bubble-out:linear-gradient(135deg,#A855F7,#C084FC);
            --bubble-in:#27272A;--bubble-out-text:#fff;--bubble-in-text:#FAFAFA;
            --shadow:0 1px 4px rgba(0,0,0,0.4);--shadow-lg:0 8px 32px rgba(0,0,0,0.7);
        }
        [data-theme="ocean"]{
            --primary:#06B6D4;--primary-dark:#0891B2;--primary-rgb:6,182,212;
            --background:#F0F9FF;--surface:#FFFFFF;--surface2:#E0F2FE;--surface3:#BAE6FD;
            --border:#BAE6FD;--text-primary:#0C4A6E;--text-secondary:#0369A1;--text-muted:#7DD3FC;
            --like:#F43F5E;--verified:#06B6D4;
            --bubble-out:linear-gradient(135deg,#0891B2,#06B6D4);
            --bubble-in:#E0F2FE;--bubble-out-text:#fff;--bubble-in-text:#0C4A6E;
            --shadow:0 1px 4px rgba(6,182,212,0.1);--shadow-lg:0 8px 32px rgba(6,182,212,0.15);
        }
        [data-theme="rose"]{
            --primary:#E11D48;--primary-dark:#BE123C;--primary-rgb:225,29,72;
            --background:#FFF1F2;--surface:#FFFFFF;--surface2:#FFE4E6;--surface3:#FECDD3;
            --border:#FECDD3;--text-primary:#881337;--text-secondary:#9F1239;--text-muted:#FDA4AF;
            --like:#E11D48;--verified:#3B82F6;
            --bubble-out:linear-gradient(135deg,#BE123C,#E11D48);
            --bubble-in:#FFE4E6;--bubble-out-text:#fff;--bubble-in-text:#881337;
            --shadow:0 1px 4px rgba(225,29,72,0.08);--shadow-lg:0 8px 32px rgba(225,29,72,0.15);
        }

        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

        body{
            font-family:'Inter',sans-serif;background:var(--background);color:var(--text-primary);
            -webkit-font-smoothing:antialiased;overflow:hidden;height:100dvh;
            transition:background 0.3s,color 0.3s;
        }

        @keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
        @keyframes slideInRight{from{opacity:0;transform:translateX(100%);}to{opacity:1;transform:translateX(0);}}
        @keyframes slideOutRight{from{opacity:1;transform:translateX(0);}to{opacity:0;transform:translateX(100%);}}
        @keyframes slideInLeft{from{opacity:0;transform:translateX(-100%);}to{opacity:1;transform:translateX(0);}}
        @keyframes slideOutLeft{from{opacity:1;transform:translateX(0);}to{opacity:0;transform:translateX(-100%);}}
        @keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}
        @keyframes spin{to{transform:rotate(360deg);}}
        @keyframes msgIn{from{opacity:0;transform:translateY(6px) scale(0.96);}to{opacity:1;transform:translateY(0) scale(1);}}
        @keyframes typingDot{0%,80%,100%{transform:translateY(0);}40%{transform:translateY(-5px);}}
        @keyframes badgePop{0%{transform:scale(0);}70%{transform:scale(1.2);}100%{transform:scale(1);}}

        .shimmer{
            background:linear-gradient(90deg,var(--surface2) 25%,var(--surface3) 50%,var(--surface2) 75%);
            background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:8px;
        }

        /* ══ LAYOUT — two panels ══ */
        .app{display:flex;height:100dvh;max-width:1100px;margin:0 auto;position:relative;}

        /* ── CONVERSATIONS PANEL ── */
        .conv-panel{
            width:100%;max-width:380px;flex-shrink:0;
            display:flex;flex-direction:column;
            background:var(--surface);
            border-right:1px solid var(--border);
            transition:background 0.3s,border-color 0.3s;
        }

        .conv-header{
            padding:16px 16px 12px;
            background:rgba(255,255,255,0.92);backdrop-filter:blur(20px);
            border-bottom:1px solid var(--border);
            display:flex;align-items:center;gap:12px;
            position:sticky;top:0;z-index:10;
            transition:background 0.3s;
        }
        [data-theme="dark"] .conv-header{background:rgba(30,41,59,0.92);}
        [data-theme="midnight"] .conv-header{background:rgba(24,24,27,0.95);}
        [data-theme="ocean"] .conv-header{background:rgba(240,249,255,0.92);}
        [data-theme="rose"] .conv-header{background:rgba(255,241,242,0.92);}

        .back-nav-btn{
            background:none;border:none;color:var(--text-primary);cursor:pointer;
            padding:7px;border-radius:50%;display:flex;align-items:center;justify-content:center;
            transition:background 0.15s;
        }
        .back-nav-btn:hover{background:var(--surface2);}
        .conv-header-title{font-size:20px;font-weight:800;flex:1;color:var(--text-primary);}
        .new-chat-btn{
            background:var(--primary);color:white;border:none;
            width:36px;height:36px;border-radius:50%;
            display:flex;align-items:center;justify-content:center;
            cursor:pointer;transition:all 0.2s;
            box-shadow:0 2px 8px rgba(var(--primary-rgb),0.35);
        }
        .new-chat-btn:hover{transform:scale(1.08);box-shadow:0 4px 16px rgba(var(--primary-rgb),0.45);}

        /* Search bar */
        .conv-search{padding:10px 16px 4px;}
        .search-wrap{
            display:flex;align-items:center;gap:8px;
            background:var(--surface2);border:1.5px solid transparent;
            border-radius:12px;padding:9px 14px;
            transition:border-color 0.2s,box-shadow 0.2s;
        }
        .search-wrap:focus-within{
            border-color:var(--primary);
            box-shadow:0 0 0 3px rgba(var(--primary-rgb),0.10);
        }
        .search-wrap svg{color:var(--text-muted);flex-shrink:0;transition:color 0.2s;}
        .search-wrap:focus-within svg{color:var(--primary);}
        .search-wrap input{
            flex:1;border:none;outline:none;background:transparent;
            font-size:14px;font-family:inherit;color:var(--text-primary);
        }
        .search-wrap input::placeholder{color:var(--text-muted);}

        /* Conversation list */
        .conv-list{flex:1;overflow-y:auto;padding:8px 0;}
        .conv-list::-webkit-scrollbar{width:4px;}
        .conv-list::-webkit-scrollbar-track{background:transparent;}
        .conv-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

        .conv-item{
            display:flex;align-items:center;gap:12px;
            padding:12px 16px;cursor:pointer;
            transition:background 0.15s;position:relative;
            animation:fadeIn 0.25s ease-out both;
        }
        .conv-item:hover{background:var(--surface2);}
        .conv-item.active{background:rgba(var(--primary-rgb),0.07);}
        .conv-item.active .conv-name{color:var(--primary);}

        .conv-avatar-wrap{position:relative;flex-shrink:0;}
        .conv-avatar{width:50px;height:50px;border-radius:50%;object-fit:cover;}
        .online-ring{
            position:absolute;bottom:1px;right:1px;
            width:13px;height:13px;border-radius:50%;
            background:#22C55E;border:2.5px solid var(--surface);
            display:none;
        }
        .online-ring.show{display:block;}

        .conv-info{flex:1;min-width:0;}
        .conv-name-row{display:flex;align-items:center;justify-content:space-between;gap:6px;margin-bottom:3px;}
        .conv-name{font-size:15px;font-weight:700;color:var(--text-primary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
        .conv-time{font-size:12px;color:var(--text-muted);flex-shrink:0;}
        .conv-preview{font-size:13px;color:var(--text-secondary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
        .conv-preview.unread{color:var(--text-primary);font-weight:600;}

        .unread-badge{
            background:var(--primary);color:white;
            font-size:11px;font-weight:800;
            min-width:20px;height:20px;border-radius:10px;
            display:none;align-items:center;justify-content:center;
            padding:0 5px;flex-shrink:0;
            animation:badgePop 0.3s cubic-bezier(0.34,1.56,0.64,1);
        }
        .unread-badge.show{display:flex;}

        .conv-empty{padding:48px 24px;text-align:center;color:var(--text-muted);}
        .conv-empty-icon{width:56px;height:56px;border-radius:50%;background:var(--surface2);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;}
        .conv-empty h3{font-size:16px;font-weight:700;color:var(--text-secondary);margin-bottom:6px;}
        .conv-empty p{font-size:13px;line-height:1.5;}

        /* ── CHAT PANEL ── */
        .chat-panel{
            flex:1;display:flex;flex-direction:column;
            background:var(--background);
            min-width:0;transition:background 0.3s;
        }

        /* Chat header */
        .chat-header{
            padding:12px 16px;
            background:rgba(255,255,255,0.92);backdrop-filter:blur(20px);
            border-bottom:1px solid var(--border);
            display:flex;align-items:center;gap:12px;
            flex-shrink:0;z-index:10;
            transition:background 0.3s;
        }
        [data-theme="dark"] .chat-header{background:rgba(30,41,59,0.92);}
        [data-theme="midnight"] .chat-header{background:rgba(24,24,27,0.95);}
        [data-theme="ocean"] .chat-header{background:rgba(240,249,255,0.92);}
        [data-theme="rose"] .chat-header{background:rgba(255,241,242,0.92);}

        .chat-back-btn{
            background:none;border:none;color:var(--text-primary);cursor:pointer;
            padding:7px;border-radius:50%;display:flex;align-items:center;justify-content:center;
            transition:background 0.15s;display:none;
        }
        .chat-back-btn:hover{background:var(--surface2);}
        .chat-avatar{width:40px;height:40px;border-radius:50%;object-fit:cover;flex-shrink:0;cursor:pointer;}
        .chat-user-info{flex:1;min-width:0;}
        .chat-user-name{font-size:16px;font-weight:800;color:var(--text-primary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
        .chat-user-status{font-size:12px;color:var(--text-muted);}
        .chat-user-status.online{color:#22C55E;font-weight:600;}
        .chat-action-btn{
            background:none;border:none;color:var(--text-secondary);cursor:pointer;
            padding:7px;border-radius:50%;display:flex;align-items:center;justify-content:center;
            transition:background 0.15s,color 0.15s;
        }
        .chat-action-btn:hover{background:var(--surface2);color:var(--primary);}

        /* Messages area */
        .messages-wrap{
            flex:1;overflow-y:auto;
            padding:16px 16px 8px;
            display:flex;flex-direction:column;
            gap:4px;
        }
        .messages-wrap::-webkit-scrollbar{width:4px;}
        .messages-wrap::-webkit-scrollbar-track{background:transparent;}
        .messages-wrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

        /* Date separator */
        .date-sep{
            display:flex;align-items:center;gap:10px;
            color:var(--text-muted);font-size:11px;font-weight:600;
            margin:12px 0 8px;text-transform:uppercase;letter-spacing:0.06em;
        }
        .date-sep::before,.date-sep::after{content:'';flex:1;height:1px;background:var(--border);}

        /* Message bubbles */
        .msg-row{display:flex;align-items:flex-end;gap:8px;animation:msgIn 0.25s ease-out;}
        .msg-row.out{flex-direction:row-reverse;}
        .msg-row + .msg-row{margin-top:2px;}
        .msg-row.gap-top{margin-top:10px;}

        .msg-sender-avatar{
            width:28px;height:28px;border-radius:50%;object-fit:cover;
            flex-shrink:0;align-self:flex-end;cursor:pointer;
        }
        .msg-row.out .msg-sender-avatar{display:none;}

        .msg-bubble-wrap{display:flex;flex-direction:column;max-width:72%;gap:2px;}
        .msg-row.out .msg-bubble-wrap{align-items:flex-end;}

        .msg-bubble{
            padding:10px 14px;border-radius:18px;
            font-size:15px;line-height:1.5;word-break:break-word;
            position:relative;
        }
        .msg-row.out .msg-bubble{
            background:var(--bubble-out);color:var(--bubble-out-text);
            border-bottom-right-radius:4px;
            box-shadow:0 2px 8px rgba(var(--primary-rgb),0.25);
        }
        .msg-row.in .msg-bubble{
            background:var(--bubble-in);color:var(--bubble-in-text);
            border-bottom-left-radius:4px;
            box-shadow:var(--shadow);
        }
        /* Consecutive messages — rounded corners */
        .msg-row.out.first-in-group .msg-bubble{border-top-right-radius:18px;}
        .msg-row.out.last-in-group .msg-bubble{border-bottom-right-radius:18px;}
        .msg-row.in.first-in-group .msg-bubble{border-top-left-radius:18px;}
        .msg-row.in.last-in-group .msg-bubble{border-bottom-left-radius:18px;}

        /* Image in message */
        .msg-img{
            max-width:240px;max-height:200px;border-radius:14px;
            object-fit:cover;display:block;cursor:zoom-in;
            border:1px solid rgba(0,0,0,0.08);
        }

        .msg-time{font-size:11px;color:var(--text-muted);padding:0 4px;margin-top:1px;}
        .msg-row.out .msg-time{text-align:right;}

        /* Delivery status */
        .msg-status{font-size:11px;color:var(--text-muted);display:flex;align-items:center;gap:2px;}
        .msg-status.seen{color:var(--primary);}
        .msg-status svg{width:14px;height:14px;}

        /* Typing indicator */
        .typing-indicator{display:none;align-items:center;gap:8px;padding:6px 0 4px;}
        .typing-indicator.show{display:flex;animation:fadeIn 0.3s ease-out;}
        .typing-avatar{width:28px;height:28px;border-radius:50%;object-fit:cover;}
        .typing-dots{
            background:var(--bubble-in);border-radius:18px;border-bottom-left-radius:4px;
            padding:10px 14px;display:flex;gap:4px;align-items:center;
            box-shadow:var(--shadow);
        }
        .typing-dot{
            width:7px;height:7px;border-radius:50%;background:var(--text-muted);
            animation:typingDot 1.2s ease-in-out infinite;
        }
        .typing-dot:nth-child(2){animation-delay:0.2s;}
        .typing-dot:nth-child(3){animation-delay:0.4s;}

        /* Input area */
        .input-area{
            padding:10px 12px calc(10px + env(safe-area-inset-bottom));
            background:var(--surface);border-top:1px solid var(--border);
            display:flex;align-items:flex-end;gap:8px;flex-shrink:0;
            transition:background 0.3s;
        }
        .input-wrap-msg{
            flex:1;display:flex;align-items:flex-end;
            background:var(--surface2);border:1.5px solid var(--border);
            border-radius:20px;padding:8px 14px;gap:8px;
            transition:border-color 0.2s,box-shadow 0.2s;
        }
        .input-wrap-msg:focus-within{
            border-color:var(--primary);
            box-shadow:0 0 0 3px rgba(var(--primary-rgb),0.10);
        }
        .msg-input{
            flex:1;border:none;outline:none;background:transparent;
            font-size:15px;font-family:inherit;color:var(--text-primary);
            resize:none;max-height:120px;line-height:1.45;
            scrollbar-width:none;
        }
        .msg-input::-webkit-scrollbar{display:none;}
        .msg-input::placeholder{color:var(--text-muted);}

        .attach-btn{
            background:none;border:none;color:var(--text-muted);cursor:pointer;
            padding:2px;display:flex;align-items:center;justify-content:center;
            flex-shrink:0;transition:color 0.2s;
        }
        .attach-btn:hover{color:var(--primary);}
        .attach-btn svg{width:20px;height:20px;}

        .send-btn{
            width:42px;height:42px;border-radius:50%;border:none;
            background:var(--primary);color:white;
            display:flex;align-items:center;justify-content:center;
            cursor:pointer;flex-shrink:0;
            transition:all 0.2s;
            box-shadow:0 2px 8px rgba(var(--primary-rgb),0.35);
        }
        .send-btn:hover{transform:scale(1.06);box-shadow:0 4px 16px rgba(var(--primary-rgb),0.45);}
        .send-btn:active{transform:scale(0.95);}
        .send-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none;box-shadow:none;}
        .send-btn svg{width:18px;height:18px;margin-left:2px;}

        /* ── EMPTY CHAT STATE ── */
        .chat-empty{
            flex:1;display:flex;flex-direction:column;
            align-items:center;justify-content:center;
            padding:48px 24px;text-align:center;color:var(--text-muted);
        }
        .chat-empty-icon{
            width:72px;height:72px;border-radius:24px;
            background:linear-gradient(135deg,rgba(var(--primary-rgb),0.12),rgba(var(--primary-rgb),0.06));
            display:flex;align-items:center;justify-content:center;margin:0 auto 20px;
        }
        .chat-empty h3{font-size:20px;font-weight:800;color:var(--text-primary);margin-bottom:8px;}
        .chat-empty p{font-size:14px;line-height:1.6;max-width:260px;}

        /* ── NEW CHAT SHEET ── */
        .sheet-overlay{
            position:fixed;inset:0;background:rgba(0,0,0,0.5);backdrop-filter:blur(6px);
            z-index:300;opacity:0;pointer-events:none;transition:opacity 0.25s;
        }
        .sheet-overlay.active{opacity:1;pointer-events:auto;}
        .new-chat-sheet{
            position:fixed;bottom:0;left:0;right:0;
            background:var(--surface);border-radius:24px 24px 0 0;
            padding:0 0 calc(20px + env(safe-area-inset-bottom));
            z-index:301;max-height:80vh;display:flex;flex-direction:column;
            transform:translateY(100%);transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);
        }
        .sheet-overlay.active ~ .new-chat-sheet{transform:translateY(0);}
        .sheet-handle{width:36px;height:4px;border-radius:2px;background:var(--border);margin:12px auto 0;}
        .sheet-hdr{
            display:flex;align-items:center;justify-content:space-between;
            padding:12px 20px 10px;border-bottom:1px solid var(--border);flex-shrink:0;
        }
        .sheet-hdr-title{font-size:17px;font-weight:800;color:var(--text-primary);}
        .sheet-close-btn{
            background:none;border:none;color:var(--text-muted);cursor:pointer;
            padding:4px;border-radius:50%;display:flex;align-items:center;justify-content:center;
        }
        .sheet-search-wrap{padding:10px 16px;border-bottom:1px solid var(--border);flex-shrink:0;}
        .user-list{overflow-y:auto;flex:1;}
        .user-item{
            display:flex;align-items:center;gap:12px;padding:12px 20px;
            cursor:pointer;transition:background 0.15s;
        }
        .user-item:hover{background:var(--surface2);}
        .user-item img{width:46px;height:46px;border-radius:50%;object-fit:cover;flex-shrink:0;}
        .user-item-info{flex:1;min-width:0;}
        .user-item-name{font-size:15px;font-weight:700;color:var(--text-primary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
        .user-item-handle{font-size:13px;color:var(--text-muted);}

        /* ── IMAGE LIGHTBOX ── */
        .lightbox{position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:500;display:none;align-items:center;justify-content:center;cursor:pointer;}
        .lightbox.active{display:flex;}
        .lightbox img{max-width:95vw;max-height:90vh;object-fit:contain;border-radius:8px;}
        .lightbox-close{position:absolute;top:16px;right:16px;background:rgba(255,255,255,0.15);border:none;color:white;width:40px;height:40px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px);}

        /* ── BOTTOM NAV ── */
        .bottom-nav{
            position:fixed;bottom:0;left:0;right:0;
            background:rgba(255,255,255,0.95);backdrop-filter:blur(20px);
            border-top:1px solid var(--border);
            padding:8px 0 calc(8px + env(safe-area-inset-bottom));
            display:none;justify-content:space-around;z-index:100;
            transition:background 0.3s;
        }
        [data-theme="dark"] .bottom-nav{background:rgba(30,41,59,0.97);}
        [data-theme="midnight"] .bottom-nav{background:rgba(24,24,27,0.97);}
        .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px;color:var(--text-secondary);background:none;border:none;font-family:inherit;cursor:pointer;transition:color 0.2s;position:relative;}
        .nav-item.active{color:var(--primary);}
        .nav-item span{font-size:11px;font-weight:600;}
        .nav-badge{position:absolute;top:4px;right:calc(50% - 16px);background:var(--like);color:white;font-size:10px;font-weight:800;min-width:18px;height:18px;border-radius:9px;display:none;align-items:center;justify-content:center;padding:0 5px;border:2px solid var(--surface);}
        .nav-badge.show{display:flex;}
        .fab{width:56px;height:56px;background:var(--primary);color:white;border:none;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(var(--primary-rgb),0.4);transform:translateY(-20px);cursor:pointer;}

        .toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--text-primary);color:var(--surface);padding:12px 24px;border-radius:9999px;font-weight:500;opacity:0;transition:all 0.3s;z-index:9999;pointer-events:none;}
        .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

        /* ── RESPONSIVE: mobile shows one panel at a time ── */
        @media(max-width:768px){
            body{overflow:hidden;}
            .conv-panel{max-width:100%;border-right:none;}
            .chat-panel{position:fixed;inset:0;z-index:50;transform:translateX(100%);transition:transform 0.32s cubic-bezier(0.4,0,0.2,1);}
            .chat-panel.open{transform:translateX(0);}
            .chat-back-btn{display:flex !important;}
            .bottom-nav{display:flex;}
            body{padding-bottom:calc(64px + env(safe-area-inset-bottom));}
            .conv-panel{padding-bottom:calc(72px + env(safe-area-inset-bottom));}
        }
        @media(min-width:769px){
            .bottom-nav{display:none;}
        }
    </style>
</head>
<body>

<div class="app">

    <!-- ══ CONVERSATIONS PANEL ══ -->
    <div class="conv-panel" id="conv-panel">
        <div class="conv-header">
            <button class="back-nav-btn" onclick="window.location.href='index.html'">
                <i data-feather="arrow-left" style="width:20px;height:20px;"></i>
            </button>
            <span class="conv-header-title">Messages</span>
            <button class="new-chat-btn" onclick="openNewChat()" title="New message">
                <i data-feather="edit" style="width:17px;height:17px;"></i>
            </button>
        </div>

        <div class="conv-search">
            <div class="search-wrap">
                <i data-feather="search" style="width:16px;height:16px;"></i>
                <input type="text" id="conv-search-input" placeholder="Search messages…" oninput="filterConversations(this.value)">
            </div>
        </div>

        <div class="conv-list" id="conv-list">
            <!-- Skeletons -->
            <div id="conv-skeletons">
                <div style="display:flex;gap:12px;padding:14px 16px;align-items:center;">
                    <div class="shimmer" style="width:50px;height:50px;border-radius:50%;flex-shrink:0;"></div>
                    <div style="flex:1;"><div class="shimmer" style="height:14px;width:55%;margin-bottom:8px;"></div><div class="shimmer" style="height:12px;width:80%;"></div></div>
                </div>
                <div style="display:flex;gap:12px;padding:14px 16px;align-items:center;">
                    <div class="shimmer" style="width:50px;height:50px;border-radius:50%;flex-shrink:0;"></div>
                    <div style="flex:1;"><div class="shimmer" style="height:14px;width:45%;margin-bottom:8px;"></div><div class="shimmer" style="height:12px;width:70%;"></div></div>
                </div>
                <div style="display:flex;gap:12px;padding:14px 16px;align-items:center;">
                    <div class="shimmer" style="width:50px;height:50px;border-radius:50%;flex-shrink:0;"></div>
                    <div style="flex:1;"><div class="shimmer" style="height:14px;width:60%;margin-bottom:8px;"></div><div class="shimmer" style="height:12px;width:65%;"></div></div>
                </div>
            </div>
        </div>
    </div>

    <!-- ══ CHAT PANEL ══ -->
    <div class="chat-panel" id="chat-panel">

        <!-- Empty state (no chat selected) -->
        <div class="chat-empty" id="chat-empty-state">
            <div class="chat-empty-icon">
                <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                </svg>
            </div>
            <h3>Your messages</h3>
            <p>Send private messages to people you follow. Start a conversation by tapping the pencil icon.</p>
        </div>

        <!-- Active chat -->
        <div id="chat-active" style="display:none;flex-direction:column;height:100%;">

            <div class="chat-header">
                <button class="chat-back-btn" id="chat-back-btn" onclick="closeChatPanel()">
                    <i data-feather="arrow-left" style="width:20px;height:20px;"></i>
                </button>
                <img id="chat-avatar" class="chat-avatar" src="" alt="" onclick="goToProfile()">
                <div class="chat-user-info">
                    <div class="chat-user-name" id="chat-user-name">—</div>
                    <div class="chat-user-status" id="chat-user-status">@—</div>
                </div>
                <button class="chat-action-btn" onclick="goToProfile()" title="View profile">
                    <i data-feather="user" style="width:18px;height:18px;"></i>
                </button>
            </div>

            <div class="messages-wrap" id="messages-wrap"></div>

            <!-- Typing indicator -->
            <div class="typing-indicator" id="typing-indicator">
                <img id="typing-avatar" class="typing-avatar" src="" alt="">
                <div class="typing-dots">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                </div>
            </div>

            <div class="input-area">
                <div class="input-wrap-msg">
                    <button class="attach-btn" onclick="document.getElementById('img-input').click()" title="Send image">
                        <i data-feather="image" style="width:20px;height:20px;"></i>
                    </button>
                    <textarea class="msg-input" id="msg-input" placeholder="Message…" rows="1"
                        oninput="autoGrow(this);updateSendBtn()"
                        onkeydown="handleMsgKey(event)"></textarea>
                </div>
                <input type="file" id="img-input" accept="image/*" style="display:none;" onchange="sendImage(event)">
                <button class="send-btn" id="send-btn" onclick="sendMessage()" disabled>
                    <i data-feather="send" style="width:18px;height:18px;"></i>
                </button>
            </div>

        </div>
    </div>

</div>

<!-- ══ NEW CHAT SHEET ══ -->
<div class="sheet-overlay" id="sheet-overlay" onclick="closeNewChat()"></div>
<div class="new-chat-sheet" id="new-chat-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-hdr">
        <span class="sheet-hdr-title">New Message</span>
        <button class="sheet-close-btn" onclick="closeNewChat()">
            <i data-feather="x" style="width:20px;height:20px;color:var(--text-primary);"></i>
        </button>
    </div>
    <div class="sheet-search-wrap">
        <div class="search-wrap">
            <i data-feather="search" style="width:16px;height:16px;"></i>
            <input type="text" id="user-search-input" placeholder="Search people…" oninput="filterUsers(this.value)">
        </div>
    </div>
    <div class="user-list" id="user-list"></div>
</div>

<!-- Image lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <button class="lightbox-close" onclick="closeLightbox()">
        <i data-feather="x" style="width:18px;height:18px;"></i>
    </button>
    <img id="lightbox-img" src="" alt="">
</div>

<!-- Bottom Nav (mobile) -->
<nav class="bottom-nav">
    <button class="nav-item" onclick="window.location.href='index.html'"><i data-feather="home"></i><span>Home</span></button>
    <button class="nav-item" onclick="window.location.href='search.html'"><i data-feather="search"></i><span>Search</span></button>
    <button class="fab" onclick="window.location.href='index.html'"><i data-feather="plus" style="width:28px;height:28px;"></i></button>
    <button class="nav-item" onclick="window.location.href='notifications.html'"><i data-feather="bell"></i><span>Alerts</span><span class="nav-badge" id="badge-notifications"></span></button>
    <button class="nav-item active"><i data-feather="mail"></i><span>Messages</span></button>
</nav>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import {
    getDatabase, ref, get, set, push, update, remove,
    onValue, onChildAdded, serverTimestamp, off
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const CLOUDINARY_CLOUD = 'dqkujefxj', CLOUDINARY_PRESET = 'banter_box';

const firebaseConfig = {
    apiKey:"AIzaSyBOyZ3As4GTuNvjemvPF_SpsC6m6vqtNhc",
    authDomain:"fire-b-a8878.firebaseapp.com",
    databaseURL:"https://fire-b-a8878.firebaseio.com",
    projectId:"fire-b-a8878",
    storageBucket:"fire-b-a8878.appspot.com",
    messagingSenderId:"658673187627",
    appId:"1:658673187627:web:6e4c29af661785f0afa36e"
};

const app=initializeApp(firebaseConfig), auth=getAuth(app), db=getDatabase(app);

// Apply theme
document.documentElement.setAttribute('data-theme', localStorage.getItem('vynix_theme')||'light');

let currentUser=null, currentUserData=null;
let activeChatId=null, activeOtherUid=null, activeOtherData=null;
let allUsers=[], allConversations=[];
let messagesListener=null;
let isFirstLoad=true;

// ── Bootstrap ──
onAuthStateChanged(auth, async user => {
    if (!user) { window.location.href='auth.html'; return; }
    currentUser=user;
    await loadCurrentUser();
    loadAllUsers();
    listenConversations();
    setupNotificationBadge();
    feather.replace();
});

async function loadCurrentUser() {
    const snap=await get(ref(db,`users/${currentUser.uid}`));
    if (snap.exists()) { currentUserData=snap.val(); }
    else { currentUserData={uid:currentUser.uid,username:currentUser.email?.split('@')[0]||'user',displayName:currentUser.displayName||'User',photoURL:`https://ui-avatars.com/api/?name=U&background=6366F1&color=fff`}; }
}

// ══════════════════════════════════════════════
// CONVERSATIONS LIST
// ══════════════════════════════════════════════
function listenConversations() {
    onValue(ref(db,`userChats/${currentUser.uid}`), async snap => {
        document.getElementById('conv-skeletons')?.remove();
        const list=document.getElementById('conv-list');

        if (!snap.exists()) {
            list.innerHTML=`<div class="conv-empty"><div class="conv-empty-icon"><i data-feather="message-circle" style="width:26px;height:26px;color:var(--text-muted);"></i></div><h3>No messages yet</h3><p>Start a conversation by tapping the pencil icon above.</p></div>`;
            feather.replace(); return;
        }

        const chats=[];
        const fetchPromises=[];
        snap.forEach(child => {
            const chatData={chatId:child.key,...child.val()};
            fetchPromises.push((async()=>{
                if (!chatData.otherUid) return;
                const us=await get(ref(db,`users/${chatData.otherUid}`));
                chatData.otherUser=us.val()||{};
                // Get last message
                const ms=await get(ref(db,`chats/${chatData.chatId}/messages`));
                if (ms.exists()) {
                    const msgs=Object.values(ms.val());
                    const last=msgs[msgs.length-1];
                    chatData.lastMsg=last.text||(last.imageUrl?'📷 Image':'');
                    chatData.lastMsgTime=last.timestamp||0;
                } else { chatData.lastMsg=''; chatData.lastMsgTime=0; }
                chats.push(chatData);
            })());
        });
        await Promise.all(fetchPromises);
        chats.sort((a,b)=>(b.lastMsgTime||0)-(a.lastMsgTime||0));
        allConversations=chats;
        renderConversationList(chats);
    });
}

function renderConversationList(chats) {
    const list=document.getElementById('conv-list');
    const search=document.getElementById('conv-search-input').value.trim().toLowerCase();
    const filtered=search ? chats.filter(c=>(c.otherUser?.displayName||'').toLowerCase().includes(search)||(c.otherUser?.username||'').toLowerCase().includes(search)) : chats;

    if (!filtered.length) {
        list.innerHTML=`<div class="conv-empty"><div class="conv-empty-icon"><i data-feather="search" style="width:26px;height:26px;color:var(--text-muted);"></i></div><h3>No results</h3><p>Try a different name or start a new conversation.</p></div>`;
        feather.replace(); return;
    }

    list.innerHTML=filtered.map((c,i)=>{
        const u=c.otherUser||{};
        const photo=u.photoURL||avatarUrl(u);
        const name=u.displayName||u.username||'User';
        const unread=c.unreadCount||0;
        const isActive=c.chatId===activeChatId;
        return `<div class="conv-item ${isActive?'active':''}" id="conv-${c.chatId}" style="animation-delay:${i*35}ms" onclick="openChat('${c.chatId}','${c.otherUid}')">
            <div class="conv-avatar-wrap">
                <img class="conv-avatar" src="${photo}" alt="">
            </div>
            <div class="conv-info">
                <div class="conv-name-row">
                    <span class="conv-name">${esc(name)}</span>
                    <span class="conv-time">${fmtTime(c.lastMsgTime)}</span>
                </div>
                <div class="conv-preview ${unread>0?'unread':''}">${esc(c.lastMsg||'Start a conversation')}</div>
            </div>
            <div class="unread-badge ${unread>0?'show':''}">${unread>9?'9+':unread}</div>
        </div>`;
    }).join('');
}

window.filterConversations = q => renderConversationList(allConversations);

// ══════════════════════════════════════════════
// OPEN / CLOSE CHAT
// ══════════════════════════════════════════════
window.openChat = async (chatId, otherUid) => {
    // Cleanup previous listener
    if (messagesListener && activeChatId) {
        off(ref(db,`chats/${activeChatId}/messages`));
    }

    activeChatId=chatId; activeOtherUid=otherUid; isFirstLoad=true;

    // Update active state on conv list
    document.querySelectorAll('.conv-item').forEach(el=>el.classList.remove('active'));
    document.getElementById(`conv-${chatId}`)?.classList.add('active');

    // Load other user data
    const us=await get(ref(db,`users/${otherUid}`));
    activeOtherData=us.val()||{};

    // Update chat header
    document.getElementById('chat-avatar').src=activeOtherData.photoURL||avatarUrl(activeOtherData);
    document.getElementById('chat-user-name').textContent=activeOtherData.displayName||activeOtherData.username||'User';
    document.getElementById('chat-user-status').textContent=`@${activeOtherData.username||'user'}`;
    document.getElementById('chat-user-status').className='chat-user-status';
    document.getElementById('typing-avatar').src=activeOtherData.photoURL||avatarUrl(activeOtherData);

    // Show chat
    document.getElementById('chat-empty-state').style.display='none';
    const chatActive=document.getElementById('chat-active');
    chatActive.style.display='flex';

    // Clear messages
    document.getElementById('messages-wrap').innerHTML='';
    document.getElementById('msg-input').value='';
    updateSendBtn();

    // Mobile: slide in
    document.getElementById('chat-panel').classList.add('open');

    // Mark messages as read
    await update(ref(db,`userChats/${currentUser.uid}/${chatId}`),{unreadCount:0});

    // Listen for messages
    listenMessages(chatId);

    feather.replace();
};

window.closeChatPanel = () => {
    document.getElementById('chat-panel').classList.remove('open');
    document.querySelectorAll('.conv-item').forEach(el=>el.classList.remove('active'));
    activeChatId=null; activeOtherUid=null; activeOtherData=null;
};

// ══════════════════════════════════════════════
// MESSAGES
// ══════════════════════════════════════════════
function listenMessages(chatId) {
    const messagesRef=ref(db,`chats/${chatId}/messages`);
    let prevSender=null, prevTime=0;

    onChildAdded(messagesRef, snap => {
        const msg={id:snap.key,...snap.val()};
        renderMessage(msg, prevSender, prevTime);
        prevSender=msg.senderUid;
        prevTime=msg.timestamp||0;

        // Auto-scroll if near bottom
        const wrap=document.getElementById('messages-wrap');
        const isNearBottom=wrap.scrollHeight-wrap.scrollTop-wrap.clientHeight < 120;
        if (isFirstLoad || isNearBottom) {
            setTimeout(()=>wrap.scrollTo({top:wrap.scrollHeight,behavior:isFirstLoad?'instant':'smooth'}),30);
        }
        if (isFirstLoad && wrap.children.length>0) isFirstLoad=false;

        // Mark read if from other user
        if (msg.senderUid!==currentUser.uid && activeChatId===chatId) {
            update(ref(db,`userChats/${currentUser.uid}/${chatId}`),{unreadCount:0});
        }
    });
}

function renderMessage(msg, prevSender, prevTime) {
    const wrap=document.getElementById('messages-wrap');
    const isOut=msg.senderUid===currentUser.uid;
    const sameUser=prevSender===msg.senderUid;
    const timeDiff=(msg.timestamp||0)-(prevTime||0);
    const sameGroup=sameUser && timeDiff<120000; // 2 min

    // Date separator
    if (!prevTime || !sameDay(prevTime, msg.timestamp||Date.now())) {
        const sep=document.createElement('div');
        sep.className='date-sep';
        sep.textContent=formatDate(msg.timestamp||Date.now());
        wrap.appendChild(sep);
    }

    const photo=isOut ? (currentUserData?.photoURL||avatarUrl(currentUserData)) : (activeOtherData?.photoURL||avatarUrl(activeOtherData));
    const div=document.createElement('div');
    div.className=`msg-row ${isOut?'out':'in'} ${!sameGroup?'gap-top':''}`;
    div.id=`msg-${msg.id}`;

    let bubbleContent='';
    if (msg.imageUrl) {
        bubbleContent=`<img class="msg-img" src="${msg.imageUrl}" alt="Image" onclick="openLightbox('${msg.imageUrl}')">`;
    } else {
        bubbleContent=`<div class="msg-bubble">${esc(msg.text||'').replace(/\n/g,'<br>')}</div>`;
    }

    const showAvatar=!isOut && !sameGroup;
    const avatarHtml=showAvatar ? `<img class="msg-sender-avatar" src="${photo}" alt="" onclick="goToProfile()">` : `<div style="width:28px;flex-shrink:0;"></div>`;

    div.innerHTML=`
        ${isOut?'':avatarHtml}
        <div class="msg-bubble-wrap">
            ${bubbleContent}
            <div class="msg-time">${fmtMsgTime(msg.timestamp)}</div>
        </div>
        ${isOut?'':''}
    `;

    wrap.appendChild(div);
}

// ── Send text message ──
window.sendMessage = async () => {
    const input=document.getElementById('msg-input');
    const text=input.value.trim();
    if (!text || !activeChatId) return;

    input.value=''; autoGrow(input); updateSendBtn();

    const msgRef=push(ref(db,`chats/${activeChatId}/messages`));
    const msgData={senderUid:currentUser.uid,text,timestamp:serverTimestamp()};
    await set(msgRef,msgData);

    // Update last message on both users' chat list
    const ts=Date.now();
    const updates={};
    updates[`userChats/${currentUser.uid}/${activeChatId}/lastMsg`]=text;
    updates[`userChats/${currentUser.uid}/${activeChatId}/lastMsgTime`]=ts;
    updates[`userChats/${activeOtherUid}/${activeChatId}/lastMsg`]=text;
    updates[`userChats/${activeOtherUid}/${activeChatId}/lastMsgTime`]=ts;
    updates[`userChats/${activeOtherUid}/${activeChatId}/unreadCount`]=(await get(ref(db,`userChats/${activeOtherUid}/${activeChatId}/unreadCount`))).val()||0;
    await update(ref(db),updates);

    // Increment unread for other user
    const unreadRef=ref(db,`userChats/${activeOtherUid}/${activeChatId}/unreadCount`);
    const us=await get(unreadRef); await set(unreadRef,(us.val()||0)+1);
};

// ── Send image ──
window.sendImage = async (e) => {
    const file=e.target.files[0]; if(!file) return;
    e.target.value='';
    showToast('Uploading image…');
    try {
        const fd=new FormData(); fd.append('file',file); fd.append('upload_preset',CLOUDINARY_PRESET); fd.append('folder','messages');
        const r=await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/upload`,{method:'POST',body:fd});
        const data=await r.json();
        if (!data.secure_url) throw new Error('Upload failed');

        const msgRef=push(ref(db,`chats/${activeChatId}/messages`));
        await set(msgRef,{senderUid:currentUser.uid,imageUrl:data.secure_url,timestamp:serverTimestamp()});

        const ts=Date.now();
        const updates={};
        updates[`userChats/${currentUser.uid}/${activeChatId}/lastMsg`]='📷 Image';
        updates[`userChats/${currentUser.uid}/${activeChatId}/lastMsgTime`]=ts;
        updates[`userChats/${activeOtherUid}/${activeChatId}/lastMsg`]='📷 Image';
        updates[`userChats/${activeOtherUid}/${activeChatId}/lastMsgTime`]=ts;
        await update(ref(db),updates);
        const unreadRef=ref(db,`userChats/${activeOtherUid}/${activeChatId}/unreadCount`);
        const us=await get(unreadRef); await set(unreadRef,(us.val()||0)+1);
        showToast('Image sent!');
    } catch { showToast('Upload failed'); }
};

// ── Key handler ──
window.handleMsgKey = (e) => {
    if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
};

// ── Auto-grow textarea ──
window.autoGrow = (el) => {
    el.style.height='auto';
    el.style.height=Math.min(el.scrollHeight,120)+'px';
};

window.updateSendBtn = () => {
    const val=document.getElementById('msg-input').value.trim();
    document.getElementById('send-btn').disabled=!val;
};

// ══════════════════════════════════════════════
// NEW CHAT SHEET
// ══════════════════════════════════════════════
async function loadAllUsers() {
    const snap=await get(ref(db,'users'));
    allUsers=[];
    if (snap.exists()) snap.forEach(c=>{if(c.key!==currentUser.uid)allUsers.push({uid:c.key,...c.val()});});
    renderUserList(allUsers);
}

function renderUserList(users) {
    const container=document.getElementById('user-list');
    if (!users.length) { container.innerHTML=`<div style="padding:24px;text-align:center;color:var(--text-muted);font-size:14px;">No users found</div>`; return; }
    container.innerHTML=users.map(u=>`
        <div class="user-item" onclick="startChat('${u.uid}')">
            <img src="${u.photoURL||avatarUrl(u)}" alt="">
            <div class="user-item-info">
                <div class="user-item-name">${esc(u.displayName||u.username||'User')}</div>
                <div class="user-item-handle">@${esc(u.username||'')}</div>
            </div>
        </div>
    `).join('');
}

window.filterUsers = q => {
    const ql=q.toLowerCase();
    const filtered=ql ? allUsers.filter(u=>(u.displayName||'').toLowerCase().includes(ql)||(u.username||'').toLowerCase().includes(ql)) : allUsers;
    renderUserList(filtered);
};

window.startChat = async (otherUid) => {
    closeNewChat();
    const ids=[currentUser.uid,otherUid].sort();
    const chatId=ids.join('_');

    // Create chat entries if they don't exist
    const updates={};
    updates[`userChats/${currentUser.uid}/${chatId}/otherUid`]=otherUid;
    updates[`userChats/${currentUser.uid}/${chatId}/unreadCount`]=0;
    updates[`userChats/${otherUid}/${chatId}/otherUid`]=currentUser.uid;
    const otherSnap=await get(ref(db,`userChats/${otherUid}/${chatId}/unreadCount`));
    updates[`userChats/${otherUid}/${chatId}/unreadCount`]=otherSnap.val()||0;
    await update(ref(db),updates);

    openChat(chatId, otherUid);
};

window.openNewChat = () => { document.getElementById('sheet-overlay').classList.add('active'); document.getElementById('user-search-input').value=''; renderUserList(allUsers); feather.replace(); };
window.closeNewChat = () => document.getElementById('sheet-overlay').classList.remove('active');

// ── Notification badge ──
function setupNotificationBadge() {
    onValue(ref(db,`notifications/${currentUser.uid}`), snap=>{
        let c=0; if(snap.exists())snap.forEach(ch=>{if(!ch.val().read)c++;});
        updateBadge('badge-notifications',c);
    });
}
function updateBadge(id,count){const b=document.getElementById(id);if(!b)return;if(count>0){b.textContent=count>99?'99+':count;b.classList.add('show');}else b.classList.remove('show');}

// ── Profile navigation ──
window.goToProfile = () => { if(activeOtherUid) window.location.href=`profile.html?id=${activeOtherUid}`; };

// ── Lightbox ──
window.openLightbox = src => { document.getElementById('lightbox-img').src=src; document.getElementById('lightbox').classList.add('active'); };
window.closeLightbox = () => document.getElementById('lightbox').classList.remove('active');

// ── Utils ──
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
function avatarUrl(u){return`https://ui-avatars.com/api/?name=${encodeURIComponent((u&&(u.username||u.displayName))||'U')}&background=random`;}
function fmtTime(ts){
    if(!ts)return'';const now=Date.now(),diff=now-ts;
    if(diff<60000)return'now';if(diff<3600000)return Math.floor(diff/60000)+'m';
    if(diff<86400000)return Math.floor(diff/3600000)+'h';
    if(diff<604800000)return Math.floor(diff/86400000)+'d';
    return new Date(ts).toLocaleDateString(undefined,{month:'short',day:'numeric'});
}
function fmtMsgTime(ts){
    if(!ts)return'';
    return new Date(ts).toLocaleTimeString(undefined,{hour:'2-digit',minute:'2-digit',hour12:true});
}
function formatDate(ts){
    const d=new Date(ts),now=new Date();
    if(d.toDateString()===now.toDateString())return'Today';
    const y=new Date(now);y.setDate(y.getDate()-1);
    if(d.toDateString()===y.toDateString())return'Yesterday';
    return d.toLocaleDateString(undefined,{weekday:'long',month:'long',day:'numeric'});
}
function sameDay(a,b){const da=new Date(a),db=new Date(b);return da.getFullYear()===db.getFullYear()&&da.getMonth()===db.getMonth()&&da.getDate()===db.getDate();}
window.showToast=msg=>{const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);};

feather.replace();
</script>
