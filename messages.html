<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vynix · Messages</title>
    <script src="https://unpkg.com/feather-icons"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root,[data-theme="light"]{--primary:#6366F1;--primary-dark:#4F46E5;--primary-rgb:99,102,241;--background:#F8FAFC;--surface:#FFFFFF;--surface2:#F1F5F9;--surface3:#E2E8F0;--border:#E2E8F0;--text-primary:#0F172A;--text-secondary:#64748B;--text-muted:#94A3B8;--like:#F43F5E;--verified:#1D9BF0;--online:#22C55E;--bubble-out:var(--primary);--bubble-out-text:#FFFFFF;--bubble-in:var(--surface2);--bubble-in-text:var(--text-primary);--shadow:0 1px 4px rgba(0,0,0,0.06);--shadow-lg:0 8px 32px rgba(0,0,0,0.10);}
        [data-theme="dark"]{--primary:#818CF8;--primary-dark:#6366F1;--primary-rgb:129,140,248;--background:#0F172A;--surface:#1E293B;--surface2:#334155;--surface3:#475569;--border:#334155;--text-primary:#F1F5F9;--text-secondary:#94A3B8;--text-muted:#64748B;--like:#FB7185;--verified:#38BDF8;--online:#4ADE80;--bubble-out:var(--primary);--bubble-out-text:#FFFFFF;--bubble-in:#334155;--bubble-in-text:#F1F5F9;--shadow:0 1px 4px rgba(0,0,0,0.3);--shadow-lg:0 8px 32px rgba(0,0,0,0.5);}
        [data-theme="midnight"]{--primary:#C084FC;--primary-dark:#A855F7;--primary-rgb:192,132,252;--background:#09090B;--surface:#18181B;--surface2:#27272A;--surface3:#3F3F46;--border:#3F3F46;--text-primary:#FAFAFA;--text-secondary:#A1A1AA;--text-muted:#71717A;--like:#F472B6;--verified:#67E8F9;--online:#4ADE80;--bubble-out:var(--primary);--bubble-out-text:#FFFFFF;--bubble-in:#27272A;--bubble-in-text:#FAFAFA;--shadow:0 1px 4px rgba(0,0,0,0.4);--shadow-lg:0 8px 32px rgba(0,0,0,0.7);}
        [data-theme="ocean"]{--primary:#06B6D4;--primary-dark:#0891B2;--primary-rgb:6,182,212;--background:#F0F9FF;--surface:#FFFFFF;--surface2:#E0F2FE;--surface3:#BAE6FD;--border:#BAE6FD;--text-primary:#0C4A6E;--text-secondary:#0369A1;--text-muted:#7DD3FC;--like:#F43F5E;--verified:#06B6D4;--online:#22C55E;--bubble-out:var(--primary);--bubble-out-text:#FFFFFF;--bubble-in:#E0F2FE;--bubble-in-text:#0C4A6E;--shadow:0 1px 4px rgba(6,182,212,0.08);--shadow-lg:0 8px 32px rgba(6,182,212,0.15);}
        [data-theme="rose"]{--primary:#E11D48;--primary-dark:#BE123C;--primary-rgb:225,29,72;--background:#FFF1F2;--surface:#FFFFFF;--surface2:#FFE4E6;--surface3:#FECDD3;--border:#FECDD3;--text-primary:#881337;--text-secondary:#9F1239;--text-muted:#FDA4AF;--like:#E11D48;--verified:#3B82F6;--online:#22C55E;--bubble-out:var(--primary);--bubble-out-text:#FFFFFF;--bubble-in:#FFE4E6;--bubble-in-text:#881337;--shadow:0 1px 4px rgba(225,29,72,0.07);--shadow-lg:0 8px 32px rgba(225,29,72,0.14);}
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
        body{font-family:'Inter',sans-serif;background:var(--background);color:var(--text-primary);-webkit-font-smoothing:antialiased;overflow:hidden;height:100vh;transition:background 0.3s,color 0.3s;}
        @keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
        @keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}
        @keyframes spin{to{transform:rotate(360deg);}}
        @keyframes typingPulse{0%,60%,100%{transform:translateY(0);opacity:0.4;}30%{transform:translateY(-4px);opacity:1;}}
        @keyframes msgPop{0%{transform:scale(0.88);opacity:0;}100%{transform:scale(1);opacity:1;}}
        @keyframes onlinePulse{0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,0.4);}50%{box-shadow:0 0 0 4px rgba(34,197,94,0);}}
        .shimmer{background:linear-gradient(90deg,var(--surface2) 25%,var(--border) 50%,var(--surface2) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px;}
        .app{display:flex;height:100vh;max-width:960px;margin:0 auto;border-left:1px solid var(--border);border-right:1px solid var(--border);overflow:hidden;}
        @media(max-width:1024px){.app{max-width:100%;border:none;}}
        .sidebar{width:340px;flex-shrink:0;display:flex;flex-direction:column;border-right:1px solid var(--border);background:var(--surface);transition:transform 0.3s cubic-bezier(0.4,0,0.2,1),background 0.3s;}
        @media(max-width:680px){.sidebar{position:fixed;inset:0;width:100%;z-index:10;transform:translateX(0);}.sidebar.hidden{transform:translateX(-100%);}}
        .sidebar-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border);background:rgba(255,255,255,0.92);backdrop-filter:blur(20px);position:sticky;top:0;z-index:5;flex-shrink:0;transition:background 0.3s;}
        [data-theme="dark"] .sidebar-header{background:rgba(30,41,59,0.92);}[data-theme="midnight"] .sidebar-header{background:rgba(24,24,27,0.95);}
        .sidebar-title{font-size:20px;font-weight:800;color:var(--text-primary);}
        .compose-btn{width:36px;height:36px;border-radius:50%;border:none;background:var(--surface2);color:var(--primary);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;}
        .compose-btn:hover{background:rgba(var(--primary-rgb),0.12);transform:scale(1.05);}
        .search-wrap{padding:10px 16px 8px;flex-shrink:0;}
        .search-inner{display:flex;align-items:center;gap:8px;background:var(--surface2);border-radius:12px;padding:9px 14px;border:1.5px solid transparent;transition:border-color 0.2s,box-shadow 0.2s;}
        .search-inner:focus-within{border-color:var(--primary);box-shadow:0 0 0 3px rgba(var(--primary-rgb),0.1);}
        .search-inner svg{color:var(--text-muted);flex-shrink:0;transition:color 0.2s;}
        .search-inner:focus-within svg{color:var(--primary);}
        .search-input{flex:1;border:none;outline:none;background:transparent;font-size:14px;font-family:inherit;color:var(--text-primary);}
        .search-input::placeholder{color:var(--text-muted);}
        .conv-list{overflow-y:auto;flex:1;overscroll-behavior:contain;}.conv-list::-webkit-scrollbar{width:0;}
        .conv-item{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;transition:background 0.15s;border-bottom:1px solid var(--border);position:relative;animation:fadeIn 0.3s ease-out both;}
        .conv-item:hover{background:var(--surface2);}.conv-item.active{background:rgba(var(--primary-rgb),0.06);}.conv-item.active .conv-name{color:var(--primary);}
        .conv-avatar-wrap{position:relative;flex-shrink:0;}
        .conv-avatar{width:50px;height:50px;border-radius:50%;object-fit:cover;border:2px solid var(--border);transition:transform 0.2s;}
        .conv-item:hover .conv-avatar{transform:scale(1.04);}
        .conv-body{flex:1;min-width:0;}
        .conv-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;}
        .conv-name{font-size:15px;font-weight:700;color:var(--text-primary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
        .conv-time{font-size:11px;color:var(--text-muted);flex-shrink:0;margin-left:8px;}
        .conv-preview{font-size:13px;color:var(--text-secondary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
        .conv-preview.unread{color:var(--text-primary);font-weight:600;}
        .unread-badge{width:20px;height:20px;border-radius:50%;background:var(--primary);color:white;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
        .empty-convs{padding:48px 24px;text-align:center;color:var(--text-muted);}
        .empty-convs-icon{width:64px;height:64px;border-radius:24px;background:var(--surface2);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;}
        .chat-pane{flex:1;display:flex;flex-direction:column;background:var(--background);min-width:0;transition:background 0.3s;}
        @media(max-width:680px){
            .chat-pane{position:fixed;inset:0;z-index:200;transform:translateX(100%);transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);}
            .chat-pane.open{transform:translateX(0);}
            .sidebar.hidden{display:none;}
            /* When chat is open the panel takes full height so input sits above the device home indicator */
            .chat-pane.open .input-area{padding-bottom:calc(12px + env(safe-area-inset-bottom));}
        }
        .chat-header{display:flex;align-items:center;gap:12px;padding:10px 16px;border-bottom:1px solid var(--border);flex-shrink:0;background:rgba(255,255,255,0.92);backdrop-filter:blur(20px);transition:background 0.3s;}
        [data-theme="dark"] .chat-header{background:rgba(30,41,59,0.92);}[data-theme="midnight"] .chat-header{background:rgba(24,24,27,0.95);}
        .chat-back-btn{background:none;border:none;color:var(--text-primary);cursor:pointer;padding:7px;border-radius:50%;display:none;align-items:center;justify-content:center;transition:background 0.15s;flex-shrink:0;}
        .chat-back-btn:hover{background:var(--surface2);}
        @media(max-width:680px){.chat-back-btn{display:flex;}}
        .chat-header-avatar-wrap{position:relative;flex-shrink:0;cursor:pointer;}
        .chat-header-avatar{width:40px;height:40px;border-radius:50%;object-fit:cover;border:2px solid var(--border);}
        .chat-header-online{position:absolute;bottom:0;right:0;width:11px;height:11px;border-radius:50%;background:var(--online);border:2px solid var(--surface);}
        .chat-header-info{flex:1;min-width:0;cursor:pointer;}
        .chat-header-name{font-size:16px;font-weight:700;color:var(--text-primary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
        .chat-header-status{font-size:12px;color:var(--text-muted);}
        .chat-header-status.online{color:var(--online);font-weight:600;}
        .chat-header-actions{display:flex;gap:4px;flex-shrink:0;}
        .chat-action-btn{width:36px;height:36px;border-radius:50%;background:none;border:none;color:var(--text-secondary);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;}
        .chat-action-btn:hover{background:var(--surface2);color:var(--primary);}
        .messages-area{flex:1;overflow-y:auto;padding:16px 16px 8px;display:flex;flex-direction:column;gap:4px;overscroll-behavior:contain;scroll-behavior:smooth;}
        .messages-area::-webkit-scrollbar{width:4px;}.messages-area::-webkit-scrollbar-track{background:transparent;}.messages-area::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
        .date-sep{display:flex;align-items:center;gap:10px;color:var(--text-muted);font-size:12px;font-weight:600;margin:12px 0 8px;}
        .date-sep::before,.date-sep::after{content:'';flex:1;height:1px;background:var(--border);}
        .msg-row{display:flex;align-items:flex-end;gap:8px;animation:msgPop 0.2s cubic-bezier(0.34,1.3,0.64,1);}
        .msg-row.out{flex-direction:row-reverse;}
        .msg-avatar{width:28px;height:28px;border-radius:50%;object-fit:cover;flex-shrink:0;margin-bottom:2px;}
        .msg-avatar.hidden{opacity:0;pointer-events:none;}
        .msg-content{max-width:72%;display:flex;flex-direction:column;gap:2px;}
        .msg-row.out .msg-content{align-items:flex-end;}.msg-row.in .msg-content{align-items:flex-start;}
        .bubble{padding:10px 14px;border-radius:18px;font-size:15px;line-height:1.5;word-break:break-word;white-space:pre-wrap;}
        .msg-row.out .bubble{background:var(--bubble-out);color:var(--bubble-out-text);border-bottom-right-radius:4px;}
        .msg-row.in .bubble{background:var(--bubble-in);color:var(--bubble-in-text);border-bottom-left-radius:4px;}
        .bubble-img{max-width:240px;border-radius:14px;display:block;cursor:zoom-in;transition:opacity 0.2s;}.bubble-img:hover{opacity:0.92;}
        .msg-meta{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text-muted);padding:0 2px;}
        .read-tick{color:var(--primary);}
        .typing-indicator{display:flex;align-items:center;gap:8px;padding:4px 0;animation:fadeIn 0.3s ease-out;}
        .typing-dots{background:var(--bubble-in);padding:10px 14px;border-radius:18px;border-bottom-left-radius:4px;display:flex;gap:4px;align-items:center;}
        .typing-dot{width:7px;height:7px;border-radius:50%;background:var(--text-muted);}
        .typing-dot:nth-child(1){animation:typingPulse 1.2s infinite 0s;}.typing-dot:nth-child(2){animation:typingPulse 1.2s infinite 0.2s;}.typing-dot:nth-child(3){animation:typingPulse 1.2s infinite 0.4s;}
        .input-area{padding:10px 12px calc(10px + env(safe-area-inset-bottom));border-top:1px solid var(--border);background:var(--surface);flex-shrink:0;transition:background 0.3s;}
        .input-row{display:flex;align-items:flex-end;gap:8px;}
        .msg-input-wrap{flex:1;background:var(--surface2);border-radius:22px;border:1.5px solid var(--border);display:flex;align-items:flex-end;padding:8px 14px;gap:8px;transition:border-color 0.2s,box-shadow 0.2s;min-height:44px;}
        .msg-input-wrap:focus-within{border-color:var(--primary);box-shadow:0 0 0 3px rgba(var(--primary-rgb),0.1);}
        .msg-input{flex:1;border:none;outline:none;background:transparent;font-size:15px;font-family:inherit;color:var(--text-primary);resize:none;max-height:120px;min-height:22px;line-height:1.45;padding:0;overflow-y:auto;}
        .msg-input::placeholder{color:var(--text-muted);}.msg-input::-webkit-scrollbar{width:0;}
        .attach-btn{background:none;border:none;color:var(--text-muted);cursor:pointer;padding:2px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:color 0.2s;flex-shrink:0;}
        .attach-btn:hover{color:var(--primary);}.attach-btn svg{width:20px;height:20px;}
        .send-btn{width:44px;height:44px;border-radius:50%;border:none;background:var(--primary);color:white;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s;box-shadow:0 2px 10px rgba(var(--primary-rgb),0.35);}
        .send-btn:hover{transform:scale(1.07);box-shadow:0 4px 16px rgba(var(--primary-rgb),0.45);}.send-btn:active{transform:scale(0.95);}.send-btn:disabled{opacity:0.45;cursor:not-allowed;transform:none;box-shadow:none;}
        #img-input{display:none;}
        .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.55);backdrop-filter:blur(6px);z-index:200;opacity:0;pointer-events:none;transition:opacity 0.25s;}
        .modal-overlay.active{opacity:1;pointer-events:auto;}
        .new-chat-sheet{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-radius:24px 24px 0 0;z-index:201;max-height:85vh;transform:translateY(100%);transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);display:flex;flex-direction:column;overflow:hidden;}
        .modal-overlay.active ~ .new-chat-sheet{transform:translateY(0);}
        .sheet-handle{width:36px;height:4px;border-radius:2px;background:var(--border);margin:12px auto 0;}
        .sheet-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 20px 10px;border-bottom:1px solid var(--border);flex-shrink:0;}
        .sheet-hdr-title{font-size:17px;font-weight:800;color:var(--text-primary);}
        .sheet-close-btn{background:none;border:none;color:var(--text-muted);cursor:pointer;padding:4px;border-radius:50%;display:flex;align-items:center;justify-content:center;}
        .sheet-close-btn:hover{color:var(--text-primary);}
        .sheet-search{padding:10px 16px;border-bottom:1px solid var(--border);flex-shrink:0;}
        .sheet-search-inner{display:flex;align-items:center;gap:8px;background:var(--surface2);border-radius:12px;padding:9px 14px;}
        .sheet-search-inner svg{color:var(--text-muted);flex-shrink:0;}
        .sheet-search-input{flex:1;border:none;outline:none;background:transparent;font-size:14px;font-family:inherit;color:var(--text-primary);}
        .sheet-search-input::placeholder{color:var(--text-muted);}
        .user-results{overflow-y:auto;flex:1;padding-bottom:calc(20px + env(safe-area-inset-bottom));}
        .user-result-row{display:flex;align-items:center;gap:12px;padding:12px 20px;cursor:pointer;transition:background 0.15s;}
        .user-result-row:hover{background:var(--surface2);}
        .user-result-row img{width:46px;height:46px;border-radius:50%;object-fit:cover;flex-shrink:0;}
        .user-result-info{flex:1;min-width:0;}
        .user-result-name{font-weight:700;font-size:15px;color:var(--text-primary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
        .user-result-handle{font-size:13px;color:var(--text-muted);}
        .chat-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;text-align:center;}
        .chat-empty-icon{width:80px;height:80px;border-radius:28px;background:linear-gradient(135deg,rgba(var(--primary-rgb),0.15),rgba(var(--primary-rgb),0.05));display:flex;align-items:center;justify-content:center;margin:0 auto 20px;}
        .chat-empty-title{font-size:20px;font-weight:800;margin-bottom:8px;color:var(--text-primary);}
        .chat-empty-sub{font-size:14px;color:var(--text-muted);line-height:1.6;max-width:260px;}
        .chat-empty-btn{margin-top:20px;padding:10px 24px;border-radius:9999px;border:none;background:var(--primary);color:white;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(var(--primary-rgb),0.3);transition:all 0.2s;}
        .chat-empty-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(var(--primary-rgb),0.4);}
        .lightbox{position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:400;display:none;align-items:center;justify-content:center;}
        .lightbox.active{display:flex;}.lightbox img{max-width:95vw;max-height:90vh;object-fit:contain;border-radius:8px;}
        .lightbox-close{position:absolute;top:16px;right:16px;background:rgba(255,255,255,0.15);border:none;color:white;width:40px;height:40px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px);}
        .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,0.95);backdrop-filter:blur(20px);border-top:1px solid var(--border);padding:8px 0 calc(8px + env(safe-area-inset-bottom));display:flex;justify-content:space-around;z-index:5;transition:background 0.3s;}
        [data-theme="dark"] .bottom-nav{background:rgba(30,41,59,0.97);}[data-theme="midnight"] .bottom-nav{background:rgba(24,24,27,0.97);}
        .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px;color:var(--text-secondary);background:none;border:none;font-family:inherit;cursor:pointer;transition:color 0.2s;position:relative;}
        .nav-item.active{color:var(--primary);}.nav-item span{font-size:11px;font-weight:600;}
        .nav-badge{position:absolute;top:4px;right:calc(50% - 16px);background:var(--like);color:white;font-size:10px;font-weight:800;min-width:18px;height:18px;border-radius:9px;display:none;align-items:center;justify-content:center;padding:0 5px;border:2px solid var(--surface);}
        .nav-badge.show{display:flex;}
        .fab{width:56px;height:56px;background:var(--primary);color:white;border:none;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(var(--primary-rgb),0.4);transform:translateY(-20px);cursor:pointer;transition:transform 0.2s;}
        .fab:active{transform:translateY(-20px) scale(0.9);}
        @media(max-width:680px){.app{height:calc(100dvh - 73px - env(safe-area-inset-bottom));}.sidebar{height:calc(100dvh - 73px - env(safe-area-inset-bottom));}.chat-pane{height:calc(100dvh - 73px - env(safe-area-inset-bottom));}}
        @media(min-width:681px){.bottom-nav{display:none;}.app{height:100dvh;}}
        .toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--text-primary);color:var(--surface);padding:12px 24px;border-radius:9999px;font-weight:500;opacity:0;transition:all 0.3s;z-index:9999;pointer-events:none;white-space:nowrap;}
        .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
    </style>
</head>
<body>
<div class="app">
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span class="sidebar-title">Messages</span>
            <button class="compose-btn" onclick="openNewChat()" title="New message"><i data-feather="edit-2" style="width:16px;height:16px;"></i></button>
        </div>
        <div class="search-wrap">
            <div class="search-inner">
                <i data-feather="search" style="width:15px;height:15px;"></i>
                <input type="text" class="search-input" placeholder="Search conversations…" id="conv-search" oninput="filterConvs(this.value)">
            </div>
        </div>
        <div class="conv-list" id="conv-list">
            <div style="padding:12px 16px;border-bottom:1px solid var(--border);display:flex;gap:12px;align-items:center;"><div class="shimmer" style="width:50px;height:50px;border-radius:50%;flex-shrink:0;"></div><div style="flex:1;"><div class="shimmer" style="height:14px;width:60%;margin-bottom:8px;"></div><div class="shimmer" style="height:12px;width:80%;"></div></div></div>
            <div style="padding:12px 16px;border-bottom:1px solid var(--border);display:flex;gap:12px;align-items:center;"><div class="shimmer" style="width:50px;height:50px;border-radius:50%;flex-shrink:0;"></div><div style="flex:1;"><div class="shimmer" style="height:14px;width:50%;margin-bottom:8px;"></div><div class="shimmer" style="height:12px;width:70%;"></div></div></div>
            <div style="padding:12px 16px;border-bottom:1px solid var(--border);display:flex;gap:12px;align-items:center;"><div class="shimmer" style="width:50px;height:50px;border-radius:50%;flex-shrink:0;"></div><div style="flex:1;"><div class="shimmer" style="height:14px;width:65%;margin-bottom:8px;"></div><div class="shimmer" style="height:12px;width:55%;"></div></div></div>
        </div>
    </div>
    <div class="chat-pane" id="chat-pane">
        <div class="chat-empty" id="chat-empty">
            <div class="chat-empty-icon"><svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div>
            <div class="chat-empty-title">Your messages</div>
            <div class="chat-empty-sub">Send a message to start a conversation. Your chats are private and only visible to you and the other person.</div>
            <button class="chat-empty-btn" onclick="openNewChat()">Start a conversation</button>
        </div>
        <div id="chat-view" style="display:none;flex:1;flex-direction:column;height:100%;">
            <div class="chat-header">
                <button class="chat-back-btn" id="back-btn" onclick="closeChat()"><i data-feather="arrow-left" style="width:20px;height:20px;"></i></button>
                <div class="chat-header-avatar-wrap" onclick="goToOtherProfile()">
                    <img id="chat-avatar" class="chat-header-avatar" src="" alt="">
                    <div class="chat-header-online" id="chat-online-dot" style="display:none;"></div>
                </div>
                <div class="chat-header-info" onclick="goToOtherProfile()">
                    <div class="chat-header-name" id="chat-name">—</div>
                    <div class="chat-header-status" id="chat-status">—</div>
                </div>
                <div class="chat-header-actions">
                    <button class="chat-action-btn" onclick="goToOtherProfile()" title="View profile"><i data-feather="user" style="width:18px;height:18px;"></i></button>
                </div>
            </div>
            <div class="messages-area" id="messages-area"></div>
            <div id="typing-slot" style="padding:0 16px 4px;display:none;">
                <div class="typing-indicator">
                    <img id="typing-avatar" src="" style="width:28px;height:28px;border-radius:50%;object-fit:cover;" alt="">
                    <div class="typing-dots"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>
                </div>
            </div>
            <div class="input-area">
                <div class="input-row">
                    <div class="msg-input-wrap">
                        <button class="attach-btn" onclick="document.getElementById('img-input').click()" title="Attach image"><i data-feather="image" style="width:20px;height:20px;"></i></button>
                        <textarea class="msg-input" id="msg-input" placeholder="Message…" rows="1" oninput="onMsgInput()" onkeydown="onMsgKeydown(event)"></textarea>
                        <input type="file" id="img-input" accept="image/*" onchange="handleImgAttach(event)">
                    </div>
                    <button class="send-btn" id="send-btn" onclick="sendMessage()" disabled><i data-feather="send" style="width:18px;height:18px;"></i></button>
                </div>
            </div>
        </div>
    </div>
</div>
<div class="modal-overlay" id="modal-overlay" onclick="closeNewChat(event)"></div>
<div class="new-chat-sheet" id="new-chat-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-hdr">
        <span class="sheet-hdr-title">New Message</span>
        <button class="sheet-close-btn" onclick="closeNewChat()"><i data-feather="x" style="width:20px;height:20px;"></i></button>
    </div>
    <div class="sheet-search">
        <div class="sheet-search-inner">
            <i data-feather="search" style="width:15px;height:15px;"></i>
            <input type="text" class="sheet-search-input" placeholder="Search people…" id="user-search" oninput="searchUsers(this.value)">
        </div>
    </div>
    <div class="user-results" id="user-results"><div style="padding:32px;text-align:center;color:var(--text-muted);font-size:14px;">Search for someone to start a conversation.</div></div>
</div>
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <button class="lightbox-close" onclick="closeLightbox()"><i data-feather="x" style="width:18px;height:18px;"></i></button>
    <img id="lightbox-img" src="" alt="">
</div>
<nav class="bottom-nav">
    <button class="nav-item" onclick="window.location.href='index.html'"><i data-feather="home"></i><span>Home</span></button>
    <button class="nav-item" onclick="window.location.href='search.html'"><i data-feather="search"></i><span>Search</span></button>
    <button class="fab" onclick="window.location.href='index.html'"><i data-feather="plus" style="width:28px;height:28px;"></i></button>
    <button class="nav-item" onclick="window.location.href='notifications.html'"><i data-feather="bell"></i><span>Alerts</span><span class="nav-badge" id="badge-notifications"></span></button>
    <button class="nav-item active"><i data-feather="mail"></i><span>Messages</span></button>
</nav>
<div class="toast" id="toast"></div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getDatabase, ref, get, set, push, update, remove, onValue, onChildAdded, serverTimestamp, off }
    from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const CLOUDINARY_CLOUD='dqkujefxj', CLOUDINARY_PRESET='banter_box';
const firebaseConfig={apiKey:"AIzaSyBOyZ3As4GTuNvjemvPF_SpsC6m6vqtNhc",authDomain:"fire-b-a8878.firebaseapp.com",databaseURL:"https://fire-b-a8878.firebaseio.com",projectId:"fire-b-a8878",storageBucket:"fire-b-a8878.appspot.com",messagingSenderId:"658673187627",appId:"1:658673187627:web:6e4c29af661785f0afa36e"};
const app=initializeApp(firebaseConfig), auth=getAuth(app), db=getDatabase(app);

document.documentElement.setAttribute('data-theme', localStorage.getItem('vynix_theme')||'light');

let currentUser=null, currentUserData=null;
let activeChatId=null, otherUid=null, otherData=null;
let allUsersCache=null, allConvs=[], typingTimer=null;
let msgListeners={}, loadedMsgIds=new Set();

onAuthStateChanged(auth, async user => {
    if (!user){window.location.href='auth.html';return;}
    currentUser=user;
    await loadCurrentUser();
    listenConversations();
    listenNotifBadge();
    feather.replace();
});

async function loadCurrentUser(){
    const snap=await get(ref(db,`users/${currentUser.uid}`));
    currentUserData=snap.val()||{uid:currentUser.uid,displayName:'User',photoURL:avatarUrl({uid:currentUser.uid}),username:'user'};
}

function listenConversations(){
    onValue(ref(db,`userChats/${currentUser.uid}`), async snap=>{
        if(!snap.exists()){
            document.getElementById('conv-list').innerHTML=`<div class="empty-convs"><div class="empty-convs-icon"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="1.8"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div><div style="font-size:16px;font-weight:700;color:var(--text-secondary);margin-bottom:6px;">No conversations yet</div><div style="font-size:13px;">Tap the compose button to start chatting.</div></div>`;
            allConvs=[];return;
        }
        const entries=[], promises=[];
        snap.forEach(child=>{
            const data=child.val();
            promises.push((async()=>{
                const uid=data.otherUid; if(!uid)return;
                const uSnap=await get(ref(db,`users/${uid}`));
                const uData=uSnap.val()||{displayName:'User',photoURL:avatarUrl({uid}),username:'user'};
                let lastMsg='',lastTs=data.lastTs||0;
                try{const lSnap=await get(ref(db,`messages/${[currentUser.uid,uid].sort().join('_')}/lastMessage`));if(lSnap.exists()){const lm=lSnap.val();lastMsg=lm.imageUrl?'📷 Photo':(lm.text||'');lastTs=lm.timestamp||lastTs;}}catch{}
                entries.push({chatId:[currentUser.uid,uid].sort().join('_'),otherUid:uid,otherData:uData,lastMsg,lastTs,unread:data.unreadCount||0});
            })());
        });
        await Promise.all(promises);
        entries.sort((a,b)=>(b.lastTs||0)-(a.lastTs||0));
        allConvs=entries; renderConvList(entries);
    });
}

function renderConvList(convs){
    const list=document.getElementById('conv-list');
    if(!convs.length){list.innerHTML=`<div class="empty-convs"><div class="empty-convs-icon"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="1.8"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div><div style="font-size:16px;font-weight:700;color:var(--text-secondary);margin-bottom:6px;">No conversations</div></div>`;return;}
    list.innerHTML=convs.map((c,i)=>`<div class="conv-item ${c.chatId===activeChatId?'active':''}" id="conv-${c.chatId}" onclick="openChat('${c.chatId}','${c.otherUid}')" style="animation-delay:${i*40}ms;"><div class="conv-avatar-wrap"><img class="conv-avatar" src="${c.otherData.photoURL||avatarUrl(c.otherData)}" alt=""></div><div class="conv-body"><div class="conv-top"><span class="conv-name">${esc(c.otherData.displayName||'User')}</span><span class="conv-time">${c.lastTs?fmtTime(c.lastTs):''}</span></div><div class="conv-preview ${c.unread>0?'unread':''}">${esc(c.lastMsg)||'<span style="color:var(--text-muted)">Start chatting</span>'}</div></div>${c.unread>0?`<div class="unread-badge">${c.unread>9?'9+':c.unread}</div>`:''}</div>`).join('');
}

window.filterConvs=q=>{const filtered=q?allConvs.filter(c=>(c.otherData.displayName||'').toLowerCase().includes(q.toLowerCase())||(c.otherData.username||'').toLowerCase().includes(q.toLowerCase())):allConvs;renderConvList(filtered);};

window.openChat=async(chatId,uid)=>{
    if(activeChatId&&msgListeners[activeChatId]){try{off(ref(db,`messages/${activeChatId}/msgs`));off(ref(db,`messages/${activeChatId}/typing/${otherUid}`));}catch{}delete msgListeners[activeChatId];}
    activeChatId=chatId; otherUid=uid;
    document.querySelectorAll('.conv-item').forEach(el=>el.classList.remove('active'));
    document.getElementById(`conv-${chatId}`)?.classList.add('active');
    const uSnap=await get(ref(db,`users/${uid}`));
    otherData=uSnap.val()||{displayName:'User',photoURL:avatarUrl({uid}),username:uid};
    document.getElementById('chat-name').textContent=otherData.displayName||'User';
    document.getElementById('chat-avatar').src=otherData.photoURL||avatarUrl(otherData);
    document.getElementById('typing-avatar').src=otherData.photoURL||avatarUrl(otherData);
    document.getElementById('chat-status').textContent=`@${otherData.username||''}`;
    document.getElementById('chat-empty').style.display='none';
    const cv=document.getElementById('chat-view'); cv.style.display='flex';
    document.getElementById('chat-pane').classList.add('open');
    document.getElementById('sidebar').classList.add('hidden');
    // Always hide nav when chat opens so it doesn't show behind the slide-in panel
    const nav=document.querySelector('.bottom-nav');
    if(nav) nav.style.display='none';
    document.getElementById('messages-area').innerHTML='<div style="padding:20px;text-align:center;"><div style="width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto;"></div></div>';
    await update(ref(db,`userChats/${currentUser.uid}/${chatId}`),{unreadCount:0}).catch(()=>{});
    listenMessages(chatId); listenTyping(chatId,uid);
    setTimeout(()=>document.getElementById('msg-input')?.focus(),300);
};

window.closeChat=()=>{
    document.getElementById('chat-pane').classList.remove('open');
    document.getElementById('sidebar').classList.remove('hidden');
    // Restore nav on mobile; desktop never shows it (CSS handles that)
    const nav=document.querySelector('.bottom-nav');
    if(nav && window.innerWidth<=680) nav.style.display='flex';
    activeChatId=null; otherUid=null; otherData=null;
    document.querySelectorAll('.conv-item').forEach(el=>el.classList.remove('active'));
};

function listenMessages(chatId){
    loadedMsgIds.clear();
    const msgsRef=ref(db,`messages/${chatId}/msgs`);
    onChildAdded(msgsRef,snap=>{
        if(loadedMsgIds.has(snap.key))return;
        loadedMsgIds.add(snap.key);
        appendMessage(snap.key,snap.val());
        scrollToBottom();
    });
    msgListeners[chatId]=true;
}

function appendMessage(msgId,msg){
    const area=document.getElementById('messages-area');
    const spinner=area.querySelector('div>div[style*="spin"]'); if(spinner)spinner.parentElement.remove();
    const isMine=msg.senderId===currentUser.uid;
    const msgDate=new Date(msg.timestamp||Date.now()).toDateString();
    const lastSep=area.querySelector('.date-sep:last-of-type');
    if(!lastSep||lastSep.dataset.date!==msgDate){const sep=document.createElement('div');sep.className='date-sep';sep.dataset.date=msgDate;sep.textContent=formatDateSep(msg.timestamp);area.appendChild(sep);}
    const prevRow=area.querySelector('.msg-row:last-of-type');
    const prevSenderId=prevRow?.dataset.sender;
    const showAvatar=!isMine&&prevSenderId!==msg.senderId;
    const row=document.createElement('div');row.className=`msg-row ${isMine?'out':'in'}`;row.dataset.sender=msg.senderId;row.id=`msg-${msgId}`;
    const avatarSrc=isMine?(currentUserData?.photoURL||avatarUrl(currentUserData)):(otherData?.photoURL||avatarUrl(otherData));
    let bubbleContent='';
    if(msg.imageUrl){bubbleContent=`<img class="bubble-img" src="${msg.imageUrl}" alt="" onclick="openLightbox('${msg.imageUrl}')">`;if(msg.text)bubbleContent+=`<div style="margin-top:6px;">${esc(msg.text)}</div>`;}
    else bubbleContent=esc(msg.text||'');
    const tick=isMine?`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="read-tick"><polyline points="20 6 9 17 4 12"/></svg>`:'';
    row.innerHTML=`${!isMine?`<img class="msg-avatar ${showAvatar?'':'hidden'}" src="${avatarSrc}" alt="">`:''}<div class="msg-content"><div class="bubble">${bubbleContent}</div><div class="msg-meta"><span>${fmtMsgTime(msg.timestamp)}</span>${tick}</div></div>${isMine?`<img class="msg-avatar hidden" src="${avatarSrc}" alt="">`:''}`; 
    area.appendChild(row);
}

function scrollToBottom(smooth=true){const area=document.getElementById('messages-area');if(!area)return;area.scrollTo({top:area.scrollHeight,behavior:smooth?'smooth':'instant'});}

window.sendMessage=async()=>{
    const input=document.getElementById('msg-input'),text=input.value.trim();
    if(!text||!activeChatId)return;
    input.value='';resizeInput();document.getElementById('send-btn').disabled=true;stopTyping();
    const msgData={senderId:currentUser.uid,text,timestamp:Date.now()};
    try{
        await push(ref(db,`messages/${activeChatId}/msgs`),msgData);
        await set(ref(db,`messages/${activeChatId}/lastMessage`),{text,timestamp:msgData.timestamp,senderId:currentUser.uid});
        const ocRef=ref(db,`userChats/${otherUid}/${activeChatId}`);
        const ocSnap=await get(ocRef);
        const prevU=ocSnap.exists()?(ocSnap.val().unreadCount||0):0;
        await update(ocRef,{otherUid:currentUser.uid,unreadCount:prevU+1,lastTs:msgData.timestamp});
        await update(ref(db,`userChats/${currentUser.uid}/${activeChatId}`),{otherUid,lastTs:msgData.timestamp,unreadCount:0});
    }catch(e){showToast('Failed to send');}
};

window.onMsgInput=()=>{
    resizeInput();const input=document.getElementById('msg-input'),has=input.value.trim().length>0;
    document.getElementById('send-btn').disabled=!has;if(has)startTyping();else stopTyping();
};
window.onMsgKeydown=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}};
function resizeInput(){const el=document.getElementById('msg-input');el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px';}

window.handleImgAttach=async e=>{
    const file=e.target.files[0];if(!file||!activeChatId)return;e.target.value='';showToast('Uploading image…');
    try{
        const fd=new FormData();fd.append('file',file);fd.append('upload_preset',CLOUDINARY_PRESET);fd.append('folder','messages');
        const res=await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/upload`,{method:'POST',body:fd});
        const data=await res.json();if(!data.secure_url)throw new Error('fail');
        const md={senderId:currentUser.uid,imageUrl:data.secure_url,text:'',timestamp:Date.now()};
        await push(ref(db,`messages/${activeChatId}/msgs`),md);
        await set(ref(db,`messages/${activeChatId}/lastMessage`),{text:'📷 Photo',timestamp:md.timestamp,senderId:currentUser.uid});
        await update(ref(db,`userChats/${currentUser.uid}/${activeChatId}`),{otherUid,lastTs:md.timestamp});
        const ocRef=ref(db,`userChats/${otherUid}/${activeChatId}`);
        const ocSnap=await get(ocRef);const pU=ocSnap.exists()?(ocSnap.val().unreadCount||0):0;
        await update(ocRef,{otherUid:currentUser.uid,unreadCount:pU+1,lastTs:md.timestamp});
    }catch{showToast('Image upload failed');}
};

function startTyping(){if(!activeChatId)return;set(ref(db,`messages/${activeChatId}/typing/${currentUser.uid}`),true);clearTimeout(typingTimer);typingTimer=setTimeout(stopTyping,3000);}
function stopTyping(){if(!activeChatId)return;remove(ref(db,`messages/${activeChatId}/typing/${currentUser.uid}`));clearTimeout(typingTimer);}

function listenTyping(chatId,uid){
    const statusEl=document.getElementById('chat-status');
    onValue(ref(db,`messages/${chatId}/typing/${uid}`),snap=>{
        const slot=document.getElementById('typing-slot');
        if(snap.exists()){slot.style.display='block';scrollToBottom();statusEl.textContent='typing…';}
        else{slot.style.display='none';statusEl.textContent=otherData?.username?`@${otherData.username}`:'';}
    });
}

window.openNewChat=()=>{document.getElementById('modal-overlay').classList.add('active');setTimeout(()=>document.getElementById('user-search').focus(),200);feather.replace();};
window.closeNewChat=e=>{
    if(e&&e.type==='click'&&e.target!==document.getElementById('modal-overlay'))return;
    document.getElementById('modal-overlay').classList.remove('active');
    document.getElementById('user-search').value='';
    document.getElementById('user-results').innerHTML='<div style="padding:32px;text-align:center;color:var(--text-muted);font-size:14px;">Search for someone to start a conversation.</div>';
};

window.searchUsers=async q=>{
    const container=document.getElementById('user-results');
    if(!q.trim()){container.innerHTML='<div style="padding:32px;text-align:center;color:var(--text-muted);font-size:14px;">Search for someone to start a conversation.</div>';return;}
    container.innerHTML='<div style="padding:32px;text-align:center;"><div style="width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto;"></div></div>';
    if(!allUsersCache){const snap=await get(ref(db,'users'));allUsersCache=[];if(snap.exists())snap.forEach(c=>{if(c.key!==currentUser.uid)allUsersCache.push({uid:c.key,...c.val()});});}
    const ql=q.toLowerCase();
    const results=allUsersCache.filter(u=>u.displayName?.toLowerCase().includes(ql)||u.username?.toLowerCase().includes(ql)).slice(0,12);
    if(!results.length){container.innerHTML='<div style="padding:32px;text-align:center;color:var(--text-muted);font-size:14px;">No users found.</div>';return;}
    container.innerHTML=results.map(u=>`<div class="user-result-row" onclick="startChat('${u.uid}')"><img src="${u.photoURL||avatarUrl(u)}" alt=""><div class="user-result-info"><div class="user-result-name">${esc(u.displayName||u.username||'User')}</div><div class="user-result-handle">@${esc(u.username||'')}</div></div></div>`).join('');
    feather.replace();
};

window.startChat=async uid=>{
    closeNewChat();
    const chatId=[currentUser.uid,uid].sort().join('_');
    await update(ref(db,`userChats/${currentUser.uid}/${chatId}`),{otherUid:uid,unreadCount:0});
    await update(ref(db,`userChats/${uid}/${chatId}`),{otherUid:currentUser.uid,unreadCount:0});
    openChat(chatId,uid);
};

function listenNotifBadge(){
    onValue(ref(db,`notifications/${currentUser.uid}`),snap=>{
        let c=0;if(snap.exists())snap.forEach(ch=>{if(!ch.val().read)c++;});
        const b=document.getElementById('badge-notifications');
        if(c>0){b.textContent=c>99?'99+':c;b.classList.add('show');}else b.classList.remove('show');
    });
}

window.goToOtherProfile=()=>{if(otherUid)window.location.href=`profile.html?id=${otherUid}`;};
window.openLightbox=src=>{document.getElementById('lightbox-img').src=src;document.getElementById('lightbox').classList.add('active');};
window.closeLightbox=()=>document.getElementById('lightbox').classList.remove('active');
window.showToast=msg=>{const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);};

function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
function avatarUrl(u){return`https://ui-avatars.com/api/?name=${encodeURIComponent((u&&(u.displayName||u.username||u.uid||'U')))}&background=random`;}
function fmtTime(ts){if(!ts)return'';const d=new Date(ts),now=new Date(),diff=now-d;if(diff<60000)return'now';if(diff<3600000)return Math.floor(diff/60000)+'m';if(d.toDateString()===now.toDateString())return d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});if(diff<7*86400000)return d.toLocaleDateString([],{weekday:'short'});return d.toLocaleDateString([],{month:'short',day:'numeric'});}
function fmtMsgTime(ts){if(!ts)return'';return new Date(ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}
function formatDateSep(ts){if(!ts)return'';const d=new Date(ts),now=new Date();if(d.toDateString()===now.toDateString())return'Today';const y=new Date(now);y.setDate(now.getDate()-1);if(d.toDateString()===y.toDateString())return'Yesterday';return d.toLocaleDateString([],{weekday:'long',month:'long',day:'numeric'});}

feather.replace();
</script>
