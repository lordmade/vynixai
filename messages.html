<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Nexus - Messages</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/feather-icons"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

    :root {
      --primary-color: #6366F1;
      --primary-light: #818CF8;
      --primary-dark: #4F46E5;
      --border: #E2E8F0;
      --hover-bg: #F8FAFC;
      --text-dark: #0F172A;
      --text-light: #64748B;
      --text-muted: #94A3B8;
      --like-red: #F43F5E;
      --success: #10B981;
      --glass-bg: rgba(255, 255, 255, 0.85);
      --shadow-sm: 0 1px 2px 0 rgba(0,0,0,0.05);
      --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
      --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      margin: 0;
      font-family: 'Inter', system-ui, sans-serif;
      background: linear-gradient(135deg, #F8FAFC 0%, #F1F5F9 100%);
      color: var(--text-dark);
      min-height: 100vh;
    }

    .layout-grid {
      display: grid;
      grid-template-columns: 80px 1fr;
      max-width: 1265px;
      margin: 0 auto;
      min-height: 100vh;
    }

    @media (min-width: 640px) { .layout-grid { grid-template-columns: 280px 1fr; } }
    @media (min-width: 1024px) { .layout-grid { grid-template-columns: 280px 600px 340px; } }

    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      padding: 1.5rem 1rem;
      border-right: 1px solid var(--border);
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(20px);
      display: flex;
      flex-direction: column;
    }

    .main-feed {
      background: white;
      border-radius: 24px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-lg);
      overflow: hidden;
      margin: 1rem;
      min-height: calc(100vh - 2rem);
    }

    .chat-header {
      position: sticky;
      top: 0;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(20px);
      z-index: 20;
      border-bottom: 1px solid var(--border);
      padding: 1rem 1.5rem;
    }

    .chat-list {
      overflow-y: auto;
      height: calc(100vh - 140px);
      padding: 0.5rem 0;
    }

    .chat-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.5rem;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
    }

    .chat-item:hover,
    .chat-item.active {
      background: rgba(99,102,241,0.08);
    }

    .chat-avatar {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid white;
      box-shadow: var(--shadow-sm);
    }

    .chat-info { flex: 1; min-width: 0; }
    .chat-name {
      font-weight: 600;
      font-size: 1.05rem;
      margin-bottom: 0.25rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .chat-last-message {
      color: var(--text-light);
      font-size: 0.9rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .chat-time { font-size: 0.8rem; color: var(--text-muted); white-space: nowrap; }

    .unread-badge {
      background: var(--primary-color);
      color: white;
      font-size: 0.75rem;
      font-weight: 600;
      min-width: 20px;
      height: 20px;
      border-radius: 9999px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 6px;
    }

    .no-chats {
      text-align: center;
      padding: 4rem 1rem;
      color: var(--text-muted);
    }

    .messages-list {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      background: #f8fafc;
    }

    .message-bubble {
      max-width: 75%;
      padding: 0.9rem 1.25rem;
      border-radius: 20px;
      line-height: 1.4;
    }

    .message-bubble.sent {
      align-self: flex-end;
      background: var(--primary-color);
      color: white;
      border-bottom-right-radius: 6px;
    }

    .message-bubble.received {
      align-self: flex-start;
      background: white;
      border: 1px solid var(--border);
      border-bottom-left-radius: 6px;
    }

    .message-time {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 0.4rem;
      text-align: right;
    }

    .chat-input-area {
      padding: 1rem 1.5rem;
      border-top: 1px solid var(--border);
      background: white;
    }

    .chat-input-wrapper {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      background: #f1f5f9;
      border-radius: 9999px;
      padding: 0.6rem 1.25rem;
    }

    #chat-message-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-size: 1rem;
    }

    .send-btn {
      background: var(--primary-color);
      color: white;
      border: none;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
    }

    .send-btn:hover:not(:disabled) {
      background: var(--primary-dark);
      transform: scale(1.08);
    }

    .send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    @media (max-width: 639px) {
      .layout-grid { grid-template-columns: 1fr; }
      .sidebar { display: none; }
      .main-feed {
        margin: 0;
        border-radius: 0;
        border: none;
        min-height: 100vh;
      }
    }
  </style>
</head>
<body>

<div class="layout-grid">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div>
      <div class="logo-box">
        <svg width="36" height="36" viewBox="0 0 40 40" fill="none">
          <rect width="40" height="40" rx="12" fill="url(#gradient)"/>
          <path d="M12 20L18 26L28 14" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="28" cy="26" r="4" fill="white"/>
          <defs><linearGradient id="gradient" x1="0" y1="0" x2="40" y2="40"><stop stop-color="#6366F1"/><stop offset="1" stop-color="#818CF8"/></linearGradient></defs>
        </svg>
        <span>Nexus</span>
      </div>

      <nav style="display:flex; flex-direction:column; gap:0.25rem;">
        <div class="nav-item" onclick="window.location.href='index.html'">
          <i data-feather="home"></i> <span class="nav-text">Home</span>
        </div>
        <div class="nav-item active">
          <i data-feather="message-circle"></i>
          <span class="nav-text">Messages</span>
          <span class="nav-badge" id="sidebar-total-unread">0</span>
        </div>
        <div class="nav-item">
          <i data-feather="users"></i> <span class="nav-text">Follows</span>
        </div>
        <div class="nav-item">
          <i data-feather="user"></i> <span class="nav-text">Profile</span>
        </div>
      </nav>
    </div>

    <div class="sidebar-footer">
      <div class="nav-item">
        <i data-feather="log-out"></i> <span class="nav-text">Logout</span>
      </div>
    </div>
  </aside>

  <!-- Main Messages Area -->
  <main class="main-feed">

    <div class="chat-header">
      <h1 style="font-size:1.4rem; font-weight:700;">Messages</h1>
    </div>

    <div style="display: flex; height: calc(100vh - 80px);">

      <!-- Chat List -->
      <div style="width: 380px; border-right: 1px solid var(--border); overflow-y: auto;">
        <div class="chat-list" id="chat-list"></div>
      </div>

      <!-- Conversation View -->
      <div id="conversation-panel" style="flex:1; display:flex; flex-direction:column; background:#fafafa;">

        <div id="no-chat-selected" style="flex:1; display:flex; align-items:center; justify-content:center; color:var(--text-muted); text-align:center; padding:2rem;">
          <div>
            <i data-feather="message-circle" style="width:64px;height:64px;opacity:0.3;margin-bottom:1.5rem;"></i>
            <h3 style="font-size:1.4rem; font-weight:600; margin-bottom:0.75rem;">Your messages</h3>
            <p style="font-size:0.95rem;">Select someone to start chatting</p>
          </div>
        </div>

        <div id="chat-view" style="display:none; flex-direction:column; height:100%;">
          <div class="chat-header" style="border-bottom:1px solid var(--border);">
            <div style="display:flex; align-items:center; gap:1rem;">
              <button onclick="closeConversation()" style="background:none;border:none;cursor:pointer;padding:8px;border-radius:50%;">
                <i data-feather="arrow-left" style="width:24px;height:24px;"></i>
              </button>
              <img id="chat-partner-avatar" class="chat-avatar" src="" alt="">
              <div>
                <div id="chat-partner-name" style="font-weight:600; font-size:1.15rem;"></div>
                <div id="chat-partner-status" style="font-size:0.85rem; color:var(--text-muted);"></div>
              </div>
            </div>
          </div>

          <div class="messages-list" id="messages-list"></div>

          <div class="chat-input-area">
            <div class="chat-input-wrapper">
              <input type="text" id="chat-message-input" placeholder="Type a message..." autocomplete="off" />
              <button id="send-message-btn" class="send-btn" disabled>
                <i data-feather="send" style="width:20px;height:20px;"></i>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.11/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.6.11/firebase-auth.js";
  import { getDatabase, ref, onValue, push, set, get, update, query, orderByChild, limitToLast } from "https://www.gstatic.com/firebasejs/9.6.11/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBOyZ3As4GTuNvjemvPF_SpsC6m6vqtNhc",
    authDomain: "fire-b-a8878.firebaseapp.com",
    databaseURL: "https://fire-b-a8878.firebaseio.com",
    projectId: "fire-b-a8878",
    storageBucket: "fire-b-a8878.appspot.com",
    messagingSenderId: "658673187627",
    appId: "1:658673187627:web:6e4c29af661785f0afa36e"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);

  let currentUser = null;
  let currentUsername = null;
  let currentChatPartner = null;
  let messagesListener = null;
  let totalUnread = 0;

  const defaultAvatar = "https://abs.twimg.com/sticky/default_profile_images/default_profile_normal.png";

  onAuthStateChanged(auth, (user) => {
    if (!user) {
      window.location.href = "signup.html";
      return;
    }
    currentUser = user;

    get(ref(db, `users/${user.uid}`)).then(snap => {
      currentUsername = snap.exists()
        ? (snap.val().username || user.email?.split('@')[0] || "user")
        : (user.email?.split('@')[0] || "user");

      loadChatList();
      loadTotalUnreadCount();
    });
  });

  // ──────────────────────────────────────────────
  // Total unread count (sidebar badge)
  // ──────────────────────────────────────────────
  function loadTotalUnreadCount() {
    if (!currentUser) return;

    const userChatsRef = ref(db, `userChats/${currentUser.uid}`);
    onValue(userChatsRef, (snap) => {
      totalUnread = 0;
      if (snap.exists()) {
        snap.forEach(child => {
          const chat = child.val();
          totalUnread += (chat.unreadCount || 0);
        });
      }

      const badge = document.getElementById("sidebar-total-unread");
      if (badge) {
        badge.textContent = totalUnread > 99 ? "99+" : totalUnread;
        badge.style.display = totalUnread > 0 ? "flex" : "none";
      }
    });
  }

  // ──────────────────────────────────────────────
  // Load list of chats + unread counters
  // ──────────────────────────────────────────────
  function loadChatList() {
    if (!currentUser) return;

    const followingRef = ref(db, `following/${currentUser.uid}`);
    onValue(followingRef, (snap) => {
      const list = document.getElementById("chat-list");
      list.innerHTML = "";

      if (!snap.exists()) {
        list.innerHTML = `
          <div class="no-chats">
            <i data-feather="users" style="width:48px;height:48px;opacity:0.4;margin-bottom:1rem;"></i>
            <p>You don't follow anyone yet.<br>Follow people to start chatting!</p>
          </div>
        `;
        feather.replace();
        return;
      }

      snap.forEach(child => {
        const uid = child.key;

        // Get user info
        get(ref(db, `users/${uid}`)).then(userSnap => {
          if (!userSnap.exists()) return;
          const u = userSnap.val();

          // Get chat summary (last message + unread)
          get(ref(db, `userChats/${currentUser.uid}/${uid}`)).then(chatSnap => {
            const chatData = chatSnap.exists() ? chatSnap.val() : {};
            const unread = chatData.unreadCount || 0;
            const lastMsg = chatData.lastMessage || "Tap to start chatting";
            const lastTime = chatData.lastTimestamp ? new Date(chatData.lastTimestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : "";

            const item = document.createElement("div");
            item.className = "chat-item";
            item.dataset.uid = uid;
            item.innerHTML = `
              <img src="${u.photoURL || defaultAvatar}" class="chat-avatar" onerror="this.src='${defaultAvatar}'" />
              <div class="chat-info">
                <div class="chat-name">${u.displayName || u.username || "User"}</div>
                <div class="chat-last-message">${lastMsg}</div>
              </div>
              <div style="display:flex; flex-direction:column; align-items:flex-end; gap:0.5rem;">
                <div class="chat-time">${lastTime}</div>
                ${unread > 0 ? `<span class="unread-badge">${unread > 99 ? '99+' : unread}</span>` : ''}
              </div>
            `;
            item.onclick = () => openConversation(uid, u);
            list.appendChild(item);
          });
        });
      });

      feather.replace();
    });
  }

  function openConversation(uid, userData) {
    document.querySelectorAll('.chat-item').forEach(el => el.classList.remove('active'));
    document.querySelector(`.chat-item[data-uid="${uid}"]`)?.classList.add('active');

    currentChatPartner = { uid, ...userData };

    document.getElementById("no-chat-selected").style.display = "none";
    document.getElementById("chat-view").style.display = "flex";

    document.getElementById("chat-partner-avatar").src = userData.photoURL || defaultAvatar;
    document.getElementById("chat-partner-name").textContent = userData.displayName || userData.username || "User";

    // Reset unread count when opening chat
    resetUnreadCount(uid);

    loadMessages(uid);
  }

  async function resetUnreadCount(partnerUid) {
    if (!currentUser) return;
    const chatRef = ref(db, `userChats/${currentUser.uid}/${partnerUid}`);
    await update(chatRef, { unreadCount: 0 });
  }

  function closeConversation() {
    if (messagesListener) messagesListener();
    currentChatPartner = null;
    document.getElementById("chat-view").style.display = "none";
    document.getElementById("no-chat-selected").style.display = "flex";
    document.querySelectorAll('.chat-item').forEach(el => el.classList.remove('active'));
  }

  function loadMessages(partnerUid) {
    if (messagesListener) messagesListener();

    const chatId = [currentUser.uid, partnerUid].sort().join('_');
    const messagesRef = ref(db, `chats/${chatId}/messages`);

    messagesListener = onValue(messagesRef, (snap) => {
      const list = document.getElementById("messages-list");
      list.innerHTML = "";

      if (!snap.exists()) {
        list.innerHTML = `
          <div style="text-align:center; padding:3rem 1rem; color:var(--text-muted);">
            <i data-feather="message-square" style="width:48px;height:48px;opacity:0.3;"></i>
            <p>No messages yet. Say hello!</p>
          </div>
        `;
        feather.replace();
        return;
      }

      const msgs = [];
      snap.forEach(c => msgs.push({ id: c.key, ...c.val() }));
      msgs.sort((a,b) => a.timestamp - b.timestamp);

      msgs.forEach(msg => {
        const isSent = msg.senderId === currentUser.uid;
        const bubble = document.createElement("div");
        bubble.className = `message-bubble ${isSent ? 'sent' : 'received'}`;
        bubble.innerHTML = `
          <div>${msg.text}</div>
          <div class="message-time">${formatTime(msg.timestamp)}</div>
        `;
        list.appendChild(bubble);
      });

      list.scrollTop = list.scrollHeight;
    });
  }

  const input = document.getElementById("chat-message-input");
  const sendBtn = document.getElementById("send-message-btn");

  input.addEventListener("input", () => {
    sendBtn.disabled = !input.value.trim() || !currentChatPartner;
  });

  sendBtn.onclick = async () => {
    const text = input.value.trim();
    if (!text || !currentChatPartner) return;

    const chatId = [currentUser.uid, currentChatPartner.uid].sort().join('_');

    // Send message
    await push(ref(db, `chats/${chatId}/messages`), {
      senderId: currentUser.uid,
      text,
      timestamp: Date.now()
    });

    // Update chat summaries for both users
    const now = Date.now();
    await update(ref(db, `userChats/${currentUser.uid}/${currentChatPartner.uid}`), {
      lastMessage: text,
      lastTimestamp: now,
      unreadCount: 0
    });

    await update(ref(db, `userChats/${currentChatPartner.uid}/${currentUser.uid}`), {
      lastMessage: text,
      lastTimestamp: now,
      unreadCount: 1   // increment unread for the receiver
    });

    input.value = "";
    sendBtn.disabled = true;
  };

  input.addEventListener("keypress", e => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendBtn.click();
    }
  });

  function formatTime(ts) {
    return new Date(ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  feather.replace();
</script>
</body>
</html>
