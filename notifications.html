<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vynix · Alerts</title>
    <script src="https://unpkg.com/feather-icons"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366F1;
            --primary-dark: #4F46E5;
            --background: #F8FAFC;
            --surface: #FFFFFF;
            --border: #E2E8F0;
            --text-primary: #0F172A;
            --text-secondary: #64748B;
            --text-muted: #94A3B8;
            --like: #F43F5E;
            --verified: #1D9BF0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--background);
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            padding-bottom: calc(90px + env(safe-area-inset-bottom));
            min-height: 100vh;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes shimmer {
            0%   { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50%       { transform: scale(1.15); }
        }

        .shimmer {
            background: linear-gradient(90deg,#f0f0f0 25%,#e8e8e8 50%,#f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 6px;
        }

        .app-container { max-width: 100%; margin: 0 auto; }
        @media (min-width: 1024px) {
            .app-container { max-width: 600px; border-left: 1px solid var(--border); border-right: 1px solid var(--border); }
        }

        /* ── Header ── */
        .header {
            position: sticky; top: 0; z-index: 50;
            background: rgba(255,255,255,0.97);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 14px 16px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .header-title { font-size: 20px; font-weight: 800; }
        .mark-all-btn {
            background: none; border: none;
            color: var(--primary); font-size: 13px; font-weight: 600;
            cursor: pointer; font-family: inherit; padding: 6px 10px;
            border-radius: 8px; transition: background 0.15s;
        }
        .mark-all-btn:hover { background: rgba(99,102,241,0.08); }

        /* ── Filter tabs ── */
        .filter-row {
            display: flex; gap: 8px;
            padding: 12px 16px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            overflow-x: auto; scrollbar-width: none;
        }
        .filter-row::-webkit-scrollbar { display: none; }

        .filter-pill {
            padding: 6px 16px;
            border-radius: 9999px;
            font-size: 13px; font-weight: 600;
            cursor: pointer; white-space: nowrap;
            border: 1.5px solid var(--border);
            background: var(--surface);
            color: var(--text-secondary);
            transition: all 0.2s; font-family: inherit;
            flex-shrink: 0;
        }
        .filter-pill.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }

        /* ── Notification item ── */
        .notif-item {
            display: flex; gap: 12px; align-items: flex-start;
            padding: 14px 16px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: background 0.15s;
            animation: fadeIn 0.3s ease-out both;
            position: relative;
        }
        .notif-item:hover { background: #f8f9ff; }
        .notif-item.unread { background: rgba(99,102,241,0.04); }
        .notif-item.unread::before {
            content: '';
            position: absolute; left: 0; top: 0; bottom: 0;
            width: 3px; background: var(--primary); border-radius: 0 2px 2px 0;
        }

        .notif-avatar-wrap { position: relative; flex-shrink: 0; }
        .notif-avatar {
            width: 46px; height: 46px; border-radius: 50%;
            object-fit: cover; display: block;
        }
        .notif-icon {
            position: absolute; bottom: -2px; right: -2px;
            width: 20px; height: 20px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            border: 2px solid var(--surface);
        }
        .notif-icon.like    { background: var(--like); }
        .notif-icon.comment { background: var(--primary); }
        .notif-icon.follow  { background: #10B981; }
        .notif-icon.mention { background: #F59E0B; }
        .notif-icon.reply   { background: #8B5CF6; }

        .notif-body { flex: 1; min-width: 0; }
        .notif-text {
            font-size: 14px; line-height: 1.45; color: var(--text-primary);
            margin-bottom: 3px;
        }
        .notif-text strong { font-weight: 700; }
        .notif-text .notif-content {
            color: var(--text-secondary); font-style: italic;
        }
        .notif-time {
            font-size: 12px; color: var(--text-muted); margin-bottom: 6px;
        }

        .notif-preview {
            border-radius: 10px; overflow: hidden;
            border: 1px solid var(--border);
            max-height: 80px;
        }
        .notif-preview img {
            width: 100%; max-height: 80px; object-fit: cover; display: block;
        }

        /* Follow back button */
        .follow-back-btn {
            margin-top: 6px;
            background: var(--text-primary); color: white;
            border: none; padding: 6px 16px; border-radius: 9999px;
            font-size: 12px; font-weight: 700; cursor: pointer;
            font-family: inherit; transition: opacity 0.2s;
        }
        .follow-back-btn:hover { opacity: 0.85; }
        .follow-back-btn.following {
            background: var(--surface); color: var(--text-primary);
            border: 1.5px solid var(--border);
        }

        /* Unread dot */
        .unread-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--primary); flex-shrink: 0;
            margin-top: 4px;
        }

        /* ── Empty state ── */
        .empty-state {
            padding: 72px 24px; text-align: center; color: var(--text-muted);
        }
        .empty-state .empty-icon {
            width: 64px; height: 64px; border-radius: 50%;
            background: var(--background);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 16px; color: var(--text-muted);
        }
        .empty-state h3 { font-size: 18px; font-weight: 700; color: var(--text-secondary); margin-bottom: 6px; }
        .empty-state p { font-size: 14px; }

        /* ── Bottom Nav ── */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
            display: flex; justify-content: space-around; z-index: 100;
        }
        .nav-item {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; gap: 4px; padding: 8px;
            color: var(--text-secondary); background: none; border: none;
            font-family: inherit; cursor: pointer; transition: color 0.2s;
            position: relative;
        }
        .nav-item.active { color: var(--primary); }
        .nav-item span { font-size: 11px; font-weight: 600; }
        .nav-badge {
            position: absolute; top: 4px; right: calc(50% - 16px);
            background: var(--like); color: white;
            font-size: 10px; font-weight: 700;
            min-width: 18px; height: 18px; border-radius: 9px;
            display: none; align-items: center; justify-content: center;
            padding: 0 5px; border: 2px solid var(--surface);
        }
        .nav-badge.show { display: flex; }
        .fab {
            width: 56px; height: 56px; background: var(--primary); color: white;
            border: none; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 20px rgba(99,102,241,0.4);
            transform: translateY(-20px); cursor: pointer; transition: transform 0.2s;
        }
        .fab:active { transform: translateY(-20px) scale(0.9); }

        .toast {
            position: fixed; bottom: 100px; left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #1e293b; color: white; padding: 12px 24px;
            border-radius: 9999px; font-weight: 500; opacity: 0;
            transition: all 0.3s; z-index: 9999; pointer-events: none;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        @media (min-width: 1024px) { .bottom-nav { display: none; } body { padding-bottom: 0; } }
    </style>
</head>
<body>

<div class="app-container">
    <header class="header">
        <span class="header-title">Alerts</span>
        <button class="mark-all-btn" onclick="markAllRead()">Mark all read</button>
    </header>

    <!-- Filter pills -->
    <div class="filter-row" id="filter-row">
        <button class="filter-pill active" data-filter="all"    onclick="setFilter('all')">All</button>
        <button class="filter-pill"        data-filter="likes"  onclick="setFilter('likes')">Likes</button>
        <button class="filter-pill"        data-filter="comments" onclick="setFilter('comments')">Comments</button>
        <button class="filter-pill"        data-filter="follows" onclick="setFilter('follows')">Follows</button>
        <button class="filter-pill"        data-filter="mentions" onclick="setFilter('mentions')">Mentions</button>
    </div>

    <!-- Shimmer placeholders -->
    <div id="shimmer-container">
        ${[0,1,2,3,4].map(() => `
        <div style="display:flex;gap:12px;padding:14px 16px;border-bottom:1px solid var(--border);background:var(--surface);">
            <div class="shimmer" style="width:46px;height:46px;border-radius:50%;flex-shrink:0;"></div>
            <div style="flex:1;">
                <div class="shimmer" style="width:75%;height:14px;margin-bottom:8px;"></div>
                <div class="shimmer" style="width:40%;height:12px;"></div>
            </div>
        </div>`).join('')}
    </div>

    <div id="notif-list"></div>

    <div class="empty-state" id="empty-state" style="display:none;">
        <div class="empty-icon"><i data-feather="bell" style="width:28px;height:28px;"></i></div>
        <h3>No alerts yet</h3>
        <p>When people like, comment or follow you, it'll show up here.</p>
    </div>
</div>

<nav class="bottom-nav">
    <button class="nav-item" onclick="window.location.href='home.html'">
        <i data-feather="home"></i><span>Home</span>
    </button>
    <button class="nav-item" onclick="window.location.href='search.html'">
        <i data-feather="search"></i><span>Search</span>
    </button>
    <button class="fab" onclick="window.location.href='home.html'">
        <i data-feather="plus" style="width:28px;height:28px;"></i>
    </button>
    <button class="nav-item active">
        <i data-feather="bell"></i><span>Alerts</span>
    </button>
    <button class="nav-item" onclick="window.location.href='messages.html'">
        <i data-feather="mail"></i><span>Messages</span>
        <span class="nav-badge" id="badge-messages"></span>
    </button>
</nav>

<div class="toast" id="toast"></div>

<script type="module">
    import { initializeApp }      from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, get, set, update, remove, onValue, query, orderByChild, limitToLast }
        from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBOyZ3As4GTuNvjemvPF_SpsC6m6vqtNhc",
        authDomain: "fire-b-a8878.firebaseapp.com",
        databaseURL: "https://fire-b-a8878.firebaseio.com",
        projectId: "fire-b-a8878",
        storageBucket: "fire-b-a8878.appspot.com",
        messagingSenderId: "658673187627",
        appId: "1:658673187627:web:6e4c29af661785f0afa36e"
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getDatabase(app);

    let currentUser = null;
    let allNotifs   = [];
    let activeFilter = 'all';
    let followingMap = {};

    const ICONS = {
        like:    { feather: 'heart',         cls: 'like'    },
        comment: { feather: 'message-circle', cls: 'comment' },
        follow:  { feather: 'user-plus',      cls: 'follow'  },
        mention: { feather: 'at-sign',        cls: 'mention' },
        reply:   { feather: 'corner-up-left', cls: 'reply'   },
    };

    onAuthStateChanged(auth, async user => {
        if (!user) { window.location.href = 'auth.html'; return; }
        currentUser = user;
        await loadFollowing();
        listenNotifications();
        setupBadgeListeners();
        feather.replace();
    });

    async function loadFollowing() {
        const snap = await get(ref(db, `following/${currentUser.uid}`));
        followingMap = {};
        if (snap.exists()) snap.forEach(c => { followingMap[c.key] = true; });
    }

    function listenNotifications() {
        const notifRef = ref(db, `notifications/${currentUser.uid}`);
        onValue(notifRef, async snap => {
            document.getElementById('shimmer-container').style.display = 'none';
            allNotifs = [];

            if (!snap.exists()) { showEmpty(); return; }

            const raw = [];
            snap.forEach(child => raw.push({ id: child.key, ...child.val() }));
            raw.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));

            // Enrich with sender user data
            const uids = [...new Set(raw.map(n => n.fromUid).filter(Boolean))];
            const userMap = {};
            await Promise.all(uids.map(async uid => {
                const s = await get(ref(db, `users/${uid}`));
                userMap[uid] = s.val() || {};
            }));

            allNotifs = raw.map(n => ({ ...n, fromUser: userMap[n.fromUid] || {} }));
            renderNotifications();
        });
    }

    function renderNotifications() {
        const list = document.getElementById('notif-list');
        const empty = document.getElementById('empty-state');

        const filtered = activeFilter === 'all'
            ? allNotifs
            : allNotifs.filter(n => {
                if (activeFilter === 'likes')    return n.type === 'like';
                if (activeFilter === 'comments') return n.type === 'comment' || n.type === 'reply';
                if (activeFilter === 'follows')  return n.type === 'follow';
                if (activeFilter === 'mentions') return n.type === 'mention';
                return true;
            });

        if (filtered.length === 0) { list.innerHTML = ''; showEmpty(); return; }
        empty.style.display = 'none';

        list.innerHTML = filtered.map((n, i) => notifHtml(n, i * 30)).join('');
        feather.replace();
    }

    function notifHtml(n, delay) {
        const u   = n.fromUser || {};
        const ico = ICONS[n.type] || ICONS.like;
        const photo = u.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(u.username||'U')}&background=random`;

        const textMap = {
            like:    `<strong>${esc(u.displayName||'Someone')}</strong> liked your post`,
            comment: `<strong>${esc(u.displayName||'Someone')}</strong> commented on your post`,
            follow:  `<strong>${esc(u.displayName||'Someone')}</strong> started following you`,
            mention: `<strong>${esc(u.displayName||'Someone')}</strong> mentioned you in a post`,
            reply:   `<strong>${esc(u.displayName||'Someone')}</strong> replied to your comment`,
        };

        const bodyText = n.body
            ? `${textMap[n.type] || textMap.like} <span class="notif-content">"${esc(n.body.slice(0,60))}${n.body.length>60?'…':''}"</span>`
            : (textMap[n.type] || textMap.like);

        const isFollowType = n.type === 'follow';
        const isFollowing  = followingMap[n.fromUid];

        return `
        <div class="notif-item ${n.read ? '' : 'unread'}"
             style="animation-delay:${delay}ms"
             onclick="handleNotifClick('${n.id}','${n.type}','${n.postId||''}','${n.fromUid||''}')">
            <div class="notif-avatar-wrap">
                <img class="notif-avatar" src="${photo}" loading="lazy">
                <div class="notif-icon ${ico.cls}">
                    <i data-feather="${ico.feather}" style="width:10px;height:10px;color:white;stroke-width:2.5;"></i>
                </div>
            </div>
            <div class="notif-body">
                <div class="notif-text">${bodyText}</div>
                <div class="notif-time">${formatTime(n.timestamp)}</div>
                ${isFollowType ? `
                <button class="follow-back-btn ${isFollowing?'following':''}"
                    onclick="toggleFollow(event,'${n.fromUid}')">
                    ${isFollowing ? 'Following' : 'Follow back'}
                </button>` : ''}
                ${n.mediaUrl ? `<div class="notif-preview"><img src="${n.mediaUrl}" loading="lazy"></div>` : ''}
            </div>
            ${!n.read ? '<div class="unread-dot"></div>' : ''}
        </div>`;
    }

    function showEmpty() {
        document.getElementById('empty-state').style.display = 'block';
        document.getElementById('notif-list').innerHTML = '';
    }

    // ── Actions ──
    window.handleNotifClick = async (id, type, postId, fromUid) => {
        // Mark as read
        await update(ref(db, `notifications/${currentUser.uid}/${id}`), { read: true });

        if (type === 'follow') {
            window.location.href = `profile.html?id=${fromUid}`;
        } else if (postId) {
            window.location.href = `home.html#post-${postId}`;
        }
    };

    window.markAllRead = async () => {
        const updates = {};
        allNotifs.filter(n => !n.read).forEach(n => {
            updates[`notifications/${currentUser.uid}/${n.id}/read`] = true;
        });
        if (Object.keys(updates).length === 0) { showToast('All caught up!'); return; }
        await update(ref(db), updates);
        showToast('All marked as read');
    };

    window.setFilter = (filter) => {
        activeFilter = filter;
        document.querySelectorAll('.filter-pill').forEach(p => {
            p.classList.toggle('active', p.dataset.filter === filter);
        });
        renderNotifications();
    };

    window.toggleFollow = async (e, uid) => {
        e.stopPropagation();
        const btn = e.currentTarget;
        if (followingMap[uid]) {
            await remove(ref(db, `following/${currentUser.uid}/${uid}`));
            await remove(ref(db, `followers/${uid}/${currentUser.uid}`));
            delete followingMap[uid];
            btn.textContent = 'Follow back';
            btn.classList.remove('following');
        } else {
            await set(ref(db, `following/${currentUser.uid}/${uid}`), true);
            await set(ref(db, `followers/${uid}/${currentUser.uid}`), true);
            followingMap[uid] = true;
            btn.textContent = 'Following';
            btn.classList.add('following');
            showToast('Following!');
        }
    };

    // ── Badges ──
    function setupBadgeListeners() {
        onValue(ref(db, `userChats/${currentUser.uid}`), snap => {
            let c = 0;
            if (snap.exists()) snap.forEach(ch => { c += ch.val().unreadCount || 0; });
            updateBadge('badge-messages', c);
        });
    }

    function updateBadge(id, count) {
        const b = document.getElementById(id);
        if (!b) return;
        if (count > 0) { b.textContent = count > 99 ? '99+' : count; b.classList.add('show'); }
        else b.classList.remove('show');
    }

    // ── Utils ──
    function esc(str) {
        const d = document.createElement('div');
        d.textContent = str || '';
        return d.innerHTML;
    }

    function formatTime(ts) {
        if (!ts) return '';
        const s = Math.floor((Date.now() - ts) / 1000);
        if (s < 60)    return 'just now';
        if (s < 3600)  return Math.floor(s/60)   + 'm ago';
        if (s < 86400) return Math.floor(s/3600)  + 'h ago';
        if (s < 604800) return Math.floor(s/86400) + 'd ago';
        return new Date(ts).toLocaleDateString('en-US', { month:'short', day:'numeric' });
    }

    window.showToast = msg => {
        const t = document.getElementById('toast');
        t.textContent = msg; t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2500);
    };

    feather.replace();
</script>
</body>
</html>
