<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vynix · Notifications</title>
    <script src="https://unpkg.com/feather-icons"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* ══ THEME SYSTEM ══ */
        :root,[data-theme="light"]{
            --primary:#6366F1;--primary-dark:#4F46E5;--primary-rgb:99,102,241;
            --background:#F8FAFC;--surface:#FFFFFF;--surface2:#F1F5F9;
            --border:#E2E8F0;--text-primary:#0F172A;--text-secondary:#64748B;--text-muted:#94A3B8;
            --like:#F43F5E;--verified:#1D9BF0;
            --nav-bg: rgba(255,255,255,0.92);
        }
        [data-theme="dark"]{
            --primary:#818CF8;--primary-dark:#6366F1;--primary-rgb:129,140,248;
            --background:#0F172A;--surface:#1E293B;--surface2:#334155;
            --border:#334155;--text-primary:#F1F5F9;--text-secondary:#94A3B8;--text-muted:#64748B;
            --like:#FB7185;--verified:#38BDF8;
            --nav-bg: rgba(15,23,42,0.95);
        }
        [data-theme="midnight"]{
            --primary:#C084FC;--primary-dark:#A855F7;--primary-rgb:192,132,252;
            --background:#09090B;--surface:#18181B;--surface2:#27272A;
            --border:#3F3F46;--text-primary:#FAFAFA;--text-secondary:#A1A1AA;--text-muted:#71717A;
            --like:#F472B6;--verified:#67E8F9;
            --nav-bg: rgba(9,9,11,0.95);
        }
        [data-theme="ocean"]{
            --primary:#06B6D4;--primary-dark:#0891B2;--primary-rgb:6,182,212;
            --background:#F0F9FF;--surface:#FFFFFF;--surface2:#E0F2FE;
            --border:#BAE6FD;--text-primary:#0C4A6E;--text-secondary:#0369A1;--text-muted:#7DD3FC;
            --like:#F43F5E;--verified:#06B6D4;
            --nav-bg: rgba(240,249,255,0.92);
        }
        [data-theme="rose"]{
            --primary:#E11D48;--primary-dark:#BE123C;--primary-rgb:225,29,72;
            --background:#FFF1F2;--surface:#FFFFFF;--surface2:#FFE4E6;
            --border:#FECDD3;--text-primary:#881337;--text-secondary:#9F1239;--text-muted:#FDA4AF;
            --like:#E11D48;--verified:#3B82F6;
            --nav-bg: rgba(255,241,242,0.92);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--background);
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            padding-bottom: calc(100px + env(safe-area-inset-bottom));
            min-height: 100vh;
            transition: background 0.3s, color 0.3s;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes navSlideUp { from { opacity: 0; transform: translateX(-50%) translateY(20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
        @keyframes badgePop { 0% { transform: scale(0.5); } 70% { transform: scale(1.2); } 100% { transform: scale(1); } }

        .app-container { max-width: 100%; margin: 0 auto; }
        @media (min-width: 1024px) {
            .app-container { max-width: 600px; border-left: 1px solid var(--border); border-right: 1px solid var(--border); min-height: 100vh; background: var(--surface); }
        }

        /* ── Header ── */
        .header {
            position: sticky; top: 0; z-index: 50;
            background: rgba(255,255,255,0.97);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 12px 16px;
            display: flex; align-items: center; justify-content: space-between;
            transition: background 0.3s, border-color 0.3s;
        }
        [data-theme="dark"] .header { background: rgba(30,41,59,0.97); }
        [data-theme="midnight"] .header { background: rgba(24,24,27,0.98); }
        [data-theme="ocean"] .header { background: rgba(240,249,255,0.97); }
        [data-theme="rose"] .header { background: rgba(255,241,242,0.97); }

        .header-left { display: flex; align-items: center; gap: 12px; }
        .back-btn {
            background: none; border: none; color: var(--text-primary);
            cursor: pointer; padding: 6px; border-radius: 50%; margin-left: -6px;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.15s;
        }
        .back-btn:hover { background: var(--surface2); }
        
        .header-title { font-size: 18px; font-weight: 700; color: var(--text-primary); }

        .header-action {
            background: none; border: none; font-size: 14px; font-weight: 600;
            color: var(--primary); cursor: pointer; font-family: inherit;
        }
        .header-action:disabled { opacity: 0.5; cursor: default; }

        /* ── Notifications List ── */
        .notif-card {
            display: flex; gap: 14px; padding: 16px;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
            cursor: pointer; transition: background 0.15s;
            position: relative;
            animation: fadeIn 0.3s ease-out both;
        }
        .notif-card:hover { background: var(--surface2); }
        
        /* Unread State */
        .notif-card.unread { background: rgba(var(--primary-rgb), 0.04); }
        .notif-card.unread:hover { background: rgba(var(--primary-rgb), 0.08); }
        .unread-dot {
            width: 8px; height: 8px; border-radius: 50%; background: var(--primary);
            position: absolute; right: 16px; top: 50%; transform: translateY(-50%);
        }

        .notif-avatar-wrap { position: relative; width: 46px; height: 46px; flex-shrink: 0; }
        .notif-avatar { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 1px solid var(--border); }
        
        /* Small icon overlay on avatar */
        .notif-icon {
            position: absolute; bottom: -2px; right: -4px;
            width: 22px; height: 22px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            border: 2px solid var(--surface); color: white;
            transition: border-color 0.3s;
        }
        .notif-card.unread .notif-icon { border-color: var(--background); }
        
        .icon-like { background: var(--like); }
        .icon-comment { background: var(--primary); }
        .icon-follow { background: #10B981; } /* Emerald green for follow */
        .icon-mention { background: #F59E0B; } /* Amber for mentions */

        .notif-body { flex: 1; min-width: 0; padding-right: 20px; } /* padding for unread dot */
        .notif-text { font-size: 15px; color: var(--text-primary); line-height: 1.4; }
        .notif-text b { font-weight: 700; }
        .notif-subtext { font-size: 14px; color: var(--text-secondary); margin-top: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .notif-time { font-size: 13px; color: var(--text-muted); margin-top: 6px; }

        /* ── States ── */
        .empty-state { padding: 80px 24px; text-align: center; color: var(--text-muted); }
        .empty-state svg { margin: 0 auto 16px; opacity: 0.3; display: block; color: var(--text-secondary); }
        .empty-state h3 { font-size: 18px; font-weight: 700; color: var(--text-primary); margin-bottom: 8px; }
        .empty-state p { font-size: 15px; }

        .spinner {
            width: 36px; height: 36px; border: 3px solid var(--border);
            border-top-color: var(--primary); border-radius: 50%;
            animation: spin 0.8s linear infinite; margin: 40px auto;
        }

        /* ══════════════════════════════════════════
           PILL BOTTOM NAV
        ══════════════════════════════════════════ */
        .bottom-nav {
            position: fixed; bottom: calc(16px + env(safe-area-inset-bottom));
            left: 50%; transform: translateX(-50%);
            width: calc(100% - 32px); max-width: 420px;
            background: var(--nav-bg); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border); border-radius: 9999px;
            padding: 8px 12px; display: flex; justify-content: space-around; align-items: center;
            z-index: 100; box-shadow: 0 8px 32px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.06);
            animation: navSlideUp 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
            transition: background 0.3s, border-color 0.3s, box-shadow 0.3s;
        }
        [data-theme="dark"] .bottom-nav, [data-theme="midnight"] .bottom-nav {
            box-shadow: 0 8px 32px rgba(0,0,0,0.45), 0 2px 8px rgba(0,0,0,0.3);
        }

        .nav-item {
            flex: 1; display: flex; align-items: center; justify-content: center;
            padding: 10px 4px; background: none; border: none; cursor: pointer;
            color: var(--text-secondary); transition: color 0.2s, transform 0.15s;
            position: relative; border-radius: 9999px;
        }
        .nav-item:active { transform: scale(0.85); }
        .nav-item.active { color: var(--text-primary); }

        .nav-item .nav-dot {
            position: absolute; bottom: 3px; left: 50%; transform: translateX(-50%) scale(0);
            width: 4px; height: 4px; border-radius: 50%; background: var(--primary);
            transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
        }
        .nav-item.active .nav-dot { transform: translateX(-50%) scale(1); }

        .nav-item .nav-icon-filled { display: none; }
        .nav-item .nav-icon-outline { display: block; }
        .nav-item.active .nav-icon-filled { display: block; }
        .nav-item.active .nav-icon-outline { display: none; }

        .nav-fab {
            width: 44px; height: 44px; background: var(--primary); color: white;
            border: none; border-radius: 9999px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; box-shadow: 0 4px 16px rgba(var(--primary-rgb),0.45);
            transition: transform 0.2s, box-shadow 0.2s; flex-shrink: 0;
        }
        .nav-fab:active { transform: scale(0.88); box-shadow: 0 2px 8px rgba(var(--primary-rgb),0.35); }

        .nav-avatar-ring {
            width: 30px; height: 30px; border-radius: 50%; border: 2px solid transparent;
            overflow: hidden; transition: border-color 0.2s;
        }
        .nav-item.active .nav-avatar-ring { border-color: var(--primary); }
        .nav-avatar-ring img { width: 100%; height: 100%; object-fit: cover; display: block; }

        .nav-badge {
            position: absolute; top: 7px; right: calc(50% - 16px);
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--like); border: 2px solid var(--surface);
            display: none; animation: badgePop 0.3s ease-out;
        }
        .nav-badge.show { display: block; }

        @media (min-width: 1024px) { .bottom-nav { display: none; } body { padding-bottom: 0; } }
    </style>
</head>
<body>

<div class="app-container">
    <header class="header">
        <div class="header-left">
            <button class="back-btn" onclick="history.back()">
                <i data-feather="arrow-left" style="width:22px;height:22px;"></i>
            </button>
            <h1 class="header-title">Notifications</h1>
        </div>
        <button id="mark-all-btn" class="header-action" onclick="markAllAsRead()" disabled>Mark all read</button>
    </header>

    <main id="main-content">
        <div id="spinner" class="spinner"></div>
        <div id="notifications-list"></div>
        
        <div id="empty-state" class="empty-state" style="display:none;">
            <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
            </svg>
            <h3>All caught up!</h3>
            <p>You have no new notifications right now.</p>
        </div>
    </main>
</div>

<nav class="bottom-nav" id="bottom-nav">
    <button class="nav-item" onclick="window.location.href='home.html'">
        <svg class="nav-icon-filled" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        <svg class="nav-icon-outline" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12L12 3l9 9"/><path d="M5 10v10a1 1 0 0 0 1 1h4v-5h4v5h4a1 1 0 0 0 1-1V10"/></svg>
        <span class="nav-dot"></span>
    </button>

    <button class="nav-item" onclick="window.location.href='search.html'">
        <svg class="nav-icon-filled" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        <svg class="nav-icon-outline" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <span class="nav-dot"></span>
    </button>

    <button class="nav-fab" onclick="window.location.href='home.html'" aria-label="Create post">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>

    <button class="nav-item active" onclick="window.scrollTo({top:0,behavior:'smooth'})">
        <svg class="nav-icon-filled" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
        <svg class="nav-icon-outline" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <span class="nav-badge" id="badge-notifications"></span>
        <span class="nav-dot"></span>
    </button>

    <button class="nav-item" onclick="window.location.href='profile.html'">
        <div class="nav-avatar-ring">
            <img src="" id="nav-profile-avatar" alt="Profile">
        </div>
        <span class="nav-dot"></span>
    </button>
</nav>

<script type="module">
    import { initializeApp }      from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBOyZ3As4GTuNvjemvPF_SpsC6m6vqtNhc",
        authDomain: "fire-b-a8878.firebaseapp.com",
        databaseURL: "https://fire-b-a8878.firebaseio.com",
        projectId: "fire-b-a8878",
        storageBucket: "fire-b-a8878.appspot.com",
        messagingSenderId: "658673187627",
        appId: "1:658673187627:web:6e4c29af661785f0afa36e"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getDatabase(app);

    // Apply Theme
    document.documentElement.setAttribute('data-theme', localStorage.getItem('vynix_theme') || 'light');

    let currentUser = null;
    let allNotifications = [];
    let unreadIds = [];

    onAuthStateChanged(auth, user => {
        if (!user) { window.location.href = 'signup.html'; return; }
        currentUser = user;
        
        // Setup Avatar for Bottom Nav
        document.getElementById('nav-profile-avatar').src = user.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(user.displayName || 'U')}&background=random`;
        
        listenToNotifications();
    });

    function listenToNotifications() {
        const notifRef = ref(db, `notifications/${currentUser.uid}`);
        
        onValue(notifRef, (snapshot) => {
            document.getElementById('spinner').style.display = 'none';
            allNotifications = [];
            unreadIds = [];
            
            if (snapshot.exists()) {
                snapshot.forEach(childSnapshot => {
                    const data = childSnapshot.val();
                    const id = childSnapshot.key;
                    allNotifications.push({ id, ...data });
                    if (!data.read) unreadIds.push(id);
                });

                // Sort newest first
                allNotifications.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
                renderNotifications();
            } else {
                renderNotifications(); // Will trigger empty state
            }
        });
    }

    function renderNotifications() {
        const listEl = document.getElementById('notifications-list');
        const emptyEl = document.getElementById('empty-state');
        const markBtn = document.getElementById('mark-all-btn');

        if (allNotifications.length === 0) {
            listEl.innerHTML = '';
            emptyEl.style.display = 'block';
            markBtn.disabled = true;
            updateBadge('badge-notifications', 0);
            return;
        }

        emptyEl.style.display = 'none';
        markBtn.disabled = unreadIds.length === 0;
        updateBadge('badge-notifications', unreadIds.length);

        let html = '';
        allNotifications.forEach((notif, index) => {
            const isUnread = !notif.read;
            const actorName = escHtml(notif.actorName || 'Someone');
            const actorAvatar = notif.actorPhoto || `https://ui-avatars.com/api/?name=${encodeURIComponent(actorName)}&background=random`;
            
            let iconHtml = '';
            let textHtml = '';
            let onClickAction = '';

            // Handle different notification types
            switch (notif.type) {
                case 'like':
                    iconHtml = `<div class="notif-icon icon-like"><i data-feather="heart" style="width:12px;height:12px;fill:white;"></i></div>`;
                    textHtml = `<b>${actorName}</b> liked your post.`;
                    onClickAction = `handleNotifClick('${notif.id}', 'home.html#post-${notif.postId}')`;
                    break;
                case 'comment':
                    iconHtml = `<div class="notif-icon icon-comment"><i data-feather="message-circle" style="width:12px;height:12px;fill:white;"></i></div>`;
                    textHtml = `<b>${actorName}</b> commented on your post.`;
                    onClickAction = `handleNotifClick('${notif.id}', 'home.html#post-${notif.postId}')`;
                    break;
                case 'follow':
                    iconHtml = `<div class="notif-icon icon-follow"><i data-feather="user" style="width:13px;height:13px;"></i></div>`;
                    textHtml = `<b>${actorName}</b> started following you.`;
                    onClickAction = `handleNotifClick('${notif.id}', 'profile.html?id=${notif.actorId}')`;
                    break;
                case 'mention':
                    iconHtml = `<div class="notif-icon icon-mention"><i data-feather="at-sign" style="width:13px;height:13px;"></i></div>`;
                    textHtml = `<b>${actorName}</b> mentioned you in a post.`;
                    onClickAction = `handleNotifClick('${notif.id}', 'home.html#post-${notif.postId}')`;
                    break;
                default:
                    iconHtml = `<div class="notif-icon" style="background:var(--text-secondary)"><i data-feather="bell" style="width:12px;height:12px;"></i></div>`;
                    textHtml = `<b>${actorName}</b> interacted with you.`;
                    onClickAction = `handleNotifClick('${notif.id}', '#')`;
            }

            html += `
                <div class="notif-card ${isUnread ? 'unread' : ''}" style="animation-delay: ${index * 30}ms" onclick="${onClickAction}">
                    <div class="notif-avatar-wrap">
                        <img src="${actorAvatar}" alt="${actorName}" class="notif-avatar" loading="lazy">
                        ${iconHtml}
                    </div>
                    <div class="notif-body">
                        <div class="notif-text">${textHtml}</div>
                        ${notif.snippet ? `<div class="notif-subtext">"${escHtml(notif.snippet)}"</div>` : ''}
                        <div class="notif-time">${formatTime(notif.timestamp)}</div>
                    </div>
                    ${isUnread ? `<div class="unread-dot"></div>` : ''}
                </div>
            `;
        });

        listEl.innerHTML = html;
        feather.replace();
    }

    // Mark single notification as read and redirect
    window.handleNotifClick = async (notifId, redirectUrl) => {
        if (!currentUser) return;
        const notif = allNotifications.find(n => n.id === notifId);
        
        // If unread, mark as read in Firebase before navigating
        if (notif && !notif.read) {
            const updates = {};
            updates[`notifications/${currentUser.uid}/${notifId}/read`] = true;
            try {
                await update(ref(db), updates);
            } catch (e) {
                console.error("Error updating notification:", e);
            }
        }
        
        if (redirectUrl !== '#') {
            window.location.href = redirectUrl;
        }
    };

    // Mark all as read action
    window.markAllAsRead = async () => {
        if (!currentUser || unreadIds.length === 0) return;
        
        const updates = {};
        unreadIds.forEach(id => {
            updates[`notifications/${currentUser.uid}/${id}/read`] = true;
        });

        try {
            await update(ref(db), updates);
            // Local state updates handled automatically by onValue listener
        } catch (e) {
            console.error("Error marking all as read:", e);
        }
    };

    // UI Helpers
    function updateBadge(id, count) {
        const b = document.getElementById(id);
        if (!b) return;
        if (count > 0) { b.textContent = count > 99 ? '99+' : count; b.classList.add('show'); }
        else b.classList.remove('show');
    }

    function escHtml(str) { 
        const d = document.createElement('div'); d.textContent = str || ''; return d.innerHTML; 
    }

    function formatTime(ts) {
        if (!ts) return 'now';
        const s = Math.floor((Date.now() - ts) / 1000);
        if (s < 60) return 'now'; 
        if (s < 3600) return Math.floor(s / 60) + 'm';
        if (s < 86400) return Math.floor(s / 3600) + 'h'; 
        if (s < 604800) return Math.floor(s / 86400) + 'd';
        return Math.floor(s / 604800) + 'w';
    }

    feather.replace();
</script>

</body>
</html>
