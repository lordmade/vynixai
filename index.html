<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vynix - Install App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #0F172A;
            color: #F1F5F9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Animated background */
        .bg-mesh {
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(ellipse at 20% 80%, rgba(99,102,241,0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(139,92,246,0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(168,85,247,0.08) 0%, transparent 70%);
            animation: meshMove 20s ease-in-out infinite;
        }
        
        @keyframes meshMove {
            0%, 100% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.1) rotate(2deg); }
        }

        /* Install Modal */
        .install-modal {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 420px;
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 28px;
            padding: 36px 28px 28px;
            text-align: center;
            box-shadow: 
                0 25px 50px -12px rgba(0,0,0,0.5),
                0 0 0 1px rgba(255,255,255,0.05) inset;
            animation: modalIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.9) translateY(30px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .app-icon {
            width: 88px;
            height: 88px;
            background: linear-gradient(135deg, #6366F1 0%, #8B5CF6 50%, #A855F7 100%);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            box-shadow: 0 12px 40px rgba(99,102,241,0.4);
            position: relative;
            overflow: hidden;
        }

        .app-icon::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent 0%, rgba(255,255,255,0.2) 100%);
        }

        .app-icon svg {
            width: 44px;
            height: 44px;
            color: white;
        }

        .modal-title {
            font-size: 26px;
            font-weight: 800;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #fff 0%, #A5B4FC 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .modal-subtitle {
            font-size: 15px;
            color: #94A3B8;
            line-height: 1.6;
            margin-bottom: 28px;
        }

        .features {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 28px;
        }

        .feature {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 16px;
            padding: 16px 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .feature:hover {
            background: rgba(255,255,255,0.06);
            border-color: rgba(99,102,241,0.3);
            transform: translateY(-2px);
        }

        .feature-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, rgba(99,102,241,0.2), rgba(139,92,246,0.2));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #818CF8;
        }

        .feature-icon svg {
            width: 18px;
            height: 18px;
        }

        .feature-text {
            font-size: 12px;
            font-weight: 600;
            color: #CBD5E1;
        }

        .btn-install {
            width: 100%;
            padding: 16px 24px;
            background: linear-gradient(135deg, #6366F1 0%, #8B5CF6 50%, #A855F7 100%);
            border: none;
            border-radius: 16px;
            color: white;
            font-family: inherit;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 8px 32px rgba(99,102,241,0.35);
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .btn-install::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            animation: shimmer 2.5s infinite;
        }

        @keyframes shimmer {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        .btn-install:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(99,102,241,0.45);
        }

        .btn-install:active {
            transform: scale(0.98);
        }

        .btn-install:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-install.spinning::after {
            content: '';
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .btn-skip {
            width: 100%;
            padding: 14px 24px;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 16px;
            color: #94A3B8;
            font-family: inherit;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-skip:hover {
            border-color: rgba(255,255,255,0.3);
            color: #CBD5E1;
            background: rgba(255,255,255,0.03);
        }

        .btn-skip:active {
            transform: scale(0.98);
        }

        /* iOS specific instructions */
        .ios-instructions {
            display: none;
            background: rgba(255,255,255,0.03);
            border: 1px dashed rgba(255,255,255,0.15);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: left;
        }

        .ios-instructions.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .ios-instructions h4 {
            font-size: 14px;
            font-weight: 600;
            color: #E2E8F0;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .ios-step {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 13px;
            color: #94A3B8;
            margin-bottom: 10px;
        }

        .ios-step:last-child {
            margin-bottom: 0;
        }

        .ios-icon {
            width: 28px;
            height: 28px;
            background: rgba(99,102,241,0.15);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .ios-icon svg {
            width: 16px;
            height: 16px;
            color: #818CF8;
        }

        /* Redirect countdown */
        .redirect-notice {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 9999px;
            padding: 12px 24px;
            font-size: 13px;
            color: #94A3B8;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .redirect-notice.show {
            opacity: 1;
        }

        .redirect-notice span {
            color: #818CF8;
            font-weight: 600;
        }

        /* Pulse animation for waiting state */
        .pulse-ring {
            position: absolute;
            inset: -4px;
            border-radius: 28px;
            border: 2px solid rgba(99,102,241,0.3);
            animation: pulse 2s ease-out infinite;
            pointer-events: none;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.05); opacity: 0; }
        }

        /* Particles */
        .particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(99,102,241,0.4);
            border-radius: 50%;
            animation: float 15s infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="bg-mesh"></div>
    
    <div class="particles" id="particles"></div>

    <!-- Install Modal -->
    <div class="install-modal" id="install-modal">
        <div class="pulse-ring" id="pulse-ring" style="display: none;"></div>
        
        <div class="app-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
            </svg>
        </div>

        <h1 class="modal-title">Install Vynix</h1>
        <p class="modal-subtitle">Get the best experience with our app. Faster, offline-ready, and always at your fingertips.</p>

        <div class="features">
            <div class="feature">
                <div class="feature-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
                </div>
                <span class="feature-text">Instant Launch</span>
            </div>
            <div class="feature">
                <div class="feature-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a10 10 0 1 0 10 10H12V2z"/><path d="M12 2a10 10 0 0 1 10 10"/></svg>
                </div>
                <span class="feature-text">Offline Mode</span>
            </div>
            <div class="feature">
                <div class="feature-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
                </div>
                <span class="feature-text">Push Alerts</span>
            </div>
            <div class="feature">
                <div class="feature-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18"/></svg>
                </div>
                <span class="feature-text">No Browser</span>
            </div>
        </div>

        <!-- iOS Instructions (hidden by default) -->
        <div class="ios-instructions" id="ios-instructions">
            <h4>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
                iOS Installation
            </h4>
            <div class="ios-step">
                <div class="ios-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"/></svg>
                </div>
                <span>Tap the <strong>Share</strong> button in Safari's toolbar</span>
            </div>
            <div class="ios-step">
                <div class="ios-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M8 12h8M12 8v8"/></svg>
                </div>
                <span>Scroll down and tap <strong>"Add to Home Screen"</strong></span>
            </div>
        </div>

        <button class="btn-install" id="btn-install" onclick="handleInstall()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 16l-5-5h3V4h4v7h3l-5 5zm-7 4h14v-2H5v2z"/>
            </svg>
            <span id="install-text">Install App</span>
        </button>

        <button class="btn-skip" id="btn-skip" onclick="skipInstall()">
            Continue to Website
        </button>
    </div>

    <div class="redirect-notice" id="redirect-notice">
        Redirecting in <span id="countdown">5</span>s...
    </div>

    <script>
        // Configuration
        const REDIRECT_URL = 'home.html'; // Change to your main app URL
        const COUNTDOWN_SECONDS = 5;
        
        let deferredPrompt = null;
        let isStandalone = false;
        let countdownInterval = null;
        let isIOS = false;

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            createParticles();
            checkStandalone();
            detectIOS();
            initPWA();
        });

        // Create floating particles
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 20; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + '%';
                p.style.animationDelay = Math.random() * 15 + 's';
                p.style.animationDuration = (10 + Math.random() * 10) + 's';
                container.appendChild(p);
            }
        }

        // Check if running as installed PWA
        function checkStandalone() {
            isStandalone = window.matchMedia('(display-mode: standalone)').matches || 
                          window.navigator.standalone === true;
            
            if (isStandalone) {
                // Already installed, redirect immediately
                window.location.replace(REDIRECT_URL);
            }
        }

        // Detect iOS
        function detectIOS() {
            isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
        }

        // Initialize PWA install detection
        function initPWA() {
            // Capture the beforeinstallprompt event
            window.addEventListener('beforeinstallprompt', (e) => {
                e.preventDefault();
                deferredPrompt = e;
                console.log('PWA install prompt ready');
            });

            // Listen for app installed
            window.addEventListener('appinstalled', () => {
                deferredPrompt = null;
                redirectToApp();
            });

            // If no prompt available after short delay, show iOS instructions if on iOS
            setTimeout(() => {
                if (!deferredPrompt && isIOS) {
                    showIOSInstructions();
                }
            }, 1000);
        }

        function showIOSInstructions() {
            document.getElementById('ios-instructions').classList.add('show');
            document.getElementById('install-text').textContent = 'I\'ve Added It';
        }

        async function handleInstall() {
            const btn = document.getElementById('btn-install');
            const text = document.getElementById('install-text');
            const pulse = document.getElementById('pulse-ring');

            // iOS case - user has manually added
            if (isIOS && !deferredPrompt) {
                redirectToApp();
                return;
            }

            // No prompt available
            if (!deferredPrompt) {
                text.textContent = 'Opening in browser...';
                startCountdown();
                return;
            }

            // Show install prompt
            pulse.style.display = 'block';
            btn.classList.add('spinning');
            text.textContent = 'Installing...';

            try {
                deferredPrompt.prompt();
                const result = await deferredPrompt.userChoice;

                if (result.outcome === 'accepted') {
                    text.textContent = '✓ Installed!';
                    setTimeout(redirectToApp, 800);
                } else {
                    // User dismissed install
                    pulse.style.display = 'none';
                    btn.classList.remove('spinning');
                    text.textContent = 'Install App';
                    // Continue showing modal, don't auto-redirect
                }
                
                deferredPrompt = null;
            } catch (err) {
                pulse.style.display = 'none';
                btn.classList.remove('spinning');
                text.textContent = 'Install App';
                console.error('Install error:', err);
            }
        }

        function skipInstall() {
            const skipBtn = document.getElementById('btn-skip');
            skipBtn.textContent = 'Continuing...';
            startCountdown();
        }

        function startCountdown() {
            const notice = document.getElementById('redirect-notice');
            const countdownEl = document.getElementById('countdown');
            
            notice.classList.add('show');
            
            let seconds = COUNTDOWN_SECONDS;
            countdownEl.textContent = seconds;

            countdownInterval = setInterval(() => {
                seconds--;
                countdownEl.textContent = seconds;
                
                if (seconds <= 0) {
                    clearInterval(countdownInterval);
                    redirectToApp();
                }
            }, 1000);
        }

        function redirectToApp() {
            window.location.replace(REDIRECT_URL);
        }

        // Prevent accidental navigation
        window.addEventListener('beforeunload', (e) => {
            if (countdownInterval) {
                e.preventDefault();
                e.returnValue = '';
            }
        });
    </script>
</body>
</html>
