<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vynix · Search</title>
    <script src="https://unpkg.com/feather-icons"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        /* ══ THEME SYSTEM ══ */
        :root,[data-theme="light"]{
            --primary:#6366F1;--primary-dark:#4F46E5;--primary-rgb:99,102,241;
            --background:#F8FAFC;--surface:#FFFFFF;--surface2:#F1F5F9;--surface3:#E2E8F0;
            --border:#E2E8F0;--text-primary:#0F172A;--text-secondary:#64748B;--text-muted:#94A3B8;
            --like:#F43F5E;--verified:#1D9BF0;--repost:#10B981;
            --shadow:0 1px 3px rgba(0,0,0,0.06);--shadow-lg:0 12px 40px rgba(0,0,0,0.1);
            --glow:0 0 0 3px rgba(99,102,241,0.12);
        }
        [data-theme="dark"]{
            --primary:#818CF8;--primary-dark:#6366F1;--primary-rgb:129,140,248;
            --background:#0F172A;--surface:#1E293B;--surface2:#334155;--surface3:#475569;
            --border:#334155;--text-primary:#F1F5F9;--text-secondary:#94A3B8;--text-muted:#64748B;
            --like:#FB7185;--verified:#38BDF8;--repost:#34D399;
            --shadow:0 1px 3px rgba(0,0,0,0.3);--shadow-lg:0 12px 40px rgba(0,0,0,0.5);
            --glow:0 0 0 3px rgba(129,140,248,0.15);
        }
        [data-theme="midnight"]{
            --primary:#C084FC;--primary-dark:#A855F7;--primary-rgb:192,132,252;
            --background:#09090B;--surface:#18181B;--surface2:#27272A;--surface3:#3F3F46;
            --border:#3F3F46;--text-primary:#FAFAFA;--text-secondary:#A1A1AA;--text-muted:#71717A;
            --like:#F472B6;--verified:#67E8F9;--repost:#4ADE80;
            --shadow:0 1px 3px rgba(0,0,0,0.4);--shadow-lg:0 12px 40px rgba(0,0,0,0.7);
            --glow:0 0 0 3px rgba(192,132,252,0.15);
        }
        [data-theme="ocean"]{
            --primary:#06B6D4;--primary-dark:#0891B2;--primary-rgb:6,182,212;
            --background:#F0F9FF;--surface:#FFFFFF;--surface2:#E0F2FE;--surface3:#BAE6FD;
            --border:#BAE6FD;--text-primary:#0C4A6E;--text-secondary:#0369A1;--text-muted:#7DD3FC;
            --like:#F43F5E;--verified:#06B6D4;--repost:#10B981;
            --shadow:0 1px 3px rgba(6,182,212,0.08);--shadow-lg:0 12px 40px rgba(6,182,212,0.15);
            --glow:0 0 0 3px rgba(6,182,212,0.12);
        }
        [data-theme="rose"]{
            --primary:#E11D48;--primary-dark:#BE123C;--primary-rgb:225,29,72;
            --background:#FFF1F2;--surface:#FFFFFF;--surface2:#FFE4E6;--surface3:#FECDD3;
            --border:#FECDD3;--text-primary:#881337;--text-secondary:#9F1239;--text-muted:#FDA4AF;
            --like:#E11D48;--verified:#3B82F6;--repost:#10B981;
            --shadow:0 1px 3px rgba(225,29,72,0.08);--shadow-lg:0 12px 40px rgba(225,29,72,0.15);
            --glow:0 0 0 3px rgba(225,29,72,0.12);
        }

        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

        body{
            font-family:'Inter',sans-serif;
            background:var(--background);color:var(--text-primary);
            -webkit-font-smoothing:antialiased;overflow-x:hidden;
            padding-bottom:calc(90px + env(safe-area-inset-bottom));
            min-height:100vh;transition:background 0.3s,color 0.3s;
        }

        @keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
        @keyframes fadeInUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
        @keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}
        @keyframes spin{to{transform:rotate(360deg);}}
        @keyframes scaleIn{from{opacity:0;transform:scale(0.92);}to{opacity:1;transform:scale(1);}}
        @keyframes slideRight{from{opacity:0;transform:translateX(-12px);}to{opacity:1;transform:translateX(0);}}
        @keyframes pulseDot{0%,100%{transform:scale(1);opacity:1;}50%{transform:scale(1.4);opacity:0.6;}}

        .shimmer{
            background:linear-gradient(90deg,var(--surface2) 25%,var(--surface3) 50%,var(--surface2) 75%);
            background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px;
        }

        /* ══ LAYOUT ══ */
        .app-container{max-width:100%;margin:0 auto;}
        @media(min-width:1024px){.app-container{max-width:600px;border-left:1px solid var(--border);border-right:1px solid var(--border);}}

        /* ══ HEADER ══ */
        .header{
            position:sticky;top:0;z-index:50;
            background:rgba(255,255,255,0.94);
            backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
            border-bottom:1px solid var(--border);
            padding:12px 16px 0;
            transition:background 0.3s,border-color 0.3s;
        }
        [data-theme="dark"] .header{background:rgba(30,41,59,0.94);}
        [data-theme="midnight"] .header{background:rgba(24,24,27,0.96);}
        [data-theme="ocean"] .header{background:rgba(240,249,255,0.94);}
        [data-theme="rose"] .header{background:rgba(255,241,242,0.94);}

        .search-bar-row{display:flex;align-items:center;gap:10px;padding-bottom:12px;}

        .back-btn{
            background:none;border:none;color:var(--text-primary);cursor:pointer;
            padding:8px;border-radius:50%;display:flex;align-items:center;justify-content:center;
            flex-shrink:0;transition:background 0.15s,transform 0.15s;
        }
        .back-btn:hover{background:var(--surface2);transform:scale(1.05);}
        .back-btn:active{transform:scale(0.92);}

        .search-input-wrap{
            flex:1;display:flex;align-items:center;gap:10px;
            background:var(--surface2);
            border:1.5px solid transparent;
            border-radius:14px;padding:11px 16px;
            transition:border-color 0.2s,box-shadow 0.2s,background 0.2s;
        }
        .search-input-wrap:focus-within{
            border-color:var(--primary);
            box-shadow:var(--glow);
            background:var(--surface);
        }
        .search-input-wrap i{color:var(--text-muted);flex-shrink:0;transition:color 0.2s;}
        .search-input-wrap:focus-within i{color:var(--primary);}

        #search-input{
            flex:1;border:none;outline:none;background:transparent;
            font-size:16px;font-family:inherit;color:var(--text-primary);
            font-weight:500;
        }
        #search-input::placeholder{color:var(--text-muted);font-weight:400;}

        .clear-btn{
            background:var(--surface3);border:none;color:var(--text-muted);
            width:20px;height:20px;border-radius:50%;
            display:none;align-items:center;justify-content:center;
            cursor:pointer;flex-shrink:0;transition:background 0.15s,color 0.15s;
        }
        .clear-btn.show{display:flex;}
        .clear-btn:hover{background:var(--like);color:white;}

        /* ══ FILTER TABS ══ */
        .filter-tabs{
            display:flex;gap:0;overflow-x:auto;scrollbar-width:none;
            border-bottom:1px solid var(--border);
            background:var(--surface);
            margin:0 -16px;
            transition:background 0.3s;
        }
        .filter-tabs::-webkit-scrollbar{display:none;}

        .filter-tab{
            flex:1;min-width:72px;padding:13px 10px;
            text-align:center;font-size:14px;font-weight:600;
            color:var(--text-secondary);background:none;border:none;
            cursor:pointer;position:relative;transition:color 0.2s;
            font-family:inherit;white-space:nowrap;
        }
        .filter-tab::after{
            content:'';position:absolute;bottom:0;left:16%;right:16%;
            height:2.5px;border-radius:2px 2px 0 0;background:var(--primary);
            transform:scaleX(0);transition:transform 0.25s cubic-bezier(0.4,0,0.2,1);
        }
        .filter-tab.active{color:var(--primary);}
        .filter-tab.active::after{transform:scaleX(1);}
        .filter-tab:hover:not(.active){color:var(--text-primary);}

        /* ══ SECTIONS ══ */
        .section-label{
            font-size:11px;font-weight:800;letter-spacing:0.08em;
            text-transform:uppercase;color:var(--text-muted);
            padding:18px 16px 10px;
        }

        /* ══ TRENDING CHIPS — horizontal scroll ══ */
        .chips-scroll{
            display:flex;gap:8px;padding:4px 16px 16px;
            overflow-x:auto;scrollbar-width:none;
            -webkit-overflow-scrolling:touch;
        }
        .chips-scroll::-webkit-scrollbar{display:none;}

        .trend-chip{
            display:flex;align-items:center;gap:5px;
            background:var(--surface);border:1.5px solid var(--border);
            border-radius:9999px;padding:7px 14px;
            font-size:13px;font-weight:600;color:var(--text-secondary);
            cursor:pointer;white-space:nowrap;flex-shrink:0;
            transition:all 0.2s;box-shadow:var(--shadow);
        }
        .trend-chip:hover{
            border-color:var(--primary);color:var(--primary);
            background:rgba(var(--primary-rgb),0.06);
            transform:translateY(-1px);box-shadow:var(--shadow-lg);
        }
        .trend-chip:active{transform:translateY(0);}
        .trend-chip .chip-count{
            font-size:11px;font-weight:500;color:var(--text-muted);
            background:var(--surface2);padding:1px 6px;border-radius:9999px;
        }
        .trend-chip .chip-hash{color:var(--primary);}

        /* ══ TRENDING POSTS — ranked list ══ */
        .trending-post{
            display:flex;align-items:center;gap:14px;
            padding:14px 16px;border-bottom:1px solid var(--border);
            background:var(--surface);cursor:pointer;
            transition:background 0.15s;animation:fadeIn 0.3s ease-out;
        }
        .trending-post:hover{background:var(--surface2);}
        .trending-post:active{background:var(--surface3);}

        .trend-rank{
            font-size:22px;font-weight:900;
            background:linear-gradient(135deg,var(--primary),var(--like));
            -webkit-background-clip:text;-webkit-text-fill-color:transparent;
            background-clip:text;width:28px;flex-shrink:0;text-align:center;line-height:1;
        }
        .trend-rank.muted{background:none;-webkit-text-fill-color:var(--surface3);color:var(--surface3);}

        .trend-body{flex:1;min-width:0;}
        .trend-title{
            font-size:15px;font-weight:700;color:var(--text-primary);
            overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:3px;
        }
        .trend-sub{font-size:12px;color:var(--text-muted);display:flex;align-items:center;gap:6px;}
        .trend-sub-dot{width:3px;height:3px;border-radius:50%;background:var(--surface3);}

        .trending-thumb{
            width:52px;height:52px;border-radius:12px;
            object-fit:cover;flex-shrink:0;
            border:1px solid var(--border);
        }

        /* ══ USER CARDS ══ */
        .user-card{
            display:flex;align-items:center;gap:13px;
            padding:13px 16px;border-bottom:1px solid var(--border);
            background:var(--surface);cursor:pointer;
            transition:background 0.15s;animation:fadeInUp 0.35s ease-out both;
        }
        .user-card:hover{background:var(--surface2);}
        .user-card:active{background:var(--surface3);}

        .user-avatar-wrap{position:relative;flex-shrink:0;}
        .user-avatar{width:48px;height:48px;border-radius:50%;object-fit:cover;}
        .online-dot{
            position:absolute;bottom:1px;right:1px;
            width:11px;height:11px;border-radius:50%;
            background:#22C55E;border:2px solid var(--surface);
            animation:pulseDot 2s ease-in-out infinite;
        }

        .user-info{flex:1;min-width:0;}
        .user-name-row{display:flex;align-items:center;gap:5px;font-weight:700;font-size:15px;margin-bottom:2px;}
        .user-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text-primary);}
        .user-handle{font-size:13px;color:var(--text-muted);}
        .user-bio{font-size:13px;color:var(--text-secondary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:2px;}
        .user-follower-count{font-size:12px;color:var(--text-muted);margin-top:2px;}

        .verified-badge{color:var(--verified);display:inline-flex;align-items:center;flex-shrink:0;}

        .follow-btn{
            background:var(--primary);color:white;border:none;
            padding:8px 16px;border-radius:9999px;
            font-size:13px;font-weight:700;cursor:pointer;flex-shrink:0;
            transition:all 0.2s;font-family:inherit;white-space:nowrap;
            box-shadow:0 2px 8px rgba(var(--primary-rgb),0.3);
        }
        .follow-btn:hover{opacity:0.88;transform:translateY(-1px);}
        .follow-btn:active{transform:scale(0.95);}
        .follow-btn.following{
            background:var(--surface2);color:var(--text-primary);
            border:1.5px solid var(--border);box-shadow:none;
        }

        /* ══ POST RESULT ══ */
        .post-result{
            background:var(--surface);border-bottom:1px solid var(--border);
            padding:15px 16px;cursor:pointer;
            transition:background 0.15s;animation:fadeInUp 0.35s ease-out both;
        }
        .post-result:hover{background:var(--surface2);}
        .post-result:active{background:var(--surface3);}

        .post-result-header{display:flex;align-items:center;gap:10px;margin-bottom:9px;}
        .post-result-avatar{width:38px;height:38px;border-radius:50%;object-fit:cover;flex-shrink:0;}
        .post-result-meta{flex:1;min-width:0;}
        .post-result-name{font-weight:700;font-size:14px;display:flex;align-items:center;gap:4px;color:var(--text-primary);}
        .post-result-handle{font-size:12px;color:var(--text-muted);display:flex;align-items:center;gap:4px;}

        .post-result-text{
            font-size:15px;line-height:1.55;color:var(--text-primary);
            display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;
        }
        .highlight{
            background:rgba(var(--primary-rgb),0.14);color:var(--primary);
            font-weight:700;border-radius:4px;padding:0 3px;
        }

        .post-result-media{
            margin-top:10px;border-radius:12px;overflow:hidden;border:1px solid var(--border);
        }
        .post-result-media img{width:100%;max-height:200px;object-fit:cover;display:block;}

        .post-result-stats{
            display:flex;gap:16px;margin-top:10px;
            color:var(--text-muted);font-size:13px;font-weight:500;
        }
        .post-stat{display:flex;align-items:center;gap:5px;}

        /* ══ RECENT SEARCHES ══ */
        .recent-wrap{padding:0 16px 8px;}
        .recent-header{
            display:flex;align-items:center;justify-content:space-between;
            padding:16px 0 10px;
        }
        .recent-item{
            display:flex;align-items:center;gap:12px;padding:10px 0;
            cursor:pointer;border-radius:12px;transition:background 0.15s;
            animation:slideRight 0.25s ease-out both;
        }
        .recent-item:hover{background:var(--surface2);padding-left:8px;padding-right:8px;margin:0 -8px;}
        .recent-icon{
            width:36px;height:36px;border-radius:50%;background:var(--surface2);
            display:flex;align-items:center;justify-content:center;
            color:var(--text-secondary);flex-shrink:0;
        }
        .recent-text{flex:1;font-size:15px;color:var(--text-primary);font-weight:500;}
        .recent-remove{
            background:none;border:none;color:var(--text-muted);cursor:pointer;
            padding:6px;border-radius:50%;display:flex;align-items:center;justify-content:center;
            transition:color 0.15s,background 0.15s;
        }
        .recent-remove:hover{color:var(--like);background:rgba(244,63,94,0.08);}

        /* ══ STATES ══ */
        .empty-state{
            padding:72px 24px;text-align:center;color:var(--text-muted);
            animation:fadeIn 0.4s ease-out;
        }
        .empty-icon{
            width:72px;height:72px;border-radius:24px;background:var(--surface2);
            display:flex;align-items:center;justify-content:center;margin:0 auto 20px;
        }
        .empty-title{font-size:20px;font-weight:800;color:var(--text-primary);margin-bottom:8px;}
        .empty-sub{font-size:14px;line-height:1.5;}

        .spinner-wrap{padding:48px;text-align:center;}
        .spinner{
            width:32px;height:32px;border:3px solid var(--border);
            border-top-color:var(--primary);border-radius:50%;
            animation:spin 0.7s linear infinite;margin:0 auto;
        }

        /* ══ SKELETON CARDS ══ */
        .skel-card{padding:13px 16px;border-bottom:1px solid var(--border);background:var(--surface);}
        .skel-user{display:flex;gap:12px;align-items:center;}

        /* ══ CATEGORIES GRID (for discover) ══ */
        .categories-grid{
            display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:4px 16px 16px;
        }
        .category-card{
            border-radius:16px;padding:20px 16px;cursor:pointer;
            position:relative;overflow:hidden;min-height:90px;
            display:flex;flex-direction:column;justify-content:flex-end;
            transition:transform 0.2s,box-shadow 0.2s;
            animation:scaleIn 0.35s ease-out both;
        }
        .category-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);}
        .category-card:active{transform:scale(0.97);}
        .category-title{font-size:15px;font-weight:800;color:white;position:relative;z-index:1;}
        .category-count{font-size:12px;font-weight:500;color:rgba(255,255,255,0.75);margin-top:2px;position:relative;z-index:1;}
        .category-bg{position:absolute;inset:0;border-radius:inherit;}
        .category-emoji{position:absolute;top:12px;right:12px;font-size:28px;opacity:0.85;}

        /* ══ BOTTOM NAV ══ */
        .bottom-nav{
            position:fixed;bottom:0;left:0;right:0;
            background:rgba(255,255,255,0.96);backdrop-filter:blur(20px);
            border-top:1px solid var(--border);
            padding:8px 0 calc(8px + env(safe-area-inset-bottom));
            display:flex;justify-content:space-around;z-index:100;
            transition:background 0.3s,border-color 0.3s;
        }
        [data-theme="dark"] .bottom-nav,[data-theme="midnight"] .bottom-nav{background:rgba(30,41,59,0.97);}
        [data-theme="midnight"] .bottom-nav{background:rgba(24,24,27,0.97);}

        .nav-item{
            flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;
            padding:8px;color:var(--text-secondary);background:none;border:none;
            font-family:inherit;cursor:pointer;transition:color 0.2s;position:relative;
        }
        .nav-item.active{color:var(--primary);}
        .nav-item span{font-size:11px;font-weight:600;}

        .nav-badge{
            position:absolute;top:4px;right:calc(50% - 16px);
            background:var(--like);color:white;font-size:10px;font-weight:800;
            min-width:18px;height:18px;border-radius:9px;display:none;
            align-items:center;justify-content:center;padding:0 5px;border:2px solid var(--surface);
        }
        .nav-badge.show{display:flex;}

        .fab{
            width:56px;height:56px;background:var(--primary);color:white;border:none;
            border-radius:50%;display:flex;align-items:center;justify-content:center;
            box-shadow:0 4px 20px rgba(var(--primary-rgb),0.4);transform:translateY(-20px);
            cursor:pointer;transition:transform 0.2s;
        }
        .fab:active{transform:translateY(-20px) scale(0.9);}

        /* ══ TOAST ══ */
        .toast{
            position:fixed;bottom:100px;left:50%;
            transform:translateX(-50%) translateY(100px);
            background:var(--text-primary);color:var(--surface);
            padding:12px 24px;border-radius:9999px;font-weight:600;
            opacity:0;transition:all 0.3s;z-index:9999;pointer-events:none;white-space:nowrap;
        }
        .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

        /* ══ DIVIDER ══ */
        .divider{height:8px;background:var(--surface2);border-top:1px solid var(--border);border-bottom:1px solid var(--border);}

        /* Clear btn for recent */
        .clear-all-btn{background:none;border:none;color:var(--primary);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}

        @media(min-width:1024px){.bottom-nav{display:none;}body{padding-bottom:0;}}
    </style>
</head>
<body>

<div class="app-container">

    <!-- ── HEADER ── -->
    <header class="header">
        <div class="search-bar-row">
            <button class="back-btn" onclick="history.back()">
                <i data-feather="arrow-left" style="width:20px;height:20px;"></i>
            </button>
            <div class="search-input-wrap">
                <i data-feather="search" style="width:18px;height:18px;"></i>
                <input
                    type="text" id="search-input"
                    placeholder="Search people, posts, tags…"
                    autocomplete="off" autocorrect="off" spellcheck="false"
                    oninput="onSearchInput()" onkeydown="onSearchKeydown(event)"
                >
                <button class="clear-btn" id="clear-btn" onclick="clearSearch()">
                    <i data-feather="x" style="width:12px;height:12px;"></i>
                </button>
            </div>
        </div>
        <!-- Filter tabs — shown only during active search -->
        <div class="filter-tabs" id="filter-tabs" style="display:none;">
            <button class="filter-tab active" data-tab="all" onclick="switchTab('all')">All</button>
            <button class="filter-tab" data-tab="people" onclick="switchTab('people')">People</button>
            <button class="filter-tab" data-tab="posts" onclick="switchTab('posts')">Posts</button>
            <button class="filter-tab" data-tab="tags" onclick="switchTab('tags')">Tags</button>
        </div>
    </header>

    <main id="main-content">

        <!-- ══════════════════ DEFAULT VIEW ══════════════════ -->
        <div id="default-view">

            <!-- Recent searches -->
            <div id="recent-section" style="display:none;">
                <div class="recent-wrap">
                    <div class="recent-header">

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp }    from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getDatabase, ref, get, set, remove, onValue, serverTimestamp }
    from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const VERIFIED_SVG = `<svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor" style="color:var(--verified);"><path d="M22.25 12c0-1.43-.88-2.67-2.19-3.34.46-1.39.2-2.9-.81-3.91s-2.52-1.27-3.91-.81c-.66-1.31-1.91-2.19-3.34-2.19s-2.67.88-3.33 2.19c-1.4-.46-2.91-.2-3.92.81s-1.26 2.52-.8 3.91c-1.31.67-2.2 1.91-2.2 3.34s.89 2.67 2.2 3.34c-.46 1.39-.21 2.9.8 3.91s2.52 1.26 3.91.81c.67 1.31 1.91 2.19 3.34 2.19s2.68-.88 3.34-2.19c1.39.45 2.9.2 3.91-.81s1.27-2.52.81-3.91c1.31-.67 2.19-1.91 2.19-3.34zm-11.71 4.2L6.8 12.22l1.41-1.41 2.83 2.83 5.66-5.66 1.41 1.41-7.07 7.22z"/></svg>`;

const firebaseConfig = {
    apiKey:"AIzaSyBOyZ3As4GTuNvjemvPF_SpsC6m6vqtNhc",
    authDomain:"fire-b-a8878.firebaseapp.com",
    databaseURL:"https://fire-b-a8878.firebaseio.com",
    projectId:"fire-b-a8878",storageBucket:"fire-b-a8878.appspot.com",
    messagingSenderId:"658673187627",appId:"1:658673187627:web:6e4c29af661785f0afa36e"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getDatabase(app);

let currentUser = null;
let allUsers = [], allPosts = [], followingMap = {};
let searchDebounce = null, activeTab = 'all';
let recentSearches = JSON.parse(localStorage.getItem('vynix_recent') || '[]');

// ── Apply theme immediately ──
document.documentElement.setAttribute('data-theme', localStorage.getItem('vynix_theme') || 'light');

// ── Discover categories ──
const CATEGORIES = [
    { label: 'Music',      emoji: '🎵', gradient: 'linear-gradient(135deg,#6366F1,#8B5CF6)', tag: '#music' },
    { label: 'Art',        emoji: '🎨', gradient: 'linear-gradient(135deg,#F59E0B,#EF4444)', tag: '#art' },
    { label: 'Tech',       emoji: '💻', gradient: 'linear-gradient(135deg,#06B6D4,#3B82F6)', tag: '#tech' },
    { label: 'Fitness',    emoji: '🏋️', gradient: 'linear-gradient(135deg,#10B981,#06B6D4)', tag: '#fitness' },
    { label: 'Food',       emoji: '🍜', gradient: 'linear-gradient(135deg,#F97316,#EAB308)', tag: '#food' },
    { label: 'Travel',     emoji: '✈️', gradient: 'linear-gradient(135deg,#8B5CF6,#EC4899)', tag: '#travel' },
    { label: 'Fashion',    emoji: '👗', gradient: 'linear-gradient(135deg,#EC4899,#F43F5E)', tag: '#fashion' },
    { label: 'Gaming',     emoji: '🎮', gradient: 'linear-gradient(135deg,#1D9BF0,#6366F1)', tag: '#gaming' },
];

// ── Bootstrap ──
onAuthStateChanged(auth, async user => {
    if (!user) { window.location.href = 'auth.html'; return; }
    currentUser = user;
    setupBadges();
    renderCategories();
    renderRecentSearches();
    await loadAllData();
    renderTrendingChips();
    renderTrendingPosts();
    renderSuggestedPeople();
    feather.replace();
});

async function loadAllData() {
    const [usersSnap, postsSnap, followSnap] = await Promise.all([
        get(ref(db, 'users')),
        get(ref(db, 'posts')),
        get(ref(db, `users/${currentUser.uid}/following`))
    ]);

    allUsers = [];
    if (usersSnap.exists()) usersSnap.forEach(c => { if (c.key !== currentUser.uid) allUsers.push({ uid:c.key,...c.val() }); });

    allPosts = [];
    if (postsSnap.exists()) {
        postsSnap.forEach(c => allPosts.push({ id:c.key,...c.val() }));
        allPosts.sort((a,b) => (b.timestamp||0) - (a.timestamp||0));
    }

    followingMap = {};
    if (followSnap.exists()) followSnap.forEach(c => { followingMap[c.key] = true; });
}

// ── Render categories ──
function renderCategories() {
    const grid = document.getElementById('categories-grid');
    grid.innerHTML = CATEGORIES.map((cat, i) => `
        <div class="category-card" style="animation-delay:${i*50}ms" onclick="searchTag('${cat.tag}')">
            <div class="category-bg" style="background:${cat.gradient};"></div>
            <div class="category-emoji">${cat.emoji}</div>
            <div class="category-title">${cat.label}</div>
        </div>
    `).join('');
}

// ── Trending chips ──
function renderTrendingChips() {
    const tagCount = {};
    allPosts.forEach(p => {
        const matches = (p.text||'').match(/#([a-zA-Z0-9_]+)/g) || [];
        matches.forEach(t => { tagCount[t] = (tagCount[t]||0)+1; });
    });
    let sorted = Object.entries(tagCount).sort((a,b)=>b[1]-a[1]).slice(0,12);
    const defaults = ['#trending','#viral','#fyp','#vynix','#explore','#new','#hot','#today','#tech','#music'];
    defaults.forEach(d => { if (!tagCount[d] && sorted.length < 10) sorted.push([d, 0]); });

    document.getElementById('trending-chips').innerHTML = sorted.slice(0,10).map(([tag, count]) => `
        <div class="trend-chip" onclick="searchTag('${escH(tag)}')">
            <span class="chip-hash">#</span>${escH(tag.slice(1))}
            ${count > 0 ? `<span class="chip-count">${count > 999 ? (count/1000).toFixed(1)+'K' : count}</span>` : ''}
        </div>
    `).join('');
}

// ── Trending posts ──
function renderTrendingPosts() {
    const container = document.getElementById('trending-posts-list');
    const top = [...allPosts]
        .sort((a,b) => Object.keys(b.likes||{}).length - Object.keys(a.likes||{}).length)
        .slice(0, 6);

    if (!top.length) { container.innerHTML = ''; return; }

    Promise.all(top.map(async (post, idx) => {
        const us = await get(ref(db, `users/${post.uid}`));
        const user = us.val() || {};
        const likeCount = Object.keys(post.likes||{}).length;
        const commentCount = Object.keys(post.comments||{}).length;
        const snippet = (post.text||'').slice(0,70) + ((post.text||'').length > 70 ? '…' : '');
        const rankClass = idx < 3 ? '' : 'muted';
        return `
            <div class="trending-post" onclick="goToPost('${post.id}')">
                <div class="trend-rank ${rankClass}">${idx+1}</div>
                <div class="trend-body">
                    <div class="trend-title">${escH(snippet || '(media post)')}</div>
                    <div class="trend-sub">
                        <span>@${escH(user.username||'user')}</span>
                        <span class="trend-sub-dot"></span>
                        <span>❤️ ${likeCount}</span>
                        <span class="trend-sub-dot"></span>
                        <span>💬 ${commentCount}</span>
                    </div>
                </div>
                ${post.mediaUrl && post.mediaType!=='video' ? `<img class="trending-thumb" src="${post.mediaUrl}" loading="lazy">` : ''}
            </div>
        `;
    })).then(htmls => { container.innerHTML = htmls.join(''); });
}

// ── Suggested people ──
function renderSuggestedPeople() {
    const container = document.getElementById('suggested-people-list');
    const suggested = allUsers.filter(u => !followingMap[u.uid]).slice(0, 6);
    if (!suggested.length) { container.innerHTML = ''; return; }
    container.innerHTML = suggested.map((u,i) => userCardHtml(u, i*50)).join('');
    feather.replace();
}

// ── Search ──
window.onSearchInput = () => {
    const q = document.getElementById('search-input').value.trim();
    document.getElementById('clear-btn').classList.toggle('show', q.length > 0);
    if (!q) { showDefaultView(); return; }
    showResultsView();
    clearTimeout(searchDebounce);
    searchDebounce = setTimeout(() => runSearch(q), 280);
};

window.onSearchKeydown = e => {
    if (e.key === 'Enter') {
        const q = document.getElementById('search-input').value.trim();
        if (q) { saveRecent(q); runSearch(q); }
    }
};

async function runSearch(q) {
    document.getElementById('spinner').style.display = 'block';
    document.getElementById('results-list').innerHTML = '';
    document.getElementById('no-results').style.display = 'none';
    document.getElementById('filter-tabs').style.display = 'flex';

    const ql = q.toLowerCase();

    // Users
    const userResults = allUsers.filter(u =>
        u.username?.toLowerCase().includes(ql) ||
        u.displayName?.toLowerCase().includes(ql) ||
        u.bio?.toLowerCase().includes(ql)
    );

    // Posts
    const postResults = allPosts.filter(p => (p.text||'').toLowerCase().includes(ql)).slice(0, 30);

    const postsWithUsers = await Promise.all(
        postResults.slice(0,20).map(async post => {
            const s = await get(ref(db, `users/${post.uid}`));
            return { ...post, user: s.val()||{} };
        })
    );

    document.getElementById('spinner').style.display = 'none';
    renderResults(userResults, postsWithUsers, q);
}

function renderResults(users, posts, q) {
    const list = document.getElementById('results-list');
    list.innerHTML = '';
    const showPeople = activeTab==='all' || activeTab==='people';
    const showPosts  = activeTab==='all' || activeTab==='posts';
    const showTags   = activeTab==='all' || activeTab==='tags';
    let hasContent = false;

    // Tag search
    if (showTags && q.startsWith('#')) {
        const tagPosts = posts.filter(p => (p.text||'').toLowerCase().includes(q.toLowerCase()));
        if (tagPosts.length) {
            hasContent = true;
            list.insertAdjacentHTML('beforeend', `<div class="section-label">Posts with ${escH(q)}</div>`);
            tagPosts.forEach((p,i) => list.insertAdjacentHTML('beforeend', postResultHtml(p,q,i*40)));
        }
    }

    // People
    if (showPeople && users.length) {
        hasContent = true;
        list.insertAdjacentHTML('beforeend', `<div class="section-label">People <span style="font-size:11px;font-weight:500;color:var(--text-muted);">${users.length} found</span></div>`);
        users.forEach((u,i) => list.insertAdjacentHTML('beforeend', userCardHtml(u, i*40)));
        if (showPosts && posts.length) list.insertAdjacentHTML('beforeend', '<div class="divider"></div>');
    }

    // Posts
    if (showPosts && posts.length) {
        hasContent = true;
        list.insertAdjacentHTML('beforeend', `<div class="section-label">Posts <span style="font-size:11px;font-weight:500;color:var(--text-muted);">${posts.length} found</span></div>`);
        posts.forEach((p,i) => list.insertAdjacentHTML('beforeend', postResultHtml(p,q,i*40)));
    }

    if (!hasContent) {
        document.getElementById('no-results-sub').textContent =
            `No results for "${q}". Try different words or check spelling.`;
        document.getElementById('no-results').style.display = 'block';
    }
    feather.replace();
}

// ── Tab switch ──
window.switchTab = tab => {
    activeTab = tab;
    document.querySelectorAll('.filter-tab').forEach(t => t.classList.toggle('active', t.dataset.tab===tab));
    const q = document.getElementById('search-input').value.trim();
    if (q) runSearch(q);
};

// ── HTML builders ──
function userCardHtml(u, delay=0) {
    const isFollowing = followingMap[u.uid];
    const followerCount = u.followersCount || Object.keys(u.followers||{}).length || 0;
    return `
        <div class="user-card" style="animation-delay:${delay}ms" onclick="goToProfile('${u.uid}')">
            <div class="user-avatar-wrap">
                <img class="user-avatar" src="${u.photoURL||avatarUrl(u)}" loading="lazy">
            </div>
            <div class="user-info">
                <div class="user-name-row">
                    <span class="user-name">${escH(u.displayName||u.username||'User')}</span>
                    ${u.verified ? `<span class="verified-badge">${VERIFIED_SVG}</span>` : ''}
                </div>
                <div class="user-handle">@${escH(u.username||'')}</div>
                ${u.bio ? `<div class="user-bio">${escH(u.bio)}</div>` : ''}
                ${followerCount > 0 ? `<div class="user-follower-count">${fmtNum(followerCount)} follower${followerCount!==1?'s':''}</div>` : ''}
            </div>
            <button class="follow-btn ${isFollowing?'following':''}" onclick="toggleFollow(event,'${u.uid}')">
                ${isFollowing ? 'Following' : 'Follow'}
            </button>
        </div>
    `;
}

function postResultHtml(post, q, delay=0) {
    const user = post.user||{};
    const likeCount = Object.keys(post.likes||{}).length;
    const commentCount = Object.keys(post.comments||{}).length;
    const highlighted = highlightQuery(escH(post.text||''), q);
    return `
        <div class="post-result" style="animation-delay:${delay}ms" onclick="goToPost('${post.id}')">
            <div class="post-result-header">
                <img class="post-result-avatar" src="${user.photoURL||avatarUrl(user)}" loading="lazy">
                <div class="post-result-meta">
                    <div class="post-result-name">
                        ${escH(user.displayName||'User')}
                        ${user.verified ? `<span class="verified-badge">${VERIFIED_SVG}</span>` : ''}
                    </div>
                    <div class="post-result-handle">
                        @${escH(user.username||'user')}
                        <span style="color:var(--surface3);">·</span>
                        ${fmtTime(post.timestamp)}
                    </div>
                </div>
            </div>
            ${post.text ? `<div class="post-result-text">${highlighted}</div>` : ''}
            ${post.mediaUrl && post.mediaType!=='video' ? `<div class="post-result-media"><img src="${post.mediaUrl}" loading="lazy"></div>` : ''}
            <div class="post-result-stats">
                <span class="post-stat"><i data-feather="heart" style="width:13px;height:13px;"></i> ${likeCount}</span>
                <span class="post-stat"><i data-feather="message-circle" style="width:13px;height:13px;"></i> ${commentCount}</span>
            </div>
        </div>
    `;
}

function highlightQuery(escapedHtml, q) {
    if (!q || q.startsWith('#')) return escapedHtml;
    const safe = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    return escapedHtml.replace(new RegExp(`(${safe})`, 'gi'), '<span class="highlight">$1</span>');
}

// ── Follow / Unfollow ──
window.toggleFollow = async (e, uid) => {
    e.stopPropagation();
    const btn = e.currentTarget;
    if (followingMap[uid]) {
        await remove(ref(db, `users/${currentUser.uid}/following/${uid}`));
        await remove(ref(db, `users/${uid}/followers/${currentUser.uid}`));
        delete followingMap[uid];
        btn.textContent='Follow'; btn.classList.remove('following');
        showToast('Unfollowed');
    } else {
        await set(ref(db, `users/${currentUser.uid}/following/${uid}`), true);
        await set(ref(db, `users/${uid}/followers/${currentUser.uid}`), true);
        followingMap[uid] = true;
        btn.textContent='Following'; btn.classList.add('following');
        showToast('Following! 🎉');
    }
};

// ── Recent searches ──
function saveRecent(q) {
    recentSearches = [q, ...recentSearches.filter(r=>r!==q)].slice(0,10);
    localStorage.setItem('vynix_recent', JSON.stringify(recentSearches));
}
function renderRecentSearches() {
    const section = document.getElementById('recent-section');
    const list = document.getElementById('recent-list');
    if (!recentSearches.length) { section.style.display='none'; return; }
    section.style.display='block';
    list.innerHTML = recentSearches.slice(0,8).map((q,i) => `
        <div class="recent-item" style="animation-delay:${i*30}ms" onclick="applyRecent('${escH(q)}')">
            <div class="recent-icon"><i data-feather="clock" style="width:16px;height:16px;"></i></div>
            <span class="recent-text">${escH(q)}</span>
            <button class="recent-remove" onclick="removeRecent(event,'${escH(q)}')">
                <i data-feather="x" style="width:14px;height:14px;"></i>
            </button>
        </div>
    `).join('');
    feather.replace();
}
window.applyRecent = q => {
    document.getElementById('search-input').value = q;
    document.getElementById('clear-btn').classList.add('show');
    showResultsView(); runSearch(q);
};
window.removeRecent = (e, q) => {
    e.stopPropagation();
    recentSearches = recentSearches.filter(r=>r!==q);
    localStorage.setItem('vynix_recent', JSON.stringify(recentSearches));
    renderRecentSearches();
};
window.clearAllRecent = () => {
    recentSearches=[];
    localStorage.setItem('vynix_recent', JSON.stringify(recentSearches));
    renderRecentSearches();
};

// ── Tag shortcut ──
window.searchTag = tag => {
    document.getElementById('search-input').value = tag;
    document.getElementById('clear-btn').classList.add('show');
    saveRecent(tag); showResultsView(); runSearch(tag);
};

// ── Views ──
function showDefaultView() {
    document.getElementById('default-view').style.display='block';
    document.getElementById('results-view').style.display='none';
    document.getElementById('filter-tabs').style.display='none';
    document.getElementById('clear-btn').classList.remove('show');
}
function showResultsView() {
    document.getElementById('default-view').style.display='none';
    document.getElementById('results-view').style.display='block';
}
window.clearSearch = () => {
    document.getElementById('search-input').value='';
    showDefaultView();
    document.getElementById('search-input').focus();
};

// ── Navigation ──
window.goToProfile = uid => window.location.href=`profile.html?id=${uid}`;
window.goToPost    = postId => window.location.href=`index.html#post-${postId}`;

// ── Badges ──
function setupBadges() {
    onValue(ref(db,`notifications/${currentUser.uid}`), snap => {
        let c=0; if(snap.exists())snap.forEach(ch=>{if(!ch.val().read)c++;});
        updateBadge('badge-notifications',c);
    });
    onValue(ref(db,`userChats/${currentUser.uid}`), snap => {
        let c=0; if(snap.exists())snap.forEach(ch=>{c+=ch.val().unreadCount||0;});
        updateBadge('badge-messages',c);
    });
}
function updateBadge(id,count){
    const b=document.getElementById(id); if(!b)return;
    if(count>0){b.textContent=count>99?'99+':count;b.classList.add('show');}
    else b.classList.remove('show');
}

// ── Utils ──
function escH(str){const d=document.createElement('div');d.textContent=str||'';return d.innerHTML;}
function avatarUrl(u){return`https://ui-avatars.com/api/?name=${encodeURIComponent(u.username||u.displayName||'U')}&background=random`;}
function fmtTime(ts){
    if(!ts)return'';const s=Math.floor((Date.now()-ts)/1000);
    if(s<60)return'now';if(s<3600)return Math.floor(s/60)+'m';
    if(s<86400)return Math.floor(s/3600)+'h';return Math.floor(s/86400)+'d';
}
function fmtNum(n){
    if(n>=1000000)return(n/1000000).toFixed(1)+'M';
    if(n>=1000)return(n/1000).toFixed(1)+'K';
    return String(n);
}
window.showToast = msg => {
    const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'),2500);
};
